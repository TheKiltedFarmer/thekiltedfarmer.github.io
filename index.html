// ── Admin Pending Review Queue ─────────────────────────────────────────────────
function PendingReviewQueue({onToast, setBills}) {
  const [pending, setPending] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    sb.from('pending_bills').select('*').eq('pending',true).order('created_at',{ascending:false})
      .then(({data})=>{ if(data) setPending(data); setLoading(false); });
  },[]);

  const approve = async(bill) => {
    const {cosigners:_c,cosign_count:_n,pending:_p,submitted_by_id:_s,submitted_by_name:_sn,source_url:_u,is_trusted_submission:_t,...billData} = bill;
    const id = bill.jurisdiction.split(' ')[0].toUpperCase().slice(0,8)+'_COM_'+Date.now();
    const {error} = await sb.from('bills').insert({...billData, id, votes_yes:0,votes_no:0,votes_abstain:0,created_at:new Date().toISOString()});
    if(!error){
      await sb.from('pending_bills').update({pending:false}).eq('id',bill.id);
      setPending(prev=>prev.filter(b=>b.id!==bill.id));
      setBills(prev=>[{...billData,id,votes_yes:0,votes_no:0,votes_abstain:0},...prev]);
      onToast('Bill approved and is now live!');
    } else onToast('Error: '+error.message);
  };

  const reject = async(bill) => {
    if(!window.confirm('Reject and remove "'+bill.title+'"?')) return;
    await sb.from('pending_bills').update({pending:false}).eq('id',bill.id);
    setPending(prev=>prev.filter(b=>b.id!==bill.id));
    onToast('Submission rejected and removed.');

  if(loading) return null;
  if(!pending.length) return null;

  return h('div',{style:{background:'#fff8e7',border:'2px solid #f0c040',borderRadius:10,padding:18,marginBottom:20}},
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#1a1a2e',marginBottom:4}},

    ),
    h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginBottom:14}},
      'These were submitted by residents. Approve to make live, or reject to remove.'
    ),
    pending.map(bill=>{
      const cosigners = (()=>{try{return JSON.parse(bill.cosigners||'[]');}catch(e){return [];}})();
      return h('div',{key:bill.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:10}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}},
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}},
              h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,textTransform:'uppercase'}},bill.level),
              h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,padding:'2px 8px',borderRadius:20}},bill.jurisdiction),
              h('span',{style:{background:'#e8f2fa',color:'#1a5c8a',fontSize:10,padding:'2px 8px',borderRadius:20}},cosigners.length+' co-signer'+(cosigners.length===1?'':'s'))
            ),
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:3}},bill.title),
            h('div',{style:{fontSize:12,color:'#aaa',marginBottom:6}},'Submitted by '+bill.submitted_by_name),
            h('div',{style:{fontSize:12,color:'#555',lineHeight:1.5}},bill.summary),
            bill.source_url&&h('div',{style:{marginTop:6}},
              h('a',{href:bill.source_url,target:'_blank',style:{fontSize:11,color:'#1a5c8a'}},'View source ->')
            )
          ),
          h('div',{style:{display:'flex',flexDirection:'column',gap:8,flexShrink:0}},
            h('button',{onClick:()=>approve(bill),style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'8px 16px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'✅ Approve'),
            h('button',{onClick:()=>reject(bill),style:{background:'#c0392b',color:'#fff',border:'none',padding:'8px 16px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'❌ Reject')
          )
        )
      );
    })
  );
}

// ── Bill Sub-Sections Voting ──────────────────────────────────────────────────
function BillSections({bill, user, onRepGain}) {
  const [sections, setSections] = useState(null);
  const [loading, setLoading] = useState(false);
  const [votes, setVotes] = useState({});
  const [open, setOpen] = useState(false);

  const loadSections = async() => {
    // Check DB first
    const {data} = await sb.from('bill_sections').select('*').eq('bill_id', bill.id).order('position');
    if(data && data.length) { setSections(data); return; }
    // Generate with AI
    setLoading(true);
    try {
      const res = await fetch(AI_PROXY, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:800,
          system:'Break this bill into distinct votable sections. Return ONLY valid JSON array, no markdown. Each section: {"title":"short plain title","summary":"1-2 sentences what this part does","position":1}. 3-7 sections max. Only create sections if the bill genuinely has distinct separable parts worth voting on individually.',
          messages:[{role:'user',content:'Bill: '+bill.title+'\n\nSummary: '+bill.summary+'\n\nFull text: '+(bill.full_text||bill.summary)+'\n\nBreak into distinct votable sections.'}]
        })
      });
      const json = await res.json();
      const raw = json.content?.find(b=>b.type==='text')?.text||'[]';
      const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
      if(parsed.length > 0) {
        // Save to DB
        const toInsert = parsed.map(s=>({...s, bill_id:bill.id, votes_yes:0, votes_no:0, votes_abstain:0, ai_generated:true, confirmed:false}));
        const {data:saved} = await sb.from('bill_sections').insert(toInsert).select();
        setSections(saved||parsed);
      }
    } catch(e) { setSections([]); }
    setLoading(false);
  };

  const voteOnSection = async(sectionId, choice) => {
    if(!user) return;
    if(votes[sectionId]) return;
    setVotes(v=>({...v,[sectionId]:choice}));
    setSections(prev=>prev.map(s=>s.id===sectionId?{...s,['votes_'+choice]:s['votes_'+choice]+1}:s));
    await sb.from('bill_section_votes').insert({section_id:sectionId, bill_id:bill.id, user_id:user.id, choice});
    if(onRepGain) onRepGain(2);
  };

  const loadUserVotes = async() => {
    if(!user||!sections) return;
    const ids = sections.map(s=>s.id).filter(Boolean);
    if(!ids.length) return;
    const {data} = await sb.from('bill_section_votes').select('*').eq('user_id',user.id).in('section_id',ids);
    if(data) { const v={}; data.forEach(d=>v[d.section_id]=d.choice); setVotes(v); }
  };

  useEffect(()=>{ if(sections) loadUserVotes(); },[sections]);

  if(!open) return h('button',{
    onClick:()=>{setOpen(true);if(!sections)loadSections();},
    style:{width:'100%',background:'#f0ebf8',border:'1px solid #c8b8e8',borderRadius:7,padding:'10px 14px',
      fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#5b3a8c',cursor:'pointer',marginTop:10,textAlign:'left'}
  },'🗂 Vote on Individual Sections of This Bill');

  return h('div',{style:{marginTop:10,border:'1px solid #c8b8e8',borderRadius:10,overflow:'hidden'}},
    h('div',{style:{background:'#5b3a8c',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:'#fff',fontSize:14}},'🗂 Section-by-Section Vote'),
      h('button',{onClick:()=>setOpen(false),style:{background:'transparent',border:'none',color:'rgba(255,255,255,.6)',cursor:'pointer',fontSize:16}},'x')
    ),
    h('div',{style:{padding:14,background:'#faf8ff'}},
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#888',fontStyle:'italic'}},
        h('div',{className:'spin',style:{marginBottom:8}}), 'AI is identifying the key sections...'
      ),
      sections&&sections.length===0&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa',fontStyle:'italic'}},
        'This bill does not have distinct separable sections to vote on individually.'
      ),
      sections&&sections.length>0&&h('div',null,
        h('div',{style:{fontSize:12,color:'#888',marginBottom:12,fontFamily:"'Lora',serif",lineHeight:1.6}},
          'Vote on each part independently. Your section votes are separate from your overall bill vote. +2 rep per section vote.'
        ),
        sections.map((s,i)=>{
          const total=(s.votes_yes||0)+(s.votes_no||0)+(s.votes_abstain||0);
          const myVote=votes[s.id];
          const pctYes=total?Math.round(s.votes_yes/total*100):0;
          const pctNo=total?Math.round(s.votes_no/total*100):0;
          return h('div',{key:s.id||i,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:10}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:4}},
              (i+1)+'. '+s.title
            ),
            h('p',{style:{fontSize:13,color:'#555',fontFamily:"'Lora',serif",lineHeight:1.6,marginBottom:10}},s.summary),
            !myVote
              ? h('div',{style:{display:'flex',gap:6}},
                  ['yes','no','abstain'].map(v=>h('button',{key:v,onClick:()=>voteOnSection(s.id,v),
                    style:{flex:1,background:v==='yes'?'#1a6b3c':v==='no'?'#c0392b':'#777',color:'#fff',
                      border:'none',borderRadius:5,padding:'7px',fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}
                  },v==='yes'?'✅ Support':v==='no'?'❌ Oppose':'⬜ Abstain'))
                )
              : h('div',null,
                  h('div',{style:{fontSize:12,color:'#1a6b3c',fontWeight:600,marginBottom:6}},
                    'Your vote: '+(myVote==='yes'?'✅ Support':myVote==='no'?'❌ Oppose':'⬜ Abstain')
                  ),
                  total>0&&h('div',null,
                    h('div',{style:{height:6,background:'#eee',borderRadius:3,overflow:'hidden',marginBottom:4}},
                      h('div',{style:{width:pctYes+'%',height:'100%',background:'#1a6b3c',display:'inline-block'}}),
                      h('div',{style:{width:pctNo+'%',height:'100%',background:'#c0392b',display:'inline-block'}})
                    ),
                    h('div',{style:{fontSize:11,color:'#aaa'}},pctYes+'% support · '+pctNo+'% oppose · '+total+' votes')
                  )
                )
          );
        })
      )
    )
  );
}

function IdeasTab({user, profile, rep, onToast}) {
  const [ideas, setIdeas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);

  const [upvoted, setUpvoted] = useState({});
  const set = k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  useEffect(()=>{
    sb.from('community_ideas').select('*').order('upvotes',{ascending:false})
      .then(({data})=>{ setIdeas(data||[]); setLoading(false); });
    if(user) sb.from('idea_upvotes').select('idea_id').eq('user_id',user.id)
      .then(({data})=>{ if(data){const v={};data.forEach(d=>v[d.idea_id]=true);setUpvoted(v);}});
  },[]);

  const submit = async()=>{
    if(!form.title.trim()||!form.description.trim()){onToast('Title and description required.');return;}
    setSaving(true);
    const idea = {
      ...form,
      submitted_by_id:user.id,
      submitted_by_name:profile?.display_name||user.email?.split('@')[0],
      upvotes:1,
      forwarded:false,
      created_at:new Date().toISOString()
    };
    const {data,error} = await sb.from('community_ideas').insert(idea).select().single();
    if(!error&&data){
      await sb.from('idea_upvotes').insert({idea_id:data.id,user_id:user.id});
      setIdeas(prev=>[data,...prev]);
      setUpvoted(v=>({...v,[data.id]:true}));
      onToast('Idea submitted! Others can now upvote it.');
      setShowAdd(false);
      setForm({title:'',description:'',category:'Roads & Infrastructure',location:'',target_official:''});
    } else onToast('Error submitting. Try again.');
    setSaving(false);
  };

  const upvote = async(idea)=>{
    if(!user){onToast('Sign in to upvote.');return;}
    if(upvoted[idea.id]){onToast('You already upvoted this.');return;}
    const newCount = (idea.upvotes||0)+1;
    setIdeas(prev=>prev.map(i=>i.id===idea.id?{...i,upvotes:newCount}:i));

    ),

    showAdd&&h('div',{style:{background:'#fff',border:'2px solid #1a6b3c',borderRadius:12,padding:20,marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#1a1a2e',marginBottom:14}},'Share a Community Idea'),
      h('div',{style:{marginBottom:10}},

        h('input',{value:form.title,onChange:set('title'),placeholder:'e.g. Fix the pothole on Michigan Ave near 4th St',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box'}})
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Description *'),
        h('textarea',{value:form.description,onChange:set('description'),rows:3,

function ResourceApprovalQueue({onToast}) {
  const [pending, setPending] = useState([]);
  useEffect(()=>{
    sb.from('community_resources').select('*').eq('approved',false).order('created_at',{ascending:false})
      .then(({data})=>setPending(data||[]));
  },[]);
  const approve = async(r)=>{
    await sb.from('community_resources').update({approved:true}).eq('id',r.id);
    setPending(p=>p.filter(x=>x.id!==r.id));
    onToast('Resource approved and live!');
  };
  const reject = async(r)=>{
    if(!window.confirm('Remove "'+r.name+'"?')) return;
    await sb.from('community_resources').delete().eq('id',r.id);
    setPending(p=>p.filter(x=>x.id!==r.id));
    onToast('Resource removed.');
  };
  if(!pending.length) return null;
  return h('div',{style:{background:'#e8f2fa',border:'1px solid #c8d8f0',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:10}},
      '📚 Resources Awaiting Approval ('+pending.length+')'
    ),
    pending.map(r=>h('div',{key:r.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:7,padding:'10px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,flexWrap:'wrap'}},
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:700,fontSize:14,color:'#1a1a2e'}},r.name),
        h('div',{style:{fontSize:12,color:'#888'}},'Submitted by '+r.submitted_by_name+' • '+r.category),
        h('div',{style:{fontSize:12,color:'#555',marginTop:4}},r.description)
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:()=>approve(r),style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'✅ Approve'),
        h('button',{onClick:()=>reject(r),style:{background:'#c0392b',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'❌ Remove')
      )
    ))
  );
}

// ── Feedback Form ─────────────────────────────────────────────────────────────
function FeedbackButton({user}) {
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({type:'suggestion',message:''});
  const [saving, setSaving] = useState(false);
  const [done, setDone] = useState(false);
  const set = k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  const submit = async()=>{
    if(!form.message.trim()) return;
    setSaving(true);
    await sb.from('user_feedback').insert({
      type:form.type,
      message:form.message.trim(),
      submitted_by_id:user?.id||null,
      submitted_by_name:user?.display_name||user?.email?.split('@')[0]||'Anonymous',
      submitted_by_email:user?.email||null,
      read:false,
      created_at:new Date().toISOString()

                  },t)
                )
              )
            ),
            h('div',{style:{marginBottom:12}},
              h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:5}},'Message *'),

// ── Feedback Inbox (Admin) ────────────────────────────────────────────────────
function FeedbackInbox({onToast}) {
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [unread, setUnread] = useState(0);
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    sb.from('user_feedback').select('*').order('created_at',{ascending:false})
      .then(({data})=>{
        setMessages(data||[]);
        setUnread((data||[]).filter(m=>!m.read).length);
        setLoading(false);
      });
  },[]);

  const markRead = async(id)=>{
    await sb.from('user_feedback').update({read:true}).eq('id',id);
    setMessages(prev=>prev.map(m=>m.id===id?{...m,read:true}:m));
    setUnread(u=>Math.max(0,u-1));
  };

  const del = async(id)=>{
    await sb.from('user_feedback').delete().eq('id',id);
    setMessages(prev=>prev.filter(m=>m.id!==id));
    onToast('Message deleted.');
  };

  const typeColor={suggestion:'#1a5c8a',bug:'#c0392b',question:'#8a6000',other:'#888'};

    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:open?14:0,cursor:'pointer'},onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',display:'flex',alignItems:'center',gap:8}},
        '💬 Feedback Inbox',
        unread>0&&h('span',{style:{background:'#c0392b',color:'#fff',borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:700}},unread+' new')
      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')
    ),
    open&&h('div',null,
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa'}},'Loading...'),
      !loading&&messages.length===0&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa',fontStyle:'italic'}},'No messages yet.'),
      messages.map(m=>h('div',{key:m.id,
        style:{background:m.read?'#fff':'#faf5ff',border:'1px solid '+(m.read?'#e5dece':'#c8b8e8'),
          borderRadius:8,padding:'12px 14px',marginBottom:8}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6,flexWrap:'wrap',gap:6}},
          h('div',{style:{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}},
            h('span',{style:{background:typeColor[m.type]||'#888',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,textTransform:'uppercase'}},m.type),
            h('span',{style:{fontWeight:700,fontSize:13,color:'#1a1a2e'}},m.submitted_by_name),
            m.submitted_by_email&&h('span',{style:{fontSize:12,color:'#1a5c8a'}},m.submitted_by_email),
            !m.read&&h('span',{style:{fontSize:10,color:'#c0392b',fontWeight:700}},'NEW')
          ),
          h('span',{style:{fontSize:11,color:'#bbb',flexShrink:0}},new Date(m.created_at).toLocaleDateString())
        ),
        h('div',{style:{fontSize:13,color:'#333',fontFamily:"'Lora',serif",lineHeight:1.7,marginBottom:8}},m.message),
        h('div',{style:{display:'flex',gap:8}},
          !m.read&&h('button',{onClick:()=>markRead(m.id),
            style:{background:'#5b3a8c',color:'#fff',border:'none',padding:'5px 12px',borderRadius:5,fontSize:12,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:700}
          },'Mark Read'),
          m.submitted_by_email&&h('a',{href:'mailto:'+m.submitted_by_email+'?subject=Re: Your feedback on The People\'s Voice',
            style:{background:'#1a5c8a',color:'#fff',textDecoration:'none',padding:'5px 12px',borderRadius:5,fontSize:12,fontFamily:"'Playfair Display',serif",fontWeight:700}
          },'Reply'),

// ── Official Manager (Admin) ──────────────────────────────────────────────────
function OfficialManager({onToast}) {
  const [officials, setOfficials] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [colMissing, setColMissing] = useState(false);

  useEffect(()=>{
    // Try to load officials - gracefully handle missing column
    sb.from('profiles').select('id,display_name,email,is_official,official_title,zip')
      .eq('is_official',true).order('display_name')
      .then(({data,error})=>{
        if(error && error.message && error.message.includes('is_official')) {
          setColMissing(true);
        } else {
          setOfficials(data||[]);
        }
        setLoading(false);
      })
      .catch(()=>{ setColMissing(true); setLoading(false); });
  },[]);

  const searchUsers = async()=>{
    if(!search.trim()) return;
    setSearching(true);
    try {
      // Search by display_name OR email
      const q = search.trim();
      const {data:byName} = await sb.from('profiles')
        .select('id,display_name,email,is_official,official_title,zip')
        .ilike('display_name','%'+q+'%').limit(10);
      const {data:byEmail} = await sb.from('profiles')
        .select('id,display_name,email,is_official,official_title,zip')
        .ilike('email','%'+q+'%').limit(5);
      const all = [...(byName||[]),...(byEmail||[])];
      const seen = new Set();
      const deduped = all.filter(r=>{ if(seen.has(r.id)) return false; seen.add(r.id); return true; });
      setResults(deduped);
      if(deduped.length===0) onToast('No users found. Try their email address.');
    } catch(e) {
      onToast('Search failed. Check Supabase column exists.');
    }
    setSearching(false);
  };

  const grantOfficial = async(profile)=>{
    const t = window.prompt('Enter their official title:\ne.g. "Ward 3 Council Member, City of Jackson"');
    if(!t||!t.trim()) return;
    try {
      const {error} = await sb.from('profiles').update({is_official:true,official_title:t.trim()}).eq('id',profile.id);
      if(error) throw error;
      const updated = {...profile,is_official:true,official_title:t.trim()};
      setOfficials(prev=>[...prev.filter(o=>o.id!==profile.id),updated]);
      setResults(prev=>prev.map(r=>r.id===profile.id?updated:r));
      onToast('Official badge granted to '+(profile.display_name||profile.email));
    } catch(e) {
      onToast('Error: '+(e.message||'Could not grant badge. Run the column SQL first.'));
    }
  };

  const revokeOfficial = async(profile)=>{
    if(!window.confirm('Remove badge from '+(profile.display_name||profile.email)+'?')) return;
    await sb.from('profiles').update({is_official:false,official_title:null}).eq('id',profile.id);
    setOfficials(prev=>prev.filter(o=>o.id!==profile.id));
    onToast('Badge removed.');
  };

  return h('div',{style:{background:'#e8f2fa',border:'1px solid #c8d8f0',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:open?14:0,cursor:'pointer'},onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e'}},
        '🏛 Verified Officials ('+officials.length+')'      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')    ),
    open&&h('div',null,
      colMissing&&h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'12px 14px',marginBottom:12,fontSize:13,color:'#8a6000'}},
        '⚠️ Run this SQL in Supabase first: ',
        h('code',{style:{display:'block',marginTop:6,background:'#f5f5f5',padding:'8px 10px',borderRadius:4,fontSize:11,color:'#333'}},
          'alter table public.profiles add column if not exists is_official boolean default false;\nalter table public.profiles add column if not exists official_title text;'
        )
      ),
      !colMissing&&officials.length>0&&h('div',{style:{marginBottom:16}},
        h('div',{style:{fontSize:12,color:'#888',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'Current Verified Officials'),
        officials.map(o=>h('div',{key:o.id,style:{background:'#fff',border:'1px solid #c8d8f0',borderRadius:7,padding:'10px 12px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
          h('div',null,
            h('div',{style:{fontWeight:700,fontSize:13,color:'#1a1a2e',display:'flex',alignItems:'center',gap:6}},
              o.display_name||o.email,
              h(OfficialBadge,{title:o.official_title,small:true})
            ),
            h('div',{style:{fontSize:11,color:'#888',marginTop:2}},o.official_title),
            o.email&&h('div',{style:{fontSize:11,color:'#1a5c8a'}},o.email)
          ),
          h('button',{onClick:()=>revokeOfficial(o),
            style:{background:'transparent',border:'1px solid #ddd',color:'#c0392b',padding:'5px 10px',borderRadius:5,fontSize:11,cursor:'pointer'}          },'Remove Badge')        ))      ),
      !colMissing&&officials.length===0&&h('div',{style:{fontSize:13,color:'#aaa',fontStyle:'italic',marginBottom:12}},'No verified officials yet.'),
      !colMissing&&h('div',null,
        h('div',{style:{fontSize:12,color:'#888',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'Grant Official Badge'),
        h('div',{style:{fontSize:12,color:'#888',marginBottom:8}},'Search by name or email address:'),
        h('div',{style:{display:'flex',gap:8,marginBottom:10}},
          h('input',{value:search,onChange:e=>setSearch(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&searchUsers(),
            placeholder:'Name or email...',
            style:{flex:1,border:'1px solid #ddd',borderRadius:6,padding:'8px 11px',fontSize:13}}),
          h('button',{onClick:searchUsers,disabled:searching,
            style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'8px 16px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}          },searching?'...':'Search')        ),
        results.length===0&&search.trim()&&!searching&&h('div',{style:{fontSize:12,color:'#aaa',fontStyle:'italic',marginBottom:8}},'No users found. Try searching by email address.'),
        results.map(r=>h('div',{key:r.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:7,padding:'10px 12px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
          h('div',null,
            h('div',{style:{fontWeight:700,fontSize:13,color:'#1a1a2e'}},r.display_name||'(no name)'),
            r.email&&h('div',{style:{fontSize:11,color:'#888'}},r.email),
            r.is_official&&h('div',{style:{fontSize:11,color:'#1a5c8a',fontWeight:600}},'Already verified: '+r.official_title)
          ),
          !r.is_official
            ? h('button',{onClick:()=>grantOfficial(r),
                style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}              },'🏛 Grant Badge')            : h('button',{onClick:()=>revokeOfficial(r),
                style:{background:'transparent',border:'1px solid #ddd',color:'#c0392b',padding:'7px 12px',borderRadius:5,fontSize:12,cursor:'pointer'}              },'Remove')        ))      )    )  );}

function NominationsInbox({onToast}) {
  const [nominations, setNominations] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    sb.from('bill_nominations').select('*').order('created_at',{ascending:false})
      .then(({data})=>{ setNominations(data||[]); setLoading(false); });
  },[]);

  const dismiss = async(id)=>{
    await sb.from('bill_nominations').delete().eq('id',id);
    setNominations(prev=>prev.filter(n=>n.id!==id));
    onToast('Nomination dismissed.');
  };

  const unread = nominations.length;

  return h('div',{style:{background:'#f0f8ff',border:'1px solid #c8d8f0',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:open?14:0,cursor:'pointer'},onClick:()=>setOpen(!open)},

        '💡 Bill Nominations',
        unread>0&&h('span',{style:{background:'#1a5c8a',color:'#fff',borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:700}},unread)
      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')
    ),
    open&&h('div',null,
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa'}},'Loading...'),
      !loading&&nominations.length===0&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa',fontStyle:'italic'}},'No nominations yet.'),
      nominations.map(n=>h('div',{key:n.id,
        style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:8}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:4}},n.title),
        n.note&&h('div',{style:{fontSize:13,color:'#555',fontFamily:"'Lora',serif",lineHeight:1.6,marginBottom:6}},n.note),
        h('div',{style:{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center',marginBottom:8}},
          h('span',{style:{fontSize:12,color:'#888'}},'From: '+n.submitted_by_name),
          h('span',{style:{fontSize:11,color:'#bbb'}},new Date(n.created_at).toLocaleDateString()),
          n.source_url&&h('a',{href:n.source_url,target:'_blank',
            style:{fontSize:12,color:'#1a5c8a',textDecoration:'none'}},'📎 Source link')
        ),
        h('div',{style:{display:'flex',gap:8}},
          n.source_url&&h('a',{href:n.source_url,target:'_blank',
            style:{background:'#1a5c8a',color:'#fff',textDecoration:'none',padding:'6px 14px',borderRadius:5,
              fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12}
          },'View & Add to App'),
          h('button',{onClick:()=>dismiss(n.id),
            style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',padding:'6px 12px',borderRadius:5,fontSize:12,cursor:'pointer'}
          },'Dismiss')
        )
      ))
    )
  );
}

const ADMIN_PASSWORD = "PeoplesVoice2025!";
const LEVELS = ['village','city','township','state','federal','county'];
const JURISDICTIONS = [
  'Village of Concord','City of Jackson','Summit Township','Columbia Township',
  'Napoleon Township','Grass Lake Township','Spring Arbor Township','Leoni Township',
  'Blackman Township','Rives Township','Henrietta Township','Waterloo Township',
  'Norvell Township','Hanover Township','Springport Township','Liberty Township',
  'Pulaski Township','Sandstone Township','Tompkins Township','Concord Township',

];

function AdminPanel({bills,setBills,onToast}) {
  const [authed,setAuthed]=useState(false);
  const [pw,setPw]=useState('');
  const [pwErr,setPwErr]=useState('');
  const [view,setView]=useState('list'); // list | add | edit
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [deleting,setDeleting]=useState(null);

  const EMPTY = {id:'',level:'city',jurisdiction:'City of Jackson',title:'',status:'',introduced:'',sponsor:'',summary:'',full_text:'',votes_yes:0,votes_no:0,votes_abstain:0,created_at:'2025-01-01'};
  const [form,setForm]=useState(EMPTY);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const [sourceUrl,setSourceUrl]=useState('');
  const [fetching,setFetching]=useState(false);
  const [fetchMsg,setFetchMsg]=useState('');

  const fetchFromUrl=async()=>{
    if(!sourceUrl.trim()){setFetchMsg('Please enter a URL first.');return;}
    setFetching(true);setFetchMsg('Fetching page...');
    try{
      // Use a CORS proxy to fetch the government page
      const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(sourceUrl);
      const res=await fetch(proxy);
      const json=await res.json();
      const raw=json.contents||'';
      // Strip HTML tags to get readable text
      const text=raw.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
                    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
                    .replace(/<[^>]+>/g,' ')
                    .replace(/\s+/g,' ')
                    .trim()
                    .slice(0,6000);
      if(!text||text.length<100){setFetchMsg('Could not read that page. Try pasting the text manually.');setFetching(false);return;}
      setFetchMsg('Analyzing with AI...');
      const aiRes=await fetch(AI_PROXY,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:'You are a civic data extractor. Extract bill/proposal information from government website text and return ONLY valid JSON with no markdown. If you cannot find a specific field, use an empty string. Schema: {"title":"full bill or proposal title","level":"one of: village, city, township, county, state, federal","jurisdiction":"the specific government body e.g. City of Jackson or Village of Concord","status":"current status e.g. Council Vote Pending or Passed or Under Review","introduced":"date introduced if found","sponsor":"sponsor or author name if found","summary":"2-3 plain English sentences describing what this proposal does","full_text":"key text from the proposal plus the source URL"}',
          messages:[{role:'user',content:'Extract bill information from this government page (source: '+sourceUrl+'):\n\n'+text}]
        })
      });
      const aiJson=await aiRes.json();
      const aiRaw=aiJson.content?.find(b=>b.type==='text')?.text||'{}';
      const extracted=JSON.parse(aiRaw.replace(/```json|```/g,'').trim());
      // Merge extracted data into form, append source URL to full_text
      setForm(f=>({
        ...f,
        title:extracted.title||f.title,
        level:extracted.level||f.level,
        jurisdiction:extracted.jurisdiction||f.jurisdiction,
        status:extracted.status||f.status,
        introduced:extracted.introduced||f.introduced,
        sponsor:extracted.sponsor||f.sponsor,
        summary:extracted.summary||f.summary,
        full_text:(extracted.full_text||f.full_text)+'\n\nSource: '+sourceUrl,
      }));
      setFetchMsg('✅ Fields filled in! Review everything below before publishing.');
    }catch(e){
      setFetchMsg('❌ Could not fetch that page. Try a different URL, or fill in the form manually.');
    }
    setFetching(false);
  };

  const tryAuth=()=>{
    if(pw===ADMIN_PASSWORD){setAuthed(true);setPwErr('');}
    else setPwErr('Incorrect password. Try again.');
  };

  const openAdd=()=>{setForm(EMPTY);setEditing(null);setView('add');setSourceUrl('');setFetchMsg('');};
  const openEdit=(bill)=>{setForm({...bill});setEditing(bill.id);setView('edit');setSourceUrl('');setFetchMsg('');};

  const genId=()=>{
    const slug=form.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,20);
    const jurisSlug=form.jurisdiction.split(' ')[0].toUpperCase().slice(0,8);
    return jurisSlug+'-'+new Date().getFullYear()+'-'+slug.slice(0,12).replace(/-$/,'');
  };

  const saveBill=async()=>{
    if(!form.title.trim()||!form.summary.trim()||!form.jurisdiction){
      onToast('Please fill in Title, Summary, and Jurisdiction.');return;
    }
    setSaving(true);
    const billData={
      ...form,
      id:editing||genId(),
      votes_yes:parseInt(form.votes_yes)||0,
      votes_no:parseInt(form.votes_no)||0,
      votes_abstain:parseInt(form.votes_abstain)||0,
    };
    const {error}=await sb.from('bills').upsert(billData,{onConflict:'id'});
    if(error){onToast('Error saving: '+error.message);}
    else{
      setBills(prev=>editing?prev.map(b=>b.id===editing?billData:b):[billData,...prev]);
      onToast(editing?'Bill updated!':'Bill added! It\'s now live for the community.');
      setView('list');
    }
    setSaving(false);
  };

  const deleteBill=async(bill)=>{
    if(!window.confirm('Delete "'+bill.title+'"? This cannot be undone.'))return;
    setDeleting(bill.id);
    await sb.from('user_votes').delete().eq('bill_id',bill.id);
    await sb.from('bill_comments').delete().eq('bill_id',bill.id);
    const {error}=await sb.from('bills').delete().eq('id',bill.id);
    if(error)onToast('Error: '+error.message);
    else{setBills(prev=>prev.filter(b=>b.id!==bill.id));onToast('Bill removed.');}
    setDeleting(null);
  };

  const inp = (label,key,placeholder,type='text',opts={}) =>
    h('div',{style:{marginBottom:12}},
      h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},label),

        h('input',{value:form[key],onChange:set(key),placeholder,type,style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
    );

  const sel = (label,key,options) =>
    h('div',{style:{marginBottom:12}},
      h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},label),
      h('select',{value:form[key],onChange:set(key),style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13}},
        options.map(o=>h('option',{key:o,value:o},o))
      )
    );

  if(!authed) return h('div',{style:{maxWidth:440,margin:'0 auto',padding:32}},
    h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:32,textAlign:'center'}},
      h('div',{style:{fontSize:32,marginBottom:12}},"🔐"),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:'#f0c040',marginBottom:8}},"Admin Access"),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#8899aa',marginBottom:20}},
        "This panel lets you add, edit, and remove bills for any community. Enter the admin password to continue."
      ),
      h('input',{value:pw,onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==='Enter'&&tryAuth(),type:'password',placeholder:'Admin password',style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'11px 13px',fontSize:14,boxSizing:'border-box',marginBottom:10,background:'#23233a',color:'#fff'}}),
      pwErr&&h('div',{style:{color:'#e74c3c',fontSize:12,marginBottom:10,textAlign:'left'}},pwErr),
      h('button',{onClick:tryAuth,style:{width:'100%',background:'#f0c040',color:'#1a1a2e',border:'none',padding:'12px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15}},"Enter Admin Panel ->")
    )
  );

  if(view==='list') return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},
          "⚙️ Admin Panel - Bills Manager"
        ),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:3}},
          "Add or update bills for any community. Changes go live immediately."
        )
      ),
      h('button',{onClick:openAdd,style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'10px 20px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14}},
        "+ Add New Bill"
      )
    ),

    // Pending community submissions review queue
    h(PendingReviewQueue,{onToast,setBills}),
    h(ResourceApprovalQueue,{onToast}),
    h(NominationsInbox,{onToast}),
    h(FeedbackInbox,{onToast}),
    h(OfficialManager,{onToast}),

    h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'12px 16px',marginBottom:16,fontSize:13,fontFamily:"'Lora',serif",color:'#8a6000',lineHeight:1.7}},
      "⚠️ ",h('strong',null,"Admin tips:")," Only add bills with verified, publicly-sourced information. Include the source in the Full Text field. Bills you add go live immediately for all users. Deleting a bill also removes all votes and comments on it - use carefully."
    ),

    bills.map(bill=>h('div',{key:bill.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,marginBottom:10,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}},
      h('div',{style:{flex:1,minWidth:200}},
        h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}},
          h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,textTransform:'uppercase'}},bill.level),
          h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,padding:'2px 8px',borderRadius:20}},bill.jurisdiction),
          h('span',{style:{background:'#fffbea',color:'#8a6000',fontSize:10,padding:'2px 8px',borderRadius:20}},bill.status||'No status')
        ),
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:4}},bill.title),
        h('div',{style:{fontSize:11,color:'#aaa'}},

      ),
      h('div',{style:{display:'flex',gap:8,flexShrink:0}},

          deleting===bill.id?"...":"🗑 Delete"

  return h('div',null,
    h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:20}},

      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:18,color:'#1a1a2e'}},

    // URL Auto-fill section
    h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:20,marginBottom:20}},

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [rep,setRep]=useState(0);
  const [mainTab,setMainTab]=useState('bills');
  const [bills,setBills]=useState([]);
  const [pendingBills,setPendingBills]=useState([]);
  const [projects,setProjects]=useState([]);
  const [billFilter,setBillFilter]=useState('all');
  const [userVotes,setUserVotes]=useState({});
  const [showPropose,setShowPropose]=useState(false);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const [showAdmin,setShowAdmin]=useState(false);
  const [showOnboarding,setShowOnboarding]=useState(false);
  const [showProfile,setShowProfile]=useState(false);

  const [memberCount,setMemberCount]=useState(null);

  useEffect(()=>{initApp();},[]);

  const initApp=async()=>{
    // Hard timeout - if Supabase hangs, show app with local data after 5s
    const timeout=setTimeout(()=>{
      console.warn('initApp timed out - loading with local seed data');
      setBills(prev=>prev.length?prev:SEED_BILLS);
      setLoading(false);
    },5000);
    try{
      const {data:{session}}=await sb.auth.getSession();
      if(session?.user){
        const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
        setUser({...session.user,...(prof||{})});setProfile(prof||{});setRep(prof?.reputation||0);
        loadUserVotes(session.user.id);
      }
      await loadBills();
      await loadProjects();
      await loadPendingBills();
    }catch(e){
      console.error('initApp error:',e);
      setBills(SEED_BILLS);
    }finally{
      clearTimeout(timeout);
      setLoading(false);
      // Load member count after app is ready
      sb.from('profiles').select('id',{count:'exact',head:true})
        .then(({count})=>{ if(count!==null) setMemberCount(count); });
    }
  };

  const loadBills=async()=>{
    const {data,error}=await sb.from('bills').select('*').order('id');
    if(data&&data.length){
      setBills(data);
    } else {
      // No bills in DB yet - show seed bills locally, they'll be added via Admin panel
      setBills(SEED_BILLS);
    }
  };
  const loadPendingBills=async()=>{
    const {data}=await sb.from('pending_bills').select('*').eq('pending',true).order('created_at',{ascending:false});
    if(data) setPendingBills(data);
  };
  const loadProjects=async()=>{const {data}=await sb.from('projects').select('*').order('created_at',{ascending:false});if(data)setProjects(data);};
  const loadUserVotes=async(uid)=>{const {data}=await sb.from('user_votes').select('*').eq('user_id',uid);if(data){const v={};data.forEach(d=>{v[d.bill_id]={choice:d.choice,anonymous:d.anonymous};});setUserVotes(v);}};

  const handleAuth=(authUser,prof)=>{
    setUser({...authUser,...prof});setProfile(prof);setRep(prof?.reputation||0);loadUserVotes(authUser.id);
    // Show onboarding for brand new users (reputation is 0 and no votes)
    if(!prof?.reputation||prof.reputation===0) setShowOnboarding(true);
  };
  const handleVoteCast=(billId,choice,anon)=>{setUserVotes(prev=>({...prev,[billId]:{choice,anonymous:anon}}));setBills(prev=>prev.map(b=>b.id!==billId?b:{...b,['votes_'+choice]:b['votes_'+choice]+1}));};
  const gainRep=pts=>{setRep(r=>r+pts);if(user)setUser(u=>({...u,reputation:(u.reputation||0)+pts}));};
  const handlePropose=async(data)=>{
    if(!user)return;
    const name=profile?.display_name||user.email.split('@')[0];
    const {data:proj,error}=await sb.from('projects').insert({...data,proposer_id:user.id,proposer_name:name,supporter_count:1}).select().single();
    if(!error&&proj){await sb.from('project_supporters').insert({project_id:proj.id,user_id:user.id});setProjects(prev=>[proj,...prev]);gainRep(10);setToast("Project submitted! +10 rep");}
  };
  const handleSignOut=async()=>{await sb.auth.signOut();setUser(null);setProfile(null);setRep(0);setUserVotes({});};

  // ZIP search - must be declared before any conditional returns (Rules of Hooks)
  const [zipSearch,setZipSearch]=useState('');
  const [keywordSearch,setKeywordSearch]=useState('');

  if(loading)return h('div',{style:{minHeight:'100vh',background:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},h(Spinner),h('div',{style:{color:'#f0c040',fontFamily:"'Playfair Display',serif",fontSize:18}},"Loading The People's Voice..."));
  if(!user)return h(AuthScreen,{onAuth:handleAuth});

  const repInfo=repLevel(rep);
  const canPropose=rep>=REP_TO_PROPOSE;

  const searchedCommunity = ZIP_COMMUNITY[zipSearch.trim()] || null;

  const getFilteredBills = () => {
    let filtered = bills;
    // ZIP filter
    if(zipSearch.trim().length===5 && searchedCommunity) {
      const communityLower = searchedCommunity.toLowerCase();
      filtered = bills.filter(b => {
        if(b.level==='federal'||b.level==='state') return true;
        const jurisLower = (b.jurisdiction||'').toLowerCase();
        if(jurisLower.includes(communityLower)) return true;
        if(billFilter!=='all' && b.level===billFilter) return true;
        return false;
      });
    } else if(billFilter!=='all') {
      filtered = bills.filter(b=>b.level===billFilter);
    }
    // Keyword search
    if(keywordSearch.trim().length>1) {
      const kw = keywordSearch.trim().toLowerCase();
      filtered = filtered.filter(b=>
        (b.title||'').toLowerCase().includes(kw) ||
        (b.summary||'').toLowerCase().includes(kw) ||
        (b.sponsor||'').toLowerCase().includes(kw) ||
        (b.jurisdiction||'').toLowerCase().includes(kw) ||
        (b.full_text||'').toLowerCase().includes(kw) ||
        (b.status||'').toLowerCase().includes(kw)
      );
    }
    return filtered;
  };

  const filteredBills = getFilteredBills();
  const totalVotes=bills.reduce((a,b)=>a+b.votes_yes+b.votes_no+b.votes_abstain,0);
  const displayName=profile?.display_name||user.email.split('@')[0];

  return h('div',{style:{minHeight:'100vh',background:'#f4f1ea'}},
    toast&&h(Toast,{msg:toast,onDone:()=>setToast(null)}),
    showPropose&&h(ProposeModal,{onClose:()=>setShowPropose(false),onSubmit:handlePropose}),
    showOnboarding&&h(OnboardingTour,{onDone:()=>setShowOnboarding(false),displayName:profile?.display_name||user.email?.split('@')[0]}),
    showProfile&&h(ProfilePage,{user,profile,rep,bills,userVotes,onClose:()=>setShowProfile(false),onProfileUpdate:(updates)=>setProfile(p=>({...p,...updates}))}),
    h(FeedbackButton,{user}),

    // Header
    h('div',{style:{background:'#1a1a2e',borderBottom:'4px solid #f0c040'}},
      h('div',{style:{maxWidth:900,margin:'0 auto',padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}},
        h('div',null,
          h('div',{style:{fontSize:10,color:'#8899aa',letterSpacing:3,textTransform:'uppercase',marginBottom:2}},"Civic Engagement Platform"),
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:22,color:'#f0c040',letterSpacing:-.5}},"The People's Voice")
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}},
          h('div',{style:{background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,padding:'7px 12px',textAlign:'center'}},
            h('div',{style:{fontSize:10,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,marginBottom:2}},"Reputation"),
            h('div',{style:{display:'flex',alignItems:'center',gap:5}},
              h('span',{style:{fontSize:16}},repInfo.icon),
              h('div',null,
                h('div',{style:{color:'#f0c040',fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14}},rep+" pts"),
                h('div',{style:{color:repInfo.color,fontSize:10,fontWeight:600}},repInfo.label)
              )
            ),
            !canPropose&&h('div',{style:{fontSize:10,color:'#8899aa',marginTop:2}},REP_TO_PROPOSE-rep+" more to propose"),
            canPropose&&h('div',{style:{fontSize:10,color:'#f0c040',marginTop:2}},"✓ Can propose")
          ),
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{color:'#fff',fontSize:12,fontFamily:"'Playfair Display',serif"}},displayName),
            h('div',{style:{color:'#f0c040',fontSize:10}},
              profile?.street_address
                ? "📍 Self-Attested · "+profile.zip
                : "✓ Verified · ZIP "+(profile?.zip||'')
            ),
            h('button',{onClick:handleSignOut,style:{background:'transparent',border:'none',color:'#8899aa',fontSize:11,cursor:'pointer',marginTop:2,fontFamily:"'Lora',serif"}},"\uD83D\uDEAA Sign out"),
            h('button',{onClick:()=>setShowProfile(true),style:{background:'transparent',border:'none',color:'#f0c040',fontSize:11,cursor:'pointer',marginTop:2,fontFamily:"'Lora',serif",display:'block'}},"👤 My Profile"),
            h('button',{onClick:()=>setShowOnboarding(true),style:{background:'transparent',border:'none',color:'#8899aa',fontSize:11,cursor:'pointer',marginTop:2,fontFamily:"'Lora',serif",display:'block'}},"❓ How it works")
          )
        )
      ),
      // Stats bar
      h('div',{style:{background:'rgba(255,255,255,.04)',borderTop:'1px solid rgba(255,255,255,.06)'}},
        h('div',{style:{maxWidth:900,margin:'0 auto',padding:'7px 16px',display:'flex',gap:20,flexWrap:'wrap'}},
          [[bills.length,"Bills"],[totalVotes.toLocaleString(),"Votes"],[projects.length,"Projects"],[memberCount!==null?memberCount:'...','Members'],[rep+" pts","Your Rep"]].map(([v,l])=>
            h('div',{key:l},h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:900,color:'#f0c040'}},v),h('div',{style:{fontSize:10,color:'#8899aa',textTransform:'uppercase',letterSpacing:1}},l))
          )
        )
      ),
      // Tabs
      h('div',{style:{maxWidth:900,margin:'0 auto',padding:'0 16px',display:'flex'}},
        [['bills','🗳 Bills'],['projects','🌱 Community'],['connect','🤝 Connect'],['resources','📚 Resources'],['ideas','💡 Ideas'],['reps','🏛 Reps'],['admin','⚙️ Admin']].map(([t,l])=>
          h('button',{key:t,onClick:()=>setMainTab(t),style:{background:'transparent',border:'none',borderBottom:mainTab===t?'3px solid #f0c040':'3px solid transparent',padding:'11px 14px',fontFamily:"'Playfair Display',serif",fontWeight:mainTab===t?700:400,fontSize:13,color:mainTab===t?'#f0c040':'#8899aa'}},l)
        )
      )
    ),

    // Body
    h('div',{style:{maxWidth:900,margin:'0 auto',padding:'14px 14px 60px'}},

      // Bills tab
      mainTab==='bills'&&h(Fragment,null,

        // Search bars
        h('div',{style:{background:'#1a1a2e',borderRadius:10,padding:'14px 16px',marginBottom:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#f0c040',marginBottom:8}},
            "🔍 Search Bills"
          ),
          h('div',{style:{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}},
            h('input',{
              value:keywordSearch,
              onChange:e=>setKeywordSearch(e.target.value),
              placeholder:'Search by keyword — "Medicaid", "roads", "SNAP"...',
              style:{flex:2,minWidth:180,border:'1px solid #444',borderRadius:6,padding:'10px 13px',fontSize:14,background:'#23233a',color:'#fff',boxSizing:'border-box'}
            }),
            h('input',{
              value:zipSearch,
              onChange:e=>{setZipSearch(e.target.value);if(e.target.value.trim().length===5)setBillFilter('all');},
              placeholder:'...or filter by ZIP',
              maxLength:5,
              style:{flex:1,minWidth:120,border:'1px solid #444',borderRadius:6,padding:'10px 13px',fontSize:14,background:'#23233a',color:'#fff',boxSizing:'border-box'}
            }),
            (zipSearch.trim()||keywordSearch.trim())&&h('button',{
              onClick:()=>{setZipSearch('');setKeywordSearch('');},
              style:{background:'transparent',border:'1px solid #556677',color:'#8899aa',borderRadius:5,padding:'9px 12px',fontSize:12,whiteSpace:'nowrap'}
            },"✕ Clear")
          ),
          searchedCommunity&&h('div',{style:{marginTop:4,fontSize:13,color:'#6bcf8a',fontFamily:"'Lora',serif"}},
            "📍 Showing bills for: ",h('strong',null,searchedCommunity)," + all State & Federal bills"
          ),
          zipSearch.trim().length===5&&!searchedCommunity&&h('div',{style:{marginTop:4,fontSize:13,color:'#e74c3c',fontFamily:"'Lora',serif"}},
            "ZIP code not found. Showing all bills."
          ),
          keywordSearch.trim().length>1&&h('div',{style:{marginTop:4,fontSize:13,color:'#6bcf8a',fontFamily:"'Lora',serif"}},
            "🔎 "+filteredBills.length+" result"+(filteredBills.length!==1?'s':'')+" for \""+keywordSearch.trim()+"\""
          )
        ),

        // Level filters
        h('div',{style:{display:'flex',gap:7,flexWrap:'wrap',marginBottom:14,alignItems:'center'}},
          h('span',{style:{fontSize:12,color:'#aaa'}},"Level:"),
          [['all','All'],['village','🏘 Village'],['city','🏙 City'],['township','🌾 Township'],['state','🏛 State'],['federal','🇺🇸 Federal']].map(([v,l])=>
            h('button',{key:v,onClick:()=>{setBillFilter(v);setZipSearch('');},style:{background:billFilter===v&&!zipSearch?'#1a1a2e':'#fff',color:billFilter===v&&!zipSearch?'#f0c040':'#555',border:'1px solid '+(billFilter===v&&!zipSearch?'#1a1a2e':'#ddd'),padding:'6px 12px',borderRadius:20,fontFamily:"'Playfair Display',serif",fontSize:12,fontWeight:billFilter===v&&!zipSearch?700:400}},l)
          ),
          h('div',{style:{marginLeft:'auto',fontSize:12,color:'#aaa'}},filteredBills.length+" bill"+(filteredBills.length!==1?'s':''))
        ),
        filteredBills.length===0&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},"No bills found for this filter."),
        filteredBills.map(bill=>h(BillCard,{key:bill.id,bill,user:{...user,reputation:rep},userVotes,onVoteCast:handleVoteCast,onRepGain:gainRep})),

        // Pending community submissions
        pendingBills.length>0&&h('div',{style:{marginTop:24}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#1a1a2e',marginBottom:4}},'⏳ Pending Community Submissions'),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginBottom:14}},'These bills were submitted by verified residents and are awaiting community co-signers to go live.'),
          pendingBills.map((bill,i)=>h(PendingBillCard,{key:bill.id||i,bill,user:{...user,reputation:rep},onCosign:loadPendingBills,onToast:setToast}))
        ),

        // Nominate a bill (lightweight)
        h(NominateBillPanel,{user:{...user,reputation:rep},onToast:setToast}),

        // Community submit panel (full)
        h(CommunitySubmitPanel,{
          user:{...user,reputation:rep},
          bills,
          onToast:setToast,
          onSubmitted:b=>{setPendingBills(prev=>[b,...prev]);}
        })
      ),

      // Projects tab
      mainTab==='projects'&&h(Fragment,null,
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}},
          h('div',null,
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},"Community Projects"),
            h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:2}},"Propose. Pledge. Build. Forward to power.")
          ),
          canPropose?h('button',{onClick:()=>setShowPropose(true),style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'10px 18px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13}},"+  Propose a Project"):
          h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:7,padding:'10px 14px',fontSize:12,color:'#888',textAlign:'center'}},
            h('div',{style:{fontWeight:600,color:'#5b3a8c',marginBottom:2}},repInfo.icon+" "+repInfo.label),
            "Earn ",h('strong',null,REP_TO_PROPOSE-rep+" more rep")," to propose",h('br'),h('span',{style:{fontSize:11}},"Vote (+5) · Comment (+10) · Pledge (+15)")
          )
        ),
        h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}},
          h('span',{style:{fontSize:12,color:'#888',fontStyle:'italic'}},"Earn rep:"),
          [["🗳 Vote","+5"],["💬 Comment","+10"],["🤲 Pledge","+15"],["🌱 Propose","50 req"]].map(([l,v])=>
            h('div',{key:l,style:{display:'flex',alignItems:'center',gap:4}},
              h('span',{style:{fontSize:12,color:'#555'}},l),
              h('span',{style:{background:'#f0c040',color:'#1a1a2e',fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:20}},v)
            )
          )
        ),
        projects.length===0&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},"No projects yet. Be the first to propose one!"),
        projects.map(proj=>h(ProjectCard,{key:proj.id,project:proj,user:{...user,reputation:rep},onRepGain:gainRep}))
      ),

      // Connect tab — Chat + Neighbor Directory
      mainTab==='connect'&&h('div',null,
        h('div',{style:{marginBottom:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e',marginBottom:3}},'🤝 Connect'),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888'}},'Chat with neighbors. Browse your community. Invite friends.')
        ),
        h(CommunityHub,{user:{...user,...profile},profile})
      ),

      // Resources tab
      mainTab==='resources'&&h(ResourcesTab,{user:{...user,reputation:rep},onToast:setToast}),

      // Ideas tab
      mainTab==='ideas'&&h(IdeasTab,{user:{...user,reputation:rep},profile,rep,onToast:setToast}),

      // Reps tab
      mainTab==='reps'&&h(Fragment,null,
        h('div',{style:{marginBottom:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e',marginBottom:3}},"Representative Accountability"),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888'}},"How your elected officials voted - compared to how you voted.")
        ),
        h(RepTracker,{bills,userZip:profile?.zip})
      ),

      // Admin tab
      mainTab==='admin'&&h(AdminPanel,{bills,setBills,onToast:setToast})
    ),

    // Footer
    h('div',{style:{background:'#1a1a2e',borderTop:'3px solid #f0c040',color:'#556677',textAlign:'center',padding:'20px 16px',fontSize:12,lineHeight:1.9}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",color:'#f0c040',fontSize:14,marginBottom:6}},"The People's Voice"),
      h('div',{style:{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',borderRadius:8,padding:'10px 14px',maxWidth:560,margin:'0 auto 8px',fontSize:11,color:'#8899aa',lineHeight:1.7}},
        "⚖️ ",h('strong',{style:{color:'#aab'}},"Nonpartisan Statement:")," Not affiliated with any political party, government body, or elected official. All analysis is factual and balanced. Community votes carry no official weight."
      ),
      "Votes & proposals are unofficial civic engagement",h('br'),
      h('span',{style:{color:'#5b3a8c'}},"Concord -> Jackson -> Michigan -> Nation")
    )
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(
  h(ErrorBoundary,null,h(App))
);

</script>
</body>
</html>
