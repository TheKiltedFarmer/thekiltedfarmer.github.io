// ── Global error boundary ─────────────────────────────────────────────────────
class ErrorBoundary extends Component {
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return{err};}
  render(){
    if(this.state.err) return h('div',{style:{padding:32,textAlign:'center',fontFamily:"'Lora',serif"}},
      h('div',{style:{fontSize:48,marginBottom:16}},"⚠️"),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:'#1a1a2e',marginBottom:8}},"Something went wrong"),
      h('div',{style:{fontSize:14,color:'#888',marginBottom:20}},"An unexpected error occurred. Try reloading the app."),
      h('button',{onClick:()=>window.location.reload(),style:{background:'#1a1a2e',color:'#f0c040',border:'none',padding:'12px 24px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,cursor:'pointer'}},"Reload App")
    );
    return this.props.children;
  }
}

// Determine which badges a profile has earned based on their data
const computeBadges = (profile, voteCounts, commentCount) => {
  const earned = new Set(profile?.badges||[]);
  const rep = profile?.reputation||0;
  const zip = profile?.zip||'';
  const votes = voteCounts||0;
  const comments = commentCount||0;

  // Reputation milestones
  if(rep>=20)  earned.add('rep_20');
  if(rep>=50)  earned.add('rep_50');
  if(rep>=100) earned.add('rep_100');
  if(rep>=200) earned.add('rep_200');

  // ZIP identity
  if(['49201','49202','49203','49204'].includes(zip)) earned.add('zip_49201');
  else if(zip==='49237') earned.add('zip_49237');
  else if(zip==='49230') earned.add('zip_49230');
  else if(zip==='49285') earned.add('zip_49285');
  else if(zip&&zip.startsWith('49')) earned.add('zip_other');

  // Official
  if(profile?.is_official) earned.add('verified_official');

  return Array.from(earned).filter(id=>BADGES[id]);
};

// Award a new badge if not already earned
const awardBadge = async(userId, badgeId, currentBadges)=>{
  if(!userId||!badgeId) return currentBadges;
  const existing = currentBadges||[];
  if(existing.includes(badgeId)) return existing;
  const updated = [...existing, badgeId];
  await sb.from('profiles').update({badges:updated}).eq('id',userId);
  return updated;
};

// Small inline badge chip
function BadgeChip({badgeId, tiny}) {
  const b = BADGES[badgeId];
  if(!b) return null;
  return h('span',{
    title:b.label+': '+b.desc,
    style:{display:'inline-flex',alignItems:'center',gap:tiny?2:3,background:b.bg,color:b.color,
      fontSize:tiny?9:10,fontWeight:700,padding:tiny?'1px 5px':'2px 8px',
      borderRadius:20,letterSpacing:.3,fontFamily:"'Lora',serif",
      whiteSpace:'nowrap',border:'1px solid '+b.color+'33',cursor:'default'}
  },b.icon+(tiny?'':' '+b.label));
}

// Row of badges (max N shown)
function BadgeRow({badges, max, tiny}) {
  if(!badges||!badges.length) return null;
  const show = badges.slice(0,max||5);
  const extra = badges.length-(max||5);
  return h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}},
    show.map(id=>h(BadgeChip,{key:id,badgeId:id,tiny})),
    extra>0&&h('span',{style:{fontSize:10,color:'#aaa',fontFamily:"'Lora',serif"}},'+'+extra+' more')
  );
}

// ── Bill Status Badge ─────────────────────────────────────────────────────────
function getStatusBadge(status) {
  if(!status) return {label:'Unknown', bg:'#f0f0f0', color:'#888', icon:'⬜'};
  const s = status.toLowerCase();
  if(s.includes('signed') || s.includes('enacted') || s.includes('passed') && s.includes('law'))
    return {label:'Signed into Law', bg:'#eef7f1', color:'#1a6b3c', icon:'✅'};
  if(s.includes('passed') && (s.includes('senate') || s.includes('house') || s.includes('committee') || s.includes('ballot')))
    return {label:'Passed', bg:'#e8f2fa', color:'#1a5c8a', icon:'🗳'};
  if(s.includes('failed') || s.includes('rejected') || s.includes('vetoed'))
    return {label:'Failed / Vetoed', bg:'#fdf0ef', color:'#c0392b', icon:'❌'};
  if(s.includes('withdrawn') || s.includes('tabled'))
    return {label:'Withdrawn', bg:'#f5f5f5', color:'#888', icon:'🚫'};
  if(s.includes('debate') || s.includes('senate') || s.includes('active') || s.includes('consideration') || s.includes('committee'))
    return {label:'Active / In Progress', bg:'#fff8e7', color:'#8a6000', icon:'⚡'};
  if(s.includes('pending') || s.includes('review') || s.includes('introduced'))
    return {label:'Pending', bg:'#f5f0fb', color:'#5b3a8c', icon:'⏳'};
  if(s.includes('executive') || s.includes('order') || s.includes('effect'))
    return {label:'In Effect', bg:'#eef7f1', color:'#1a6b3c', icon:'📋'};
  return {label:'Active', bg:'#fff8e7', color:'#8a6000', icon:'⚡'};
}

function StatusBadge({status}) {
  const b = getStatusBadge(status);
  return h('span',{
    title: status,
    style:{display:'inline-flex',alignItems:'center',gap:4,background:b.bg,color:b.color,
      fontSize:10,fontWeight:700,padding:'3px 9px',borderRadius:20,
      textTransform:'uppercase',letterSpacing:.5,fontFamily:"'Lora',serif",whiteSpace:'nowrap'}
  }, b.icon+' '+b.label);
}

// ── Bill Change Log ───────────────────────────────────────────────────────────
function BillChangeLog({bill}) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({status:'',note:'',source:''});
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    sb.from('bill_changelog').select('*').eq('bill_id',bill.id).order('created_at',{ascending:false})
      .then(({data})=>{ setLogs(data||[]); setLoading(false); });
  },[bill.id]);

  const addEntry = async()=>{
    if(!form.status.trim()) return;
    setSaving(true);
    const entry = {
      bill_id: bill.id,
      bill_title: bill.title,
      status: form.status.trim(),
      note: form.note.trim(),
      source_url: form.source.trim()||null,
      created_at: new Date().toISOString()
    };
    const {data,error} = await sb.from('bill_changelog').insert(entry).select().single();
    if(!error) {
      setLogs(prev=>[data||entry,...prev]);
      setForm({status:'',note:'',source:''});
      setShowAdd(false);
    }
    setSaving(false);
  };

  const statusIcon = (s)=>{
    const sl = (s||'').toLowerCase();
    if(sl.includes('signed')||sl.includes('law')||sl.includes('enacted')) return '✅';
    if(sl.includes('passed')) return '🗳';
    if(sl.includes('failed')||sl.includes('veto')) return '❌';
    if(sl.includes('introduced')) return '📋';
    if(sl.includes('debate')||sl.includes('senate')||sl.includes('committee')) return '⚡';
    if(sl.includes('amended')) return '✏️';
    return '📌';
  };

  return h('div',{style:{marginTop:10}},
    h('button',{
      onClick:()=>setOpen(!open),
      style:{width:'100%',background:'#f5f3ee',border:'1px solid #e5dece',borderRadius:7,
        padding:'10px 14px',fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,
        color:'#1a1a2e',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center'}
    },
      h('span',null,'📋 Bill History '+(logs.length>0?'('+logs.length+')':'')),
      h('span',{style:{fontSize:11,color:'#aaa'}},open?'▲':'▼')
    ),
    open&&h('div',{style:{border:'1px solid #e5dece',borderTop:'none',borderRadius:'0 0 7px 7px',background:'#fff',padding:14}},
      // Seed with current status as first entry if no logs
      logs.length===0&&!loading&&h('div',null,
        h('div',{style:{background:'#f5f3ee',borderRadius:7,padding:'10px 12px',marginBottom:10,display:'flex',gap:10,alignItems:'flex-start'}},
          h('div',{style:{fontSize:18,flexShrink:0}},'📋'),
          h('div',null,

// ── AI Breakdown ──────────────────────────────────────────────────────────────
function AIBreakdown({bill}) {
  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(false);

  const show=async()=>{
    const preloaded=ANALYSES[bill.id];
    if(preloaded){setData(preloaded);return;}
    // For admin-added bills: generate live AI analysis
    setLoading(true);
    try{
      const res=await fetch(AI_PROXY,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:900,
          system:'You are a nonpartisan civic analyst specializing in local impact. Respond ONLY with valid JSON, no markdown. Be specific — name actual groups, income levels, businesses, and geographic areas affected. Schema: {"plain":"2-3 plain sentences any resident can understand","benefits":[{"group":"specific group name","detail":"how they benefit specifically"}],"concerns":[{"group":"specific group name","detail":"the specific concern or cost they bear"}],"who_gains_most":"1 sentence about who benefits most and why","who_pays":"1 sentence about who bears the cost or tradeoff","fineprint":["up to 3 specific gotchas or details worth knowing"],"local":"1-2 sentences on specific Jackson County / local impact","bottom":"one honest, plain sentence summary"}',
          messages:[{role:'user',content:'Analyze this civic proposal for '+bill.jurisdiction+':\nTitle: '+bill.title+'\nStatus: '+bill.status+'\nSponsor: '+bill.sponsor+'\nSummary: '+bill.summary+'\nText: '+(bill.full_text||bill.summary)+'\n\nBe specific about WHO benefits and WHO pays. Name actual groups - farmers, renters, landlords, small businesses, low-income residents, seniors, developers, etc.'}]
        })
      });
      const json=await res.json();
      const raw=json.content?.find(b=>b.type==='text')?.text||'{}';
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      setData(parsed);
    }catch(e){
      setData({plain:bill.summary,benefits:["Community members affected by this proposal"],concerns:["Those who bear any costs or tradeoffs"],fineprint:[],local:"This proposal directly affects "+bill.jurisdiction+" residents.",bottom:"Review the full text and attend relevant public meetings."});
    }
    setLoading(false);
  };

  if(loading) return h('div',{style:{padding:16,textAlign:'center',color:'#777',fontFamily:"'Lora',serif",fontStyle:'italic'}},
    h('div',{className:'spin',style:{marginBottom:8}}),
    "Analyzing for your community..."
  );
  if(!data) return h(Btn,{onClick:show,style:{marginTop:0}},"⚡ Get AI Analysis");
  return h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:10,padding:20}},
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:8}},"🤖 AI Community Analysis"),
    h('div',{style:{background:'#f0f4ff',border:'1px solid #c8d8f0',borderRadius:6,padding:'8px 12px',marginBottom:12,fontSize:11,color:'#1a5c8a',lineHeight:1.6}},
      h('strong',null,"⚖️ Nonpartisan:")," This analysis presents factual, balanced information only. The People's Voice has no political affiliation and takes no position on any bill."
    ),
    h('p',{style:{fontFamily:"'Lora',serif",fontSize:14,lineHeight:1.75,color:'#333',marginBottom:14}},data.plain),

    // Who gains most / who pays — the key equity section
    (data.who_gains_most||data.who_pays)&&h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}},
      data.who_gains_most&&h('div',{style:{background:'#e8f5ee',border:'1px solid #c8e8d4',borderRadius:7,padding:12}},
        h('div',{style:{fontSize:10,fontWeight:700,color:'#1a6b3c',textTransform:'uppercase',letterSpacing:1,marginBottom:6}},"🏆 Who Benefits Most"),
        h('div',{style:{fontSize:13,color:'#1a3a2a',lineHeight:1.6}},data.who_gains_most)
      ),
      data.who_pays&&h('div',{style:{background:'#fdf0ef',border:'1px solid #f0c8c0',borderRadius:7,padding:12}},
        h('div',{style:{fontSize:10,fontWeight:700,color:'#c0392b',textTransform:'uppercase',letterSpacing:1,marginBottom:6}},"💸 Who Bears the Cost"),
        h('div',{style:{fontSize:13,color:'#3a1a1a',lineHeight:1.6}},data.who_pays)
      )
    ),

    // Detailed benefits and concerns
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}},
      h('div',{style:{background:'#eef7f1',borderRadius:7,padding:12}},
        h('div',{style:{fontSize:10,fontWeight:700,color:'#1a6b3c',textTransform:'uppercase',letterSpacing:1,marginBottom:8}},"✅ Who Benefits"),
        (data.benefits||[]).map((x,i)=>{
          const item = typeof x==='object' ? x : {group:x,detail:''};
          return h('div',{key:i,style:{marginBottom:8}},
            h('div',{style:{fontSize:12,fontWeight:700,color:'#1a3a2a'}},item.group||x),
            item.detail&&h('div',{style:{fontSize:11,color:'#555',lineHeight:1.5,marginTop:2}},item.detail)
          );
        })
      ),
      h('div',{style:{background:'#fdf0ef',borderRadius:7,padding:12}},
        h('div',{style:{fontSize:10,fontWeight:700,color:'#c0392b',textTransform:'uppercase',letterSpacing:1,marginBottom:8}},"⚠️ Concerns"),
        (data.concerns||[]).map((x,i)=>{
          const item = typeof x==='object' ? x : {group:x,detail:''};
          return h('div',{key:i,style:{marginBottom:8}},
            h('div',{style:{fontSize:12,fontWeight:700,color:'#3a1a1a'}},item.group||x),
            item.detail&&h('div',{style:{fontSize:11,color:'#555',lineHeight:1.5,marginTop:2}},item.detail)
          );
        })
      )
    ),

    data.fineprint&&data.fineprint.length>0&&h('div',{style:{background:'#fffbea',borderRadius:7,padding:12,marginBottom:12}},
      h('div',{style:{fontSize:10,fontWeight:700,color:'#8a6000',textTransform:'uppercase',letterSpacing:1,marginBottom:8}},"🔍 Fine Print"),
      data.fineprint.map((x,i)=>h('div',{key:i,style:{fontSize:13,color:'#333',marginBottom:4}},"• "+x))
    ),
    data.local&&h('div',{style:{background:'#e8f2fa',borderRadius:7,padding:12,marginBottom:12}},
      h('div',{style:{fontSize:10,fontWeight:700,color:'#1a5c8a',textTransform:'uppercase',letterSpacing:1,marginBottom:6}},"📍 Local Impact"),
      h('div',{style:{fontSize:13,color:'#333',lineHeight:1.6}},data.local)
    ),
    h('div',{style:{borderTop:'1px solid #e5dece',paddingTop:10,fontFamily:"'Playfair Display',serif",fontStyle:'italic',color:'#1a1a2e',fontSize:14}},
      h('strong',null,"Bottom Line: "),data.bottom
    )
  );
}

// ── Social Share ──────────────────────────────────────────────────────────────
// ── AI Chat ───────────────────────────────────────────────────────────────────
function AIChat({bill}) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [open, setOpen] = useState(false);
  const bottomRef = useRef(null);

  const SUGGESTIONS = [
    'Who does this affect most in Jackson County?',
    'What would happen if this fails?',
    'Are there similar laws elsewhere in Michigan?',
    'What are the arguments for and against?',
    'How would this affect small farmers / renters / seniors?',
  ];

  useEffect(()=>{
    if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:'smooth'});
  },[messages]);

  const send = async(text) => {
    const q = (text||input).trim();
    if(!q||loading) return;
    setInput('');
    const userMsg = {role:'user',content:q};
    setMessages(prev=>[...prev,userMsg]);
    setLoading(true);

    try {
      const history = messages.map(m=>({role:m.role,content:m.content}));
      const res = await fetch(AI_PROXY,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:600,
          system:`You are a neutral, nonpartisan civic assistant helping residents of Jackson County, Michigan understand local legislation. You answer questions about this specific bill clearly and fairly, presenting multiple perspectives where relevant. Never tell someone how to vote. Always be honest about uncertainty. Keep answers concise — 2-4 paragraphs max.

Bill: ${bill.title}
Jurisdiction: ${bill.jurisdiction}
Status: ${bill.status}
Summary: ${bill.summary}
Full text: ${bill.full_text||bill.summary}`,
          messages:[...history,userMsg]
        })
      });
      const json = await res.json();
      const reply = json.content?.find(b=>b.type==='text')?.text||'I was unable to generate a response. Please try again.';
      setMessages(prev=>[...prev,{role:'assistant',content:reply}]);
    } catch(e) {
      setMessages(prev=>[...prev,{role:'assistant',content:'Something went wrong. Please try again.'}]);
    }
    setLoading(false);
  };

  if(!open) return h('button',{
    onClick:()=>setOpen(true),
    style:{width:'100%',background:'#f0ebf8',border:'1px solid #c8b8e8',borderRadius:8,padding:'12px 16px',
      fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#5b3a8c',cursor:'pointer',
      display:'flex',alignItems:'center',gap:8,justifyContent:'center',marginTop:12}
  },'💬 Discuss This Bill with AI');

  return h('div',{style:{marginTop:12,border:'1px solid #c8b8e8',borderRadius:10,overflow:'hidden'}},
    // Header
    h('div',{style:{background:'#5b3a8c',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:'#fff',fontSize:14}},
        '💬 Ask About This Bill'
      ),
      h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
        h('div',{style:{fontSize:11,color:'rgba(255,255,255,.6)'}},
          'Neutral AI — no political opinion'
        ),
        h('button',{onClick:()=>setOpen(false),style:{background:'transparent',border:'none',color:'rgba(255,255,255,.6)',cursor:'pointer',fontSize:16,lineHeight:1}},'x')
      )
    ),

    // Suggestions (show when no messages yet)
    messages.length===0&&h('div',{style:{background:'#f9f5ff',padding:'12px 14px',borderBottom:'1px solid #e8dff8'}},
      h('div',{style:{fontSize:11,color:'#8a6aac',fontWeight:600,marginBottom:8,textTransform:'uppercase',letterSpacing:1}},'Suggested questions:'),
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
        SUGGESTIONS.map((s,i)=>h('button',{key:i,onClick:()=>send(s),
          style:{background:'#fff',border:'1px solid #c8b8e8',borderRadius:20,padding:'5px 11px',fontSize:12,
            color:'#5b3a8c',cursor:'pointer',fontFamily:"'Lora',serif",lineHeight:1.4,textAlign:'left'}
        },s))
      )
    ),

    // Messages
    h('div',{style:{background:'#fff',maxHeight:320,overflowY:'auto',padding:'14px 16px',display:'flex',flexDirection:'column',gap:12}},
      messages.map((m,i)=>h('div',{key:i,style:{display:'flex',gap:10,alignItems:'flex-start',flexDirection:m.role==='user'?'row-reverse':'row'}},
        h('div',{style:{
          width:30,height:30,borderRadius:'50%',flexShrink:0,
          background:m.role==='user'?'#1a1a2e':'#5b3a8c',
          color:'#f0c040',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700
        }},m.role==='user'?'You':'AI'),
        h('div',{style:{
          background:m.role==='user'?'#f0f4ff':'#f9f5ff',
          border:'1px solid '+(m.role==='user'?'#c8d4f8':'#e0d0f8'),
          borderRadius:8,padding:'10px 13px',fontSize:13,
          fontFamily:"'Lora',serif",lineHeight:1.7,color:'#333',
          maxWidth:'80%'
        }},m.content)
      )),
      loading&&h('div',{style:{display:'flex',gap:10,alignItems:'center'}},
        h('div',{style:{width:30,height:30,borderRadius:'50%',background:'#5b3a8c',color:'#f0c040',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700}},'AI'),
        h('div',{style:{background:'#f9f5ff',border:'1px solid #e0d0f8',borderRadius:8,padding:'10px 13px',fontSize:13,color:'#aaa',fontStyle:'italic'}},'Thinking...')
      ),
      h('div',{ref:bottomRef})
    ),

    // Input
    h('div',{style:{background:'#f9f5ff',borderTop:'1px solid #e8dff8',padding:'10px 12px',display:'flex',gap:8}},
      h('input',{
        value:input,onChange:e=>setInput(e.target.value),
        onKeyDown:e=>e.key==='Enter'&&!e.shiftKey&&send(),
        placeholder:'Ask anything about this bill...',
        style:{flex:1,border:'1px solid #c8b8e8',borderRadius:6,padding:'9px 12px',fontSize:13,
          fontFamily:"'Lora',serif",background:'#fff',boxSizing:'border-box'}
      }),
      h('button',{onClick:()=>send(),disabled:!input.trim()||loading,
        style:{background:input.trim()&&!loading?'#5b3a8c':'#ddd',color:input.trim()&&!loading?'#fff':'#aaa',
          border:'none',borderRadius:6,padding:'9px 16px',fontFamily:"'Playfair Display',serif",
          fontWeight:700,fontSize:13,cursor:input.trim()&&!loading?'pointer':'default'}
      },'Send')
    ),
    h('div',{style:{background:'#f9f5ff',paddingBottom:8,textAlign:'center',fontSize:10,color:'#c8b8e8'}},'Neutral · Nonpartisan · No political opinion expressed')
  );
}

function ShareButtons({bill,choice}) {
  const emoji = choice==='yes'?'✅':choice==='no'?'❌':'⬜';
  const text = `${emoji} I voted ${choice.toUpperCase()} on "${bill.title}" via The People's Voice - a nonpartisan civic platform. See the community results: ${SITE_URL}`;
  const share = (platform) => {
    if(platform==='fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(SITE_URL)}&quote=${encodeURIComponent(text)}`,'_blank','width=600,height=400');
    else if(platform==='x') window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,'_blank','width=600,height=400');
    else {
      if(navigator.share) navigator.share({title:"My vote on The People's Voice",text,url:SITE_URL});
      else { navigator.clipboard&&navigator.clipboard.writeText(text); alert("Copied! Paste to share anywhere."); }
    }
  };
  return h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginTop:8}},
    h('button',{onClick:()=>share('fb'),style:{background:'#1877f2',color:'#fff',border:'none',padding:'7px 12px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12}},"f Share"),
    h('button',{onClick:()=>share('x'),style:{background:'#000',color:'#fff',border:'none',padding:'7px 12px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12}},"X Share"),
    h('button',{onClick:()=>share('other'),style:{background:'#555',color:'#fff',border:'none',padding:'7px 12px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12}},"📋 Copy")
  );
}

// ── Email Rep Buttons ─────────────────────────────────────────────────────────
function EmailRepButtons({bill,choice,user}) {
  const [contactCount,setContactCount]=useState(null);
  useEffect(()=>{
    sb.from('rep_contacts').select('*',{count:'exact',head:true}).eq('bill_id',bill.id)
      .then(({count})=>{ if(count!==null) setContactCount(count); });
  },[bill.id]);

  const logContact=async(repName)=>{
    await sb.from('rep_contacts').insert({
      bill_id:bill.id,bill_title:bill.title,
      user_id:user?.id||null,rep_name:repName,
      contacted_at:new Date().toISOString()
    });
    setContactCount(c=>(c||0)+1);
  };

  // Match reps to bills by level — this is the key fix
  const getRelevantReps = ()=>{
    const level = bill.level||'';
    const juris = (bill.jurisdiction||'').toLowerCase();

    if(level==='federal') {
      // Federal bills — show both state reps + state senator (they vote on federal too)
      return REPS.filter(r=>
        r.jurisdiction==='State of Michigan' || r.jurisdiction==='Jackson County'
      ).slice(0,4);
    }
    if(level==='state') {
      // State bills — show state reps + senator
      return REPS.filter(r=>r.jurisdiction==='State of Michigan');
    }
    if(level==='county') {
      return REPS.filter(r=>r.jurisdiction==='Jackson County');
    }
    if(level==='city'||juris.includes('jackson')) {
      return REPS.filter(r=>r.body==='Jackson City Council'||r.id==='r1').slice(0,4);
    }
    if(level==='village'||juris.includes('concord')) {
      return REPS.filter(r=>r.body==='Village of Concord Council');
    }
    if(level==='township') {
      return REPS.filter(r=>r.jurisdiction==='Jackson County'||r.jurisdiction==='State of Michigan').slice(0,3);
    }
    // Fallback — anyone who has voted on this bill or jurisdiction match
    const byVote = REPS.filter(r=>r.votes[bill.id]);
    if(byVote.length) return byVote;
    return REPS.filter(r=>r.jurisdiction==='State of Michigan');
  };

  const relevant = getRelevantReps().slice(0,4);

  if(!relevant.length) return h('div',{style:{fontSize:12,color:'#aaa',fontStyle:'italic',marginTop:6}},"No rep contact info on file for this bill yet.");

  return h('div',null,
    contactCount>0&&h('div',{style:{fontSize:12,color:'#1a6b3c',fontWeight:600,marginBottom:6}},
      '📬 '+contactCount+' resident'+(contactCount===1?'':'s')+' have emailed their rep about this bill'
    ),
    h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginTop:4}},
      relevant.map(rep=>{
        const subject = encodeURIComponent("Re: "+bill.title+" - Constituent Input");
        const body = encodeURIComponent(
          "Dear "+rep.name+",\n\n"+
          "As a constituent, I am writing regarding:\n"+bill.title+" ("+bill.id+")\n\n"+
          bill.summary+"\n\n"+
          "The People's Voice community platform shows "+bill.votes_yes+" residents support this measure vs "+bill.votes_no+" opposed.\n\n"+
          "I personally voted "+choice.toUpperCase()+" on this bill and wanted to share my perspective directly.\n\n"+
          "[Add your personal message here]\n\n"+
          "Respectfully,\n[Your name]\nDistrict resident\nSent via The People's Voice - "+SITE_URL
        );
        return h('a',{key:rep.id,
          href:`mailto:${rep.contact}?subject=${subject}&body=${body}`,
          onClick:()=>logContact(rep.name),
          style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:5,padding:'7px 12px',
            fontSize:12,color:'#8a6000',textDecoration:'none',fontFamily:"'Playfair Display',serif",
            fontWeight:700,display:'inline-flex',alignItems:'center',gap:4}
        },"✉️ "+rep.name.split(" ").slice(-1)[0]+" ("+rep.title.split(",")[0]+")");
      })
    )
  );
}

function CommentItem({comment:c, user, billId, onEdited}) {
  const [editing, setEditing] = useState(false);

const CREDIBLE_DOMAINS = new Set([
  // Wire services
  'apnews.com','reuters.com','npr.org','pbs.org','bbc.com','bbc.co.uk','apnews.com',
  // Michigan outlets

  // Government / official

  'federalregister.gov','govinfo.gov','cityofjackson.org','co.jackson.mi.us',
  'cityofconcord.org','villageofconcord.org',
  // Nonpartisan / fact check
  'factcheck.org','politifact.com','snopes.com','ballotpedia.org','opensecrets.org',
]);

const NEWS_CATEGORIES = ['Local','Michigan','Federal','International'];

function getDomain(url) {
  try { return new URL(url).hostname.replace('www.',''); } catch(e) { return ''; }
}

function isCredibleSource(url) {
  const domain = getDomain(url);
  if(!domain) return false;
  if(CREDIBLE_DOMAINS.has(domain)) return true;
  // Check parent domain
  const parts = domain.split('.');
  if(parts.length>2) {
    const parent = parts.slice(-2).join('.');
    if(CREDIBLE_DOMAINS.has(parent)) return true;
  }
  return false;
}

function SourceBadge({url}) {
  const domain = getDomain(url);
  const credible = isCredibleSource(url);
  return h('span',{
    title: credible?'Verified credible source':'Source credibility unverified',
    style:{display:'inline-flex',alignItems:'center',gap:3,
      background:credible?'#eef7f1':'#fff8e7',
      color:credible?'#1a6b3c':'#8a6000',
      border:'1px solid '+(credible?'#1a6b3c44':'#f0c04044'),
      borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:700,
      fontFamily:"'Lora',serif",whiteSpace:'nowrap'}
  }, credible?'✓ '+domain:'⚠ '+domain);
}

// AI neutralize a news story via Cloudflare Worker
async function neutralizeStory(title, url, summary, category) {
  const prompt = `You are a nonpartisan civic editor for The People's Voice, a community platform serving Jackson County, Michigan.

A community member submitted this news story:
Title: "${title}"
Category: ${category}
Source: ${url}
Context: "${summary}"

Your job — respond ONLY in this exact JSON format with no extra text:
{
  "neutral_headline": "A neutral headline under 12 words",
  "neutral_summary": "2-3 factual sentences. Include key numbers/dates. Explain what happened and why it matters.",
  "local_relevance": "One sentence: how this concretely affects Jackson County residents.",
  "original_bias": "left-leaning or right-leaning or neutral",
  "category": "${category}",
  "poll_question": "A clear yes/no civic question for Jackson County residents to vote on. Start with 'Do you support...' or 'Should the US...' or 'Do you believe...' Keep it under 12 words.",
  "poll_benefits": ["Benefit 1 (one sentence, factual)", "Benefit 2 (one sentence, factual)", "Benefit 3 (one sentence, factual)"],
  "poll_consequences": ["Risk/consequence 1 (one sentence, factual)", "Risk/consequence 2 (one sentence, factual)", "Risk/consequence 3 (one sentence, factual)"]
}

Rules:
- poll_benefits and poll_consequences must be factual, balanced, and nonpartisan
- Do not use words like "dangerous", "radical", "extreme", "wrong", "right"
- Each benefit/consequence should be a concrete, verifiable claim`;

  try {
    const res = await fetch(AI_PROXY, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:900,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text||'').trim();
    const clean = text.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  } catch(e) {
    return null;
  }
}

function NewsTab({user, rep, profile}) {
  const [stories, setStories] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showSubmit, setShowSubmit] = useState(false);
  const [catFilter, setCatFilter] = useState('all');
  const [url, setUrl] = useState('');
  const [originalTitle, setOriginalTitle] = useState('');
  const [userContext, setUserContext] = useState('');
  const [category, setCategory] = useState('Federal');
  const [submitting, setSubmitting] = useState(false);
  const [submitMsg, setSubmitMsg] = useState('');
  const [urlError, setUrlError] = useState('');
  const isTrusted = (rep||0) >= 50;

  useEffect(()=>{ loadStories(); },[catFilter]);

  const loadStories = async()=>{
    setLoading(true);
    let q = sb.from('news_stories').select('*').eq('approved',true).order('created_at',{ascending:false}).limit(20);
    if(catFilter!=='all') q = q.eq('category',catFilter);
    const {data} = await q;
    setStories(data||[]); setLoading(false);
  };

  const checkUrl = u=>{
    setUrl(u);
    if(u.length>10) setUrlError(isCredibleSource(u)?'':"\u26A0\uFE0F '"+getDomain(u)+"' is not on our verified sources list. Please use AP, Reuters, NPR, MLive, Bridge Michigan, Detroit Free Press, or other established outlets.");
    else setUrlError('');
  };

  const submitStory = async()=>{
    if(!url.trim()||!originalTitle.trim()) { setSubmitMsg('Please enter a URL and headline.'); return; }
    if(!isCredibleSource(url)) { setSubmitMsg('Please use a credible news source.'); return; }
    setSubmitting(true); setSubmitMsg("\uD83E\uDD16 AI is reading and neutralizing this story...");
    const result = await neutralizeStory(originalTitle, url, userContext, category);
    if(!result) { setSubmitMsg("\u274C AI analysis failed. Check that the Cloudflare Worker is updated with the new domain, then try again."); setSubmitting(false); return; }
    setSubmitMsg("\u2705 Neutralized! Publishing...");
    const {data,error} = await sb.from('news_stories').insert({
      source_url:url.trim(), original_title:originalTitle.trim(),
      neutral_headline:result.neutral_headline, neutral_summary:result.neutral_summary,
      local_relevance:result.local_relevance, original_bias:result.original_bias,
      category:result.category||category,
      poll_question:result.poll_question||null,
      poll_benefits:result.poll_benefits||[], poll_consequences:result.poll_consequences||[],
      poll_yes:0, poll_no:0, poll_unsure:0,
      submitted_by_id:user.id,
      submitted_by_name:profile?.display_name||user.email?.split('@')?.[0]||'Resident',
      upvotes:0, comment_count:0, approved:true,
      created_at:new Date().toISOString()
    }).select().single();
    if(!error&&data) { setStories(prev=>[data,...prev]); setUrl(''); setOriginalTitle(''); setUserContext(''); setSubmitMsg(''); setShowSubmit(false); }
    else setSubmitMsg("\u274C Error: "+(error?.message||'unknown'));
    setSubmitting(false);
  };

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:10}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},"\uD83D\uDCF0 Current Events"),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:2}},"Community-submitted news — AI-neutralized, source-verified, locally contextualized.")
      ),
      isTrusted
        ? h('button',{onClick:()=>setShowSubmit(!showSubmit),style:{background:showSubmit?'#f5f5f5':'#1a1a2e',color:showSubmit?'#888':'#f0c040',border:showSubmit?'1px solid #ddd':'none',padding:'10px 18px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}},showSubmit?'Cancel':'+ Submit Story')
        : h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:7,padding:'8px 12px',fontSize:12,color:'#888'}},"\u2B50 Need 50 rep to submit stories")
    ),

    showSubmit&&isTrusted&&h('div',{style:{background:'#fff',border:'2px solid #1a5c8a',borderRadius:10,padding:18,marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#1a1a2e',marginBottom:4}},"Submit a News Story"),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#888',marginBottom:16,lineHeight:1.6}},"The AI will neutralize the story and generate a community poll question with benefits and risks before it goes live."),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},"Source URL *"),
        h('input',{value:url,onChange:e=>checkUrl(e.target.value),placeholder:'https://apnews.com/article/...',
          style:{width:'100%',border:'1px solid '+(urlError?'#e74c3c':'#ddd'),borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box',fontFamily:"'Lora',serif"}}),
        urlError&&h('div',{style:{fontSize:11,color:'#e74c3c',marginTop:4,lineHeight:1.5}},urlError),
        !urlError&&url&&isCredibleSource(url)&&h('div',{style:{fontSize:11,color:'#1a6b3c',marginTop:4}},"\u2713 Credible source: "+getDomain(url))
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},"Original Headline *"),
        h('input',{value:originalTitle,onChange:e=>setOriginalTitle(e.target.value),placeholder:'Paste the original headline exactly',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box',fontFamily:"'Lora',serif"}})
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},"Category"),
        h('div',{style:{display:'flex',gap:6,flexWrap:'wrap'}},

        h('textarea',{value:userContext,onChange:e=>setUserContext(e.target.value),rows:2,placeholder:'Local context helps the AI write a better relevance note...',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box',resize:'vertical',fontFamily:"'Lora',serif",lineHeight:1.6}})
      ),
      h('div',{style:{background:'#e8f2fa',borderRadius:7,padding:'10px 12px',marginBottom:14,fontSize:11,color:'#1a5c8a',lineHeight:1.6}},
        h('strong',null,"\u2713 Accepted sources: "),"AP News, Reuters, NPR, MLive, Bridge Michigan, Detroit Free Press, Michigan Radio, Washington Post, NY Times, The Hill, Politico, and other established outlets."
      ),
      submitMsg&&h('div',{style:{padding:'10px 12px',borderRadius:6,marginBottom:10,fontSize:13,lineHeight:1.5,
        background:submitMsg.startsWith('\u274C')?'#fdf0ef':submitMsg.startsWith('\u2705')?'#eef7f1':'#fff8e7',
        color:submitMsg.startsWith('\u274C')?'#c0392b':submitMsg.startsWith('\u2705')?'#1a6b3c':'#8a6000',
        fontFamily:"'Lora',serif"}},submitMsg),
      h('button',{onClick:submitStory,disabled:submitting||!url.trim()||!originalTitle.trim()||!!urlError,
        style:{width:'100%',background:submitting||!url.trim()||!originalTitle.trim()||urlError?'#ccc':'#1a5c8a',color:'#fff',border:'none',padding:'12px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,cursor:'pointer'}
      },submitting?"\uD83E\uDD16 AI Neutralizing...":"Submit & Neutralize \u2192")

    h('div',{style:{display:'flex',gap:7,flexWrap:'wrap',marginBottom:14,alignItems:'center'}},
      h('span',{style:{fontSize:12,color:'#aaa'}},"Filter:"),

        h('button',{key:v,onClick:()=>setCatFilter(v),

  vote:       {icon:'🗳',  color:'#1a6b3c', bg:'#eef7f1', label:'voted on'},
  comment:    {icon:'💬',  color:'#1a5c8a', bg:'#e8f2fa', label:'commented on'},

  idea:       {icon:'💡',  color:'#8a6000', bg:'#fff8e7', label:'submitted an idea'},
  resource:   {icon:'📚',  color:'#1a5c8a', bg:'#e8f2fa', label:'added a resource'},
  project:    {icon:'🤝',  color:'#5b3a8c', bg:'#f0ebf8', label:'pledged to'},

function CommunityFeed({user, profile, bills, guestMode}) {
  const [feed, setFeed] = useState([]);
  const [loading, setLoading] = useState(true);
  const [memberCount, setMemberCount] = useState(null);
  const [totalVotes, setTotalVotes] = useState(null);

  useEffect(()=>{
    loadFeed();
    // Load summary stats
    sb.from('profiles').select('id',{count:'exact',head:true}).then(({count})=>setMemberCount(count));
    sb.from('user_votes').select('id',{count:'exact',head:true}).then(({count})=>setTotalVotes(count));
  },[]);

  const loadFeed = async()=>{
    try {
      // Pull recent activity from multiple tables in parallel
      const [votesRes, commentsRes, profilesRes, ideasRes, chatRes, nominationsRes] = await Promise.all([
        sb.from('user_votes').select('id,user_id,bill_id,choice,anonymous,created_at').order('created_at',{ascending:false}).limit(15),
        sb.from('bill_comments').select('id,user_id,display_name,bill_id,content,anonymous,created_at').order('created_at',{ascending:false}).limit(10),
        sb.from('profiles').select('id,display_name,zip,reputation,badges,created_at').order('created_at',{ascending:false}).limit(8),
        sb.from('community_ideas').select('id,title,submitted_by_name,upvotes,created_at').order('created_at',{ascending:false}).limit(8),
        sb.from('community_chat').select('id,display_name,content,room_id,created_at').eq('room_id','general').order('created_at',{ascending:false}).limit(6),
        sb.from('bill_nominations').select('id,title,submitted_by_name,created_at').order('created_at',{ascending:false}).limit(5),
      ]);

      const items = [];

      // Votes
      (votesRes.data||[]).forEach(v=>{
        const bill = bills.find(b=>b.id===v.bill_id);
        items.push({
          id:'vote-'+v.id, type:'vote', ts:v.created_at,
          name: v.anonymous?'An anonymous resident':'A verified resident',
          detail: bill?.title||v.bill_id,
          sub: v.choice==='yes'?'✅ Supported':v.choice==='no'?'❌ Opposed':'⬜ Abstained',
          billId: v.bill_id
        });
      });

      // Comments
      (commentsRes.data||[]).forEach(c=>{
        const bill = bills.find(b=>b.id===c.bill_id);
        items.push({
          id:'comment-'+c.id, type:'comment', ts:c.created_at,
          name: c.anonymous?'An anonymous resident':(c.display_name||'A resident'),
          detail: bill?.title||c.bill_id,
          sub: '"'+(c.content||'').slice(0,80)+(c.content?.length>80?'...':'')+'"',
        });
      });

      // New members (joined in last 30 days)
      const cutoff = new Date(Date.now()-30*24*60*60*1000).toISOString();
      (profilesRes.data||[]).filter(p=>p.created_at>cutoff).forEach(p=>{
        items.push({
          id:'join-'+p.id, type:'join', ts:p.created_at,
          name: p.display_name||'A new neighbor',
          detail: p.zip?'from '+p.zip:'',
          sub: null
        });
        // Badge events — show newest badge earned
        if(p.badges&&p.badges.length>0) {
          const latestBadge = p.badges[p.badges.length-1];
          if(BADGES[latestBadge]) {
            items.push({
              id:'badge-'+p.id+'-'+latestBadge, type:'badge', ts:p.created_at,
              name: p.display_name||'A resident',
              detail: BADGES[latestBadge].label,
              sub: BADGES[latestBadge].desc,
              badgeId: latestBadge
            });
          }
        }
      });

      // Ideas
      (ideasRes.data||[]).forEach(i=>{
        items.push({
          id:'idea-'+i.id, type:'idea', ts:i.created_at,
          name: i.submitted_by_name||'A resident',
          detail: i.title,
          sub: i.upvotes>1?i.upvotes+' upvotes':null
        });
      });

      // Chat messages
      (chatRes.data||[]).forEach(m=>{
        items.push({
          id:'chat-'+m.id, type:'chat', ts:m.created_at,
          name: m.display_name||'A resident',
          detail: '"'+(m.content||'').slice(0,100)+(m.content?.length>100?'...':'')+'"',
          sub: 'in #general'
        });
      });

      // Nominations
      (nominationsRes.data||[]).forEach(n=>{
        items.push({
          id:'nom-'+n.id, type:'nomination', ts:n.created_at,
          name: n.submitted_by_name||'A resident',
          detail: n.title,
          sub: 'Pending admin review'
        });
      });

      // Sort all by timestamp, newest first
      items.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
      setFeed(items.slice(0,40));
    } catch(e) {
      console.error('Feed load error:', e);
    }
    setLoading(false);
  };

  const timeAgo = (ts)=>{
    const diff = Date.now()-new Date(ts);
    const m = Math.floor(diff/60000);
    const h = Math.floor(diff/3600000);
    const d = Math.floor(diff/86400000);
    if(m<2) return 'just now';
    if(m<60) return m+'m ago';
    if(h<24) return h+'h ago';
    return d+'d ago';
  };

  return h('div',null,

// ── Community Bill Submission System ─────────────────────────────────────────
function CommunitySubmitPanel({user, bills, onToast, onSubmitted}) {
  const [open, setOpen] = useState(false);
  const [sourceUrl, setSourceUrl] = useState('');
  const [fetching, setFetching] = useState(false);
  const [fetchMsg, setFetchMsg] = useState('');
  const [form, setForm] = useState({title:'',level:'city',jurisdiction:'City of Jackson',status:'',introduced:'',sponsor:'',summary:'',full_text:''});
  const [saving, setSaving] = useState(false);
  const isTrusted = (user?.reputation||0) >= 50;
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));

  const fetchFromUrl = async() => {
    if(!sourceUrl.trim()){setFetchMsg('Please enter a URL first.');return;}
    setFetching(true);setFetchMsg('Fetching page...');
    try{
      const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(sourceUrl);
      const res=await fetch(proxy);
      const json=await res.json();
      const raw=json.contents||'';
      const text=raw.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
                    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
                    .replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,6000);
      if(!text||text.length<100){setFetchMsg('Could not read that page. Fill in the form manually.');setFetching(false);return;}
      setFetchMsg('AI is reading the document...');
      const aiRes=await fetch(AI_PROXY,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:'You are a civic data extractor. Extract bill/proposal info and return ONLY valid JSON, no markdown. Schema: {"title":"","level":"village|city|township|county|state|federal","jurisdiction":"","status":"","introduced":"","sponsor":"","summary":"2-3 plain English sentences","full_text":"key text + source URL"}',
          messages:[{role:'user',content:'Extract bill info from this page (source: '+sourceUrl+'):\n\n'+text}]
        })
      });
      const aiJson=await aiRes.json();
      const aiRaw=aiJson.content?.find(b=>b.type==='text')?.text||'{}';
      const extracted=JSON.parse(aiRaw.replace(/```json|```/g,'').trim());
      setForm(f=>({...f,
        title:extracted.title||f.title,
        level:extracted.level||f.level,
        jurisdiction:extracted.jurisdiction||f.jurisdiction,
        status:extracted.status||f.status,
        introduced:extracted.introduced||f.introduced,
        sponsor:extracted.sponsor||f.sponsor,
        summary:extracted.summary||f.summary,
        full_text:(extracted.full_text||f.full_text)+'\n\nSource: '+sourceUrl,
      }));
      setFetchMsg('✅ Fields filled in! Review carefully before submitting.');
    }catch(e){
      setFetchMsg('Could not fetch that page. Fill in the form manually.');
    }
    setFetching(false);
  };

  // Check for duplicate
  const duplicate = bills.find(b=>
    b.title&&form.title&&b.title.toLowerCase().trim()===form.title.toLowerCase().trim()
  );

  const submit = async() => {
    if(!form.title.trim()||!form.summary.trim()){onToast('Title and summary are required.');return;}
    if(duplicate){onToast('This bill already exists in the system!');return;}
    setSaving(true);
    const submission = {
      ...form,
      votes_yes:0,votes_no:0,votes_abstain:0,
      submitted_by_id: user.id,
      submitted_by_name: user.display_name||user.email?.split('@')[0]||'Resident',
      cosign_count: 1,
      cosigners: JSON.stringify([user.id]),
      source_url: sourceUrl||null,
      pending: true,
      created_at: new Date().toISOString(),
    };
    const {error} = await sb.from('pending_bills').insert(submission);
    if(!error){
      onToast('Bill submitted! It will go live once verified by the community.');
      if(onSubmitted) onSubmitted(submission);
      setOpen(false);
      setForm({title:'',level:'city',jurisdiction:'City of Jackson',status:'',introduced:'',sponsor:'',summary:'',full_text:''});
      setSourceUrl('');setFetchMsg('');
    } else {
      onToast('Submitted locally - admin will review. Thank you!');
      setOpen(false);
    }
    setSaving(false);
  };

  if(!user) return null;

  const JURISDICTIONS = ['Village of Concord','City of Jackson','Summit Township','Columbia Township','Napoleon Township','Grass Lake Township','Spring Arbor Township','Leoni Township','Blackman Township','Rives Township','Henrietta Township','Waterloo Township','Norvell Township','Hanover Township','Springport Township','Jackson County','State of Michigan','Federal'];
  const inp = (label,key,ph,type='text',rows=0) => h('div',{style:{marginBottom:10}},
    h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},label),
    rows>0
      ? h('textarea',{value:form[key],onChange:set(key),placeholder:ph,rows,style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box',resize:'vertical'}})
      : h('input',{value:form[key],onChange:set(key),placeholder:ph,type,style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box'}})
  );

  return h('div',{style:{marginBottom:16}},
    !open
      ? h('button',{
          onClick:()=>setOpen(true),
          style:{width:'100%',background:'#fff',border:'2px dashed #c0b89a',borderRadius:10,padding:'14px',fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#8a6000',cursor:'pointer'}
        },'+ Submit a Bill from Your Community')
      : h('div',{style:{background:'#fff',border:'2px solid #1a1a2e',borderRadius:12,padding:20,marginBottom:4}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:17,color:'#1a1a2e',marginBottom:4}},'📋 Submit a Community Bill'),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginBottom:16,lineHeight:1.6}},
            'Paste a link to meeting minutes, an agenda, or any government page. The AI will read it and fill in the details. You review, then submit for community verification.',
            isTrusted
              ? h('span',{style:{color:'#1a6b3c',fontWeight:600}}, ' As a trusted resident, your submissions need only 1 co-signer.')
              : h('span',null, ' Submissions need 3 co-signers to go live.')
          ),

          // URL fetch box
          h('div',{style:{background:'#1a1a2e',borderRadius:8,padding:14,marginBottom:16}},
            h('div',{style:{fontSize:12,color:'#f0c040',fontWeight:700,marginBottom:8}},'🔗 Import from a Government Website or Document'),
            h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
              h('input',{
                value:sourceUrl,onChange:e=>setSourceUrl(e.target.value),
                onKeyDown:e=>e.key==='Enter'&&fetchFromUrl(),
                placeholder:'Paste URL to agenda, minutes, ordinance page...',
                style:{flex:1,minWidth:180,border:'1px solid #444',borderRadius:5,padding:'9px 12px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}
              }),
              h('button',{onClick:fetchFromUrl,disabled:fetching,
                style:{background:fetching?'#555':'#f0c040',color:'#1a1a2e',border:'none',padding:'9px 16px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:13,cursor:'pointer'}
              },fetching?'Reading...':'Auto-Fill ->')
            ),
            fetchMsg&&h('div',{style:{marginTop:8,fontSize:12,color:fetchMsg.startsWith('✅')?'#6bcf8a':'#f0c040'}},fetchMsg)
          ),

          // Duplicate warning
          duplicate&&h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:7,padding:'10px 14px',marginBottom:12,fontSize:13,color:'#8a6000'}},
            '⚠️ A bill called "',h('strong',null,duplicate.title),'" already exists in the system. Check the Bills tab before submitting.'
          ),

          // Form fields
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}},
            h('div',null,
              h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Level'),
              h('select',{value:form.level,onChange:set('level'),style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,marginBottom:10}},
                ['village','city','township','county','state','federal'].map(l=>h('option',{key:l,value:l},l))
              )
            ),
            h('div',null,
              h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Jurisdiction'),
              h('select',{value:form.jurisdiction,onChange:set('jurisdiction'),style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,marginBottom:10}},
                JURISDICTIONS.map(j=>h('option',{key:j,value:j},j))
              )
            )
          ),
          inp('Bill / Proposal Title *','title','e.g. Main Street Sidewalk Repair Ordinance'),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}},
            h('div',null,inp('Status','status','e.g. Council Vote Pending, Passed')),
            h('div',null,inp('Date Introduced','introduced','e.g. March 2025'))
          ),
          inp('Sponsor / Author','sponsor','e.g. Councilmember Jane Smith'),
          inp('Plain-Language Summary *','summary','What does this bill do? Write 2-3 sentences any resident can understand.','text',3),
          inp('Source / Full Text','full_text','Paste relevant text from the document, or describe where to find it. Always include your source.','text',3),

          h('div',{style:{background:'#e8f5ee',border:'1px solid #c8e8d4',borderRadius:7,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#1a6b3c',lineHeight:1.6}},
            '✅ By submitting, you confirm this is real, publicly-documented legislation. Inaccurate submissions may result in a reduction of your community reputation.'
          ),

          h('div',{style:{display:'flex',gap:10}},
            h('button',{onClick:submit,disabled:saving||!!duplicate,
              style:{flex:1,background:saving||duplicate?'#ccc':'#1a6b3c',color:'#fff',border:'none',padding:'12px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15,cursor:'pointer'}
            },saving?'Submitting...':'Submit for Community Verification ->'),
            h('button',{onClick:()=>{setOpen(false);setFetchMsg('');setSourceUrl('');},
              style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',padding:'12px 16px',borderRadius:7,fontSize:13,cursor:'pointer'}
            },'Cancel')
          )
        )
  );
}

function PendingBillCard({bill, user, onCosign, onToast}) {
  const cosigners = (() => { try { return JSON.parse(bill.cosigners||'[]'); } catch(e) { return []; } })();
  const isTrusted = (user?.reputation||0) >= 50;
  const threshold = bill.is_trusted_submission ? 2 : 4; // trusted=needs 2 total, regular=needs 4
  const needed = Math.max(0, threshold - cosigners.length);
  const alreadySigned = user && cosigners.includes(user.id);
  const isSubmitter = user && bill.submitted_by_id === user.id;
  const pct = Math.min(100, Math.round((cosigners.length/threshold)*100));

  const cosign = async() => {
    if(alreadySigned){onToast('You already co-signed this bill.');return;}
    if(isSubmitter){onToast('You cannot co-sign your own submission.');return;}
    const newCosigners = [...cosigners, user.id];
    const nowLive = newCosigners.length >= threshold;
    await sb.from('pending_bills').update({
      cosign_count: newCosigners.length,
      cosigners: JSON.stringify(newCosigners),
      pending: !nowLive,
    }).eq('id', bill.id);
    if(nowLive) {
      // Move to live bills table
      const {cosigners:_c, cosign_count:_n, pending:_p, submitted_by_id:_s, submitted_by_name:_sn, source_url:_u, is_trusted_submission:_t, ...billData} = bill;
      billData.id = billData.id || (bill.jurisdiction.split(' ')[0].toUpperCase()+'_COMMUNITY_'+Date.now());
      await sb.from('bills').insert({...billData, votes_yes:0, votes_no:0, votes_abstain:0});
      onToast('🎉 Bill verified by the community and is now live for voting!');
    } else {
      onToast('Co-signed! '+(needed-1)+' more needed to go live.');
    }
    if(onCosign) onCosign();
  };

  return h('div',{style:{background:'#fff',border:'2px solid #f0c040',borderRadius:10,marginBottom:12,padding:'14px 16px',opacity:0.95}},
    h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8,alignItems:'center'}},
      h('span',{style:{background:'#fff8e7',color:'#8a6000',fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:20,textTransform:'uppercase',letterSpacing:1}},'⏳ Pending Verification'),
      h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,padding:'3px 8px',borderRadius:20}},bill.level),
      h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,padding:'3px 8px',borderRadius:20}},bill.jurisdiction)
    ),
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#1a1a2e',marginBottom:4}},bill.title),
    h('div',{style:{fontSize:12,color:'#aaa',marginBottom:8}},'Submitted by ',h('strong',{style:{color:'#5b3a8c'}},bill.submitted_by_name||'Community Member')),
    h('p',{style:{fontFamily:"'Lora',serif",fontSize:13,lineHeight:1.65,color:'#555',marginBottom:12}},bill.summary),

    // Co-sign progress bar
    h('div',{style:{marginBottom:10}},
      h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:4}},
        h('span',{style:{fontSize:12,fontWeight:700,color:'#8a6000'}},'Community Verification'),
        h('span',{style:{fontSize:12,color:needed===0?'#1a6b3c':'#8a6000',fontWeight:700}},cosigners.length+'/'+threshold+' co-signers'+(needed===0?' ✅':''))
      ),
      h('div',{style:{height:8,background:'#eee',borderRadius:4,overflow:'hidden'}},
        h('div',{style:{width:pct+'%',height:'100%',background:pct>=100?'#1a6b3c':'#f0c040',transition:'width .4s'}})
      ),
      needed>0&&h('div',{style:{fontSize:11,color:'#aaa',marginTop:3}},needed+' more verified resident'+(needed===1?'':' ')+'needed to go live')
    ),

    bill.source_url&&h('div',{style:{fontSize:12,marginBottom:10}},
      h('a',{href:bill.source_url,target:'_blank',style:{color:'#1a5c8a',textDecoration:'none'}},'📎 View Source Document')
    ),

    user&&!alreadySigned&&!isSubmitter&&h('button',{onClick:cosign,
      style:{background:'#1a1a2e',color:'#f0c040',border:'none',padding:'9px 18px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}
    },'✅ I Can Verify This - Co-Sign'),
    alreadySigned&&h('div',{style:{fontSize:12,color:'#1a6b3c',fontWeight:600}},'✅ You have co-signed this bill'),
    isSubmitter&&h('div',{style:{fontSize:12,color:'#aaa',fontStyle:'italic'}},'You submitted this bill')
  );
}

// ── Rep Tracker ───────────────────────────────────────────────────────────────
function RepTracker({bills, userZip}) {
  const [filter,setFilter]=useState('all');
  const [selected,setSelected]=useState(null);
  const [zipInput,setZipInput]=useState(userZip||'');
  const [activeZip,setActiveZip]=useState(userZip||'');

  const getRepsForZip=(zip)=>{
    if(!zip) return REPS;
    const ids=ZIP_REPS[zip];
    if(!ids) return REPS.filter(r=>r.jurisdiction==='State of Michigan'||r.jurisdiction==='Jackson County');
    return REPS.filter(r=>ids.includes(r.id));
  };

  const baseReps = activeZip ? getRepsForZip(activeZip) : REPS;
  const filtered = filter==='all' ? baseReps : baseReps.filter(r=>r.jurisdiction===filter);

  const getAlignment=rep=>{
    const b=bills.filter(b=>rep.votes[b.id]&&rep.votes[b.id].vote!=='not-recorded');
    if(!b.length) return null;
    const aligned=b.filter(b=>{const cw=b.votes_yes>b.votes_no?'yes':'no';return rep.votes[b.id].vote===cw;}).length;
    return Math.round(aligned/b.length*100);
  };
  const voteColor=v=>v==='yes'?'#1a6b3c':v==='no'?'#c0392b':'#888';
  const voteBg=v=>v==='yes'?'#eef7f1':v==='no'?'#fdf0ef':'#f5f5f5';
  const voteLabel=v=>v==='yes'?'Yes':v==='no'?'No':v==='abstain'?'Abstain':'Not Recorded';

  return h('div',null,
    h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'12px 14px',marginBottom:14,display:'flex',gap:10,alignItems:'flex-start'}},
      h('span',{style:{fontSize:20,flexShrink:0}},'\u2696\uFE0F'),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#555',lineHeight:1.7}},
        h('strong',{style:{color:'#1a1a2e',fontFamily:"'Playfair Display',serif"}},'Accountability Tracker'),
        ' - How your elected representatives voted vs. how the community voted. Sourced from public meeting minutes. ',
        h('em',null,'This platform takes no political position.')
      )
    ),
    h('div',{style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,padding:'14px 16px',marginBottom:14}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:8}},'Find Your Representatives by ZIP Code'),
      h('div',{style:{display:'flex',gap:8}},
        h('input',{value:zipInput,onChange:e=>setZipInput(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&setActiveZip(zipInput),
          placeholder:'e.g. 49237, 49201, 49230...',
          style:{flex:1,border:'1px solid #ddd',borderRadius:6,padding:'9px 12px',fontSize:14,fontFamily:"'Lora',serif"}
        }),
        h('button',{onClick:()=>setActiveZip(zipInput),
          style:{background:'#1a1a2e',color:'#f0c040',border:'none',padding:'9px 18px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,cursor:'pointer'}
        },'Find'),
        activeZip&&h('button',{onClick:()=>{setActiveZip('');setZipInput('');},
          style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',padding:'9px 12px',borderRadius:6,cursor:'pointer',fontSize:13}
        },'Clear')
      ),
      activeZip&&h('div',{style:{marginTop:8,fontSize:12,color:'#1a6b3c',fontWeight:600}},
        'Showing '+filtered.length+' representatives for ZIP '+activeZip
      )
    ),
    h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}},
      [['all','All'],['City of Jackson','Jackson City'],['Village of Concord','Concord'],['State of Michigan','State MI'],['Jackson County','County']].map(([v,l])=>
        h('button',{key:v,onClick:()=>setFilter(v),
          style:{background:filter===v?'#1a1a2e':'#fff',color:filter===v?'#f0c040':'#555',
            border:'1px solid '+(filter===v?'#1a1a2e':'#ddd'),padding:'7px 14px',borderRadius:20,
            fontFamily:"'Playfair Display',serif",fontSize:12,fontWeight:filter===v?700:400,cursor:'pointer'}
        },l)
      )
    ),
    filtered.length===0&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},
      'No representatives found for that ZIP. Try 49201, 49237, or 49230.'
    ),
    filtered.map(rep=>{
      const alignment=getAlignment(rep);
      const repBills=bills.filter(b=>rep.votes[b.id]);
      const isOpen=selected===rep.id;
      const partyColor=rep.party==='Republican'?'#c0392b':rep.party==='Democrat'?'#1a5c8a':'#888';
      return h('div',{key:rep.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,marginBottom:12,overflow:'hidden',boxShadow:'0 2px 8px rgba(0,0,0,.04)'}},
        h('div',{style:{padding:'14px 16px',display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}},
          h('div',{style:{width:46,height:46,borderRadius:'50%',background:'#1a1a2e',color:'#f0c040',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontFamily:"'Playfair Display',serif",fontSize:13,flexShrink:0}},rep.photo),
          h('div',{style:{flex:1,minWidth:120}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15,color:'#1a1a2e'}},rep.name),
            h('div',{style:{fontSize:12,color:'#555',marginTop:1}},rep.title),
            h('div',{style:{fontSize:11,color:'#888'}},rep.body),
            rep.party!=='Nonpartisan'&&h('span',{style:{fontSize:10,fontWeight:700,color:partyColor,textTransform:'uppercase',letterSpacing:1}},rep.party)
          ),
          alignment!==null
            ? h('div',{style:{textAlign:'center',minWidth:70}},
                h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:22,color:alignment>=70?'#1a6b3c':alignment>=40?'#8a6000':'#c0392b'}},alignment+'%'),
                h('div',{style:{fontSize:10,color:'#888',textTransform:'uppercase',letterSpacing:1}},'With People'),
                h('div',{style:{height:5,background:'#eee',borderRadius:3,marginTop:3,overflow:'hidden'}},
                  h('div',{style:{width:alignment+'%',height:'100%',background:alignment>=70?'#1a6b3c':alignment>=40?'#f0c040':'#c0392b',borderRadius:3}})
                )
              )
            : h('div',{style:{fontSize:11,color:'#bbb',fontStyle:'italic'}},'No votes recorded'),
          h('button',{onClick:()=>setSelected(isOpen?null:rep.id),
            style:{background:'transparent',border:'1px solid #e0e0e0',borderRadius:6,padding:'7px 12px',fontFamily:"'Playfair Display',serif",fontSize:12,color:'#555',cursor:'pointer'}
          },isOpen?'Close':'Details')
        ),
        isOpen&&h('div',{style:{borderTop:'1px solid #f0ece4',padding:'16px',background:'#faf8f3'}},
          h('div',{style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:14}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e',marginBottom:8}},'Contact Information'),
            h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
              h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
                h('a',{href:'mailto:'+rep.contact,
                  style:{display:'inline-flex',alignItems:'center',gap:6,background:'#1a1a2e',color:'#f0c040',textDecoration:'none',padding:'8px 14px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13}
                },'Email '+rep.name.split(' ')[0]),
                rep.phone&&h('a',{href:'tel:'+rep.phone.replace(/\D/g,''),
                  style:{display:'inline-flex',alignItems:'center',gap:6,background:'#e8f2fa',color:'#1a5c8a',textDecoration:'none',padding:'8px 14px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13}
                },rep.phone),
                h('a',{href:'https://'+rep.website,target:'_blank',
                  style:{display:'inline-flex',alignItems:'center',gap:6,background:'#f5f5f5',color:'#555',textDecoration:'none',padding:'8px 14px',borderRadius:6,fontSize:13}
                },'Website')
              ),
              rep.address&&h('div',{style:{fontSize:12,color:'#888'}},'Address: '+rep.address),
              rep.notes&&h('div',{style:{fontSize:12,color:'#5b3a8c',fontStyle:'italic'}},rep.notes)
            )
          ),
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e',marginBottom:10}},'Official Votes vs. Community'),
          repBills.length===0&&h('div',{style:{color:'#bbb',fontStyle:'italic',fontSize:13}},'No recorded votes yet.'),
          repBills.map(b=>{
            const rv=rep.votes[b.id];
            const total=b.votes_yes+b.votes_no+b.votes_abstain;
            const cw=b.votes_yes>b.votes_no?'yes':'no';
            const aligned=rv.vote!=='not-recorded'&&rv.vote===cw;
            const misaligned=rv.vote!=='not-recorded'&&rv.vote!==cw;
            return h('div',{key:b.id,style:{marginBottom:12,paddingBottom:12,borderBottom:'1px solid #eee'}},
              h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e',marginBottom:6}},b.title),
              h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:5}},
                h('div',{style:{background:voteBg(rv.vote),color:voteColor(rv.vote),fontWeight:700,fontSize:12,padding:'4px 10px',borderRadius:20}},'Rep: '+voteLabel(rv.vote)),
                h('div',{style:{background:'#f0f0f0',color:'#555',fontSize:12,padding:'4px 10px',borderRadius:20}},'Community: '+pct(b.votes_yes,total)+'% Support'),
                aligned&&h('div',{style:{background:'#eef7f1',color:'#1a6b3c',fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:20}},'Aligned'),
                misaligned&&h('div',{style:{background:'#fdf0ef',color:'#c0392b',fontSize:12,fontWeight:700,padding:'4px 10px',borderRadius:20}},'Against community')
              ),
              rv.note&&h('div',{style:{fontSize:12,color:'#888',fontStyle:'italic'}},'Source: '+rv.note)
            );
          })
        )
      );
    })
  );
}

// ── Project Card ──────────────────────────────────────────────────────────────
function ProjectCard({project,user,onRepGain}) {
  const [open,setOpen]=useState(false);
  const [tab,setTab]=useState('pledges');
  const [pledgeType,setPledgeType]=useState('labor');
  const [pledgeVal,setPledgeVal]=useState('');
  const [pledgeDetail,setPledgeDetail]=useState('');
  const [commentText,setCommentText]=useState('');
  const [pledges,setPledges]=useState([]);
  const [comments,setComments]=useState([]);
  const [supported,setSupported]=useState(false);
  const [supportCount,setSupportCount]=useState(project.supporter_count||0);
  const [letter,setLetter]=useState(project.forwarded_letter||null);
  const [showLetter,setShowLetter]=useState(false);
  const [toast,setToast]=useState(null);
  const catColor=CAT_COLORS[project.category]||'#555';
  const isReady=supportCount>=project.supporter_threshold;
  const supportPct=Math.min(100,Math.round(supportCount/project.supporter_threshold*100));

  useEffect(()=>{if(open){loadPledges();loadComments();checkSupport();}},[open]);

  const loadPledges=async()=>{const {data}=await sb.from('project_pledges').select('*').eq('project_id',project.id);if(data)setPledges(data);};
  const loadComments=async()=>{const {data}=await sb.from('project_comments').select('*').eq('project_id',project.id).order('created_at',{ascending:false});if(data)setComments(data);};
  const checkSupport=async()=>{if(!user)return;const {data}=await sb.from('project_supporters').select('id').eq('project_id',project.id).eq('user_id',user.id);if(data&&data.length)setSupported(true);};

  const addSupport=async()=>{
    if(!user){setToast("Sign in to support projects.");return;}
    if(supported)return;
    const {error}=await sb.from('project_supporters').insert({project_id:project.id,user_id:user.id});
    if(!error){
      await sb.from('projects').update({supporter_count:supportCount+1}).eq('id',project.id);
      setSupportCount(c=>c+1);setSupported(true);
      await sb.from('profiles').update({reputation:Math.min(9999,(user.reputation||0)+5)}).eq('id',user.id);
      onRepGain(5);setToast("Support added! +5 reputation");
    }
  };

  const submitPledge=async()=>{
    if(!pledgeVal.trim()||!user)return;
    const name=user.display_name||user.email.split('@')[0];
    const {error}=await sb.from('project_pledges').insert({project_id:project.id,user_id:user.id,display_name:name,pledge_type:pledgeType,value:pledgeVal,detail:pledgeDetail});
    if(!error){
      setPledges(prev=>[...prev,{display_name:name,pledge_type:pledgeType,value:pledgeVal,detail:pledgeDetail}]);
      setPledgeVal('');setPledgeDetail('');
      await sb.from('profiles').update({reputation:Math.min(9999,(user.reputation||0)+15)}).eq('id',user.id);
      onRepGain(15);setToast("Pledge saved! +15 reputation");
    }
  };

  const postComment=async()=>{
    if(!commentText.trim()||!user)return;
    const name=user.display_name||user.email.split('@')[0];
    const {error}=await sb.from('project_comments').insert({project_id:project.id,user_id:user.id,display_name:name,content:commentText.trim()});
    if(!error){
      setComments(prev=>[{display_name:name,content:commentText.trim(),created_at:new Date().toISOString()},...prev]);
      setCommentText('');
      await sb.from('profiles').update({reputation:Math.min(9999,(user.reputation||0)+10)}).eq('id',user.id);
      onRepGain(10);setToast("+10 reputation!");
    }
  };

  const generateLetter=async()=>{
    const pledgeSummary=pledges.map(p=>p.display_name+": "+p.pledge_type+" - "+p.value).join(", ");
    const text="Dear "+project.official_target_name+",\n\nWe, "+supportCount+" verified residents of "+project.jurisdiction+", write to formally request your support for:\n\n\""+project.title+"\"\n\n"+project.description+"\n\nOur community has already pledged: "+(pledgeSummary||"volunteer time and community support")+".\n\nThis reflects the genuine priorities of your constituents as documented through The People's Voice civic platform.\n\nWe respectfully request a response or a meeting to discuss how this project can receive official support.\n\nRespectfully,\nThe People of "+project.jurisdiction+"\nvia The People's Voice - "+SITE_URL;
    await sb.from('projects').update({forwarded_letter:text,status:'forwarded'}).eq('id',project.id);
    setLetter(text);setShowLetter(true);setToast("Letter generated! Project marked as forwarded.");
  };

  return h('div',{style:{background:'#fff',borderRadius:10,border:'1px solid #e5dece',marginBottom:16,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,.05)'}},
    toast&&h(Toast,{msg:toast,onDone:()=>setToast(null)}),
    h('div',{style:{borderLeft:'5px solid '+catColor,padding:'18px 16px'}},
      h('div',{style:{display:'flex',gap:7,flexWrap:'wrap',marginBottom:10}},
        h(Tag,{bg:catColor+'22',color:catColor},"🌱 "+project.category),
        h(Tag,{bg:'#f5f5f5',color:'#555'},project.jurisdiction),
        h(Tag,{bg:project.status==='forwarded'?'#eef7f1':'#fffbea',color:project.status==='forwarded'?'#1a6b3c':'#8a6000'},project.status==='forwarded'?"✅ Forwarded":"⏳ Gathering Support")
      ),
      h('h3',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:17,color:'#1a1a2e',margin:'0 0 6px',lineHeight:1.3}},project.title),
      h('div',{style:{fontSize:12,color:'#aaa',marginBottom:10}},"Proposed by ",h('strong',{style:{color:'#5b3a8c'}},project.proposer_name)," · ",project.created_at ? new Date(project.created_at).toLocaleDateString() : ''),
      h('p',{style:{fontFamily:"'Lora',serif",fontSize:14,lineHeight:1.7,color:'#444',margin:'0 0 14px'}},project.description),
      h('div',{style:{marginBottom:14}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
          h('span',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e'}},"Community Support"),
          h('span',{style:{fontSize:13,color:isReady?'#1a6b3c':'#888',fontWeight:isReady?700:400}},supportCount+" / "+project.supporter_threshold+(isReady?" ✅":""))
        ),
        h('div',{style:{height:12,background:'#eee',borderRadius:6,overflow:'hidden'}},
          h('div',{style:{width:supportPct+'%',height:'100%',background:isReady?'#1a6b3c':catColor,transition:'width .5s'}})
        )
      ),
      h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
        !supported?h(Btn,{onClick:addSupport,bg:'#1a6b3c',color:'#fff'},"🤝 Add My Support"):h('div',{style:{background:'#eef7f1',border:'1px solid #c8e8d4',borderRadius:5,padding:'8px 14px',fontSize:13,color:'#1a6b3c'}},"✓ You support this"),
        isReady&&project.status!=='forwarded'&&h(Btn,{onClick:generateLetter,bg:'#c0392b',color:'#fff'},"📨 Forward to Officials"),
        (letter||project.status==='forwarded')&&h(Btn,{onClick:()=>setShowLetter(!showLetter),bg:'transparent',color:'#1a5c8a',border:'1px solid #1a5c8a'},"📄 "+(showLetter?"Hide":"View")+" Letter")
      ),
      showLetter&&letter&&h('div',{style:{marginTop:14,background:'#f0f4ff',border:'1px solid #c0d0e8',borderRadius:8,padding:16}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a5c8a',marginBottom:10}},"📨 Letter to "+project.official_target_name),
        h('pre',{style:{fontFamily:"'Lora',serif",fontSize:12,lineHeight:1.7,color:'#333',whiteSpace:'pre-wrap',margin:0}},letter)
      ),
      h('button',{onClick:()=>setOpen(!open),style:{marginTop:12,background:'transparent',border:'none',color:'#1a5c8a',fontFamily:"'Playfair Display',serif",fontSize:13,padding:0}},open?"▲ Close":"▼ Pledges & Discussion")
    ),
    open&&h('div',{style:{borderTop:'1px solid #e5dece',padding:'16px'}},
      h('div',{style:{display:'flex',borderBottom:'2px solid #e5dece',marginBottom:16}},
        [['pledges','🤲 Pledges'],['discuss','💬 Discussion']].map(([t,l])=>
          h('button',{key:t,onClick:()=>setTab(t),style:{background:'transparent',border:'none',borderBottom:tab===t?'2px solid #1a1a2e':'none',marginBottom:-2,padding:'8px 14px',fontFamily:"'Playfair Display',serif",fontWeight:tab===t?700:400,fontSize:14,color:tab===t?'#1a1a2e':'#aaa'}},l)
        )
      ),
      tab==='pledges'&&h('div',null,
        pledges.length>0&&h('div',{style:{marginBottom:16}},
          pledges.map((p,i)=>{const m=PLEDGE_META[p.pledge_type]||PLEDGE_META.labor;return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:m.bg,borderRadius:7,marginBottom:8}},
            h('span',{style:{fontSize:18}},m.icon),
            h('div',{style:{flex:1}},
              h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:m.color}},p.display_name+" - "+p.value),
              p.detail&&h('div',{style:{fontSize:12,color:'#666'}},p.detail)
            ),
            h('div',{style:{fontSize:11,color:m.color,fontWeight:700,textTransform:'uppercase'}},m.label)
          );})
        ),
        user?h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:8,padding:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:12}},"Pledge Your Contribution"),
          h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}},
            Object.entries(PLEDGE_META).map(([type,meta])=>
              h('button',{key:type,onClick:()=>setPledgeType(type),style:{padding:'7px 11px',border:'2px solid '+(pledgeType===type?meta.color:'#ddd'),borderRadius:6,background:pledgeType===type?meta.bg:'#fff',color:pledgeType===type?meta.color:'#777',fontFamily:"'Playfair Display',serif",fontSize:12,fontWeight:pledgeType===type?700:400}},meta.icon+" "+meta.label)
            )
          ),
          h('input',{value:pledgeVal,onChange:e=>setPledgeVal(e.target.value),placeholder:pledgeType==='labor'?'e.g. 4 hours on weekends':pledgeType==='skills'?'e.g. Carpentry, cooking':pledgeType==='materials'?'e.g. 10 bags of soil':'e.g. $50',style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box',marginBottom:8}}),
          h('input',{value:pledgeDetail,onChange:e=>setPledgeDetail(e.target.value),placeholder:'Optional details...',style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box',marginBottom:10}}),
          h(Btn,{onClick:submitPledge,bg:'#1a6b3c',color:'#fff'},"Pledge +15 rep ->")
        ):h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:12,fontSize:13,color:'#8a6000',textAlign:'center'}},"Sign in to pledge resources.")
      ),
      tab==='discuss'&&h('div',null,
        user?h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:8,padding:14,marginBottom:14}},
          h('textarea',{value:commentText,onChange:e=>setCommentText(e.target.value),placeholder:'Ideas, questions, offers to help...',rows:3,style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,resize:'vertical',boxSizing:'border-box'}}),
