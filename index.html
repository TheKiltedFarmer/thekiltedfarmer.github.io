function RepContactTracker({bill, user}) {
  const [contacts, setContacts] = useState([]);
  const [loading, setLoading] = useState(false);

  useEffect(()=>{
    sb.from('rep_contacts').select('count').eq('bill_id',bill.id)
      .then(({count})=>{ if(count!==null) setContacts(count); });
  },[bill.id]);

  const logContact = async(repName) => {
    setLoading(true);
    await sb.from('rep_contacts').insert({
      bill_id:bill.id, bill_title:bill.title,
      user_id:user?.id||null, rep_name:repName,
      contacted_at:new Date().toISOString()
    });
    setContacts(c=>c+1);
    setLoading(false);
  };

  if(!contacts&&contacts!==0) return null;

  return contacts>0
    ? h('div',{style:{fontSize:12,color:'#1a6b3c',fontWeight:600,marginTop:4}},
        '📬 '+contacts+' resident'+(contacts===1?'':'s')+' have contacted their rep about this bill'
      )
    : null;
}

function AuthScreen({onAuth, onGuest}) {
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [name,setName]=useState('');
  const [zip,setZip]=useState('');
  const [attested,setAttested]=useState(false);
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);
  const [step,setStep]=useState(1); // 1=account info, 2=zip+attestation

  const community=ZIP_COMMUNITY[zip.trim()]||null;
  const zipValid=VALID_ZIPS.includes(zip.trim());

  const nextStep=()=>{
    if(step===1){
      if(!email.trim()){setError('Email is required.');return;}
      // Validate email format before proceeding
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRegex.test(email.trim())){
        setError('Please enter a valid email address (e.g. name@gmail.com). If you\'re opening this from Facebook Messenger, try copying the link and opening it in Safari or Chrome instead.');
        return;
      }
      if(pass.length<6){setError('Password must be at least 6 characters.');return;}
      setError('');setStep(2);
    }
  };

  const handleSignup=async()=>{
    if(!zip.trim()){setError('ZIP code is required.');return;}
    if(!zipValid){setError('Sorry — The People\'s Voice is currently only open to Jackson County and surrounding area residents. Your ZIP code ('+zip.trim()+') is not in our service area.');return;}
    if(!attested){setError('Please confirm the attestation to continue.');return;}
    setLoading(true);setError('');
    const displayName=name||email.split('@')[0];
    const {data,error:err}=await sb.auth.signUp({
      email,password:pass,
      options:{data:{display_name:displayName,zip}}
    });
    if(err){
      let msg=err.message||'Something went wrong. Please try again.';
      if(msg.includes('invalid format')||msg.includes('invalid email')) msg='Please enter a valid email address (e.g. name@gmail.com). If you opened this from Facebook Messenger, try copying thepeoplesvoices.org and opening it directly in Safari or Chrome.';
      else if(msg.includes('already registered')||msg.includes('already exists')) msg='An account with this email already exists. Try signing in instead.';
      else if(msg.includes('password')) msg='Password must be at least 6 characters.';
      else if(msg.includes('rate limit')) msg='Too many attempts — please wait a minute and try again.';
      setError(msg);setLoading(false);return;
    }
    if(data.user){
      // Retry profile creation up to 3 times in case of network hiccup
      let profileCreated = false;
      for(let i=0; i<3; i++) {
        const {error:profErr} = await sb.from('profiles').upsert({
          id:data.user.id,email,display_name:displayName,
          zip,verified_method:'self-attested',reputation:0,
          show_in_directory:true
        });
        if(!profErr) { profileCreated = true; break; }
        console.warn('Profile upsert attempt '+(i+1)+' failed:',profErr.message);
        await new Promise(r=>setTimeout(r,800));
      }
      if(!profileCreated) console.error('All profile upsert attempts failed — trigger should handle it');
      onAuth(data.user,{display_name:displayName,zip,reputation:0,show_in_directory:true});
    }
    setLoading(false);
  };

  const handleLogin=async()=>{
    setLoading(true);setError('');
    const {data,error:err}=await sb.auth.signInWithPassword({email,password:pass});
    if(err){setError(err.message);setLoading(false);return;}
    if(data.user){
      let {data:prof} = await sb.from('profiles').select('*').eq('id',data.user.id).single();
      // If profile row missing (can happen with broken signups), create it now
      if(!prof) {
        await sb.from('profiles').upsert({
          id:data.user.id, email:data.user.email,
          display_name:data.user.email?.split('@')[0]||'Resident',
          zip:'', reputation:0, verified_method:'self-attested', show_in_directory:true
        });
        const {data:newProf} = await sb.from('profiles').select('*').eq('id',data.user.id).single();
        prof = newProf;
      }
      onAuth(data.user,prof||{});
    }
    setLoading(false);
  };

  const inp=(val,setter,placeholder,type='text',extra={})=>
    h('input',{value:val,onChange:e=>setter(e.target.value),placeholder,type,
      style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'10px 13px',marginBottom:10,fontSize:14,boxSizing:'border-box',...(extra.style||{})},...extra});

  return h('div',{style:{minHeight:'100vh',background:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',padding:16,overflowY:'auto'}},
    h('div',{style:{background:'#fff',borderRadius:14,padding:28,width:440,maxWidth:'100%',boxShadow:'0 30px 80px rgba(0,0,0,.5)',margin:'20px auto'}},

      // Header
      h('div',{style:{textAlign:'center',marginBottom:20}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:28,color:'#1a1a2e',letterSpacing:-1,lineHeight:1.1}},"The People's",h('br'),"Voice"),
        h('div',{style:{marginTop:8,fontSize:11,color:'#5b3a8c',background:'#f0ebf8',padding:'4px 14px',borderRadius:20,display:'inline-block',fontWeight:700,letterSpacing:1,textTransform:'uppercase'}},"Vote · Build · Change"),
        mode==='signup'&&h('div',{style:{marginTop:12,background:'#f8f6f0',borderRadius:10,padding:'12px 14px',textAlign:'left'}},
          [
            ["🗳","Vote on real local, state & federal bills"],
            ["📨","Email your elected officials directly from any bill"],
            ["🌱","Propose community projects and forward ideas to officials"],
            ["⚖️","Get plain-language AI breakdowns - factual, no spin"],
          ].map(([icon,text])=>h('div',{key:icon,style:{display:'flex',gap:8,alignItems:'flex-start',marginBottom:6}},
            h('span',{style:{fontSize:14,flexShrink:0}},icon),
            h('span',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#555',lineHeight:1.5}},text)
          )),
          h('div',{style:{marginTop:8,paddingTop:8,borderTop:'1px solid #e5dece',fontSize:11,color:'#aaa',lineHeight:1.6}},
            "⚖️ Nonpartisan · Independent · Not affiliated with any government or party.",h('br'),
            h('strong',null,"Your votes are unofficial - but your voice is real.")
          ),
          // Guest mode
          onGuest&&h('div',{style:{marginTop:12,paddingTop:12,borderTop:'1px solid #e5dece',textAlign:'center'}},
            h('button',{onClick:onGuest,
              style:{background:'transparent',border:'none',color:'#aaa',fontSize:12,
                cursor:'pointer',fontFamily:"'Lora',serif",textDecoration:'underline'}
            },'👁 Browse as guest — view bills without an account')
          )
        )
      ),

      // Mode toggle
      h('div',{style:{display:'flex',marginBottom:20,border:'1px solid #eee',borderRadius:8,overflow:'hidden'}},
        [['login','Sign In'],['signup','Create Account']].map(([m,l])=>
          h('button',{key:m,onClick:()=>{setMode(m);setError('');setStep(1);},
            style:{flex:1,padding:'10px',background:mode===m?'#1a1a2e':'#fff',color:mode===m?'#f0c040':'#555',border:'none',fontFamily:"'Playfair Display',serif",fontWeight:mode===m?700:400,fontSize:14}},l)
        )
      ),

      // ── LOGIN FORM ──
      mode==='login'&&h(Fragment,null,

          h('div',{style:{fontSize:11,color:step>=parseInt(n)?'#1a1a2e':'#aaa',fontFamily:"'Lora',serif"}},l),
          i<2&&h('div',{style:{position:'relative',top:-22,left:'50%',width:'100%',height:2,background:step>parseInt(n)?'#1a1a2e':'#eee',zIndex:0}})
        ))
      ),

      // ── SIGNUP STEP 1 - ACCOUNT INFO ──
      mode==='signup'&&step===1&&h(Fragment,null,
        inp(name,setName,'Your full name (optional)'),
        inp(email,setEmail,'Email address *','email'),

        error&&h('div',{style:{background:'#fdf0ef',border:'1px solid #f0c0b8',borderRadius:6,padding:'10px 12px',marginBottom:12,fontSize:13,color:'#c0392b'}},error),
        h('button',{onClick:nextStep,style:{width:'100%',background:'#1a1a2e',color:'#f0c040',border:'none',padding:'13px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15}},

      // ── SIGNUP STEP 2 - ZIP + ATTESTATION ──
      mode==='signup'&&step===2&&h(Fragment,null,
        h('div',{style:{background:'#e8f2fa',border:'1px solid #c8d8f0',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:13,fontFamily:"'Lora',serif",color:'#1a5c8a',lineHeight:1.7}},
          "📍 ",h('strong',null,"Just your ZIP code:")," We only need your ZIP to confirm you're a Jackson County area resident. We do not collect or store your street address."
        ),
        h('div',{style:{marginBottom:10}},
          h('input',{value:zip,onChange:e=>setZip(e.target.value),placeholder:'ZIP code * (e.g. 49237)',maxLength:5,
            style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'10px 13px',fontSize:14,boxSizing:'border-box'}})
        ),
        community&&h('div',{style:{fontSize:12,color:'#1a6b3c',marginBottom:8,paddingLeft:4,fontWeight:600}},"✓ "+community+" — welcome to The People's Voice!"),
        zip.trim().length===5&&!zipValid&&h('div',{style:{background:'#fdf0ef',border:'1px solid #f0c0b8',borderRadius:6,padding:'10px 12px',marginBottom:8,fontSize:13,color:'#c0392b',lineHeight:1.6}},
          h('strong',null,"❌ ZIP code not in our service area. "),

          h('br'),
          h('span',{style:{color:'#555',fontSize:12}},"You can still ",
            h('button',{onClick:onGuest,style:{background:'none',border:'none',color:'#1a5c8a',fontSize:12,cursor:'pointer',textDecoration:'underline',padding:0,fontFamily:"'Lora',serif",fontWeight:700}},"browse as a guest"),

          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#555',lineHeight:1.8,marginBottom:14}},
            "By checking the box below, I ",h('strong',null,"attest")," that:",
            h('ul',{style:{marginTop:8,marginLeft:16,display:'flex',flexDirection:'column',gap:6}},
              h('li',null,"I am a real person and a genuine Jackson County area resident"),

            )

              "I confirm I am a real Jackson County area resident and will use this platform honestly."
            )
          )
        ),
        h('div',{style:{fontSize:11,color:'#aaa',fontFamily:"'Lora',serif",lineHeight:1.6,marginBottom:14,textAlign:'center'}},
          "We collect your email and ZIP only. No street address. No data sold. Ever.",h('br'),
          h('button',{onClick:()=>document.dispatchEvent(new CustomEvent('showPrivacy')),

        ),
        error&&h('div',{style:{background:'#fdf0ef',border:'1px solid #f0c0b8',borderRadius:6,padding:'10px 12px',marginBottom:12,fontSize:13,color:'#c0392b'}},error),
        h('div',{style:{display:'flex',gap:10}},
          h('button',{onClick:()=>{setStep(1);setError('');},style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',padding:'12px 16px',borderRadius:7,fontSize:14}},"← Back"),
          h('button',{onClick:handleSignup,disabled:loading||!attested||(zip.trim().length===5&&!zipValid),style:{flex:1,background:loading||!attested||(zip.trim().length===5&&!zipValid)?'#ccc':'#1a6b3c',color:'#fff',border:'none',padding:'13px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15}},
            loading?h(Spinner):'Create My Account ✓'

  );

// ── RSS Auto-Fetch Button (Admin) ─────────────────────────────────────────
function RssFetchButton({onToast, user, profile}) {
  const [fetching, setFetching] = React.useState(false);
  const [progress, setProgress] = React.useState('');
  const [result, setResult] = React.useState(null);
  const run = async()=>{
    if(fetching) return;
    setFetching(true); setProgress('Starting RSS fetch...'); setResult(null);
    try {
      const {data:existing} = await sb.from('news_stories').select('source_url').limit(200);
      const {added,skipped} = await fetchAndPublishRss({...user,...(profile||{})},existing||[],msg=>setProgress(msg));
      setResult({added,skipped});
      onToast('\u2705 RSS fetch done! '+added+' new stories added, '+skipped+' skipped.');
    } catch(e) { onToast('\u274c RSS fetch error: '+e.message); }
    setFetching(false); setProgress('');
  };
  return h('div',{style:{display:'inline-flex',flexDirection:'column',gap:4,alignItems:'flex-start'}},
    h('button',{onClick:run,disabled:fetching,style:{background:fetching?'#444':'#1a5c8a',color:'#fff',border:'none',padding:'10px 18px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:fetching?'default':'pointer',whiteSpace:'nowrap'}},
      fetching?'\uD83D\uDCE1 Fetching RSS...':'\uD83D\uDCE1 Auto-Fetch News'),
    fetching&&progress&&h('div',{style:{fontSize:11,color:'#888',fontFamily:"'Lora',serif",maxWidth:260,lineHeight:1.4,background:'#f5f3ee',borderRadius:5,padding:'4px 8px'}},progress),
    result&&h('div',{style:{fontSize:11,color:'#1a6b3c',fontWeight:700}},
      '\u2705 +'+result.added+' new \u00b7 \u23ed '+result.skipped+' skipped')
  );
}
// ── Admin Pending Review Queue ─────────────────────────────────────────────────
function PendingReviewQueue({onToast, setBills}) {
  const [pending, setPending] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    sb.from('pending_bills').select('*').eq('pending',true).order('created_at',{ascending:false})
      .then(({data})=>{ if(data) setPending(data); setLoading(false); });
  },[]);

  const approve = async(bill) => {
    const {cosigners:_c,cosign_count:_n,pending:_p,submitted_by_id:_s,submitted_by_name:_sn,source_url:_u,is_trusted_submission:_t,...billData} = bill;
    const id = bill.jurisdiction.split(' ')[0].toUpperCase().slice(0,8)+'_COM_'+Date.now();
    const {error} = await sb.from('bills').insert({...billData, id, votes_yes:0,votes_no:0,votes_abstain:0,created_at:new Date().toISOString()});
    if(!error){
      await sb.from('pending_bills').update({pending:false}).eq('id',bill.id);
      setPending(prev=>prev.filter(b=>b.id!==bill.id));
      setBills(prev=>[{...billData,id,votes_yes:0,votes_no:0,votes_abstain:0},...prev]);
      onToast('Bill approved and is now live!');
    } else onToast('Error: '+error.message);
  };

  const reject = async(bill) => {
    if(!window.confirm('Reject and remove "'+bill.title+'"?')) return;
    await sb.from('pending_bills').update({pending:false}).eq('id',bill.id);
    setPending(prev=>prev.filter(b=>b.id!==bill.id));
    onToast('Submission rejected and removed.');
  };

  if(loading) return null;
  if(!pending.length) return null;

  return h('div',{style:{background:'#fff8e7',border:'2px solid #f0c040',borderRadius:10,padding:18,marginBottom:20}},
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#1a1a2e',marginBottom:4}},
      '⏳ Community Submissions Awaiting Review ('+pending.length+')'
    ),
    h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginBottom:14}},
      'These were submitted by residents. Approve to make live, or reject to remove.'
    ),
    pending.map(bill=>{
      const cosigners = (()=>{try{return JSON.parse(bill.cosigners||'[]');}catch(e){return [];}})();
      return h('div',{key:bill.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:10}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}},
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}},
              h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,textTransform:'uppercase'}},bill.level),
              h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,padding:'2px 8px',borderRadius:20}},bill.jurisdiction),
              h('span',{style:{background:'#e8f2fa',color:'#1a5c8a',fontSize:10,padding:'2px 8px',borderRadius:20}},cosigners.length+' co-signer'+(cosigners.length===1?'':'s'))
            ),
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:3}},bill.title),
            h('div',{style:{fontSize:12,color:'#aaa',marginBottom:6}},'Submitted by '+bill.submitted_by_name),
            h('div',{style:{fontSize:12,color:'#555',lineHeight:1.5}},bill.summary),
            bill.source_url&&h('div',{style:{marginTop:6}},
              h('a',{href:bill.source_url,target:'_blank',style:{fontSize:11,color:'#1a5c8a'}},'View source ->')
            )
          ),
          h('div',{style:{display:'flex',flexDirection:'column',gap:8,flexShrink:0}},
            h('button',{onClick:()=>approve(bill),style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'8px 16px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'✅ Approve'),
            h('button',{onClick:()=>reject(bill),style:{background:'#c0392b',color:'#fff',border:'none',padding:'8px 16px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'❌ Reject')
          )
        )
      );
    })
  );
}

// ── Bill Sub-Sections Voting ──────────────────────────────────────────────────
function BillSections({bill, user, onRepGain}) {
  const [sections, setSections] = useState(null);
  const [loading, setLoading] = useState(false);
  const [votes, setVotes] = useState({});
  const [open, setOpen] = useState(false);

  const loadSections = async() => {
    // Check DB first
    const {data} = await sb.from('bill_sections').select('*').eq('bill_id', bill.id).order('position');
    if(data && data.length) { setSections(data); return; }
    // Generate with AI
    setLoading(true);
    try {
      const res = await fetch(AI_PROXY, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:800,
          system:'Break this bill into distinct votable sections. Return ONLY valid JSON array, no markdown. Each section: {"title":"short plain title","summary":"1-2 sentences what this part does","position":1}. 3-7 sections max. Only create sections if the bill genuinely has distinct separable parts worth voting on individually.',
          messages:[{role:'user',content:'Bill: '+bill.title+'\n\nSummary: '+bill.summary+'\n\nFull text: '+(bill.full_text||bill.summary)+'\n\nBreak into distinct votable sections.'}]
        })
      });
      const json = await res.json();
      const raw = json.content?.find(b=>b.type==='text')?.text||'[]';
      const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
      if(parsed.length > 0) {
        // Save to DB
        const toInsert = parsed.map(s=>({...s, bill_id:bill.id, votes_yes:0, votes_no:0, votes_abstain:0, ai_generated:true, confirmed:false}));
        const {data:saved} = await sb.from('bill_sections').insert(toInsert).select();
        setSections(saved||parsed);
      }
    } catch(e) { setSections([]); }
    setLoading(false);
  };

  const voteOnSection = async(sectionId, choice) => {
    if(!user) return;
    if(votes[sectionId]) return;
    setVotes(v=>({...v,[sectionId]:choice}));
    setSections(prev=>prev.map(s=>s.id===sectionId?{...s,['votes_'+choice]:s['votes_'+choice]+1}:s));
    await sb.from('bill_section_votes').insert({section_id:sectionId, bill_id:bill.id, user_id:user.id, choice});
    if(onRepGain) onRepGain(2);
  };

  const loadUserVotes = async() => {
    if(!user||!sections) return;
    const ids = sections.map(s=>s.id).filter(Boolean);
    if(!ids.length) return;
    const {data} = await sb.from('bill_section_votes').select('*').eq('user_id',user.id).in('section_id',ids);
    if(data) { const v={}; data.forEach(d=>v[d.section_id]=d.choice); setVotes(v); }
  };

  useEffect(()=>{ if(sections) loadUserVotes(); },[sections]);

  if(!open) return h('button',{
    onClick:()=>{setOpen(true);if(!sections)loadSections();},
    style:{width:'100%',background:'#f0ebf8',border:'1px solid #c8b8e8',borderRadius:7,padding:'10px 14px',
      fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#5b3a8c',cursor:'pointer',marginTop:10,textAlign:'left'}
  },'🗂 Vote on Individual Sections of This Bill');

  return h('div',{style:{marginTop:10,border:'1px solid #c8b8e8',borderRadius:10,overflow:'hidden'}},
    h('div',{style:{background:'#5b3a8c',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:'#fff',fontSize:14}},'🗂 Section-by-Section Vote'),
      h('button',{onClick:()=>setOpen(false),style:{background:'transparent',border:'none',color:'rgba(255,255,255,.6)',cursor:'pointer',fontSize:16}},'x')
    ),
    h('div',{style:{padding:14,background:'#faf8ff'}},
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#888',fontStyle:'italic'}},
        h('div',{className:'spin',style:{marginBottom:8}}), 'AI is identifying the key sections...'
      ),
      sections&&sections.length===0&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa',fontStyle:'italic'}},
        'This bill does not have distinct separable sections to vote on individually.'
      ),
      sections&&sections.length>0&&h('div',null,
        h('div',{style:{fontSize:12,color:'#888',marginBottom:12,fontFamily:"'Lora',serif",lineHeight:1.6}},
          'Vote on each part independently. Your section votes are separate from your overall bill vote. +2 rep per section vote.'
        ),
        sections.map((s,i)=>{
          const total=(s.votes_yes||0)+(s.votes_no||0)+(s.votes_abstain||0);
          const myVote=votes[s.id];
          const pctYes=total?Math.round(s.votes_yes/total*100):0;
          const pctNo=total?Math.round(s.votes_no/total*100):0;
          return h('div',{key:s.id||i,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:10}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:4}},
              (i+1)+'. '+s.title
            ),
            h('p',{style:{fontSize:13,color:'#555',fontFamily:"'Lora',serif",lineHeight:1.6,marginBottom:10}},s.summary),
            !myVote
              ? h('div',{style:{display:'flex',gap:6}},
                  ['yes','no','abstain'].map(v=>h('button',{key:v,onClick:()=>voteOnSection(s.id,v),
                    style:{flex:1,background:v==='yes'?'#1a6b3c':v==='no'?'#c0392b':'#777',color:'#fff',
                      border:'none',borderRadius:5,padding:'7px',fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}
                  },v==='yes'?'✅ Support':v==='no'?'❌ Oppose':'⬜ Abstain'))
                )
              : h('div',null,
                  h('div',{style:{fontSize:12,color:'#1a6b3c',fontWeight:600,marginBottom:6}},
                    'Your vote: '+(myVote==='yes'?'✅ Support':myVote==='no'?'❌ Oppose':'⬜ Abstain')
                  ),
                  total>0&&h('div',null,
                    h('div',{style:{height:6,background:'#eee',borderRadius:3,overflow:'hidden',marginBottom:4}},
                      h('div',{style:{width:pctYes+'%',height:'100%',background:'#1a6b3c',display:'inline-block'}}),
                      h('div',{style:{width:pctNo+'%',height:'100%',background:'#c0392b',display:'inline-block'}})
                    ),
                    h('div',{style:{fontSize:11,color:'#aaa'}},pctYes+'% support · '+pctNo+'% oppose · '+total+' votes')
                  )
                )
          );
        })
      )
    )
  );
}


// ── Events Tab ────────────────────────────────────────────────────────────────
const EVENT_CATEGORIES = ['All','Farmers Market','Festival','Town Hall','Community Meeting','Volunteer','Candidate Forum','Workshop','Other'];
const EVENT_CAT_COLORS = {
  'Farmers Market':'#1a6b3c','Festival':'#5b3a8c','Town Hall':'#1a5c8a',
  'Community Meeting':'#1a5c8a','Volunteer':'#8a6000','Candidate Forum':'#c0392b',
  'Workshop':'#2c7a6b','Other':'#888'
};

function EventCard({event, user, onToast, onDelete, isAdmin}) {
  const [expanded, setExpanded] = useState(false);
  const [rsvp, setRsvp] = useState(null); // 'going' | 'maybe' | 'cantgo' | null
  const [rsvpCounts, setRsvpCounts] = useState({going:0,maybe:0,cantgo:0});
  const [rsvpLoading, setRsvpLoading] = useState(false);
  const isPast = new Date(event.event_date+'T12:00:00').getTime() <= Date.now() - 86400000;
  const catColor = EVENT_CAT_COLORS[event.category]||'#888';

  useEffect(()=>{
    // Load RSVP counts and user's own RSVP
    (async()=>{
      try {
        const {data:counts} = await sb.from('event_rsvps').select('response').eq('event_id',event.id);
        if(counts) {
          const c = {going:0,maybe:0,cantgo:0};
          counts.forEach(r=>{ if(c[r.response]!==undefined) c[r.response]++; });
          setRsvpCounts(c);
        }
        if(user?.id) {
          const {data:mine} = await sb.from('event_rsvps').select('response').eq('event_id',event.id).eq('user_id',user.id).single();
          if(mine) setRsvp(mine.response);
        }
      } catch(e) {}
    })();
  },[event.id,user?.id]);

  const handleRsvp = async(response)=>{
    if(!user) { onToast('Sign in to RSVP to events.'); return; }
    setRsvpLoading(true);
    const prev = rsvp;
    const newResponse = prev===response ? null : response;
    setRsvp(newResponse);
    // Optimistically update counts
    setRsvpCounts(c=>{
      const n = {...c};
      if(prev) n[prev] = Math.max(0,n[prev]-1);
      if(newResponse) n[newResponse]++;
      return n;
    });
    try {
      if(newResponse) {
        await sb.from('event_rsvps').upsert({event_id:event.id,user_id:user.id,response:newResponse,updated_at:new Date().toISOString()},{onConflict:'event_id,user_id'});
        onToast(newResponse==='going'?'✅ You\'re going!':newResponse==='maybe'?'🤔 Marked as maybe!':'👋 RSVP updated.');
      } else {
        await sb.from('event_rsvps').delete().eq('event_id',event.id).eq('user_id',user.id);
        onToast('RSVP removed.');
      }
    } catch(e) {
      // Revert on error
      setRsvp(prev);
      onToast('Could not save RSVP. Run the event_rsvps SQL first.');
    }
    setRsvpLoading(false);
  };

  const shareEvent = ()=>{
    const text = `📅 ${event.title}\n${new Date(event.event_date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}${event.event_time?' at '+event.event_time:''}\n📍 ${event.location}\n\nJackson County community event on The People's Voice`;
    const url = SITE_URL+'?tab=events';
    if(navigator.share) {
      navigator.share({title:event.title,text,url}).catch(()=>{});
    } else {
      navigator.clipboard&&navigator.clipboard.writeText(text+'\n'+url);
      onToast('📋 Event details copied to clipboard!');
    }
  };

  const RSVP_BTNS = [
    {key:'going',   label:'✅ Going',  active:'#1a6b3c', count:rsvpCounts.going},
    {key:'maybe',   label:'🤔 Maybe',  active:'#8a6000', count:rsvpCounts.maybe},
    {key:'cantgo',  label:'❌ Can\'t Go', active:'#c0392b', count:rsvpCounts.cantgo},
  ];

  return h('div',{style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,marginBottom:12,overflow:'hidden',opacity:isPast?0.7:1}},
    h('div',{style:{display:'flex',gap:0}},
      // Date column
      h('div',{style:{background:isPast?'#e5e5e5':'#1a1a2e',color:isPast?'#888':'#f0c040',minWidth:64,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'12px 8px',textAlign:'center',flexShrink:0}},
        h('div',{style:{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,opacity:0.8}},
          new Date(event.event_date+'T12:00:00').toLocaleDateString('en-US',{month:'short'})
        ),
        h('div',{style:{fontSize:26,fontWeight:900,lineHeight:1,fontFamily:"'Playfair Display',serif"}},
          new Date(event.event_date+'T12:00:00').getDate()
        ),
        h('div',{style:{fontSize:10,opacity:0.7,marginTop:2}},
          new Date(event.event_date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short'})
        )
      ),
      // Content
      h('div',{style:{flex:1,padding:'12px 14px'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,flexWrap:'wrap'}},
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6,alignItems:'center'}},
              h('span',{style:{background:catColor,color:'#fff',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,textTransform:'uppercase',letterSpacing:0.5}},event.category),
              isPast&&h('span',{style:{background:'#e5e5e5',color:'#888',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20}},'Past Event'),
              rsvp==='going'&&h('span',{style:{background:'#1a6b3c',color:'#fff',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20}},'✅ You\'re going')
            ),
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:4}},event.title),
            h('div',{style:{fontSize:12,color:'#555',display:'flex',gap:12,flexWrap:'wrap'}},
              event.event_time&&h('span',null,'🕐 '+event.event_time),
              h('span',null,'📍 '+event.location)
            )
          ),
          h('div',{style:{display:'flex',gap:6,flexShrink:0}},
            h('button',{onClick:shareEvent,title:'Share this event',
              style:{background:'transparent',border:'1px solid #e5dece',color:'#1a5c8a',
                padding:'5px 9px',borderRadius:5,fontSize:13,cursor:'pointer'}
            },'📤'),
            h('button',{onClick:()=>setExpanded(!expanded),
              style:{background:'transparent',border:'1px solid #e5dece',color:'#888',
                padding:'5px 10px',borderRadius:5,fontSize:12,cursor:'pointer'}},
              expanded?'Less ▲':'More ▼'
            )
          )
        ),

        // RSVP bar — always visible on upcoming events
        !isPast&&h('div',{style:{display:'flex',gap:6,marginTop:10,flexWrap:'wrap',alignItems:'center'}},
          RSVP_BTNS.map(btn=>h('button',{key:btn.key,
            onClick:()=>handleRsvp(btn.key),
            disabled:rsvpLoading,
            style:{
              background:rsvp===btn.key?btn.active:'#f5f5f5',
              color:rsvp===btn.key?'#fff':'#555',
              border:'1px solid '+(rsvp===btn.key?btn.active:'#ddd'),
              padding:'5px 11px',borderRadius:20,fontSize:11,cursor:'pointer',
              fontFamily:"'Lora',serif",fontWeight:rsvp===btn.key?700:400,
              transition:'all 0.15s'
            }},
            btn.label+(btn.count>0?' ('+btn.count+')':'')
          )),
          (rsvpCounts.going>0||rsvpCounts.maybe>0)&&h('div',{style:{marginLeft:'auto',fontSize:10,color:'#aaa'}},
            rsvpCounts.going+' going · '+rsvpCounts.maybe+' maybe'
          )
        ),

        expanded&&h('div',{style:{marginTop:10,paddingTop:10,borderTop:'1px solid #f0ece0'}},
          event.description&&h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#444',lineHeight:1.7,marginBottom:10}},event.description),
          h('div',{style:{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}},
            event.link&&h('a',{href:event.link,target:'_blank',rel:'noopener noreferrer',
              style:{background:'#1a5c8a',color:'#fff',textDecoration:'none',padding:'6px 14px',
                borderRadius:5,fontSize:12,fontFamily:"'Playfair Display',serif",fontWeight:700}},
              '🔗 More Info'),
            h('span',{style:{fontSize:11,color:'#bbb'}},'Added by '+event.submitted_by_name),
            isAdmin&&h('button',{onClick:()=>onDelete(event),
              style:{marginLeft:'auto',background:'transparent',border:'1px solid #e5dece',
                color:'#c0392b',padding:'5px 10px',borderRadius:5,fontSize:11,cursor:'pointer'}},
              '🗑 Remove')
          )
        )
      )
    )
  );
}
function EventsTab({user, profile, onToast}) {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [catFilter, setCatFilter] = useState('All');
  const [showPast, setShowPast] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [saving, setSaving] = useState(false);
  const isAdmin = profile?.is_admin===true;

  const EMPTY_FORM = {title:'',event_date:'',event_time:'',location:'',zip:'',category:'Farmers Market',description:'',link:''};
  const [form, setForm] = useState(EMPTY_FORM);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));

  const load = async()=>{
    setLoading(true);
    try {
      const {data} = await sb.from('events').select('*').order('event_date',{ascending:true});
      setEvents(data||[]);
    } catch(e) { /* table may not exist yet */ }
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const today = new Date().toISOString().slice(0,10);

  const filtered = events.filter(e=>{
    const isPast = e.event_date.localeCompare(today) === -1;
    if(!showPast && isPast) return false;
    if(catFilter!=='All' && e.category!==catFilter) return false;
    return true;
  });

  const upcoming = events.filter(e=>e.event_date>=today).length;

  const submit = async()=>{
    if(!form.title.trim()||!form.event_date||!form.location.trim()){
      onToast('Please fill in Title, Date, and Location.'); return;
    }
    setSaving(true);
    const payload = {
      ...form,
      submitted_by_id: user.id,
      submitted_by_name: profile?.display_name||user.email||'Neighbor',
      approved: isAdmin, // admins auto-approve their own submissions
      created_at: new Date().toISOString()
    };
    try {
      const {data,error} = await sb.from('events').insert(payload).select().single();
      if(error) throw error;
      if(isAdmin) {
        setEvents(prev=>[...prev,data].sort((a,b)=>a.event_date.localeCompare(b.event_date)));
        onToast('✅ Event added!');
      } else {
        onToast('✅ Event submitted for review! It will appear once approved.');
      }
      setForm(EMPTY_FORM);
      setShowAdd(false);
    } catch(e) {
      onToast('❌ Could not save event. Run the events SQL in Supabase first.');
    }
    setSaving(false);
  };

  const deleteEvent = async(event)=>{
    if(!window.confirm('Remove "'+event.title+'"?')) return;
    await sb.from('events').delete().eq('id',event.id);
    setEvents(prev=>prev.filter(e=>e.id!==event.id));
    onToast('Event removed.');
  };

  return h('div',null,
    // Header
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:10}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},'📅 Local Events'),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:2}},
          upcoming>0?(upcoming+' upcoming events in Jackson County'):'Farmers markets, festivals, town halls, and more.'
        )
      ),
      user&&h('button',{onClick:()=>setShowAdd(!showAdd),style:{background:showAdd?'#555':'#1a6b3c',color:'#fff',border:'none',padding:'10px 18px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13}},
        showAdd?'✕ Cancel':'+ Add Event'
      )
    ),

    // Add Event Form
    showAdd&&h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:20,marginBottom:20}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#f0c040',marginBottom:14}},'📅 Add a Local Event'),
      !isAdmin&&h('div',{style:{background:'rgba(240,192,64,0.15)',border:'1px solid rgba(240,192,64,0.3)',borderRadius:7,padding:'8px 12px',marginBottom:14,fontSize:12,color:'#f0c040',fontFamily:"'Lora',serif"}},
        '📋 Your event will be reviewed by admin before going live.'
      ),
      // Row 1: Title
      h('div',{style:{marginBottom:12}},
        h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Event Title *'),
        h('input',{value:form.title,onChange:set('title'),placeholder:'e.g. Concord Farmers Market',style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}})
      ),
      // Row 2: Date + Time
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}},
        h('div',null,
          h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Date *'),
          h('input',{type:'date',value:form.event_date,onChange:set('event_date'),min:today,style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}})
        ),
        h('div',null,
          h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Time'),
          h('input',{type:'time',value:form.event_time,onChange:set('event_time'),style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}})
        )
      ),
      // Row 3: Location + ZIP + Category
      h('div',{style:{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:12,marginBottom:12}},
        h('div',null,
          h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Location / Address *'),
          h('input',{value:form.location,onChange:set('location'),placeholder:'e.g. Concord Village Park',style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}})
        ),
        h('div',null,
          h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'ZIP Code'),
          h('input',{value:form.zip,onChange:set('zip'),placeholder:'49237',maxLength:5,style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}})
        ),
        h('div',null,
          h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Category'),
          h('select',{value:form.category,onChange:set('category'),style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}},
            EVENT_CATEGORIES.filter(c=>c!=='All').map(c=>h('option',{key:c,value:c},c))
          )
        )
      ),
      // Row 4: Description
      h('div',{style:{marginBottom:12}},
        h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Description'),
        h('textarea',{value:form.description,onChange:set('description'),placeholder:'What should neighbors know? Hours, what to bring, who it\'s for...',rows:3,style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,background:'#23233a',color:'#fff',resize:'vertical',boxSizing:'border-box'}})
      ),
      // Row 5: Link
      h('div',{style:{marginBottom:16}},
        h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Link (optional)'),
        h('input',{value:form.link,onChange:set('link'),placeholder:'https://...',style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}})
      ),
      h('button',{onClick:submit,disabled:saving,style:{width:'100%',background:saving?'#555':'#f0c040',color:'#1a1a2e',border:'none',padding:'13px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15,cursor:'pointer'}},
        saving?'Saving...':isAdmin?'Publish Event ->':'Submit for Review ->'
      )
    ),

    // Category filter chips
    h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}},
      EVENT_CATEGORIES.map(c=>h('button',{key:c,onClick:()=>setCatFilter(c),style:{background:catFilter===c?'#1a1a2e':'#fff',color:catFilter===c?'#f0c040':'#555',border:'1px solid '+(catFilter===c?'#1a1a2e':'#e5dece'),padding:'5px 12px',borderRadius:20,fontSize:12,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:catFilter===c?700:400}},c))
    ),

    // Past events toggle
    h('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:10}},
      h('button',{onClick:()=>setShowPast(!showPast),style:{background:'transparent',border:'none',fontSize:12,color:'#aaa',cursor:'pointer',textDecoration:'underline'}},
        showPast?'Hide past events':'Show past events'
      )
    ),

    // Event list
    loading&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},'Loading events...'),
    !loading&&filtered.length===0&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa'}},
      h('div',{style:{fontSize:32,marginBottom:10}},'📅'),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:'#555',marginBottom:6}},
        catFilter==='All'?'No upcoming events yet.':'No '+catFilter+' events yet.'
      ),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#aaa',lineHeight:1.6}},
        'Know of a local event? Be the first to add it!'

    ),
    filtered.map(e=>h(EventCard,{key:e.id,event:e,user,onToast,onDelete:deleteEvent,isAdmin}))
  );
}

// ── Events Approval Queue (Admin) ─────────────────────────────────────────────
function EventsApprovalQueue({onToast}) {
  const [events, setEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);

  const load = async()=>{
    setLoading(true);
    const {data} = await sb.from('events').select('*').eq('approved',false).order('created_at',{ascending:false});
    setEvents(data||[]);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const approve = async(event)=>{
    await sb.from('events').update({approved:true}).eq('id',event.id);
    setEvents(prev=>prev.filter(e=>e.id!==event.id));
    onToast('✅ Event approved and live!');
  };

  const reject = async(event)=>{
    if(!window.confirm('Remove this event submission?')) return;
    await sb.from('events').delete().eq('id',event.id);
    setEvents(prev=>prev.filter(e=>e.id!==event.id));
    onToast('Event removed.');
  };

  return h('div',{style:{background:'#f0f8ff',border:'1px solid #c8d8f0',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:open?14:0,cursor:'pointer'},onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',display:'flex',alignItems:'center',gap:8}},
        '📅 Pending Events',
        events.length>0&&h('span',{style:{background:'#c0392b',color:'#fff',borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:700}},events.length)
      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')
    ),
    open&&h('div',null,
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa'}},'Loading...'),
      !loading&&events.length===0&&h('div',{style:{fontSize:13,color:'#aaa',fontStyle:'italic',padding:'8px 0'}},'No pending event submissions.'),
      events.map(e=>h('div',{key:e.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:8}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:3}},e.title),
        h('div',{style:{fontSize:12,color:'#555',marginBottom:3}},
          '📅 '+e.event_date+(e.event_time?' at '+e.event_time:'')+' · 📍 '+e.location
        ),
        h('div',{style:{fontSize:12,color:'#888',marginBottom:3}},'Category: '+e.category),
        e.description&&h('div',{style:{fontSize:12,color:'#555',fontFamily:"'Lora',serif",lineHeight:1.5,marginBottom:6}},e.description),

        )

const EXCHANGE_CATEGORIES = ['All','Food & Produce','Tools & Equipment','Skills & Labor','Childcare','Transportation','Housing Help','Supplies','Knowledge & Tutoring','Animals & Plants','Other'];
const EXCHANGE_CAT_COLORS = {

  'Childcare':'#5b3a8c','Transportation':'#2c7a6b','Housing Help':'#8a6000',

function ExchangeCard({item, user, onToast, onDelete, isAdmin}) {
  const [claimed, setClaimed] = useState(item.claimed||false);
  const [claiming, setClaiming] = useState(false);
  const [expanded, setExpanded] = useState(false);
  const isOffer = item.listing_type==='offer';
  const isMe = item.posted_by_id===user?.id;
  const catColor = EXCHANGE_CAT_COLORS[item.category]||'#888';

  const claim = async()=>{
    if(!user) { onToast('Sign in to respond to listings.'); return; }
    setClaiming(true);
    try {
      await sb.from('exchange_listings').update({claimed:true,claimed_by_id:user.id,claimed_at:new Date().toISOString()}).eq('id',item.id);
      // Notify the poster
      await sb.from('notifications').insert({
        user_id:item.posted_by_id,type:'exchange',
        title:(isOffer?'Someone wants your offer: ':'Someone can help with: ')+item.title,
        body:(user.display_name||'A neighbor')+' responded to your listing.',
        read:false,created_at:new Date().toISOString()
      }).catch(()=>{});
      setClaimed(true);
      onToast('✅ '+(isOffer?"You've claimed this offer! Reach out to connect.":'Your request has been matched! They\'ll be in touch.'));
    } catch(e) { onToast('❌ Could not update: '+e.message); }
    setClaiming(false);
  };

  const unclaim = async()=>{
    await sb.from('exchange_listings').update({claimed:false,claimed_by_id:null,claimed_at:null}).eq('id',item.id);
    setClaimed(false);
    onToast('Listing re-opened.');
  };

  return h('div',{style:{background:'#fff',border:'2px solid '+(isOffer?'#d4edda':'#d4e6f1'),
    borderRadius:10,marginBottom:12,overflow:'hidden',opacity:claimed?0.7:1}},
    h('div',{style:{display:'flex',gap:0}},
      // Type stripe
      h('div',{style:{width:6,background:isOffer?'#1a6b3c':'#1a5c8a',flexShrink:0}}),
      h('div',{style:{flex:1,padding:'13px 14px'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,flexWrap:'wrap'}},
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6,alignItems:'center'}},
              h('span',{style:{background:isOffer?'#1a6b3c':'#1a5c8a',color:'#fff',fontSize:10,fontWeight:700,
                padding:'2px 10px',borderRadius:20,textTransform:'uppercase',letterSpacing:0.5}},
                isOffer?'🤲 Offering':'🙏 Requesting'),
              h('span',{style:{background:catColor,color:'#fff',fontSize:10,fontWeight:700,
                padding:'2px 8px',borderRadius:20}},item.category),
              claimed&&h('span',{style:{background:'#f0c040',color:'#1a1a2e',fontSize:10,fontWeight:700,
                padding:'2px 8px',borderRadius:20}},'✓ Matched'),
              item.zip&&h('span',{style:{background:'#f5f5f5',color:'#666',fontSize:10,
                padding:'2px 8px',borderRadius:20}},'📍 '+item.zip)
            ),
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,
              color:'#1a1a2e',marginBottom:4}},item.title),
            h('div',{style:{fontSize:12,color:'#888',fontFamily:"'Lora',serif"}},
              'Posted by '+item.posted_by_name+' · '+timeAgo(item.created_at))
          ),
          h('button',{onClick:()=>setExpanded(!expanded),
            style:{background:'transparent',border:'1px solid #e5dece',color:'#888',
              padding:'5px 10px',borderRadius:5,fontSize:12,cursor:'pointer',flexShrink:0}},
            expanded?'Less ▲':'More ▼')
        ),
        // Always show short description
        item.description&&!expanded&&h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,
          color:'#555',lineHeight:1.6,marginTop:4}},
          item.description.slice(0,120)+(item.description.length>120?'...':'')),
        expanded&&h('div',{style:{marginTop:10,paddingTop:10,borderTop:'1px solid #f0ece0'}},
          item.description&&h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#444',
            lineHeight:1.7,marginBottom:12}},item.description),
          h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
            !claimed&&!isMe&&user&&h('button',{onClick:claim,disabled:claiming,
              style:{background:isOffer?'#1a6b3c':'#1a5c8a',color:'#fff',border:'none',
                padding:'8px 18px',borderRadius:6,fontFamily:"'Playfair Display',serif",
                fontWeight:700,fontSize:13,cursor:'pointer'}},
              claiming?'...':(isOffer?'🤲 I want this':'✋ I can help')),
            claimed&&isMe&&h('button',{onClick:unclaim,
              style:{background:'transparent',border:'1px solid #ddd',color:'#888',
                padding:'7px 14px',borderRadius:6,fontSize:12,cursor:'pointer'}},
              'Re-open listing'),
            claimed&&!isMe&&h('div',{style:{fontSize:13,color:'#1a6b3c',fontWeight:700,
              fontFamily:"'Lora',serif"}},'✓ You responded to this'),
            isMe&&!claimed&&h('button',{onClick:()=>onDelete(item),
              style:{marginLeft:'auto',background:'transparent',border:'1px solid #fcc',
                color:'#c0392b',padding:'6px 12px',borderRadius:5,fontSize:12,cursor:'pointer'}},
              '🗑 Remove'),
            isAdmin&&!isMe&&h('button',{onClick:()=>onDelete(item),
              style:{marginLeft:'auto',background:'transparent',border:'1px solid #fcc',
                color:'#c0392b',padding:'6px 12px',borderRadius:5,fontSize:12,cursor:'pointer'}},
              '🗑 Remove')
          )
        )
      )
    )
  );
}

// ── Community Map Tab ─────────────────────────────────────────────────────────
function MapTab({user, profile}) {
  const mapRef     = useRef(null);
  const leafletRef = useRef(null);
  const markersRef = useRef([]);
  const [activeLayers, setActiveLayers] = useState(new Set(['events','exchange','projects','resources','members']));
  const [mapData, setMapData] = useState({events:[],exchange:[],projects:[],resources:[],members:[]});
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);

  // Load data
  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try {
        const today = new Date().toISOString().slice(0,10);
        const [
          {data:events},
          {data:exchange},
          {data:projects},
          {data:resources},
          {data:members},
        ] = await Promise.all([
          sb.from('events').select('id,title,event_date,event_time,location,zip,category').eq('approved',true).gte('event_date',today).order('event_date',{ascending:true}).limit(40),
          sb.from('exchange_listings').select('id,title,listing_type,category,zip').eq('claimed',false).limit(40),
          sb.from('projects').select('id,title,supporter_count,proposer_name').limit(40),
          sb.from('community_resources').select('id,name,category,address,lat,lng,description,hours,phone,website').eq('verified',true).limit(100),
          sb.from('profiles').select('zip').not('zip','is',null).neq('zip',''),
        ]);
        // Count members per ZIP
        const membersByZip = {};
        (members||[]).forEach(m=>{ if(m.zip) membersByZip[m.zip]=(membersByZip[m.zip]||0)+1; });
        setMapData({
          events:events||[],
          exchange:exchange||[],
          projects:projects||[],
          resources:resources||[],
          members:Object.entries(membersByZip).map(([zip,count])=>({zip,count})),
        });
      } catch(e){}
      setLoading(false);
    })();
  },[]);

  // Init map
  useEffect(()=>{
    if(!mapRef.current||leafletRef.current) return;
    const L = window.L;
    if(!L) return;
    const map = L.map(mapRef.current,{
      center:[42.25,-84.40],
      zoom:10,
      zoomControl:true,
    });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',
      maxZoom:18,
    }).addTo(map);
    leafletRef.current = map;
    return ()=>{ map.remove(); leafletRef.current=null; };
  },[]);

  // Draw markers whenever data or layers change
  useEffect(()=>{
    const L = window.L;
    const map = leafletRef.current;
    if(!L||!map||loading) return;
    (async()=>{

    // Clear existing markers
    markersRef.current.forEach(m=>map.removeLayer(m));
    markersRef.current = [];

    const makeIcon = (emoji, color) => L.divIcon({
      html:`<div style="background:${color};color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3);">${emoji}</div>`,
      iconSize:[32,32],iconAnchor:[16,16],popupAnchor:[0,-18],className:'',
    });

    const addMarker = (lat,lng,icon,popupHtml)=>{
      const m = L.marker([lat,lng],{icon})
        .addTo(map)
        .bindPopup(popupHtml,{maxWidth:220});
      markersRef.current.push(m);
    };

    // Events — smart location matching
    if(activeLayers.has('events')) {
      // Build location lookup from known Jackson County places
      const PLACE_COORDS = {
        'concord': [42.1789,-84.6384], 'village of concord': [42.1789,-84.6384],
        'jackson': [42.2459,-84.4013], 'city of jackson': [42.2459,-84.4013],
        'brooklyn': [42.1084,-84.2471], 'napoleon': [42.1645,-84.3010],
        'grass lake': [42.2589,-84.1630], 'michigan center': [42.2400,-84.3200],
        'summit': [42.2134,-84.3600], 'summit township': [42.2134,-84.3600],
        'spring arbor': [42.1006,-84.5508], 'springport': [42.3920,-84.7402],
        'leslie': [42.4528,-84.4341], 'parma': [42.2934,-84.5830],
        'hanover': [42.0595,-84.5530], 'homer': [42.1528,-84.8094],
        'litchfield': [42.0420,-84.7583], 'albion': [42.2495,-84.7530],
        'manchester': [42.1517,-84.0527], 'cement city': [42.0056,-84.3330],
        'clark lake': [42.1500,-84.3200], 'horton': [42.0106,-84.4319],
        'munith': [42.3862,-84.2274], 'norvell': [42.2310,-84.0774],
        'onondaga': [42.3528,-84.4902], 'pleasant lake': [42.3245,-84.3608],
        'rives junction': [42.4695,-84.4580], 'lake columbia': [42.1000,-84.3400],
      };

      const getEventCoords = async(e) => {
        // 0. Use stored ZIP field if available
        if(e.zip && ZIP_COORDS[e.zip]) return ZIP_COORDS[e.zip];
        const loc = (e.location||'').toLowerCase();
        // 1. Check for ZIP in location string
        const zipMatch = loc.match(/\b(4920[0-9]|4923[0-9]|4924[0-9]|4925[0-9]|4926[0-9]|4827[0-9]|48158|48827)\b/);
        if(zipMatch && ZIP_COORDS[zipMatch[1]]) return ZIP_COORDS[zipMatch[1]];
        // 2. Match known place names
        for(const [place, coords] of Object.entries(PLACE_COORDS)) {
          if(loc.includes(place)) return coords;
        }
        // 3. Try Nominatim geocoding for specific addresses
        try {
          const q = encodeURIComponent((e.location||'')+', Jackson County, Michigan');
          const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&countrycodes=us`);
          const data = await res.json();
          if(data&&data[0]) return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        } catch(err) {}
        // 4. Fallback — random scatter around Jackson center
        return [42.25+((Math.random()-.5)*.12), -84.40+((Math.random()-.5)*.15)];
      };

      for(const e of mapData.events) {
        const coords = await getEventCoords(e);
        const d = new Date(e.event_date+'T12:00:00');
        const dateStr = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        addMarker(coords[0], coords[1],
          makeIcon('📅','#5b3a8c'),
          `<div style="font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:#1a1a2e;margin-bottom:4px;">${e.title}</div>
           <div style="font-size:11px;color:#888;">${dateStr}${e.event_time?' · '+e.event_time:''}</div>
           <div style="font-size:11px;color:#555;margin-top:2px;">📍 ${e.location}</div>
           <div style="margin-top:6px;"><span style="background:#5b3a8c;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;">${e.category}</span></div>`
        );
      }
    }

    // Exchange listings — by ZIP
    if(activeLayers.has('exchange')) {
      mapData.exchange.forEach(item=>{
        const zip = item.zip||(profile?.zip||'49201');
        const coords = ZIP_COORDS[zip]||ZIP_COORDS['49201'];
        const color = item.listing_type==='offer'?'#1a6b3c':'#1a5c8a';
        addMarker(coords[0]+((Math.random()-.5)*.02), coords[1]+((Math.random()-.5)*.03),
          makeIcon(item.listing_type==='offer'?'🤲':'🙏',color),
          `<div style="font-size:10px;font-weight:700;color:${color};text-transform:uppercase;margin-bottom:3px;">${item.listing_type==='offer'?'Offering':'Requesting'}</div>
           <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:#1a1a2e;margin-bottom:3px;">${item.title}</div>
           <div style="font-size:11px;color:#888;">${item.category}${zip?' · ZIP '+zip:''}</div>`
        );
      });
    }

    // Projects — spread around county center
    if(activeLayers.has('projects')) {
      mapData.projects.forEach((p,i)=>{
        const angle = (i/Math.max(mapData.projects.length,1))*2*Math.PI;
        const r = 0.05+Math.random()*0.08;
        addMarker(42.25+Math.cos(angle)*r, -84.40+Math.sin(angle)*r,
          makeIcon('🌱','#8a4000'),
          `<div style="font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:#1a1a2e;margin-bottom:3px;">${p.title}</div>
           <div style="font-size:11px;color:#888;">By ${p.proposer_name} · ${p.supporter_count||1} supporter${(p.supporter_count||1)!==1?'s':''}</div>`
        );
      });
    }

    // Resources — food pantries, blessing boxes, etc.
    if(activeLayers.has('resources')) {
      const RESOURCE_ICONS = {
        // New blessing-box categories
        'blessing_box':      {emoji:'📦', color:'#c0392b', label:'Blessing Box'},
        'food_pantry':       {emoji:'🥫', color:'#e67e22', label:'Food Pantry'},
        'food_bank':         {emoji:'🏛', color:'#d35400', label:'Food Bank'},
        'free_store':        {emoji:'🛍', color:'#8e44ad', label:'Free Store'},
        'meal_program':      {emoji:'🍽', color:'#27ae60', label:'Meal Program'},
        // Old category names (backward compat)
        'Food & Nutrition':  {emoji:'🥫', color:'#e67e22', label:'Food & Nutrition'},
        'Housing':           {emoji:'🏠', color:'#1a5c8a', label:'Housing'},
        'Health & Mental Health': {emoji:'💙', color:'#1a6b3c', label:'Health'},
        'Jobs & Training':   {emoji:'🔧', color:'#5b3a8c', label:'Jobs & Training'},
        'Legal Aid':         {emoji:'⚖️', color:'#8a6000', label:'Legal Aid'},
        'Crisis Support':    {emoji:'🆘', color:'#c0392b', label:'Crisis Support'},
        'Transportation':    {emoji:'🚌', color:'#2c7a6b', label:'Transportation'},
        'Education':         {emoji:'📚', color:'#5b3a8c', label:'Education'},
        'Other':             {emoji:'🧡', color:'#888', label:'Resource'},
        'other':             {emoji:'🧡', color:'#888', label:'Resource'},
      };
      // Geocode resources missing lat/lng on the fly, save back to DB
      const geocodeRes = async(r)=>{
        if(r.lat&&r.lng) return r;
        if(!r.address) return null;
        try{
          const q=encodeURIComponent(r.address+', Jackson County, Michigan');
          const res=await fetch('https://nominatim.openstreetmap.org/search?q='+q+'&format=json&limit=1&countrycodes=us');
          const geo=await res.json();
          if(geo&&geo[0]){
            const lat=parseFloat(geo[0].lat),lng=parseFloat(geo[0].lon);
            sb.from('community_resources').update({lat,lng}).eq('id',r.id).then(()=>{});
            return {...r,lat,lng};
          }
        }catch(e){}
        return null;
      };
      const resMissingCoords = mapData.resources.filter(r=>!r.lat||!r.lng);
      const resHasCoords = mapData.resources.filter(r=>r.lat&&r.lng);
      const resGeocodedFresh = (await Promise.all(resMissingCoords.map(geocodeRes))).filter(Boolean);
      const allResourcesForMap = [...resHasCoords, ...resGeocodedFresh];
      allResourcesForMap.forEach(r=>{
        const ri = RESOURCE_ICONS[r.category]||RESOURCE_ICONS['other'];
        addMarker(parseFloat(r.lat), parseFloat(r.lng),
          makeIcon(ri.emoji, ri.color),
          `<div style="min-width:180px;">
            <div style="font-size:10px;font-weight:700;color:${ri.color};text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">${ri.label}</div>
            <div style="font-family:'Playfair Display',serif;font-weight:700;font-size:14px;color:#1a1a2e;margin-bottom:4px;">${r.name}</div>
            ${r.address?`<div style="font-size:11px;color:#555;margin-bottom:3px;">📍 ${r.address}</div>`:''}
            ${r.hours?`<div style="font-size:11px;color:#555;margin-bottom:3px;">🕐 ${r.hours}</div>`:''}
            ${r.phone?`<div style="font-size:11px;color:#1a5c8a;margin-bottom:3px;"><a href="tel:${r.phone.replace(/\D/g,'')}" style="color:#1a5c8a;">${r.phone}</a></div>`:''}
            ${r.description?`<div style="font-size:11px;color:#888;margin-top:4px;line-height:1.5;">${r.description.slice(0,100)}${r.description.length>100?'...':''}</div>`:''}
            ${r.website?`<div style="margin-top:6px;"><a href="https://${r.website.replace(/^https?:\/\//,'')}" target="_blank" style="font-size:11px;color:#1a5c8a;">Visit Website →</a></div>`:''}
          </div>`
        );
      });
    }

    // Members — heat circles by ZIP
    if(activeLayers.has('members')) {
      mapData.members.forEach(({zip,count})=>{
        const coords = ZIP_COORDS[zip];
        if(!coords) return;
        const radius = Math.min(800+count*300, 4000);
        const circle = L.circle(coords,{
          radius,color:'#1a5c8a',fillColor:'#1a5c8a',
          fillOpacity:Math.min(0.1+count*0.04,0.45),weight:1,opacity:0.4,
        }).addTo(map)
         .bindPopup(`<div style="font-family:'Playfair Display',serif;font-weight:700;font-size:13px;color:#1a1a2e;">${ZIP_COMMUNITY[zip]||zip}</div>
            <div style="font-size:12px;color:#1a5c8a;font-weight:600;">👥 ${count} member${count!==1?'s':''}</div>`);
        markersRef.current.push(circle);
      });
    }

    })(); // end async IIFE
  },[mapData,activeLayers,loading]);

  const toggleLayer = id => setActiveLayers(prev=>{
    const n = new Set(prev);
    n.has(id)?n.delete(id):n.add(id);
    return n;
  });

  const totalPins = (activeLayers.has('events')?mapData.events.length:0)+
    (activeLayers.has('exchange')?mapData.exchange.length:0)+
    (activeLayers.has('projects')?mapData.projects.length:0)+
    (activeLayers.has('resources')?mapData.resources.filter(r=>r.lat&&r.lng).length:0);

  return h('div',null,
    // Header
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:8}},
      h('div',null,

function PulseTab({bills, user, profile}) {
  const [stats, setStats] = useState(null);
  const [topBills, setTopBills] = useState([]);
  const [repResponses, setRepResponses] = useState([]);
  const [recentIdeas, setRecentIdeas] = useState([]);
  const [memberGrowth, setMemberGrowth] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{ load(); },[]);

  const load = async()=>{
    setLoading(true);
    try {
      const since7  = new Date(Date.now()-7*24*60*60*1000).toISOString();

      // Run count queries and data queries separately so one failure doesn't kill all
      const [r1,r2,r3,r4] = await Promise.all([
        sb.from('user_votes').select('id',{count:'exact',head:true}),
        sb.from('profiles').select('id',{count:'exact',head:true}),
        sb.from('user_votes').select('id',{count:'exact',head:true}).gte('created_at',since7),
        sb.from('profiles').select('id',{count:'exact',head:true}).gte('created_at',since7),
      ]);

      setStats({
        totalVotes: r1.count||0,
        totalMembers: r2.count||0,
        votes7: r3.count||0,
        members7: r4.count||0,
      });

      // Bills — safe
      const {data:billData} = await sb.from('bills')
        .select('id,title,votes_yes,votes_no,votes_abstain,status,jurisdiction')
        .order('votes_yes',{ascending:false}).order('created_at',{ascending:false}).limit(5);
      setTopBills(billData||[]);

      // Ideas — handle missing columns gracefully
      try {
        const ideaResult = await sb.from('community_ideas')
          .select('id,title,upvotes,category,forwarded,created_at')
          .order('upvotes',{ascending:false}).limit(5);
        if(!ideaResult.error) setRecentIdeas(ideaResult.data||[]);
      } catch(e) {}

      // Forwarded ideas
      try {
        const fwdResult = await sb.from('community_ideas')
          .select('id,title,upvotes,target_official')
          .eq('forwarded',true).order('upvotes',{ascending:false}).limit(10);
        if(!fwdResult.error) setRepResponses(fwdResult.data||[]);
      } catch(e) {}

    } catch(e){ console.error('PulseTab load error:',e); }
    setLoading(false);
  };

  const billPct = (yes,no,abs) => {
    const t = (yes||0)+(no||0)+(abs||0);
    return t > 0 ? Math.round(((yes||0)/t)*100) : 0;
  };
  const billTotal = (b) => (b.votes_yes||0)+(b.votes_no||0)+(b.votes_abstain||0);

  if(loading) return h('div',{style:{textAlign:'center',padding:60,color:'#aaa',fontStyle:'italic'}},'Loading community pulse...');

  return h('div',null,
    // Header
    h('div',{style:{marginBottom:20}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:22,color:'#1a1a2e',marginBottom:4}},'📊 Community Pulse'),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',lineHeight:1.6}},
        'A live look at civic health in Jackson County — participation, top issues, and accountability.')
    ),

    // Big stats
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10,marginBottom:20}},
      [
        {val:stats?.totalMembers||0, label:'Total Members', icon:'👥', color:'#1a5c8a'},
        {val:stats?.members7||0, label:'New This Week', icon:'🌱', color:'#1a6b3c'},
        {val:stats?.totalVotes||0, label:'Total Votes Cast', icon:'🗳', color:'#5b3a8c'},
        {val:stats?.votes7||0, label:'Votes This Week', icon:'📈', color:'#8a4000'},
        {val:bills.length, label:'Active Bills', icon:'📋', color:'#1a5c8a'},
      ].map(s=>h('div',{key:s.label,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,padding:'16px 14px',textAlign:'center'}},
        h('div',{style:{fontSize:28,marginBottom:4}},s.icon),
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:24,color:s.color,lineHeight:1}},
          s.val.toLocaleString()),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:11,color:'#888',marginTop:4,textTransform:'uppercase',letterSpacing:0.8}},s.label)
      ))
    ),

    // Top Bills by community support
    h('div',{style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,padding:'18px 20px',marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:'#1a1a2e',marginBottom:14,display:'flex',alignItems:'center',gap:8}},
        '🗳 Top Bills by Community Support'),
      topBills.length===0&&h('div',{style:{color:'#aaa',fontStyle:'italic',fontSize:13}},'No bills yet.'),
      topBills.map((b,i)=>{
        const t = billTotal(b);
        const p = billPct(b.votes_yes,b.votes_no,b.votes_abstain);
        const barColor = p>=60?'#1a6b3c':p>=40?'#f0c040':'#c0392b';
        return h('div',{key:b.id,style:{marginBottom:i<topBills.length-1?14:0}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4,flexWrap:'wrap',gap:4}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e',flex:1,minWidth:180}},b.title),
            h('div',{style:{display:'flex',gap:6,alignItems:'center',flexShrink:0}},
              h('span',{style:{fontSize:11,color:'#888'}},b.jurisdiction),
              h('span',{style:{background:barColor,color:'#fff',fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20}},p+'% support')
            )
          ),
          h('div',{style:{background:'#f0ece0',borderRadius:20,height:8,overflow:'hidden'}},
            h('div',{style:{width:p+'%',height:'100%',background:barColor,borderRadius:20,transition:'width 0.6s ease'}})
          ),
          h('div',{style:{fontSize:11,color:'#aaa',marginTop:3}},
            t+' vote'+(t!==1?'s':'')+' · ✅ '+b.votes_yes+' · ❌ '+b.votes_no+' · ⬜ '+(b.votes_abstain||0))
        );
      })
    ),

    // Two column: Ideas + Rep accountability
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}},

      // Top Community Ideas
      h('div',{style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,padding:'18px 20px'}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:12}},'💡 Top Community Ideas'),
        recentIdeas.length===0&&h('div',{style:{color:'#aaa',fontStyle:'italic',fontSize:12}},'No ideas yet.'),
        recentIdeas.map((idea,i)=>h('div',{key:idea.id,style:{
          paddingBottom:i<recentIdeas.length-1?10:0,
          marginBottom:i<recentIdeas.length-1?10:0,
          borderBottom:i<recentIdeas.length-1?'1px solid #f5f3ee':'none'}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e',marginBottom:3}},idea.title),
          h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
            h('span',{style:{background:'#f0c040',color:'#1a1a2e',fontSize:11,fontWeight:700,padding:'1px 7px',borderRadius:20}},idea.upvotes+' votes'),
            h('span',{style:{fontSize:10,color:'#888'}},idea.category),
            idea.forwarded===true&&h('span',{style:{background:'#1a6b3c',color:'#fff',fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:10}},'FORWARDED')
          )
        ))
      ),

      // Rep Accountability
      h('div',{style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,padding:'18px 20px'}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:6}},'🏛 Rep Accountability'),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:11,color:'#888',marginBottom:12,lineHeight:1.5}},
          'Ideas forwarded to officials. Tracking whether they respond.'),
        repResponses.length===0&&h('div',{style:{color:'#aaa',fontStyle:'italic',fontSize:12}},'No ideas forwarded yet.'),
        repResponses.map((idea,i)=>h('div',{key:idea.id,style:{
          paddingBottom:i<repResponses.length-1?10:0,
          marginBottom:i<repResponses.length-1?10:0,
          borderBottom:i<repResponses.length-1?'1px solid #f5f3ee':'none'}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,color:'#1a1a2e',marginBottom:3}},idea.title),
          h('div',{style:{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}},
            idea.target_official&&h('span',{style:{fontSize:10,color:'#555',fontStyle:'italic'}},'→ '+idea.target_official),
            h('span',{style:{background:'#fff8e7',border:'1px solid #f0c040',color:'#8a6000',fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:10}},'⏳ AWAITING RESPONSE')
          )
        ))
      )
    ),

    // Participation trend note
    h('div',{style:{background:'#1a1a2e',borderRadius:10,padding:'16px 20px',display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}},
      h('div',{style:{flex:1}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:'#f0c040',fontSize:15,marginBottom:4}},'Your Voice Matters'),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#8899aa',lineHeight:1.6}},
          'Every vote, comment, and idea on this platform is a real act of civic participation. Share this platform with a neighbor and double our impact.')
      ),
      h('button',{onClick:()=>{
        if(navigator.share){navigator.share({title:"The People's Voice",text:"A free civic platform for Jackson County neighbors.",url:'https://thepeoplesvoices.org'});}
        else{navigator.clipboard.writeText('https://thepeoplesvoices.org');alert('Link copied!');}

        fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer',flexShrink:0}},
