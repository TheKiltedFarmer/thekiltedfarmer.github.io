}

function NotificationPreferences({user, profile, onClose, onToast}) {
  const [prefs, setPrefs] = useState(null);
  const [pushEnabled, setPushEnabled] = useState(false);
  const [saving, setSaving] = useState(false);
  const [pushStatus, setPushStatus] = useState('unknown'); // 'granted'|'denied'|'default'

  useEffect(()=>{
    // Load existing prefs
    sb.from('notification_prefs').select('*').eq('user_id',user.id).single()
      .then(({data,error})=>{
        setPrefs(data || {
          user_id: user.id,
          notify_dm: true,
          notify_new_bill: true,
          notify_bill_vote: false,
          notify_comment_reply: true,
          notify_badge: true,
          notify_idea_update: false,
          notify_system: true,
          push_enabled: false,
        });
        setPushEnabled(data?.push_enabled||false);
      }).catch(()=>{
        // notification_prefs table not yet created — use defaults
        setPrefs({user_id:user.id,notify_dm:true,notify_new_bill:true,notify_bill_vote:false,
          notify_comment_reply:true,notify_badge:true,notify_idea_update:false,
          notify_system:true,notify_digest:true,push_enabled:false});
      });
    // Check push permission
    if('Notification' in window) setPushStatus(Notification.permission);
  },[]);

  const requestPush = async()=>{
    if(!('Notification' in window)) { onToast('Push notifications not supported in this browser.'); return; }
    const perm = await Notification.requestPermission();
    setPushStatus(perm);
    if(perm==='granted') {
      setPushEnabled(true);
      setPrefs(p=>({...p,push_enabled:true}));
      onToast('✅ Push notifications enabled!');
    } else {
      onToast('Push notifications blocked. Enable them in your browser settings.');
    }
  };

  const save = async()=>{
    if(!prefs) return;
    setSaving(true);
    const payload = {...prefs,push_enabled:pushEnabled,user_id:user.id};
    try {
      const {error} = await sb.from('notification_prefs').upsert(payload);
      if(!error) onToast('✅ Notification preferences saved!');
      else onToast('❌ Error saving — run the notifications SQL in Supabase first.');
    } catch(e) { onToast('❌ Table missing — run the notifications SQL in Supabase.'); }
    setSaving(false);
    onClose();
  };

  const toggle=(key)=>setPrefs(p=>({...p,[key]:!p[key]}));

  const Toggle=({label,pkey,desc})=>h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #f5f3ee'}},
    h('div',null,
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:600,fontSize:13,color:'#1a1a2e'}},label),
      desc&&h('div',{style:{fontFamily:"'Lora',serif",fontSize:11,color:'#888',marginTop:2}},desc)
    ),
    h('label',{style:{position:'relative',display:'inline-block',width:40,height:22,flexShrink:0,cursor:'pointer'}},
      h('input',{type:'checkbox',checked:prefs?.[pkey]||false,onChange:()=>toggle(pkey),style:{opacity:0,width:0,height:0}}),
      h('span',{style:{position:'absolute',cursor:'pointer',top:0,left:0,right:0,bottom:0,
        background:prefs?.[pkey]?'#1a6b3c':'#ccc',borderRadius:22,transition:'.3s',
        }})
    )
  );

  if(!prefs) return h('div',{style:{padding:30,textAlign:'center',color:'#aaa'}},'Loading...');

  return h('div',{style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.5)',
    zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}},
    h('div',{style:{background:'#fff',borderRadius:12,width:480,maxWidth:'100%',maxHeight:'90vh',overflowY:'auto',
      boxShadow:'0 20px 60px rgba(0,0,0,.3)'}},
      h('div',{style:{background:'#1a1a2e',padding:'16px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',borderRadius:'12px 12px 0 0'}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:'#f0c040',fontSize:17}},'🔔 Notification Preferences'),
        h('button',{onClick:onClose,style:{background:'none',border:'none',color:'#8899aa',fontSize:20,cursor:'pointer',lineHeight:1}},'×')
      ),
      h('div',{style:{padding:'16px 20px'}},

        // Push notifications
        h('div',{style:{background:pushStatus==='granted'?'#eef7f1':pushStatus==='denied'?'#fdf0ef':'#f0f7ff',
          borderRadius:8,padding:'12px 14px',marginBottom:16,border:'1px solid '+(pushStatus==='granted'?'#1a6b3c44':pushStatus==='denied'?'#c0392b44':'#1a5c8a44')}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:4}},
            pushStatus==='granted'?'✅ Push Notifications Active':
            pushStatus==='denied'?'❌ Push Notifications Blocked':
            '📱 Enable Push Notifications'
          ),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#555',lineHeight:1.6,marginBottom:pushStatus!=='granted'?10:0}},
            pushStatus==='granted'?'You\'ll receive browser notifications for the events selected below.':
            pushStatus==='denied'?'You\'ve blocked notifications. Go to your browser settings to re-enable them.':
            'Get notified even when you\'re not on the site. Works on mobile and desktop.'
          ),
          pushStatus!=='granted'&&pushStatus!=='denied'&&
            h('button',{onClick:requestPush,style:{background:'#1a5c8a',color:'#fff',border:'none',
              padding:'8px 16px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,
              fontSize:13,cursor:'pointer'}},'Enable Push Notifications')
        ),

        // In-app notification toggles
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#888',
          textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'Notify me about:'),

        h(Toggle,{label:'✉️ Direct Messages',pkey:'notify_dm',desc:'When someone sends you a private message'}),
        h(Toggle,{label:'📋 New Bills Added',pkey:'notify_new_bill',desc:'When a new bill is added to The People\'s Voice'}),
        h(Toggle,{label:'💬 Replies to My Comments',pkey:'notify_comment_reply',desc:'When someone replies to your bill comment'}),
        h(Toggle,{label:'🗳 Community Votes',pkey:'notify_bill_vote',desc:'Vote milestone updates on bills you\'ve voted on'}),
        h(Toggle,{label:'🏅 Badges & Reputation',pkey:'notify_badge',desc:'When you earn a new badge or level up'}),
        h(Toggle,{label:'💡 Idea Updates',pkey:'notify_idea_update',desc:'When your idea reaches the forwarding threshold'}),
        h(Toggle,{label:'📢 Platform Announcements',pkey:'notify_system',desc:'Important updates from The People\'s Voice'}),
        h(Toggle,{label:'📧 Weekly Digest Email',pkey:'notify_digest',desc:'Monday morning summary of what happened in your community'}),

        h('div',{style:{marginTop:16,display:'flex',gap:10}},
          h('button',{onClick:save,disabled:saving,style:{flex:1,background:saving?'#ccc':'#1a6b3c',color:'#fff',
            border:'none',padding:'12px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,cursor:'pointer'}
          },saving?'Saving...':'Save Preferences'),
          h('button',{onClick:onClose,style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',
            padding:'12px 18px',borderRadius:7,fontSize:13,cursor:'pointer'}},'Cancel')
        )
      )
    )
  );
}

function App() {
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [rep,setRep]=useState(0);
  const [mainTab,setMainTab]=useState('feed');
  const [feedNavCtx,setFeedNavCtx]=useState(null); // context from feed click {billId, userId}
  const [bills,setBills]=useState([]);
  const [pendingBills,setPendingBills]=useState([]);
  const [projects,setProjects]=useState([]);
  const [billFilter,setBillFilter]=useState('all');
  const [userVotes,setUserVotes]=useState({});
  const [showPropose,setShowPropose]=useState(false);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const [showAdmin,setShowAdmin]=useState(false);
  const [showOnboarding,setShowOnboarding]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [showPrivacy,setShowPrivacy]=useState(false);
  const [showNotifications,setShowNotifications]=useState(false);
  const [showNotificationPrefs,setShowNotificationPrefs]=useState(false);
  const [notifications,setNotifications]=useState([]);
  const [unreadNotifCount,setUnreadNotifCount]=useState(0);
  const [guestMode,setGuestMode]=useState(false);

  useEffect(()=>{
    const handler = ()=>setShowPrivacy(true);
    document.addEventListener('showPrivacy', handler);
    return ()=>document.removeEventListener('showPrivacy', handler);
  },[]);

  const [memberCount,setMemberCount]=useState(null);

  useEffect(()=>{initApp();},[]);

  // Poll notifications every 45s so bell updates while user is active
  useEffect(()=>{
    if(!user?.id) return;
    const poll = setInterval(()=>loadNotifications(user.id), 45000);
    return ()=>clearInterval(poll);
  },[user?.id]);

  const initApp=async()=>{
    // Hard timeout - if Supabase hangs, show app with local data after 5s
    const timeout=setTimeout(()=>{
      console.warn('initApp timed out - loading with local seed data');
      setBills(prev=>prev.length?prev:SEED_BILLS);
      setLoading(false);
    },5000);
    try{
      const {data:{session}}=await sb.auth.getSession();
      if(session?.user){
        const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
        setUser({...session.user,...(prof||{})});setProfile(prof||{});setRep(prof?.reputation||0);
        loadUserVotes(session.user.id);
        loadNotifications(session.user.id);
      }
      await loadBills();
      await loadProjects();
      await loadPendingBills();
    }catch(e){
      console.error('initApp error:',e);
      setBills(SEED_BILLS);
    }finally{
      clearTimeout(timeout);
      setLoading(false);
      // Load member count after app is ready
      sb.from('profiles').select('id',{count:'exact',head:true})
        .then(({count,error})=>{ if(!error&&count!==null) setMemberCount(count); }).catch(()=>{});
    }
  };

  const loadBills=async()=>{
    const {data,error}=await sb.from('bills').select('*').order('id');
    if(data&&data.length){
      setBills(data);
    } else {
      // No bills in DB yet - show seed bills locally, they'll be added via Admin panel
      setBills(SEED_BILLS);
    }
  };
  const loadPendingBills=async()=>{
    const {data}=await sb.from('pending_bills').select('*').eq('pending',true).order('created_at',{ascending:false});
    if(data) setPendingBills(data);
  };
  const loadProjects=async()=>{const {data}=await sb.from('projects').select('*').order('created_at',{ascending:false});if(data)setProjects(data);};
  const loadUserVotes=async(uid)=>{const {data}=await sb.from('user_votes').select('*').eq('user_id',uid);if(data){const v={};data.forEach(d=>{v[d.bill_id]={choice:d.choice,anonymous:d.anonymous};});setUserVotes(v);}};

  const loadNotifications=async(uid)=>{
    try {
      const {data,error} = await sb.from('notifications').select('*').eq('user_id',uid).order('created_at',{ascending:false}).limit(30);
      if(!error&&data){ setNotifications(data); setUnreadNotifCount(data.filter(n=>!n.read).length); }
    } catch(e) { /* notifications table not yet created */ }
  };

  const markNotifsRead=async(uid)=>{
    try {
      setUnreadNotifCount(0);
      setNotifications(prev=>prev.map(n=>({...n,read:true})));
      await sb.from('notifications').update({read:true}).eq('user_id',uid).eq('read',false);
    } catch(e) { /* notifications table not yet created */ }
  };

  const handleAuth=(authUser,prof)=>{
    setUser({...authUser,...prof});setProfile(prof);setRep(prof?.reputation||0);loadUserVotes(authUser.id);
    // Show onboarding for brand new users
    if(!prof?.reputation||prof.reputation===0) setShowOnboarding(true);
    // Auto-award ZIP and rep badges on login
    setTimeout(async()=>{
      const zip = prof?.zip||'';
      const curBadges = prof?.badges||[];
      let badges = [...curBadges];
      // ZIP badge
      const zipBadge = ['49201','49202','49203','49204'].includes(zip)?'zip_49201':
        zip==='49237'?'zip_49237':zip==='49230'?'zip_49230':zip==='49285'?'zip_49285':
        (zip&&zip.startsWith('49'))?'zip_other':null;
      if(zipBadge&&!badges.includes(zipBadge)) badges=await awardBadge(authUser.id,zipBadge,badges);
      // New member badge = first_vote precursor — give them 'new resident' baseline
      // Rep milestones from existing rep
      const r = prof?.reputation||0;
      if(r>=20&&!badges.includes('rep_20')) badges=await awardBadge(authUser.id,'rep_20',badges);
      if(r>=50&&!badges.includes('rep_50')) badges=await awardBadge(authUser.id,'rep_50',badges);
      if(r>=100&&!badges.includes('rep_100')) badges=await awardBadge(authUser.id,'rep_100',badges);
      if(r>=200&&!badges.includes('rep_200')) badges=await awardBadge(authUser.id,'rep_200',badges);
      if(prof?.is_official&&!badges.includes('verified_official')) badges=await awardBadge(authUser.id,'verified_official',badges);
      if(badges.length!==curBadges.length) setProfile(p=>({...p,badges}));
    },1000);
  };
  const handleVoteCast=(billId,choice,anon)=>{setUserVotes(prev=>({...prev,[billId]:{choice,anonymous:anon}}));setBills(prev=>prev.map(b=>b.id!==billId?b:{...b,['votes_'+choice]:b['votes_'+choice]+1}));};
  const gainRep=async(pts, badgeToAward)=>{
    const newRep = rep+pts;
    setRep(newRep);
    if(user) setUser(u=>({...u,reputation:(u.reputation||0)+pts}));
    // Auto-award rep milestone badges
    const currentBadges = profile?.badges||[];
    let badges = [...currentBadges];
    if(badgeToAward && !badges.includes(badgeToAward)) {
      badges = await awardBadge(user?.id, badgeToAward, badges);
      setProfile(p=>({...p,badges}));
    }
    // Rep milestones
    const milestones = [[20,'rep_20'],[50,'rep_50'],[100,'rep_100'],[200,'rep_200']];
    for(const [threshold, bId] of milestones) {
      if(newRep>=threshold && !badges.includes(bId)) {
        badges = await awardBadge(user?.id, bId, badges);
        setProfile(p=>({...p,badges}));
        setToast('🏅 New badge earned: '+BADGES[bId].label+'!');
      }
    }
  };
  const handlePropose=async(data)=>{
    if(!user)return;
    const name=profile?.display_name||user.email.split('@')[0];
    const {data:proj,error}=await sb.from('projects').insert({...data,proposer_id:user.id,proposer_name:name,supporter_count:1}).select().single();
    if(!error&&proj){await sb.from('project_supporters').insert({project_id:proj.id,user_id:user.id});setProjects(prev=>[proj,...prev]);gainRep(10);setToast("Project submitted! +10 rep");}
  };
  const handleSignOut=async()=>{await sb.auth.signOut();setUser(null);setProfile(null);setRep(0);setUserVotes({});};

  // ZIP search - must be declared before any conditional returns (Rules of Hooks)
  const [zipSearch,setZipSearch]=useState(profile?.zip||'');
  const [keywordSearch,setKeywordSearch]=useState('');

  if(loading)return h('div',{style:{minHeight:'100vh',background:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},h(Spinner),h('div',{style:{color:'#f0c040',fontFamily:"'Playfair Display',serif",fontSize:18}},"Loading The People's Voice..."));
  if(!user&&!guestMode)return h(AuthScreen,{onAuth:handleAuth,onGuest:()=>setGuestMode(true)});

  const repInfo=repLevel(rep);
  const canPropose=rep>=REP_TO_PROPOSE;
  const isAdmin=profile?.is_admin===true;

  const searchedCommunity = ZIP_COMMUNITY[zipSearch.trim()] || null;

  const getFilteredBills = () => {
    let filtered = bills;
    const zip = zipSearch.trim();
    const community = ZIP_COMMUNITY[zip] || null;

    if(zip.length===5 && community) {
      // ZIP matched — show federal, state, and matching local bills only
      const communityLower = community.toLowerCase();
      filtered = bills.filter(b => {
        if(b.level==='federal'||b.level==='state') return true;
        return (b.jurisdiction||'').toLowerCase().includes(communityLower);
      });
    } else if(zip.length===5 && !community) {
      // ZIP entered but not in our map — show only federal/state
      filtered = bills.filter(b=>b.level==='federal'||b.level==='state');
    } else if(!zip) {
      // No ZIP — hide local/village/city/township bills by default
      // Users must enter their ZIP to see local legislation
      filtered = bills.filter(b=>b.level==='federal'||b.level==='state');
    } else if(billFilter!=='all') {
      filtered = bills.filter(b=>b.level===billFilter);
    }

    // Apply level filter on top if set
    if(billFilter!=='all' && zip.length===5 && community) {
      filtered = filtered.filter(b=>b.level===billFilter||b.level==='federal'||b.level==='state');
    }

    // Keyword search
    if(keywordSearch.trim().length>1) {
      const kw = keywordSearch.trim().toLowerCase();
      filtered = filtered.filter(b=>
        (b.title||'').toLowerCase().includes(kw) ||
        (b.summary||'').toLowerCase().includes(kw) ||
        (b.sponsor||'').toLowerCase().includes(kw) ||
        (b.jurisdiction||'').toLowerCase().includes(kw) ||
        (b.full_text||'').toLowerCase().includes(kw) ||
        (b.status||'').toLowerCase().includes(kw)
      );
    }
    return filtered;
  };

  const filteredBills = getFilteredBills();
  const totalVotes=bills.reduce((a,b)=>a+b.votes_yes+b.votes_no+b.votes_abstain,0);
  const displayName=profile?.display_name||(user?.email?.split('@')[0])||'Guest';

  return h('div',{style:{minHeight:'100vh',background:'#f4f1ea'}},
    toast&&h(Toast,{msg:toast,onDone:()=>setToast(null)}),
    showPropose&&h(ProposeModal,{onClose:()=>setShowPropose(false),onSubmit:handlePropose}),
    showOnboarding&&h(OnboardingTour,{onDone:()=>setShowOnboarding(false),displayName:profile?.display_name||user.email?.split('@')[0]}),
    showProfile&&h(ProfilePage,{user,profile,rep,bills,userVotes,onClose:()=>setShowProfile(false),onProfileUpdate:(updates)=>setProfile(p=>({...p,...updates})),onToast:setToast}),
    showNotifications&&h(NotificationPanel,{notifications,user,
      onClose:()=>setShowNotifications(false),
      onOpenPrefs:()=>{setShowNotifications(false);setShowNotificationPrefs(true);}
    }),
    showNotificationPrefs&&h(NotificationPreferences,{user,profile,
      onClose:()=>setShowNotificationPrefs(false),
      onToast:setToast
    }),
    // Click outside to close notification panel
    showNotifications&&h('div',{onClick:()=>setShowNotifications(false),
      style:{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:999}})
    ,
    h(FeedbackButton,{user}),
    showPrivacy&&h(PrivacyModal,{onClose:()=>setShowPrivacy(false)}),

    // Guest mode banner
    guestMode&&h('div',{style:{background:'#f0c040',padding:'10px 16px',textAlign:'center',display:'flex',gap:12,alignItems:'center',justifyContent:'center',flexWrap:'wrap'}},
      h('span',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e'}},
        '👁 You are browsing as a guest — votes, comments and community features require an account.'
      ),
      h('button',{onClick:()=>setGuestMode(false),
        style:{background:'#1a1a2e',color:'#f0c040',border:'none',padding:'6px 16px',borderRadius:6,
          fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}
      },'Sign Up / Sign In')
    ),

    // Header
    h('div',{style:{background:'#1a1a2e',borderBottom:'4px solid #f0c040'}},
      h('div',{style:{maxWidth:900,margin:'0 auto',padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}},
        h('div',null,
          h('div',{style:{fontSize:9,color:'#8899aa',letterSpacing:2,textTransform:'uppercase',marginBottom:1}},"Civic Engagement Platform"),
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:'#f0c040',letterSpacing:-.5}},"The People's Voice")
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:8,flexShrink:0}},
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{color:'#fff',fontSize:12,fontFamily:"'Playfair Display',serif",fontWeight:700}},displayName),
            h('div',{style:{color:'#f0c040',fontSize:10,marginBottom:2}},rep+' pts · '+repInfo.label),
            h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',alignItems:'center'}},
              // Notification bell
              h('div',{style:{position:'relative'}},
                h('button',{onClick:()=>{ setShowNotifications(!showNotifications); if(!showNotifications&&unreadNotifCount>0) markNotifsRead(user.id); },
                  style:{background:'transparent',border:'none',color:'#8899aa',fontSize:16,cursor:'pointer',padding:'2px 4px',position:'relative',lineHeight:1}
                },'🔔',
                  unreadNotifCount>0&&h('span',{style:{position:'absolute',top:-4,right:-4,background:'#c0392b',color:'#fff',borderRadius:'50%',width:16,height:16,fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}},unreadNotifCount>9?'9+':unreadNotifCount)
                )
              ),
              h('button',{onClick:handleSignOut,style:{background:'transparent',border:'none',color:'#8899aa',fontSize:11,cursor:'pointer',fontFamily:"'Lora',serif",padding:0}},"\uD83D\uDEAA Sign out"),
              h('button',{onClick:()=>setShowProfile(true),style:{background:'transparent',border:'none',color:'#f0c040',fontSize:11,cursor:'pointer',fontFamily:"'Lora',serif",padding:0}},"\uD83D\uDC64 Profile"),
              h('button',{onClick:()=>setShowOnboarding(true),style:{background:'transparent',border:'none',color:'#8899aa',fontSize:11,cursor:'pointer',fontFamily:"'Lora',serif",padding:0}},"\u2753 Help")
            )
          )
        )
      ),
      // Stats bar — horizontally scrollable on mobile
      h('div',{style:{background:'rgba(255,255,255,.04)',borderTop:'1px solid rgba(255,255,255,.06)',overflowX:'auto',WebkitOverflowScrolling:'touch'}},
        h('div',{style:{maxWidth:900,margin:'0 auto',padding:'6px 14px',display:'flex',gap:16,flexWrap:'nowrap',minWidth:'max-content'}},
          [[bills.length,"Bills"],[totalVotes.toLocaleString(),"Votes"],[projects.length,"Projects"],[memberCount!==null?memberCount:'...',"Members"],[rep+" pts","Your Rep"]].map(([v,l])=>
            h('div',{key:l,style:{flexShrink:0}},
              h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:900,color:'#f0c040'}},v),
              h('div',{style:{fontSize:9,color:'#8899aa',textTransform:'uppercase',letterSpacing:1}},l)
            )
          )
        )
      ),
      // Tabs — horizontally scrollable on mobile
      h('div',{style:{overflowX:'auto',WebkitOverflowScrolling:'touch',borderTop:'1px solid rgba(255,255,255,.06)'}},
        h('div',{style:{maxWidth:900,margin:'0 auto',padding:'0 14px',display:'flex',flexWrap:'nowrap',minWidth:'max-content'}},
          [['feed','\uD83D\uDCE1 Feed'],['bills','\uD83D\uDDF3 Bills'],['proposals','📝 Civic Voice'],['news','\uD83D\uDCF0 News'],['projects','\uD83C\uDF31 Community'],['events','📅 Events'],['exchange','🤲 Exchange'],['map','🗺 Map'],['pulse','📊 Pulse'],['connect','\uD83E\uDD1D Connect'],['resources','\uD83D\uDCDA Resources'],['reps','\uD83C\uDFDB Reps'],...(isAdmin?[['admin','\u2699\uFE0F Admin']]:[])].map(([t,l])=>
            h('button',{key:t,onClick:()=>setMainTab(t),
              style:{background:'transparent',border:'none',
                borderBottom:mainTab===t?'3px solid #f0c040':'3px solid transparent',
                padding:'10px 12px',fontFamily:"'Playfair Display',serif",
                fontWeight:mainTab===t?700:400,fontSize:12,
                color:mainTab===t?'#f0c040':'#8899aa',
                whiteSpace:'nowrap',flexShrink:0,cursor:'pointer'}
            },l)
          )
        )
      )
    ),

    // Body

      // Profile completion nudge banner

        background:'linear-gradient(135deg,#1a1a2e,#2a1a4e)',
        border:'1px solid #f0c040',borderRadius:10,padding:'12px 16px',
        marginBottom:14,display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}},
        h('div',{style:{fontSize:22,flexShrink:0}},'👋'),
        h('div',{style:{flex:1,minWidth:180}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#f0c040',marginBottom:2}},
            'Welcome! Finish setting up your profile'),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#8899aa',lineHeight:1.5}},
            (!profile?.display_name&&!profile?.zip)?'Add your name and ZIP code so your neighbors know who you are and where you\'re from.':
            !profile?.display_name?'Add a display name so your neighbors know who you are.':
            'Add your ZIP code so your community posts reach the right people.')
        ),
        h('button',{onClick:()=>setShowProfile(true),
          style:{background:'#f0c040',color:'#1a1a2e',border:'none',padding:'9px 18px',
            borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,
            fontSize:13,cursor:'pointer',flexShrink:0}},
          'Complete Profile →')
      ),

      // Bills tab
      // Feed tab — community activity stream
      mainTab==='feed'&&h(CommunityFeed,{user,profile,bills,guestMode,onNavigate:(tab,ctx)=>{setFeedNavCtx(ctx||null);setMainTab(tab);}}),

      mainTab==='news'&&h(NewsTab,{user,rep,profile}),

      mainTab==='bills'&&h(Fragment,null,

        // Search bars
        h('div',{style:{background:'#1a1a2e',borderRadius:10,padding:'14px 16px',marginBottom:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#f0c040',marginBottom:8}},
            "🔍 Search Bills"
          ),
          h('div',{style:{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}},
            h('input',{
              value:keywordSearch,
              onChange:e=>setKeywordSearch(e.target.value),
              placeholder:'Search by keyword — "Medicaid", "roads", "SNAP"...',
              style:{flex:2,minWidth:180,border:'1px solid #444',borderRadius:6,padding:'10px 13px',fontSize:14,background:'#23233a',color:'#fff',boxSizing:'border-box'}
            }),
            h('input',{
              value:zipSearch,
              onChange:e=>{setZipSearch(e.target.value);if(e.target.value.trim().length===5)setBillFilter('all');},
              placeholder:'...or filter by ZIP',
              maxLength:5,
              style:{flex:1,minWidth:120,border:'1px solid #444',borderRadius:6,padding:'10px 13px',fontSize:14,background:'#23233a',color:'#fff',boxSizing:'border-box'}
            }),
            (zipSearch.trim()||keywordSearch.trim())&&h('button',{
              onClick:()=>{setZipSearch('');setKeywordSearch('');},
              style:{background:'transparent',border:'1px solid #556677',color:'#8899aa',borderRadius:5,padding:'9px 12px',fontSize:12,whiteSpace:'nowrap'}
            },"✕ Clear")
          ),
          searchedCommunity&&h('div',{style:{marginTop:4,fontSize:13,color:'#6bcf8a',fontFamily:"'Lora',serif"}},
            '📍 Showing bills for: ',h('strong',null,searchedCommunity),' + all State & Federal bills'
          ),
          zipSearch.trim().length===5&&!searchedCommunity&&h('div',{style:{marginTop:4,fontSize:13,color:'#e74c3c',fontFamily:"'Lora',serif"}},
            'ZIP code not found in Jackson County. Showing Federal & State bills only.'
          ),
          !zipSearch.trim()&&h('div',{style:{marginTop:4,fontSize:12,color:'#8899aa',fontFamily:"'Lora',serif"}},
            '💡 Enter your ZIP to see local legislation for your community'
          ),
          keywordSearch.trim().length>1&&h('div',{style:{marginTop:4,fontSize:13,color:'#6bcf8a',fontFamily:"'Lora',serif"}},
            "🔎 "+filteredBills.length+" result"+(filteredBills.length!==1?'s':'')+" for \""+keywordSearch.trim()+"\""
          )
        ),

        // Level filters
        h('div',{style:{display:'flex',gap:7,flexWrap:'wrap',marginBottom:14,alignItems:'center'}},
          h('span',{style:{fontSize:12,color:'#aaa'}},"Level:"),
          [['all','All'],['village','🏘 Village'],['city','🏙 City'],['township','🌾 Township'],['state','🏛 State'],['federal','🇺🇸 Federal']].map(([v,l])=>
            h('button',{key:v,onClick:()=>{setBillFilter(v);setZipSearch('');},style:{background:billFilter===v&&!zipSearch?'#1a1a2e':'#fff',color:billFilter===v&&!zipSearch?'#f0c040':'#555',border:'1px solid '+(billFilter===v&&!zipSearch?'#1a1a2e':'#ddd'),padding:'6px 12px',borderRadius:20,fontFamily:"'Playfair Display',serif",fontSize:12,fontWeight:billFilter===v&&!zipSearch?700:400}},l)
          ),
          h('div',{style:{marginLeft:'auto',fontSize:12,color:'#aaa'}},filteredBills.length+" bill"+(filteredBills.length!==1?'s':''))
        ),
        filteredBills.length===0&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},"No bills found for this filter."),
        filteredBills.map(bill=>h(BillCard,{key:bill.id,bill,user:{...user,reputation:rep},userVotes,onVoteCast:handleVoteCast,onRepGain:gainRep,highlighted:feedNavCtx?.billId===bill.id,onHighlightDone:()=>setFeedNavCtx(null)})),

        // Link to proposals tab
        h('div',{style:{textAlign:'center',marginTop:20,padding:'14px 16px',background:'#f5f0ff',borderRadius:8,border:'1px solid #c8b8e8',display:'flex',alignItems:'center',justifyContent:'center',gap:12,flexWrap:'wrap'}},
          h('div',null,
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:2}},'📝 Have a bill to propose?'),
            h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#888'}},'Submit a community proposal, co-sign others, and track what goes live.')
          ),
          h('button',{onClick:()=>setMainTab('proposals'),
            style:{background:'#5b3a8c',color:'#fff',border:'none',padding:'9px 18px',borderRadius:6,
              fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer',flexShrink:0}},
            'Go to Proposals →')
        )
      ),

      // Proposals tab
      mainTab==='proposals'&&h(ProposalsTab,{user,profile,bills,onToast:setToast}),

      // Projects tab
      mainTab==='projects'&&h(Fragment,null,
        // Header
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:10}},
          h('div',null,
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},"🌱 Community Projects"),
            h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:2}},"Neighbors proposing real change — together.")
          ),
          canPropose?h('button',{onClick:()=>setShowPropose(true),style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'10px 18px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13}},"+  Propose a Project"):
          h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:7,padding:'10px 14px',fontSize:12,color:'#888',textAlign:'center'}},
            h('div',{style:{fontWeight:600,color:'#5b3a8c',marginBottom:2}},repInfo.icon+" "+repInfo.label),
            "Earn ",h('strong',null,REP_TO_PROPOSE-rep+" more rep")," to propose",h('br'),h('span',{style:{fontSize:11}},"Vote (+5) · Comment (+10) · Pledge (+15)")
          )
        ),

        // Explainer panel
        h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:'18px 20px',marginBottom:16}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#f0c040',marginBottom:14}},'How Community Projects Work'),
          h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12}},
            [
              ['📝','Propose','A verified resident with 50+ rep submits a project idea — anything from a community garden to a neighborhood trail to a tool library.'],
              ['🤝','Gather Support','Neighbors pledge their time, skills, or resources. The more support a project gets, the stronger the case for action.'],
              ['📨','Forward to Officials','When a project reaches its support threshold, you can send a formal letter directly to your elected representatives — right from this page.'],
              ['🏛','Hold Them Accountable','Officials receive the letter with your community\'s name attached. Their response (or silence) becomes part of the public record.'],
            ].map(([icon,title,desc])=>
              h('div',{key:title,style:{background:'rgba(255,255,255,.06)',borderRadius:8,padding:'12px 14px'}},
                h('div',{style:{fontSize:22,marginBottom:6}},icon),
                h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#f0c040',marginBottom:4}},title),
                h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#8899aa',lineHeight:1.6}},desc)
              )
            )
          ),
          h('div',{style:{marginTop:14,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.08)',display:'flex',gap:16,flexWrap:'wrap',alignItems:'center'}},
            h('span',{style:{fontSize:12,color:'#556677',fontFamily:"'Lora',serif"}},'Earn rep by participating:'),
            [["🗳 Vote","+5"],["💬 Comment","+10"],["🤲 Pledge","+15"],["🌱 Propose","50 req"]].map(([l,v])=>
              h('div',{key:l,style:{display:'flex',alignItems:'center',gap:4}},
                h('span',{style:{fontSize:12,color:'#8899aa'}},l),
                h('span',{style:{background:'#f0c040',color:'#1a1a2e',fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:20}},v)
              )
            )
          )
        ),

        projects.length===0&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa'}},
          h('div',{style:{fontSize:36,marginBottom:10}},'🌱'),
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:'#555',marginBottom:6}},'No projects yet'),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,lineHeight:1.6}},'Be the first to propose something your community needs.')
        ),
        projects.map(proj=>h(ProjectCard,{key:proj.id,project:proj,user:{...user,reputation:rep},onRepGain:gainRep}))
      ),

      // Events tab
      mainTab==='events'&&h(EventsTab,{user,profile,onToast:setToast}),

      // Exchange tab
      mainTab==='exchange'&&h(ExchangeTab,{user,profile,onToast:setToast}),

      // Map tab — live community map
      mainTab==='map'&&h(MapTab,{user,profile}),

      // Pulse tab — community health dashboard
      mainTab==='pulse'&&h(PulseTab,{bills,user,profile}),

      // Connect tab — Chat + Neighbor Directory
      mainTab==='connect'&&h('div',null,
        h('div',{style:{marginBottom:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e',marginBottom:3}},'🤝 Connect'),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888'}},'Chat with neighbors. Browse your community. Invite friends.')
        ),
        h(CommunityHub,{user:{...user,...profile},profile})
      ),

      // Resources tab
      mainTab==='resources'&&h(ResourcesTab,{user:{...user,reputation:rep},profile,onToast:setToast}),

      // Reps tab
      mainTab==='reps'&&h(Fragment,null,
        h('div',{style:{marginBottom:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e',marginBottom:3}},"Representative Accountability"),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888'}},"How your elected officials voted - compared to how you voted.")
        ),
        h(RepTracker,{bills,userZip:profile?.zip})
      ),

      // Admin tab
      mainTab==='admin'&&isAdmin&&h(AdminPanel,{bills,setBills,onToast:setToast,user,profile})
    ),

    // Footer
    h('div',{style:{background:'#1a1a2e',borderTop:'3px solid #f0c040',color:'#556677',textAlign:'center',padding:'20px 16px',fontSize:12,lineHeight:1.9}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",color:'#f0c040',fontSize:14,marginBottom:6}},"The People's Voice"),
      h('div',{style:{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',borderRadius:8,padding:'10px 14px',maxWidth:560,margin:'0 auto 8px',fontSize:11,color:'#8899aa',lineHeight:1.7}},
        "⚖️ ",h('strong',{style:{color:'#aab'}},"Nonpartisan Statement:")," Not affiliated with any political party, government body, or elected official. All analysis is factual and balanced. Community votes carry no official weight.",
        h('span',{style:{marginLeft:8}},
          h('button',{onClick:()=>setShowPrivacy(true),
            style:{background:'none',border:'none',color:'#5b9a6c',fontSize:10,cursor:'pointer',
              textDecoration:'underline',padding:0,fontFamily:"'Lora',serif"}
          },'Privacy Policy')
        )
      ),
      "Votes & proposals are unofficial civic engagement",h('br'),
      h('span',{style:{color:'#5b3a8c'}},"Concord -> Jackson -> Michigan -> Nation")
    )
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(
  h(ErrorBoundary,null,h(App))
);

</script>
</body>
</html>
