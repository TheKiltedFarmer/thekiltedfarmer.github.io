function ProfilePage({user, profile, rep, bills, userVotes, onClose, onProfileUpdate, onToast}) {
  const repInfo = repLevel(rep);
  const votedBills = bills.filter(b=>userVotes[b.id]);
  const [avatarUrl, setAvatarUrl] = useState(profile?.avatar_url||null);
  const [uploading, setUploading] = useState(false);
  const [editing, setEditing] = useState(false);
  const [saving, setSaving] = useState(false);
  const [editForm, setEditForm] = useState({
    display_name: profile?.display_name||'',
    bio: profile?.bio||'',
    tagline: profile?.tagline||'',
    facebook: profile?.facebook||'',
    twitter: profile?.twitter||'',
    instagram: profile?.instagram||'',
  });
  const fileRef = useRef(null);
  const setField = k=>e=>setEditForm(f=>({...f,[k]:e.target.value}));

  const displayName = editForm.display_name||profile?.display_name||user.email?.split('@')[0]||'Resident';
  const joinDate = user.created_at ? new Date(user.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'}) : 'Recently';

  const voteBreakdown = votedBills.reduce((acc,b)=>{
    const v = userVotes[b.id];
    if(v) acc[v.choice] = (acc[v.choice]||0)+1;
    return acc;
  },{});

  const saveProfile = async()=>{
    setSaving(true);
    const updates = {
      display_name: editForm.display_name.trim()||displayName,
      bio: editForm.bio.trim(),
      tagline: editForm.tagline.trim(),
      facebook: editForm.facebook.trim(),
      twitter: editForm.twitter.trim(),
      instagram: editForm.instagram.trim(),
    };
    await sb.from('profiles').update(updates).eq('id',user.id);
    if(onProfileUpdate) onProfileUpdate(updates);
    setEditing(false);
    setSaving(false);
  };

  const handleAvatarUpload = async(e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024) { alert('Image must be under 2MB'); return; }
    setUploading(true);
    const reader = new FileReader();
    reader.onload = async(ev)=>{
      const dataUrl = ev.target.result;
      await sb.from('profiles').update({avatar_url:dataUrl}).eq('id',user.id);
      setAvatarUrl(dataUrl);
      if(onProfileUpdate) onProfileUpdate({avatar_url:dataUrl});
      setUploading(false);
    };
    reader.readAsDataURL(file);
  };

  const inviteLink = SITE_URL+'?ref='+(user.id||'').slice(0,8);

    navigator.clipboard&&navigator.clipboard.writeText(inviteLink);

        h('button',{onClick:onClose,style:{position:'absolute',top:16,right:16,background:'transparent',border:'none',color:'#8899aa',fontSize:20,cursor:'pointer',lineHeight:1}},'x'),
        h('div',{style:{display:'flex',gap:16,alignItems:'center'}},
          h('div',{style:{position:'relative',flexShrink:0}},
            avatarUrl
              ? h('img',{src:avatarUrl,alt:'Profile',style:{width:70,height:70,borderRadius:'50%',objectFit:'cover',border:'3px solid #f0c040'}})
              : h('div',{style:{width:70,height:70,borderRadius:'50%',background:'#f0c040',color:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:28,border:'3px solid #f0c040'}},
                  displayName[0].toUpperCase()
                ),
            h('button',{onClick:()=>fileRef.current&&fileRef.current.click(),title:'Change photo',
              style:{position:'absolute',bottom:0,right:0,width:24,height:24,borderRadius:'50%',background:'#f0c040',border:'2px solid #1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:12}
            },uploading?'..':'📷'),
            h('input',{ref:fileRef,type:'file',accept:'image/*',onChange:handleAvatarUpload,style:{display:'none'}})
          ),
          h('div',{style:{flex:1}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:'#f0c040'}},displayName),
            profile?.tagline&&!editing&&h('div',{style:{fontSize:13,color:'#aab',fontStyle:'italic',marginTop:2}},profile.tagline),
            h('div',{style:{fontSize:12,color:'#8899aa',marginTop:4}},'Member since '+joinDate),
            profile?.full_address&&h('div',{style:{fontSize:12,color:'#8899aa',marginTop:2}},'📍 '+profile.full_address),

// ── Official Badge Request ────────────────────────────────────────────────────
function OfficialBadgeRequest({user, profile, onToast}) {
  const [open, setOpen] = useState(false);
  const [title, setTitle] = useState('');
  const [body, setBody] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  const submit = async()=>{
    if(!title.trim()) return;
    setSubmitting(true);
    const {error} = await sb.from('official_badge_requests').insert({
      user_id: user.id,
      display_name: profile?.display_name||user.email?.split('@')[0]||'Resident',
      email: user.email||'',
      zip: profile?.zip||'',
      title: title.trim(),
      message: body.trim()||null,
      status: 'pending',
      created_at: new Date().toISOString()
    });
    if(!error) {
      setSubmitted(true);
      onToast('✅ Request submitted! Justin will review your application.');
    } else {
      onToast('❌ Error submitting request — please try again.');
    }
    setSubmitting(false);
  };

  if(submitted||profile?.is_official) return null;

  return h('div',null,
    !open
      ? h('button',{onClick:()=>setOpen(true),
          style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'10px 20px',
            borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,
            fontSize:13,cursor:'pointer',width:'100%'}
        },'🏛 Request Verified Official Badge')
      : h('div',{style:{background:'#f0ebf8',border:'1px solid #c8b8e8',borderRadius:8,padding:14,marginTop:8}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:10}},
            'Official Badge Application'
          ),
          h('div',{style:{marginBottom:10}},
            h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Your Official Title *'),
            h('input',{value:title,onChange:e=>setTitle(e.target.value),
              placeholder:'e.g. "Jackson City Council Member, Ward 3" or "Village of Concord Trustee"',
              style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',
                fontSize:13,boxSizing:'border-box',fontFamily:"'Lora',serif"}})
          ),
          h('div',{style:{marginBottom:12}},
            h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Additional Information (optional)'),
            h('textarea',{value:body,onChange:e=>setBody(e.target.value),rows:2,
              placeholder:'Any additional context — official website, contact info, etc.',
              style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',
                fontSize:13,boxSizing:'border-box',resize:'vertical',fontFamily:"'Lora',serif",lineHeight:1.6}})
          ),
          h('div',{style:{fontSize:11,color:'#888',fontFamily:"'Lora',serif",lineHeight:1.5,marginBottom:12}},
            '⚖️ Your request will be reviewed by the platform admin. Verified officials have their comments highlighted and receive an official badge on their profile.'
          ),
          h('div',{style:{display:'flex',gap:8}},
            h('button',{onClick:submit,disabled:submitting||!title.trim(),
              style:{flex:1,background:submitting||!title.trim()?'#ccc':'#5b3a8c',
                color:'#fff',border:'none',padding:'10px',borderRadius:7,
                fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}
            },submitting?'Submitting...':'Submit Application'),
            h('button',{onClick:()=>setOpen(false),
              style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',
                padding:'10px 16px',borderRadius:7,fontSize:13,cursor:'pointer'}
            },'Cancel')
          )
        )
  );
}

// Admin inbox for official badge requests
function OfficialBadgeInbox({onToast}) {
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    sb.from('official_badge_requests').select('*')
      .eq('status','pending').order('created_at',{ascending:false})
      .then(({data})=>{ setRequests(data||[]); setLoading(false); });
  },[]);

  const approve = async(req)=>{
    // Grant the badge
    await sb.from('profiles').update({
      is_official: true,
      official_title: req.title
    }).eq('id',req.user_id);
    // Mark request as approved
    await sb.from('official_badge_requests').update({status:'approved'}).eq('id',req.id);
    setRequests(prev=>prev.filter(r=>r.id!==req.id));
    onToast('✅ Official badge granted to '+req.display_name+'!');
  };

  const deny = async(req)=>{
    await sb.from('official_badge_requests').update({status:'denied'}).eq('id',req.id);
    setRequests(prev=>prev.filter(r=>r.id!==req.id));
    onToast('Request from '+req.display_name+' denied.');
  };

  const count = requests.length;

  return h('div',{style:{background:'#f0ebf8',border:'1px solid #c8b8e8',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',marginBottom:open?14:0},
      onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',display:'flex',alignItems:'center',gap:8}},
        '🏛 Official Badge Requests',
        count>0&&h('span',{style:{background:'#5b3a8c',color:'#fff',borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:700}},count)
      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')
    ),
    open&&h('div',null,
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa'}},'Loading...'),
      !loading&&requests.length===0&&h('div',{style:{textAlign:'center',padding:16,color:'#aaa',fontStyle:'italic'}},'No pending badge requests.'),
      requests.map(req=>h('div',{key:req.id,
        style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:8}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:2}},
          req.display_name
        ),
        h('div',{style:{fontSize:12,color:'#1a5c8a',fontWeight:700,marginBottom:4}},
          '🏛 '+req.title
        ),
        h('div',{style:{display:'flex',gap:8,fontSize:11,color:'#888',marginBottom:req.message?6:10,flexWrap:'wrap'}},
          h('span',null,'📧 '+req.email),
          h('span',null,'📍 ZIP: '+req.zip),
          h('span',null,'🕐 '+new Date(req.created_at).toLocaleDateString())
        ),
        req.message&&h('div',{style:{fontSize:12,color:'#555',fontFamily:"'Lora',serif",
          lineHeight:1.6,fontStyle:'italic',marginBottom:8,padding:'6px 10px',
          background:'#f5f3ee',borderRadius:5}},'"'+req.message+'"'),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{onClick:()=>approve(req),
            style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'7px 16px',
              borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,
              fontSize:12,cursor:'pointer'}
          },'✅ Approve & Grant Badge'),
          h('button',{onClick:()=>deny(req),
            style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',
              padding:'7px 12px',borderRadius:6,fontSize:12,cursor:'pointer'}
          },'Deny')
        )
      ))
    )
  );
}

// ── Neighbor Directory + Community Chat ───────────────────────────────────────
const CHAT_ROOMS = [
  {id:'general', label:'🏙 Jackson County', desc:'General community chat for all residents'},
  {id:'49201', label:'📍 49201 · Jackson City', desc:'Downtown and central Jackson'},
  {id:'49202', label:'📍 49202 · West Jackson', desc:'West side neighborhoods'},
  {id:'49203', label:'📍 49203 · South Jackson', desc:'South Jackson area'},
  {id:'49237', label:'📍 49237 · Concord', desc:'Village of Concord and surroundings'},
  {id:'49230', label:'📍 49230 · Brooklyn', desc:'Brooklyn and Columbia Township'},
  {id:'49285', label:'📍 49285 · Summit Twp', desc:'Summit Township area'},
];

function CommunityHub({user, profile}) {
  const [activeTab, setActiveTab] = useState('chat');
  const [activeRoom, setActiveRoom] = useState('general');
  const [messages, setMessages] = useState([]);
  const [msgText, setMsgText] = useState('');
  const [sending, setSending] = useState(false);
  const [neighbors, setNeighbors] = useState([]);
  const [loadingNeighbors, setLoadingNeighbors] = useState(true);
  const [loadingMsgs, setLoadingMsgs] = useState(true);
  const bottomRef = useRef(null);
  const pollRef = useRef(null);

  const displayName = profile?.display_name||user?.email?.split('@')[0]||'Resident';
  const userZip = profile?.zip||'';

  // Load neighbors
  useEffect(()=>{
    sb.from('profiles').select('id,display_name,zip,reputation,avatar_url,tagline,bio,is_official,official_title,created_at,badges,show_in_directory')
      .or('show_in_directory.is.null,show_in_directory.eq.true')
      .order('reputation',{ascending:false}).limit(50)
      .then(({data})=>{ setNeighbors(data||[]); setLoadingNeighbors(false); });
  },[]);

  // Load + poll messages
  const loadMessages = async(room)=>{
    const {data} = await sb.from('community_chat')
      .select('*').eq('room_id',room)
      .order('created_at',{ascending:true}).limit(60);
    if(data) setMessages(data);
    setLoadingMsgs(false);
  };

  useEffect(()=>{
    setLoadingMsgs(true);
    loadMessages(activeRoom);
    clearInterval(pollRef.current);
    pollRef.current = setInterval(()=>loadMessages(activeRoom), 5000);
    return ()=>clearInterval(pollRef.current);
  },[activeRoom]);

  useEffect(()=>{
    if(bottomRef.current) bottomRef.current.scrollIntoView({behavior:'smooth'});
  },[messages]);

  const sendMessage = async()=>{
    if(!msgText.trim()||!user) return;
    setSending(true);
    const msg = {
      room_id: activeRoom,
      user_id: user.id,
      display_name: displayName,
      content: msgText.trim(),
      is_official: profile?.is_official||false,
      official_title: profile?.official_title||null,
      created_at: new Date().toISOString()
    };
    const {data} = await sb.from('community_chat').insert(msg).select().single();
    if(data) setMessages(prev=>[...prev,data]);
    else setMessages(prev=>[...prev,{...msg,id:Date.now()}]);
    setMsgText('');
    setSending(false);
  };

  const currentRoom = CHAT_ROOMS.find(r=>r.id===activeRoom)||CHAT_ROOMS[0];

  return h('div',{style:{background:'#f4f1ea',minHeight:400}},

    // Tab switcher
    h('div',{style:{display:'flex',gap:0,marginBottom:16,background:'#fff',borderRadius:10,overflow:'hidden',border:'1px solid #e5dece'}},
      [['chat','💬 Community Chat'],['neighbors','👥 Neighbor Directory']].map(([t,l])=>
        h('button',{key:t,onClick:()=>setActiveTab(t),
          style:{flex:1,padding:'12px',background:activeTab===t?'#1a1a2e':'transparent',
            color:activeTab===t?'#f0c040':'#555',border:'none',
            fontFamily:"'Playfair Display',serif",fontWeight:activeTab===t?700:400,
            fontSize:14,cursor:'pointer'}
        },l)
      )
    ),

    // ── Chat ────────────────────────────────────────────────────────────────
    activeTab==='chat'&&h('div',null,
      // Room selector
      h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}},
        CHAT_ROOMS.map(r=>h('button',{key:r.id,onClick:()=>setActiveRoom(r.id),
          style:{background:activeRoom===r.id?'#1a1a2e':'#fff',color:activeRoom===r.id?'#f0c040':'#555',
            border:'1px solid '+(activeRoom===r.id?'#1a1a2e':'#ddd'),padding:'5px 11px',borderRadius:20,
            fontFamily:"'Lora',serif",fontSize:11,cursor:'pointer',whiteSpace:'nowrap'}
        },r.label))
      ),

      // Chat window
      h('div',{style:{background:'#fff',borderRadius:10,overflow:'hidden',border:'1px solid #e5dece'}},
        h('div',{style:{background:'#1a1a2e',padding:'10px 14px'}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:'#f0c040',fontSize:14}},currentRoom.label),
          h('div',{style:{fontSize:11,color:'#8899aa',marginTop:2}},currentRoom.desc)
        ),
        h('div',{style:{height:320,overflowY:'auto',padding:'12px 14px',display:'flex',flexDirection:'column',gap:8}},
          loadingMsgs&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa',fontStyle:'italic'}},'Loading messages...'),
          !loadingMsgs&&messages.length===0&&h('div',{style:{textAlign:'center',padding:30,color:'#aaa'}},
            h('div',{style:{fontSize:32,marginBottom:8}},'💬'),
            h('div',{style:{fontSize:13,fontStyle:'italic'}},'No messages yet. Start the conversation!')
          ),
          messages.map((m,i)=>{
            const isMe = m.user_id===user?.id;
            return h('div',{key:m.id||i,style:{display:'flex',gap:8,alignItems:'flex-start',flexDirection:isMe?'row-reverse':'row'}},
              h('div',{style:{width:30,height:30,borderRadius:'50%',flexShrink:0,
                background:m.is_official?'#1a5c8a':'#1a1a2e',
                color:'#f0c040',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700}},
                (m.display_name||'?')[0].toUpperCase()
              ),
              h('div',{style:{maxWidth:'75%'}},
                h('div',{style:{display:'flex',gap:6,alignItems:'center',marginBottom:3,flexDirection:isMe?'row-reverse':'row'}},
                  h('span',{style:{fontSize:11,fontWeight:700,color:isMe?'#1a5c8a':'#1a1a2e'}},isMe?'You':m.display_name),
                  m.is_official&&h('span',{style:{background:'#1a5c8a',color:'#fff',fontSize:8,fontWeight:700,padding:'1px 5px',borderRadius:10}},'OFFICIAL'),
                  h('span',{style:{fontSize:10,color:'#bbb'}},m.created_at?new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'')
                ),
                h('div',{style:{background:isMe?'#e8f2fa':'#f5f3ee',border:'1px solid '+(isMe?'#c8d8f0':'#e5dece'),
                  borderRadius:8,padding:'8px 11px',fontSize:13,fontFamily:"'Lora',serif",lineHeight:1.6,color:'#333'}},
                  m.content
                )
              )
            );
          }),
          h('div',{ref:bottomRef})
        ),
        !user
          ? h('div',{style:{padding:14,background:'#faf8f3',borderTop:'1px solid #e5dece',textAlign:'center',fontSize:13,color:'#888',fontStyle:'italic'}},
              'Sign in to join the conversation'
            )
          : h('div',{style:{padding:'10px 12px',background:'#faf8f3',borderTop:'1px solid #e5dece',display:'flex',gap:8}},
              h('input',{
                value:msgText,onChange:e=>setMsgText(e.target.value),
                onKeyDown:e=>e.key==='Enter'&&!e.shiftKey&&sendMessage(),
                placeholder:'Say something to your community...',
                style:{flex:1,border:'1px solid #ddd',borderRadius:20,padding:'9px 14px',fontSize:13,
                  fontFamily:"'Lora',serif",background:'#fff'}
              }),
              h('button',{onClick:sendMessage,disabled:!msgText.trim()||sending,
                style:{background:msgText.trim()&&!sending?'#1a1a2e':'#ddd',color:msgText.trim()&&!sending?'#f0c040':'#aaa',
                  border:'none',borderRadius:20,padding:'9px 16px',fontFamily:"'Playfair Display',serif",
                  fontWeight:700,fontSize:13,cursor:msgText.trim()&&!sending?'pointer':'default',whiteSpace:'nowrap'}
              },'Send')
            )

function RepContactTracker({bill, user}) {
  const [contacts, setContacts] = useState([]);
  const [loading, setLoading] = useState(false);

  useEffect(()=>{
    sb.from('rep_contacts').select('count').eq('bill_id',bill.id)
      .then(({count})=>{ if(count!==null) setContacts(count); });
  },[bill.id]);

  const logContact = async(repName) => {
    setLoading(true);
    await sb.from('rep_contacts').insert({
      bill_id:bill.id, bill_title:bill.title,
      user_id:user?.id||null, rep_name:repName,
      contacted_at:new Date().toISOString()
    });
    setContacts(c=>c+1);
    setLoading(false);
  };

  if(!contacts&&contacts!==0) return null;

  return contacts>0
    ? h('div',{style:{fontSize:12,color:'#1a6b3c',fontWeight:600,marginTop:4}},
        '📬 '+contacts+' resident'+(contacts===1?'':'s')+' have contacted their rep about this bill'
      )
    : null;
}

// ── Auth Screen ───────────────────────────────────────────────────────────────
function AuthScreen({onAuth, onGuest}) {
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [name,setName]=useState('');
  const [zip,setZip]=useState('');
  const [attested,setAttested]=useState(false);
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);
  const [step,setStep]=useState(1); // 1=account info, 2=zip+attestation

  const community=ZIP_COMMUNITY[zip.trim()]||null;
  const zipValid=VALID_ZIPS.includes(zip.trim());

  const nextStep=()=>{
    if(step===1){
      if(!email.trim()){setError('Email is required.');return;}
      // Validate email format before proceeding
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRegex.test(email.trim())){
        setError('Please enter a valid email address (e.g. name@gmail.com). If you\'re opening this from Facebook Messenger, try copying the link and opening it in Safari or Chrome instead.');
        return;
      }
      if(pass.length<6){setError('Password must be at least 6 characters.');return;}
      setError('');setStep(2);
    }
  };

  const handleSignup=async()=>{
    if(!zip.trim()){setError('ZIP code is required.');return;}
    if(!zipValid){setError('Sorry — The People\'s Voice is currently only open to Jackson County and surrounding area residents. Your ZIP code ('+zip.trim()+') is not in our service area.');return;}
    if(!attested){setError('Please confirm the attestation to continue.');return;}
    setLoading(true);setError('');
    const displayName=name||email.split('@')[0];
    const {data,error:err}=await sb.auth.signUp({
      email,password:pass,
      options:{data:{display_name:displayName,zip}}
    });
    if(err){
      let msg=err.message||'Something went wrong. Please try again.';
      if(msg.includes('invalid format')||msg.includes('invalid email')) msg='Please enter a valid email address (e.g. name@gmail.com). If you opened this from Facebook Messenger, try copying thepeoplesvoices.org and opening it directly in Safari or Chrome.';
      else if(msg.includes('already registered')||msg.includes('already exists')) msg='An account with this email already exists. Try signing in instead.';
      else if(msg.includes('password')) msg='Password must be at least 6 characters.';
      else if(msg.includes('rate limit')) msg='Too many attempts — please wait a minute and try again.';
      setError(msg);setLoading(false);return;
    }
    if(data.user){
      // Retry profile creation up to 3 times in case of network hiccup
      let profileCreated = false;
      for(let i=0; i<3; i++) {
        const {error:profErr} = await sb.from('profiles').upsert({
          id:data.user.id,email,display_name:displayName,
          zip,verified_method:'self-attested',reputation:0,
          show_in_directory:true
        });
        if(!profErr) { profileCreated = true; break; }
        await new Promise(r=>setTimeout(r,800));
      }
      onAuth(data.user,{display_name:displayName,zip,reputation:0,show_in_directory:true});
    }
    setLoading(false);
  };

  const handleLogin=async()=>{
    setLoading(true);setError('');
    const {data,error:err}=await sb.auth.signInWithPassword({email,password:pass});
    if(err){setError(err.message);setLoading(false);return;}
    if(data.user){
      let {data:prof} = await sb.from('profiles').select('*').eq('id',data.user.id).single();
      // If profile row missing (can happen with broken signups), create it now
      if(!prof) {
        await sb.from('profiles').upsert({
          id:data.user.id, email:data.user.email,
          display_name:data.user.email?.split('@')[0]||'Resident',
          zip:'', reputation:0, verified_method:'self-attested', show_in_directory:true
        });
        const {data:newProf} = await sb.from('profiles').select('*').eq('id',data.user.id).single();
        prof = newProf;
      }
      onAuth(data.user,prof||{});
    }
    setLoading(false);

// ── Admin Pending Review Queue ─────────────────────────────────────────────────
function PendingReviewQueue({onToast, setBills}) {
  const [pending, setPending] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    sb.from('pending_bills').select('*').eq('pending',true).order('created_at',{ascending:false})
      .then(({data})=>{ if(data) setPending(data); setLoading(false); });
  },[]);

  const approve = async(bill) => {
    const {cosigners:_c,cosign_count:_n,pending:_p,submitted_by_id:_s,submitted_by_name:_sn,source_url:_u,is_trusted_submission:_t,...billData} = bill;
    const id = bill.jurisdiction.split(' ')[0].toUpperCase().slice(0,8)+'_COM_'+Date.now();
    const {error} = await sb.from('bills').insert({...billData, id, votes_yes:0,votes_no:0,votes_abstain:0,created_at:new Date().toISOString()});
    if(!error){
      await sb.from('pending_bills').update({pending:false}).eq('id',bill.id);
      setPending(prev=>prev.filter(b=>b.id!==bill.id));
      setBills(prev=>[{...billData,id,votes_yes:0,votes_no:0,votes_abstain:0},...prev]);
      onToast('Bill approved and is now live!');
    } else onToast('Error: '+error.message);
  };

  const reject = async(bill) => {
    if(!window.confirm('Reject and remove "'+bill.title+'"?')) return;
    await sb.from('pending_bills').update({pending:false}).eq('id',bill.id);
    setPending(prev=>prev.filter(b=>b.id!==bill.id));
    onToast('Submission rejected and removed.');
  };

  if(loading) return null;
  if(!pending.length) return null;

  return h('div',{style:{background:'#fff8e7',border:'2px solid #f0c040',borderRadius:10,padding:18,marginBottom:20}},
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#1a1a2e',marginBottom:4}},
      '⏳ Community Submissions Awaiting Review ('+pending.length+')'
    ),
    h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginBottom:14}},
      'These were submitted by residents. Approve to make live, or reject to remove.'
    ),
    pending.map(bill=>{
      const cosigners = (()=>{try{return JSON.parse(bill.cosigners||'[]');}catch(e){return [];}})();
      return h('div',{key:bill.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:10}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}},
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap'}},
              h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,textTransform:'uppercase'}},bill.level),
              h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,padding:'2px 8px',borderRadius:20}},bill.jurisdiction),
              h('span',{style:{background:'#e8f2fa',color:'#1a5c8a',fontSize:10,padding:'2px 8px',borderRadius:20}},cosigners.length+' co-signer'+(cosigners.length===1?'':'s'))
            ),
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:3}},bill.title),
            h('div',{style:{fontSize:12,color:'#aaa',marginBottom:6}},'Submitted by '+bill.submitted_by_name),
            h('div',{style:{fontSize:12,color:'#555',lineHeight:1.5}},bill.summary),
            bill.source_url&&h('div',{style:{marginTop:6}},
              h('a',{href:bill.source_url,target:'_blank',style:{fontSize:11,color:'#1a5c8a'}},'View source ->')
            )
          ),
          h('div',{style:{display:'flex',flexDirection:'column',gap:8,flexShrink:0}},
            h('button',{onClick:()=>approve(bill),style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'8px 16px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'✅ Approve'),
            h('button',{onClick:()=>reject(bill),style:{background:'#c0392b',color:'#fff',border:'none',padding:'8px 16px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'❌ Reject')
          )
        )
      );
    })
  );
}

// ── Bill Sub-Sections Voting ──────────────────────────────────────────────────
function BillSections({bill, user, onRepGain}) {
  const [sections, setSections] = useState(null);
  const [loading, setLoading] = useState(false);
  const [votes, setVotes] = useState({});
  const [open, setOpen] = useState(false);

  const loadSections = async() => {
    // Check DB first
    const {data} = await sb.from('bill_sections').select('*').eq('bill_id', bill.id).order('position');
    if(data && data.length) { setSections(data); return; }
    // Generate with AI
    setLoading(true);
    try {
      const res = await fetch(AI_PROXY, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:800,
          system:'Break this bill into distinct votable sections. Return ONLY valid JSON array, no markdown. Each section: {"title":"short plain title","summary":"1-2 sentences what this part does","position":1}. 3-7 sections max. Only create sections if the bill genuinely has distinct separable parts worth voting on individually.',
          messages:[{role:'user',content:'Bill: '+bill.title+'\n\nSummary: '+bill.summary+'\n\nFull text: '+(bill.full_text||bill.summary)+'\n\nBreak into distinct votable sections.'}]
        })
      });
      const json = await res.json();
      const raw = json.content?.find(b=>b.type==='text')?.text||'[]';
      const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
      if(parsed.length > 0) {
        // Save to DB
        const toInsert = parsed.map(s=>({...s, bill_id:bill.id, votes_yes:0, votes_no:0, votes_abstain:0, ai_generated:true, confirmed:false}));
        const {data:saved} = await sb.from('bill_sections').insert(toInsert).select();
        setSections(saved||parsed);
      }
    } catch(e) { setSections([]); }
    setLoading(false);
  };

  const voteOnSection = async(sectionId, choice) => {
    if(!user) return;
    if(votes[sectionId]) return;
    setVotes(v=>({...v,[sectionId]:choice}));
    setSections(prev=>prev.map(s=>s.id===sectionId?{...s,['votes_'+choice]:s['votes_'+choice]+1}:s));
    await sb.from('bill_section_votes').insert({section_id:sectionId, bill_id:bill.id, user_id:user.id, choice});
    if(onRepGain) onRepGain(2);
  };

  const loadUserVotes = async() => {
    if(!user||!sections) return;
    const ids = sections.map(s=>s.id).filter(Boolean);
    if(!ids.length) return;
    const {data} = await sb.from('bill_section_votes').select('*').eq('user_id',user.id).in('section_id',ids);
    if(data) { const v={}; data.forEach(d=>v[d.section_id]=d.choice); setVotes(v); }
  };

  useEffect(()=>{ if(sections) loadUserVotes(); },[sections]);

  if(!open) return h('button',{
    onClick:()=>{setOpen(true);if(!sections)loadSections();},
    style:{width:'100%',background:'#f0ebf8',border:'1px solid #c8b8e8',borderRadius:7,padding:'10px 14px',
      fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#5b3a8c',cursor:'pointer',marginTop:10,textAlign:'left'}
  },'🗂 Vote on Individual Sections of This Bill');

  return h('div',{style:{marginTop:10,border:'1px solid #c8b8e8',borderRadius:10,overflow:'hidden'}},
    h('div',{style:{background:'#5b3a8c',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:'#fff',fontSize:14}},'🗂 Section-by-Section Vote'),
      h('button',{onClick:()=>setOpen(false),style:{background:'transparent',border:'none',color:'rgba(255,255,255,.6)',cursor:'pointer',fontSize:16}},'x')
    ),
    h('div',{style:{padding:14,background:'#faf8ff'}},
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#888',fontStyle:'italic'}},
        h('div',{className:'spin',style:{marginBottom:8}}), 'AI is identifying the key sections...'
      ),
      sections&&sections.length===0&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa',fontStyle:'italic'}},
        'This bill does not have distinct separable sections to vote on individually.'
      ),
      sections&&sections.length>0&&h('div',null,
        h('div',{style:{fontSize:12,color:'#888',marginBottom:12,fontFamily:"'Lora',serif",lineHeight:1.6}},
          'Vote on each part independently. Your section votes are separate from your overall bill vote. +2 rep per section vote.'
        ),
        sections.map((s,i)=>{
          const total=(s.votes_yes||0)+(s.votes_no||0)+(s.votes_abstain||0);
          const myVote=votes[s.id];
          const pctYes=total?Math.round(s.votes_yes/total*100):0;
          const pctNo=total?Math.round(s.votes_no/total*100):0;
          return h('div',{key:s.id||i,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:10}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:4}},
              (i+1)+'. '+s.title
            ),
            h('p',{style:{fontSize:13,color:'#555',fontFamily:"'Lora',serif",lineHeight:1.6,marginBottom:10}},s.summary),
            !myVote
              ? h('div',{style:{display:'flex',gap:6}},
                  ['yes','no','abstain'].map(v=>h('button',{key:v,onClick:()=>voteOnSection(s.id,v),
                    style:{flex:1,background:v==='yes'?'#1a6b3c':v==='no'?'#c0392b':'#777',color:'#fff',
                      border:'none',borderRadius:5,padding:'7px',fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}
                  },v==='yes'?'✅ Support':v==='no'?'❌ Oppose':'⬜ Abstain'))
                )
              : h('div',null,
                  h('div',{style:{fontSize:12,color:'#1a6b3c',fontWeight:600,marginBottom:6}},
                    'Your vote: '+(myVote==='yes'?'✅ Support':myVote==='no'?'❌ Oppose':'⬜ Abstain')
                  ),
                  total>0&&h('div',null,
                    h('div',{style:{height:6,background:'#eee',borderRadius:3,overflow:'hidden',marginBottom:4}},
                      h('div',{style:{width:pctYes+'%',height:'100%',background:'#1a6b3c',display:'inline-block'}}),
                      h('div',{style:{width:pctNo+'%',height:'100%',background:'#c0392b',display:'inline-block'}})
                    ),
                    h('div',{style:{fontSize:11,color:'#aaa'}},pctYes+'% support · '+pctNo+'% oppose · '+total+' votes')
                  )
                )
          );
        })
      )
    )
  );
}

// ── Ideas Tab ─────────────────────────────────────────────────────────────────
const IDEA_CATS = ['Roads & Infrastructure','Parks & Public Spaces','Safety','Environment','Economic Development','Schools & Youth','Health & Wellness','Other'];
const IDEA_THRESHOLD = 10;

function IdeasTab({user, profile, rep, onToast}) {
  const [ideas, setIdeas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [catFilter, setCatFilter] = useState('all');
  const [form, setForm] = useState({title:'',description:'',category:'Roads & Infrastructure',location:'',target_official:''});
  const [saving, setSaving] = useState(false);
  const [upvoted, setUpvoted] = useState({});
  const set = k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  useEffect(()=>{
    sb.from('community_ideas').select('*').order('upvotes',{ascending:false})
      .then(({data})=>{ setIdeas(data||[]); setLoading(false); });
    if(user) sb.from('idea_upvotes').select('idea_id').eq('user_id',user.id)
      .then(({data})=>{ if(data){const v={};data.forEach(d=>v[d.idea_id]=true);setUpvoted(v);}});
  },[]);

  const submit = async()=>{
    if(!form.title.trim()||!form.description.trim()){onToast('Title and description required.');return;}
    setSaving(true);
    const idea = {
      ...form,
      submitted_by_id:user.id,
      submitted_by_name:profile?.display_name||user.email?.split('@')[0],
      upvotes:1,
      forwarded:false,
      created_at:new Date().toISOString()
    };
    const {data,error} = await sb.from('community_ideas').insert(idea).select().single();
    if(!error&&data){
      await sb.from('idea_upvotes').insert({idea_id:data.id,user_id:user.id});
      setIdeas(prev=>[data,...prev]);
      setUpvoted(v=>({...v,[data.id]:true}));
      onToast('Idea submitted! Others can now upvote it.');
      setShowAdd(false);
      setForm({title:'',description:'',category:'Roads & Infrastructure',location:'',target_official:''});
    } else onToast('Error submitting. Try again.');
    setSaving(false);
  };

  const upvote = async(idea)=>{
    if(!user){onToast('Sign in to upvote.');return;}
    if(upvoted[idea.id]){onToast('You already upvoted this.');return;}
    const newCount = (idea.upvotes||0)+1;
    setIdeas(prev=>prev.map(i=>i.id===idea.id?{...i,upvotes:newCount}:i));
    setUpvoted(v=>({...v,[idea.id]:true}));
    await sb.from('idea_upvotes').insert({idea_id:idea.id,user_id:user.id});
    await sb.from('community_ideas').update({upvotes:newCount}).eq('id',idea.id);
    // Auto-forward if threshold hit
    if(newCount>=IDEA_THRESHOLD && !idea.forwarded){
      forwardIdea({...idea,upvotes:newCount});
    }
  };

  const forwardIdea = async(idea)=>{
    const letter = `Dear ${idea.target_official||'Local Official'},\n\nA community idea on The People's Voice civic platform has reached ${IDEA_THRESHOLD} verified resident upvotes and is being formally forwarded to you:\n\n"${idea.title}"\n\n${idea.description}\n\nLocation: ${idea.location||'Jackson County'}\nCategory: ${idea.category}\nUpvotes: ${idea.upvotes} verified residents\n\nThis reflects genuine community priorities. We respectfully request your consideration.\n\nSincerely,\nThe People's Voice Community\nthekiltedfarmer.github.io`;
    await sb.from('community_ideas').update({forwarded:true,forwarded_letter:letter}).eq('id',idea.id);
    setIdeas(prev=>prev.map(i=>i.id===idea.id?{...i,forwarded:true}:i));
    onToast('🎉 This idea has been forwarded to local leadership!');
  };

  const filtered = catFilter==='all'?ideas:ideas.filter(i=>i.category===catFilter);

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},'💡 Community Ideas'),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:2}},'Suggest local improvements. '+IDEA_THRESHOLD+' upvotes = forwarded to your official.')
      ),
      user&&h('button',{onClick:()=>setShowAdd(!showAdd),
        style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'10px 18px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}
      },'+ Share an Idea')
    ),

    // How it works banner
    h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13,fontFamily:"'Lora',serif",color:'#8a6000',lineHeight:1.7}},
      '💡 ',h('strong',null,'How it works:'),' Any verified resident can suggest a local improvement. Others upvote ideas they support. When an idea reaches ',h('strong',null,IDEA_THRESHOLD+' upvotes'),', it\'s automatically packaged into a letter and forwarded to the relevant local official.'
    ),

    // Add form
    showAdd&&h('div',{style:{background:'#fff',border:'2px solid #1a6b3c',borderRadius:12,padding:20,marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#1a1a2e',marginBottom:14}},'Share a Community Idea'),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Title *'),
        h('input',{value:form.title,onChange:set('title'),placeholder:'e.g. Fix the pothole on Michigan Ave near 4th St',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box'}})
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Description *'),
        h('textarea',{value:form.description,onChange:set('description'),rows:3,
          placeholder:'Describe the problem and what you\'d like to see done. Be specific.',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box',resize:'vertical'}})
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
        h('div',null,
          h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Category'),
          h('select',{value:form.category,onChange:set('category'),style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13}},
            IDEA_CATS.map(c=>h('option',{key:c,value:c},c))
          )
        ),
        h('div',null,
          h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Location'),
          h('input',{value:form.location,onChange:set('location'),placeholder:'Street, neighborhood, or area',
            style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box'}})
        )
      ),
      h('div',{style:{marginBottom:12}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Who should receive this? (optional)'),
        h('input',{value:form.target_official,onChange:set('target_official'),placeholder:'e.g. Jackson City Council, Village of Concord, Summit Township Board',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box'}})
      ),
      h('div',{style:{background:'#e8f5ee',borderRadius:7,padding:'8px 12px',marginBottom:12,fontSize:12,color:'#1a6b3c'}},'✅ Your idea will be visible immediately. Reach '+IDEA_THRESHOLD+' upvotes and it gets forwarded to leadership automatically.'),
      h('div',{style:{display:'flex',gap:10}},
        h('button',{onClick:submit,disabled:saving,style:{background:saving?'#ccc':'#1a6b3c',color:'#fff',border:'none',padding:'11px 20px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,cursor:'pointer'}},saving?'Submitting...':'Submit Idea'),
        h('button',{onClick:()=>setShowAdd(false),style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',padding:'11px 16px',borderRadius:7,cursor:'pointer'}},'Cancel')
      )
    ),

    // Category filters
    h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}},
      [['all','All'],...IDEA_CATS.map(c=>[c,c])].map(([v,l])=>
        h('button',{key:v,onClick:()=>setCatFilter(v),
          style:{background:catFilter===v?'#1a6b3c':'#fff',color:catFilter===v?'#fff':'#555',
            border:'1px solid '+(catFilter===v?'#1a6b3c':'#ddd'),padding:'5px 11px',borderRadius:20,
            fontFamily:"'Lora',serif",fontSize:12,cursor:'pointer'}
        },l)
      )
    ),

    loading&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},'Loading ideas...'),
    !loading&&filtered.length===0&&h('div',{style:{textAlign:'center',padding:40}},
      h('div',{style:{fontSize:40,marginBottom:12}},'💡'),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:'#1a1a2e',marginBottom:6}},'No ideas yet'),
      h('div',{style:{color:'#aaa',fontSize:13}},'Be the first to suggest a local improvement.')
    ),

    filtered.map(idea=>{
      const pct=Math.min(100,Math.round((idea.upvotes||0)/IDEA_THRESHOLD*100));
      const hasVoted=upvoted[idea.id];
      return h('div',{key:idea.id,style:{background:'#fff',border:'1px solid '+(idea.forwarded?'#1a6b3c':'#e5dece'),borderRadius:10,padding:'14px 16px',marginBottom:10}},
        h('div',{style:{display:'flex',gap:12,alignItems:'flex-start'}},
          // Upvote button
          h('div',{style:{textAlign:'center',flexShrink:0}},
            h('button',{onClick:()=>upvote(idea),disabled:hasVoted,
              style:{background:hasVoted?'#eef7f1':'#fff',border:'2px solid '+(hasVoted?'#1a6b3c':'#ddd'),
                borderRadius:8,padding:'8px 12px',cursor:hasVoted?'default':'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2}
            },
              h('div',{style:{fontSize:18}},hasVoted?'✅':'👍'),
              h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:hasVoted?'#1a6b3c':'#1a1a2e'}},idea.upvotes||0),
              h('div',{style:{fontSize:9,color:'#aaa',textTransform:'uppercase',letterSpacing:1}},'votes')
            )
          ),
          h('div',{style:{flex:1}},
            h('div',{style:{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap',alignItems:'center'}},
              h('span',{style:{background:'#f0ebf8',color:'#5b3a8c',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20}},idea.category),
              idea.location&&h('span',{style:{fontSize:11,color:'#888'}},'📍 '+idea.location),
              idea.forwarded&&h('span',{style:{background:'#eef7f1',color:'#1a6b3c',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20}},'✅ Forwarded to Officials')

function ResourceApprovalQueue({onToast}) {
  const [pending, setPending] = useState([]);
  useEffect(()=>{
    sb.from('community_resources').select('*').eq('approved',false).order('created_at',{ascending:false})
      .then(({data})=>setPending(data||[]));
  },[]);
  const approve = async(r)=>{
    await sb.from('community_resources').update({approved:true}).eq('id',r.id);
    setPending(p=>p.filter(x=>x.id!==r.id));
    onToast('Resource approved and live!');
  };
  const reject = async(r)=>{
    if(!window.confirm('Remove "'+r.name+'"?')) return;
    await sb.from('community_resources').delete().eq('id',r.id);
    setPending(p=>p.filter(x=>x.id!==r.id));
    onToast('Resource removed.');
  };
  if(!pending.length) return null;
  return h('div',{style:{background:'#e8f2fa',border:'1px solid #c8d8f0',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:10}},
      '📚 Resources Awaiting Approval ('+pending.length+')'
    ),
    pending.map(r=>h('div',{key:r.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:7,padding:'10px 14px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center',gap:10,flexWrap:'wrap'}},
      h('div',{style:{flex:1}},
        h('div',{style:{fontWeight:700,fontSize:14,color:'#1a1a2e'}},r.name),
        h('div',{style:{fontSize:12,color:'#888'}},'Submitted by '+r.submitted_by_name+' • '+r.category),
        h('div',{style:{fontSize:12,color:'#555',marginTop:4}},r.description)
      ),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:()=>approve(r),style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'✅ Approve'),

// ── Official Manager (Admin) ──────────────────────────────────────────────────
function OfficialManager({onToast}) {
  const [officials, setOfficials] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [colMissing, setColMissing] = useState(false);

  useEffect(()=>{
    // Try to load officials - gracefully handle missing column
    sb.from('profiles').select('id,display_name,email,is_official,official_title,zip')
      .eq('is_official',true).order('display_name')
      .then(({data,error})=>{
        if(error && error.message && error.message.includes('is_official')) {
          setColMissing(true);
        } else {
          setOfficials(data||[]);
        }
        setLoading(false);
      })
      .catch(()=>{ setColMissing(true); setLoading(false); });
  },[]);

  const searchUsers = async()=>{
    if(!search.trim()) return;
    setSearching(true);
    try {
      // Search by display_name OR email
      const q = search.trim();
      const {data:byName} = await sb.from('profiles')
        .select('id,display_name,email,is_official,official_title,zip')
        .ilike('display_name','%'+q+'%').limit(10);
      const {data:byEmail} = await sb.from('profiles')
        .select('id,display_name,email,is_official,official_title,zip')
        .ilike('email','%'+q+'%').limit(5);
      const all = [...(byName||[]),...(byEmail||[])];
      const seen = new Set();
      const deduped = all.filter(r=>{ if(seen.has(r.id)) return false; seen.add(r.id); return true; });
      setResults(deduped);
      if(deduped.length===0) onToast('No users found. Try their email address.');
    } catch(e) {
      onToast('Search failed. Check Supabase column exists.');
    }
    setSearching(false);
  };

  const grantOfficial = async(profile)=>{
    const t = window.prompt('Enter their official title:\ne.g. "Ward 3 Council Member, City of Jackson"');
    if(!t||!t.trim()) return;
    try {
      const {error} = await sb.from('profiles').update({is_official:true,official_title:t.trim()}).eq('id',profile.id);
      if(error) throw error;
      const updated = {...profile,is_official:true,official_title:t.trim()};
      setOfficials(prev=>[...prev.filter(o=>o.id!==profile.id),updated]);
      setResults(prev=>prev.map(r=>r.id===profile.id?updated:r));
      onToast('Official badge granted to '+(profile.display_name||profile.email));
    } catch(e) {
      onToast('Error: '+(e.message||'Could not grant badge. Run the column SQL first.'));
    }
  };

  const revokeOfficial = async(profile)=>{
    if(!window.confirm('Remove badge from '+(profile.display_name||profile.email)+'?')) return;
    await sb.from('profiles').update({is_official:false,official_title:null}).eq('id',profile.id);
    setOfficials(prev=>prev.filter(o=>o.id!==profile.id));
    onToast('Badge removed.');
  };

  return h('div',{style:{background:'#e8f2fa',border:'1px solid #c8d8f0',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:open?14:0,cursor:'pointer'},onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e'}},
        '🏛 Verified Officials ('+officials.length+')'      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')    ),
    open&&h('div',null,
      colMissing&&h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'12px 14px',marginBottom:12,fontSize:13,color:'#8a6000'}},
        '⚠️ Run this SQL in Supabase first: ',
        h('code',{style:{display:'block',marginTop:6,background:'#f5f5f5',padding:'8px 10px',borderRadius:4,fontSize:11,color:'#333'}},
          'alter table public.profiles add column if not exists is_official boolean default false;\nalter table public.profiles add column if not exists official_title text;'
        )
      ),
      !colMissing&&officials.length>0&&h('div',{style:{marginBottom:16}},
        h('div',{style:{fontSize:12,color:'#888',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'Current Verified Officials'),
        officials.map(o=>h('div',{key:o.id,style:{background:'#fff',border:'1px solid #c8d8f0',borderRadius:7,padding:'10px 12px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
          h('div',null,
            h('div',{style:{fontWeight:700,fontSize:13,color:'#1a1a2e',display:'flex',alignItems:'center',gap:6}},
              o.display_name||o.email,
              h(OfficialBadge,{title:o.official_title,small:true})
            ),
            h('div',{style:{fontSize:11,color:'#888',marginTop:2}},o.official_title),
            o.email&&h('div',{style:{fontSize:11,color:'#1a5c8a'}},o.email)
          ),
          h('button',{onClick:()=>revokeOfficial(o),
            style:{background:'transparent',border:'1px solid #ddd',color:'#c0392b',padding:'5px 10px',borderRadius:5,fontSize:11,cursor:'pointer'}          },'Remove Badge')        ))      ),
      !colMissing&&officials.length===0&&h('div',{style:{fontSize:13,color:'#aaa',fontStyle:'italic',marginBottom:12}},'No verified officials yet.'),
      !colMissing&&h('div',null,
        h('div',{style:{fontSize:12,color:'#888',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'Grant Official Badge'),
        h('div',{style:{fontSize:12,color:'#888',marginBottom:8}},'Search by name or email address:'),
        h('div',{style:{display:'flex',gap:8,marginBottom:10}},
          h('input',{value:search,onChange:e=>setSearch(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&searchUsers(),
            placeholder:'Name or email...',
            style:{flex:1,border:'1px solid #ddd',borderRadius:6,padding:'8px 11px',fontSize:13}}),
          h('button',{onClick:searchUsers,disabled:searching,
            style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'8px 16px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}          },searching?'...':'Search')        ),
        results.length===0&&search.trim()&&!searching&&h('div',{style:{fontSize:12,color:'#aaa',fontStyle:'italic',marginBottom:8}},'No users found. Try searching by email address.'),
        results.map(r=>h('div',{key:r.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:7,padding:'10px 12px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
          h('div',null,
            h('div',{style:{fontWeight:700,fontSize:13,color:'#1a1a2e'}},r.display_name||'(no name)'),
            r.email&&h('div',{style:{fontSize:11,color:'#888'}},r.email),
            r.is_official&&h('div',{style:{fontSize:11,color:'#1a5c8a',fontWeight:600}},'Already verified: '+r.official_title)
          ),
          !r.is_official
            ? h('button',{onClick:()=>grantOfficial(r),
                style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}              },'🏛 Grant Badge')            : h('button',{onClick:()=>revokeOfficial(r),
                style:{background:'transparent',border:'1px solid #ddd',color:'#c0392b',padding:'7px 12px',borderRadius:5,fontSize:12,cursor:'pointer'}              },'Remove')        ))      )    )  );}
