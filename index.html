  };

  const selectUser = (u)=>{
    setSelected(u);
    setEditing({
      display_name: u.display_name||'',
      zip: u.zip||'',
      reputation: u.reputation||0,
      is_admin: u.is_admin||false,
      show_in_directory: u.show_in_directory!==false,
    });
  };

  const saveUser = async()=>{
    if(!selected) return;
    setSaving(true);
    const updates = {
      display_name: editing.display_name.trim()||selected.display_name,
      zip: editing.zip.trim(),
      reputation: Math.max(0,Math.min(9999,parseInt(editing.reputation)||0)),
      is_admin: editing.is_admin,
      show_in_directory: editing.show_in_directory,
    };
    const {error} = await sb.from('profiles').update(updates).eq('id',selected.id);
    if(!error) {
      onToast('✅ User updated successfully.');
      setSelected({...selected,...updates});
      setResults(prev=>prev.map(u=>u.id===selected.id?{...u,...updates}:u));
    } else {
      onToast('❌ Error: '+error.message);
    }
    setSaving(false);
  };

  const confirmEmail = async()=>{
    // Confirm email via profiles update (marks as verified)
    const {error} = await sb.from('profiles').update({email_confirmed:true}).eq('id',selected.id);
    if(!error) onToast('✅ Profile marked as verified. Note: to fully confirm auth email, use Supabase Dashboard > Auth > Users.');
    else onToast('Tip: Go to Supabase Dashboard > Authentication > Users > find user > click "Send confirmation email" or manually confirm.');
  };

  const resetReputation = async()=>{
    if(!window.confirm('Reset '+selected.display_name+'\'s reputation to 0?')) return;
    const {error} = await sb.from('profiles').update({reputation:0,badges:[]}).eq('id',selected.id);
    if(!error) { onToast('Reputation reset to 0.'); setEditing(e=>({...e,reputation:0})); }
  };

  const field = (label, key, type='text')=>h('div',{style:{marginBottom:10}},
    h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},label),
    type==='checkbox'
      ? h('label',{style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}},
          h('input',{type:'checkbox',checked:!!editing[key],
            onChange:e=>setEditing(v=>({...v,[key]:e.target.checked})),
            style:{width:16,height:16,cursor:'pointer'}}),
          h('span',{style:{fontSize:13,color:'#333',fontFamily:"'Lora',serif"}},editing[key]?'Yes':'No')
        )
      : h('input',{type,value:editing[key]??'',
          onChange:e=>setEditing(v=>({...v,[key]:type==='number'?e.target.value:e.target.value})),
          style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'8px 10px',
            fontSize:13,boxSizing:'border-box',fontFamily:"'Lora',serif"}})
  );

  return h('div',{style:{background:'#e8f2fa',border:'1px solid #c8d8f0',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',marginBottom:open?14:0},
      onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',display:'flex',alignItems:'center',gap:8}},
        '👥 User Manager'
      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')
    ),

    open&&h('div',null,
      // Search
      h('div',{style:{display:'flex',gap:8,marginBottom:12}},
        h('input',{value:search,onChange:e=>setSearch(e.target.value),
          onKeyDown:e=>e.key==='Enter'&&searchUsers(),
          placeholder:'Search by email or display name...',
          style:{flex:1,border:'1px solid #ddd',borderRadius:6,padding:'9px 12px',fontSize:13,fontFamily:"'Lora',serif"}}),
        h('button',{onClick:searchUsers,disabled:loading||!search.trim(),
          style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'9px 18px',borderRadius:6,
            fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}
        },loading?'Searching...':'Search')
      ),

      // Results list
      results.length>0&&h('div',{style:{marginBottom:12}},
        h('div',{style:{fontSize:11,color:'#888',marginBottom:6,textTransform:'uppercase',letterSpacing:1}},results.length+' result'+(results.length!==1?'s':'')+' — click to manage'),
        results.map(u=>h('div',{key:u.id,
          onClick:()=>selectUser(u),
          style:{background:selected?.id===u.id?'#1a1a2e':'#fff',
            color:selected?.id===u.id?'#f0c040':'#333',
            border:'1px solid '+(selected?.id===u.id?'#1a1a2e':'#ddd'),
            borderRadius:7,padding:'10px 12px',marginBottom:6,cursor:'pointer',
            display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',null,
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13}},
              u.display_name||'(no name)'
            ),
            h('div',{style:{fontSize:11,color:selected?.id===u.id?'#aab':'#888',marginTop:2}},
              u.email+' · ZIP: '+(u.zip||'none')+' · '+u.reputation+' rep'+(u.is_admin?' · 🔐 Admin':'')
            )
          ),
          h('span',{style:{fontSize:11,color:selected?.id===u.id?'#f0c040':'#aaa'}},
            selected?.id===u.id?'Selected ▶':'Edit →'
          )
        ))
      ),

      results.length===0&&search.trim()&&!loading&&
        h('div',{style:{fontSize:13,color:'#888',fontStyle:'italic',marginBottom:12}},'No users found for "'+search+'"'),

      // Edit panel
      selected&&h('div',{style:{background:'#fff',border:'2px solid #1a5c8a',borderRadius:8,padding:16}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15,color:'#1a1a2e',marginBottom:4}},
          'Editing: '+(selected.display_name||selected.email)
        ),
        h('div',{style:{fontSize:11,color:'#aaa',marginBottom:14,fontFamily:"'Lora',serif"}},
          'User ID: '+selected.id
        ),

        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
          h('div',null, field('Display Name','display_name')),
          h('div',null, field('ZIP Code','zip')),
          h('div',null, field('Reputation (0–9999)','reputation','number')),
          h('div',null,
            h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Is Admin'),
            h('label',{style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer',marginTop:8}},
              h('input',{type:'checkbox',checked:!!editing.is_admin,
                onChange:e=>setEditing(v=>({...v,is_admin:e.target.checked})),
                style:{width:16,height:16,cursor:'pointer'}}),
              h('span',{style:{fontSize:13,color:'#333',fontFamily:"'Lora',serif"}},editing.is_admin?'Yes — Admin access':'No — Regular user')
            )
          ),
          h('div',null,
            h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Show in Directory'),
            h('label',{style:{display:'flex',alignItems:'center',gap:8,cursor:'pointer',marginTop:8}},
              h('input',{type:'checkbox',checked:!!editing.show_in_directory,
                onChange:e=>setEditing(v=>({...v,show_in_directory:e.target.checked})),
                style:{width:16,height:16,cursor:'pointer'}}),
              h('span',{style:{fontSize:13,color:'#333',fontFamily:"'Lora',serif"}},editing.show_in_directory?'Visible':'Hidden')
            )
          )
        ),

        // Quick action buttons
        h('div',{style:{background:'#f5f3ee',borderRadius:6,padding:'10px 12px',marginBottom:12}},
          h('div',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'Quick Actions'),
          h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
            h('button',{onClick:confirmEmail,
              style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,
                fontSize:12,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:700}
            },'✉️ Email Confirmation Help'),
            h('button',{onClick:resetReputation,
              style:{background:'#c0392b',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,
                fontSize:12,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:700}
            },'🔄 Reset Reputation'),
            h('button',{
              onClick:()=>{
                const info = 'User: '+(selected.display_name||'N/A')+'\nEmail: '+selected.email+'\nID: '+selected.id+'\nZIP: '+(selected.zip||'none')+'\nRep: '+selected.reputation+'\nAdmin: '+(selected.is_admin?'Yes':'No')+'\nJoined: '+new Date(selected.created_at).toLocaleDateString();
                navigator.clipboard&&navigator.clipboard.writeText(info);
                onToast('User info copied to clipboard');
              },
              style:{background:'#555',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,
                fontSize:12,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:700}
            },'📋 Copy User Info')
          )
        ),

        h('div',{style:{background:'#fff8e7',borderRadius:6,padding:'8px 12px',marginBottom:12,fontSize:11,color:'#8a6000',lineHeight:1.6}},
          '⚠️ To fully confirm a user\'s email (fix login issues), go to ',
          h('strong',null,'Supabase Dashboard → Authentication → Users'),
          ' → find the user → click the menu → "Send confirmation email" or delete and re-invite.'
        ),

        h('div',{style:{display:'flex',gap:10}},
          h('button',{onClick:saveUser,disabled:saving,
            style:{flex:1,background:saving?'#ccc':'#1a6b3c',color:'#fff',border:'none',
              padding:'11px',borderRadius:7,fontFamily:"'Playfair Display',serif",
              fontWeight:900,fontSize:14,cursor:'pointer'}
          },saving?'Saving...':'Save Changes'),
          h('button',{onClick:()=>setSelected(null),
            style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',
              padding:'11px 18px',borderRadius:7,fontSize:13,cursor:'pointer'}
          },'Cancel')
        )
      )
    )
  );
}

// ── Admin Panel ───────────────────────────────────────────────────────────────
const LEVELS = ['village','city','township','state','federal','county'];
const JURISDICTIONS = [
  'Village of Concord','City of Jackson','Summit Township','Columbia Township',
  'Napoleon Township','Grass Lake Township','Spring Arbor Township','Leoni Township',
  'Blackman Township','Rives Township','Henrietta Township','Waterloo Township',
  'Norvell Township','Hanover Township','Springport Township','Liberty Township',
  'Pulaski Township','Sandstone Township','Tompkins Township','Concord Township',
  'Jackson County','State of Michigan','Federal',
];

function AdminPanel({bills,setBills,onToast,user,profile}) {
  // Admin access is granted via is_admin flag on the profile — no password in source code
  const isAdmin = profile?.is_admin === true;
  const [authed,setAuthed]=useState(isAdmin);

  // Re-check if profile loads after mount
  useEffect(()=>{ if(isAdmin) setAuthed(true); },[isAdmin]);
  const [view,setView]=useState('list'); // list | add | edit
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [deleting,setDeleting]=useState(null);

  const EMPTY = {id:'',level:'city',jurisdiction:'City of Jackson',title:'',status:'',introduced:'',sponsor:'',summary:'',full_text:'',votes_yes:0,votes_no:0,votes_abstain:0,created_at:'2025-01-01'};
  const [form,setForm]=useState(EMPTY);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const [sourceUrl,setSourceUrl]=useState('');
  const [fetching,setFetching]=useState(false);
  const [fetchMsg,setFetchMsg]=useState('');

  const fetchFromUrl=async()=>{
    if(!sourceUrl.trim()){setFetchMsg('Please enter a URL first.');return;}
    setFetching(true);setFetchMsg('Fetching page...');
    try{
      // Use a CORS proxy to fetch the government page
      const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(sourceUrl);
      const res=await fetch(proxy);
      const json=await res.json();
      const raw=json.contents||'';
      // Strip HTML tags to get readable text
      const text=raw.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
                    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
                    .replace(/<[^>]+>/g,' ')
                    .replace(/\s+/g,' ')
                    .trim()
                    .slice(0,6000);
      if(!text||text.length<100){setFetchMsg('Could not read that page. Try pasting the text manually.');setFetching(false);return;}
      setFetchMsg('Analyzing with AI...');
      const aiRes=await fetch(AI_PROXY,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:'You are a civic data extractor. Extract bill/proposal information from government website text and return ONLY valid JSON with no markdown. If you cannot find a specific field, use an empty string. Schema: {"title":"full bill or proposal title","level":"one of: village, city, township, county, state, federal","jurisdiction":"the specific government body e.g. City of Jackson or Village of Concord","status":"current status e.g. Council Vote Pending or Passed or Under Review","introduced":"date introduced if found","sponsor":"sponsor or author name if found","summary":"2-3 plain English sentences describing what this proposal does","full_text":"key text from the proposal plus the source URL"}',
          messages:[{role:'user',content:'Extract bill information from this government page (source: '+sourceUrl+'):\n\n'+text}]
        })
      });
      const aiJson=await aiRes.json();
      const aiRaw=aiJson.content?.find(b=>b.type==='text')?.text||'{}';
      const extracted=JSON.parse(aiRaw.replace(/```json|```/g,'').trim());
      // Merge extracted data into form, append source URL to full_text
      setForm(f=>({
        ...f,
        title:extracted.title||f.title,
        level:extracted.level||f.level,
        jurisdiction:extracted.jurisdiction||f.jurisdiction,
        status:extracted.status||f.status,
        introduced:extracted.introduced||f.introduced,
        sponsor:extracted.sponsor||f.sponsor,
        summary:extracted.summary||f.summary,
        full_text:(extracted.full_text||f.full_text)+'\n\nSource: '+sourceUrl,
      }));
      setFetchMsg('✅ Fields filled in! Review everything below before publishing.');
    }catch(e){
      setFetchMsg('❌ Could not fetch that page. Try a different URL, or fill in the form manually.');
    }
    setFetching(false);
  };

  const openAdd=()=>{setForm(EMPTY);setEditing(null);setView('add');setSourceUrl('');setFetchMsg('');};
  const openEdit=(bill)=>{setForm({...bill});setEditing(bill.id);setView('edit');setSourceUrl('');setFetchMsg('');};

  const genId=()=>{
    const slug=form.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,20);
    const jurisSlug=form.jurisdiction.split(' ')[0].toUpperCase().slice(0,8);
    return jurisSlug+'-'+new Date().getFullYear()+'-'+slug.slice(0,12).replace(/-$/,'');
  };

  const saveBill=async()=>{
    if(!form.title.trim()||!form.summary.trim()||!form.jurisdiction){
      onToast('Please fill in Title, Summary, and Jurisdiction.');return;
    }
    setSaving(true);
    const billData={
      ...form,
      id:editing||genId(),
      votes_yes:parseInt(form.votes_yes)||0,
      votes_no:parseInt(form.votes_no)||0,
      votes_abstain:parseInt(form.votes_abstain)||0,
    };
    const {error}=await sb.from('bills').upsert(billData,{onConflict:'id'});
    if(error){onToast('Error saving: '+error.message);}
    else{
      setBills(prev=>editing?prev.map(b=>b.id===editing?billData:b):[billData,...prev]);
      onToast(editing?'Bill updated!':'Bill added! It\'s now live for the community.');
      setView('list');
    }
    setSaving(false);
  };

  const deleteBill=async(bill)=>{
    if(!window.confirm('Delete "'+bill.title+'"? This cannot be undone.'))return;
    setDeleting(bill.id);
    await sb.from('user_votes').delete().eq('bill_id',bill.id);
    await sb.from('bill_comments').delete().eq('bill_id',bill.id);
    const {error}=await sb.from('bills').delete().eq('id',bill.id);
    if(error)onToast('Error: '+error.message);
    else{setBills(prev=>prev.filter(b=>b.id!==bill.id));onToast('Bill removed.');}
    setDeleting(null);
  };

  const inp = (label,key,placeholder,type='text',opts={}) =>
    h('div',{style:{marginBottom:12}},
      h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},label),
      opts.textarea?
        h('textarea',{value:form[key],onChange:set(key),placeholder,rows:opts.rows||3,style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box',resize:'vertical'}}):
        h('input',{value:form[key],onChange:set(key),placeholder,type,style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
    );

  const sel = (label,key,options) =>
    h('div',{style:{marginBottom:12}},
      h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},label),
      h('select',{value:form[key],onChange:set(key),style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13}},
        options.map(o=>h('option',{key:o,value:o},o))
      )
    );

  if(!authed) return h('div',{style:{maxWidth:440,margin:'0 auto',padding:32}},
    h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:32,textAlign:'center'}},
      h('div',{style:{fontSize:32,marginBottom:12}},"🔐"),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:'#f0c040',marginBottom:8}},"Admin Access Required"),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#8899aa',marginBottom:20,lineHeight:1.7}},
        "This panel is restricted to authorized administrators only.",
        h('br'),
        h('br'),
        "If you believe you should have access, contact ",
        h('a',{href:'mailto:chef.justinfairchild@gmail.com',style:{color:'#f0c040'}},"the platform admin"),
        "."
      ),
      h('div',{style:{background:'rgba(255,255,255,.05)',borderRadius:8,padding:'12px 16px',fontSize:12,color:'#556677',fontFamily:"'Lora',serif"}},
        "Signed in as: "+(profile?.display_name||user?.email||'Unknown')
      )
    )
  );

  if(view==='list') return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},
          "⚙️ Admin Panel - Bills Manager"
        ),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:3}},
          "Add or update bills for any community. Changes go live immediately."
        )
      ),
      h('button',{onClick:openAdd,style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'10px 20px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14}},
        "+ Add New Bill"
      )
    ),

    // Pending community submissions review queue
    h(UserManager,{onToast}),
    h(OfficialBadgeInbox,{onToast}),
    h(PendingReviewQueue,{onToast,setBills}),
    h(ResourceApprovalQueue,{onToast}),
    h(NominationsInbox,{onToast}),
    h(FeedbackInbox,{onToast}),
    h(OfficialManager,{onToast}),

    h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'12px 16px',marginBottom:16,fontSize:13,fontFamily:"'Lora',serif",color:'#8a6000',lineHeight:1.7}},
      "⚠️ ",h('strong',null,"Admin tips:")," Only add bills with verified, publicly-sourced information. Include the source in the Full Text field. Bills you add go live immediately for all users. Deleting a bill also removes all votes and comments on it - use carefully."
    ),

    bills.map(bill=>h('div',{key:bill.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,marginBottom:10,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}},
      h('div',{style:{flex:1,minWidth:200}},
        h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}},
          h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,textTransform:'uppercase'}},bill.level),
          h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,padding:'2px 8px',borderRadius:20}},bill.jurisdiction),
          h('span',{style:{background:'#fffbea',color:'#8a6000',fontSize:10,padding:'2px 8px',borderRadius:20}},bill.status||'No status')
        ),
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:4}},bill.title),
        h('div',{style:{fontSize:11,color:'#aaa'}},
          "✅ "+bill.votes_yes+" · ❌ "+bill.votes_no+" · ⬜ "+bill.votes_abstain+" · ID: "+bill.id
        )
      ),
      h('div',{style:{display:'flex',gap:8,flexShrink:0}},
        h('button',{onClick:()=>openEdit(bill),style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12}},
          "✏️ Edit"
        ),
        h('button',{onClick:()=>deleteBill(bill),disabled:deleting===bill.id,style:{background:'#c0392b',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12}},
          deleting===bill.id?"...":"🗑 Delete"
        )
      )
    ))
  );

  return h('div',null,
    h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:20}},
      h('button',{onClick:()=>setView('list'),style:{background:'transparent',border:'1px solid #ddd',borderRadius:5,padding:'7px 12px',fontFamily:"'Playfair Display',serif",fontSize:13,color:'#555'}},
        "<- Back to list"
      ),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:18,color:'#1a1a2e'}},
        editing?"Edit Bill":"Add New Bill"
      )
    ),

    // URL Auto-fill section
    h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:20,marginBottom:20}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#f0c040',marginBottom:4}},
        "🔗 Import from a Government Website"
      ),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#8899aa',marginBottom:14,lineHeight:1.6}},
        "Paste a link to any council agenda, meeting minutes, or ordinance page. The AI will read it and fill in the form automatically. You can edit anything before publishing."
      ),
      h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
        h('input',{
          value:sourceUrl,onChange:e=>setSourceUrl(e.target.value),
          placeholder:'e.g. https://villageofconcord.com/agenda or https://cityofjackson.org/...',
          onKeyDown:e=>e.key==='Enter'&&fetchFromUrl(),
          style:{flex:1,minWidth:200,border:'1px solid #444',borderRadius:6,padding:'10px 13px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}
        }),
        h('button',{onClick:fetchFromUrl,disabled:fetching,style:{background:fetching?'#555':'#f0c040',color:'#1a1a2e',border:'none',padding:'10px 20px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:14,whiteSpace:'nowrap'}},
          fetching?'Working...':'Auto-Fill ->'
        )
      ),
      fetchMsg&&h('div',{style:{marginTop:10,fontSize:13,fontFamily:"'Lora',serif",color:fetchMsg.startsWith('✅')?'#6bcf8a':fetchMsg.startsWith('❌')?'#e74c3c':'#f0c040',lineHeight:1.6}},fetchMsg),
      h('div',{style:{marginTop:12,fontSize:11,color:'#556677',lineHeight:1.7}},
        "💡 Works best with: Village of Concord (villageofconcord.com) · City of Jackson (cityofjackson.org) · Jackson County (co.jackson.mi.us) · Michigan Legislature (legislature.mi.gov) · Any public government meeting page"
      )
    ),

    h('div',{style:{background:'#fff',borderRadius:12,border:'1px solid #e5dece',padding:24}},
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}},
        h('div',{style:{paddingRight:12}},sel('Level *','level',LEVELS)),
        h('div',{style:{paddingLeft:12}},sel('Jurisdiction *','jurisdiction',JURISDICTIONS))
      ),
      inp('Bill / Proposal Title *','title','e.g. Main Street Sidewalk Repair Ordinance'),
      inp('Status','status','e.g. Council Vote Pending, Passed, Under Review, Ballot Measure'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}},
        h('div',{style:{paddingRight:12}},inp('Date Introduced','introduced','e.g. March 15, 2025')),
        h('div',{style:{paddingLeft:12}},inp('Sponsor / Author','sponsor','e.g. Councilmember Jane Smith'))
      ),
      inp('Plain-Language Summary *','summary','Describe what this bill does in 2-3 sentences that any resident can understand.',''  ,{textarea:true,rows:3}),
      inp('Full Text / Source','full_text','Paste the full bill text or describe where it can be found. Always include your source.',''  ,{textarea:true,rows:4}),

      h('div',{style:{background:'#f8f6f0',borderRadius:8,padding:'14px 16px',marginBottom:16}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e',marginBottom:10}},
          "Starting Vote Counts (leave at 0 for a fresh bill)"
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}},
          ['yes','no','abstain'].map(k=>
            h('div',{key:k},
              h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},k),
              h('input',{value:form['votes_'+k],onChange:set('votes_'+k),type:'number',min:0,style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box'}})
            )
          )
        )
      ),

      h('div',{style:{background:'#e8f2fa',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:12,color:'#1a5c8a',fontFamily:"'Lora',serif",lineHeight:1.7}},
        "💡 ",h('strong',null,"AI Analysis:")," The AI breakdown will be generated automatically using your Summary and Full Text when a user clicks 'Get AI Analysis'. You don't need to write it manually."
      ),

      h('div',{style:{display:'flex',gap:10}},
        h('button',{onClick:saveBill,disabled:saving,style:{flex:1,background:saving?'#ccc':'#1a6b3c',color:'#fff',border:'none',padding:'13px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15}},
          saving?'Saving...':(editing?'Save Changes ->':'Publish Bill ->')
        ),
        h('button',{onClick:()=>setView('list'),style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',padding:'13px 20px',borderRadius:7,fontSize:14}},
          "Cancel"
        )
      )
    )
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [rep,setRep]=useState(0);
  const [mainTab,setMainTab]=useState('feed');
  const [bills,setBills]=useState([]);
  const [pendingBills,setPendingBills]=useState([]);
  const [projects,setProjects]=useState([]);
  const [billFilter,setBillFilter]=useState('all');
  const [userVotes,setUserVotes]=useState({});
  const [showPropose,setShowPropose]=useState(false);
  const [loading,setLoading]=useState(true);
  const [toast,setToast]=useState(null);
  const [showAdmin,setShowAdmin]=useState(false);
  const [showOnboarding,setShowOnboarding]=useState(false);
  const [showProfile,setShowProfile]=useState(false);
  const [showPrivacy,setShowPrivacy]=useState(false);
  const [guestMode,setGuestMode]=useState(false);

  useEffect(()=>{
    const handler = ()=>setShowPrivacy(true);
    document.addEventListener('showPrivacy', handler);
    return ()=>document.removeEventListener('showPrivacy', handler);
  },[]);

  const [memberCount,setMemberCount]=useState(null);

  useEffect(()=>{initApp();},[]);

  const initApp=async()=>{
    // Hard timeout - if Supabase hangs, show app with local data after 5s
    const timeout=setTimeout(()=>{
      console.warn('initApp timed out - loading with local seed data');
      setBills(prev=>prev.length?prev:SEED_BILLS);
      setLoading(false);
    },5000);
    try{
      const {data:{session}}=await sb.auth.getSession();
      if(session?.user){
        const {data:prof}=await sb.from('profiles').select('*').eq('id',session.user.id).single();
        setUser({...session.user,...(prof||{})});setProfile(prof||{});setRep(prof?.reputation||0);
        loadUserVotes(session.user.id);
      }
      await loadBills();
      await loadProjects();
      await loadPendingBills();
    }catch(e){
      console.error('initApp error:',e);
      setBills(SEED_BILLS);
    }finally{
      clearTimeout(timeout);
      setLoading(false);
      // Load member count after app is ready
      sb.from('profiles').select('id',{count:'exact',head:true})
        .then(({count})=>{ if(count!==null) setMemberCount(count); });
    }
  };

  const loadBills=async()=>{
    const {data,error}=await sb.from('bills').select('*').order('id');
    if(data&&data.length){
      setBills(data);
    } else {
      // No bills in DB yet - show seed bills locally, they'll be added via Admin panel
      setBills(SEED_BILLS);
    }
  };
  const loadPendingBills=async()=>{
    const {data}=await sb.from('pending_bills').select('*').eq('pending',true).order('created_at',{ascending:false});
    if(data) setPendingBills(data);
  };
  const loadProjects=async()=>{const {data}=await sb.from('projects').select('*').order('created_at',{ascending:false});if(data)setProjects(data);};
  const loadUserVotes=async(uid)=>{const {data}=await sb.from('user_votes').select('*').eq('user_id',uid);if(data){const v={};data.forEach(d=>{v[d.bill_id]={choice:d.choice,anonymous:d.anonymous};});setUserVotes(v);}};

  const handleAuth=(authUser,prof)=>{
    setUser({...authUser,...prof});setProfile(prof);setRep(prof?.reputation||0);loadUserVotes(authUser.id);
    // Show onboarding for brand new users
    if(!prof?.reputation||prof.reputation===0) setShowOnboarding(true);
    // Auto-award ZIP and rep badges on login
    setTimeout(async()=>{
      const zip = prof?.zip||'';
      const curBadges = prof?.badges||[];
      let badges = [...curBadges];
      // ZIP badge
      const zipBadge = ['49201','49202','49203','49204'].includes(zip)?'zip_49201':
        zip==='49237'?'zip_49237':zip==='49230'?'zip_49230':zip==='49285'?'zip_49285':
        (zip&&zip.startsWith('49'))?'zip_other':null;
      if(zipBadge&&!badges.includes(zipBadge)) badges=await awardBadge(authUser.id,zipBadge,badges);
      // New member badge = first_vote precursor — give them 'new resident' baseline
      // Rep milestones from existing rep
      const r = prof?.reputation||0;
      if(r>=20&&!badges.includes('rep_20')) badges=await awardBadge(authUser.id,'rep_20',badges);
      if(r>=50&&!badges.includes('rep_50')) badges=await awardBadge(authUser.id,'rep_50',badges);
      if(r>=100&&!badges.includes('rep_100')) badges=await awardBadge(authUser.id,'rep_100',badges);
      if(r>=200&&!badges.includes('rep_200')) badges=await awardBadge(authUser.id,'rep_200',badges);
      if(prof?.is_official&&!badges.includes('verified_official')) badges=await awardBadge(authUser.id,'verified_official',badges);
      if(badges.length!==curBadges.length) setProfile(p=>({...p,badges}));
    },1000);
  };
  const handleVoteCast=(billId,choice,anon)=>{setUserVotes(prev=>({...prev,[billId]:{choice,anonymous:anon}}));setBills(prev=>prev.map(b=>b.id!==billId?b:{...b,['votes_'+choice]:b['votes_'+choice]+1}));};
  const gainRep=async(pts, badgeToAward)=>{
    const newRep = rep+pts;
    setRep(newRep);
    if(user) setUser(u=>({...u,reputation:(u.reputation||0)+pts}));
    // Auto-award rep milestone badges
    const currentBadges = profile?.badges||[];
    let badges = [...currentBadges];
    if(badgeToAward && !badges.includes(badgeToAward)) {
      badges = await awardBadge(user?.id, badgeToAward, badges);
      setProfile(p=>({...p,badges}));
    }
    // Rep milestones
    const milestones = [[20,'rep_20'],[50,'rep_50'],[100,'rep_100'],[200,'rep_200']];
    for(const [threshold, bId] of milestones) {
      if(newRep>=threshold && !badges.includes(bId)) {
        badges = await awardBadge(user?.id, bId, badges);
        setProfile(p=>({...p,badges}));
        setToast('🏅 New badge earned: '+BADGES[bId].label+'!');
      }
    }
  };
  const handlePropose=async(data)=>{
    if(!user)return;
    const name=profile?.display_name||user.email.split('@')[0];
    const {data:proj,error}=await sb.from('projects').insert({...data,proposer_id:user.id,proposer_name:name,supporter_count:1}).select().single();
    if(!error&&proj){await sb.from('project_supporters').insert({project_id:proj.id,user_id:user.id});setProjects(prev=>[proj,...prev]);gainRep(10);setToast("Project submitted! +10 rep");}
  };
  const handleSignOut=async()=>{await sb.auth.signOut();setUser(null);setProfile(null);setRep(0);setUserVotes({});};

  // ZIP search - must be declared before any conditional returns (Rules of Hooks)
  const [zipSearch,setZipSearch]=useState('');
  const [keywordSearch,setKeywordSearch]=useState('');

  if(loading)return h('div',{style:{minHeight:'100vh',background:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}},h(Spinner),h('div',{style:{color:'#f0c040',fontFamily:"'Playfair Display',serif",fontSize:18}},"Loading The People's Voice..."));
  if(!user&&!guestMode)return h(AuthScreen,{onAuth:handleAuth,onGuest:()=>setGuestMode(true)});

  const repInfo=repLevel(rep);
  const canPropose=rep>=REP_TO_PROPOSE;
  const isAdmin=profile?.is_admin===true;

  const searchedCommunity = ZIP_COMMUNITY[zipSearch.trim()] || null;

  const getFilteredBills = () => {
    let filtered = bills;
    // ZIP filter
    if(zipSearch.trim().length===5 && searchedCommunity) {
      const communityLower = searchedCommunity.toLowerCase();
      filtered = bills.filter(b => {
        if(b.level==='federal'||b.level==='state') return true;
        const jurisLower = (b.jurisdiction||'').toLowerCase();
        if(jurisLower.includes(communityLower)) return true;
        if(billFilter!=='all' && b.level===billFilter) return true;
        return false;
      });
    } else if(billFilter!=='all') {
      filtered = bills.filter(b=>b.level===billFilter);
    }
    // Keyword search
    if(keywordSearch.trim().length>1) {
      const kw = keywordSearch.trim().toLowerCase();
      filtered = filtered.filter(b=>
        (b.title||'').toLowerCase().includes(kw) ||
        (b.summary||'').toLowerCase().includes(kw) ||
        (b.sponsor||'').toLowerCase().includes(kw) ||
        (b.jurisdiction||'').toLowerCase().includes(kw) ||
        (b.full_text||'').toLowerCase().includes(kw) ||
        (b.status||'').toLowerCase().includes(kw)
      );
    }
    return filtered;
  };

  const filteredBills = getFilteredBills();
  const totalVotes=bills.reduce((a,b)=>a+b.votes_yes+b.votes_no+b.votes_abstain,0);
  const displayName=profile?.display_name||(user?.email?.split('@')[0])||'Guest';

  return h('div',{style:{minHeight:'100vh',background:'#f4f1ea'}},
    toast&&h(Toast,{msg:toast,onDone:()=>setToast(null)}),
    showPropose&&h(ProposeModal,{onClose:()=>setShowPropose(false),onSubmit:handlePropose}),
    showOnboarding&&h(OnboardingTour,{onDone:()=>setShowOnboarding(false),displayName:profile?.display_name||user.email?.split('@')[0]}),
    showProfile&&h(ProfilePage,{user,profile,rep,bills,userVotes,onClose:()=>setShowProfile(false),onProfileUpdate:(updates)=>setProfile(p=>({...p,...updates})),onToast:setToast}),
    h(FeedbackButton,{user}),
    showPrivacy&&h(PrivacyModal,{onClose:()=>setShowPrivacy(false)}),

    // Guest mode banner
    guestMode&&h('div',{style:{background:'#f0c040',padding:'10px 16px',textAlign:'center',display:'flex',gap:12,alignItems:'center',justifyContent:'center',flexWrap:'wrap'}},
      h('span',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e'}},
        '👁 You are browsing as a guest — votes, comments and community features require an account.'
      ),
      h('button',{onClick:()=>setGuestMode(false),
        style:{background:'#1a1a2e',color:'#f0c040',border:'none',padding:'6px 16px',borderRadius:6,
          fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}
      },'Sign Up / Sign In')
    ),

    // Header
    h('div',{style:{background:'#1a1a2e',borderBottom:'4px solid #f0c040'}},
      h('div',{style:{maxWidth:900,margin:'0 auto',padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}},
        h('div',null,
          h('div',{style:{fontSize:9,color:'#8899aa',letterSpacing:2,textTransform:'uppercase',marginBottom:1}},"Civic Engagement Platform"),
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:'#f0c040',letterSpacing:-.5}},"The People's Voice")
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:8,flexShrink:0}},
          h('div',{style:{textAlign:'right'}},
            h('div',{style:{color:'#fff',fontSize:12,fontFamily:"'Playfair Display',serif",fontWeight:700}},displayName),
            h('div',{style:{color:'#f0c040',fontSize:10,marginBottom:2}},rep+' pts · '+repInfo.label),
            h('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
              h('button',{onClick:handleSignOut,style:{background:'transparent',border:'none',color:'#8899aa',fontSize:11,cursor:'pointer',fontFamily:"'Lora',serif",padding:0}},"\uD83D\uDEAA Sign out"),
              h('button',{onClick:()=>setShowProfile(true),style:{background:'transparent',border:'none',color:'#f0c040',fontSize:11,cursor:'pointer',fontFamily:"'Lora',serif",padding:0}},"\uD83D\uDC64 Profile"),
              h('button',{onClick:()=>setShowOnboarding(true),style:{background:'transparent',border:'none',color:'#8899aa',fontSize:11,cursor:'pointer',fontFamily:"'Lora',serif",padding:0}},"\u2753 Help")
            )
          )
        )
      ),
      // Stats bar — horizontally scrollable on mobile
      h('div',{style:{background:'rgba(255,255,255,.04)',borderTop:'1px solid rgba(255,255,255,.06)',overflowX:'auto',WebkitOverflowScrolling:'touch'}},
        h('div',{style:{maxWidth:900,margin:'0 auto',padding:'6px 14px',display:'flex',gap:16,flexWrap:'nowrap',minWidth:'max-content'}},
          [[bills.length,"Bills"],[totalVotes.toLocaleString(),"Votes"],[projects.length,"Projects"],[memberCount!==null?memberCount:'...',"Members"],[rep+" pts","Your Rep"]].map(([v,l])=>
            h('div',{key:l,style:{flexShrink:0}},
              h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:900,color:'#f0c040'}},v),
              h('div',{style:{fontSize:9,color:'#8899aa',textTransform:'uppercase',letterSpacing:1}},l)
            )
          )
        )
      ),
      // Tabs — horizontally scrollable on mobile
      h('div',{style:{overflowX:'auto',WebkitOverflowScrolling:'touch',borderTop:'1px solid rgba(255,255,255,.06)'}},
        h('div',{style:{maxWidth:900,margin:'0 auto',padding:'0 14px',display:'flex',flexWrap:'nowrap',minWidth:'max-content'}},
          [['feed','\uD83D\uDCE1 Feed'],['bills','\uD83D\uDDF3 Bills'],['news','\uD83D\uDCF0 News'],['projects','\uD83C\uDF31 Community'],['connect','\uD83E\uDD1D Connect'],['resources','\uD83D\uDCDA Resources'],['ideas','\uD83D\uDCA1 Ideas'],['reps','\uD83C\uDFDB Reps'],...(isAdmin?[['admin','\u2699\uFE0F Admin']]:[])].map(([t,l])=>
            h('button',{key:t,onClick:()=>setMainTab(t),
              style:{background:'transparent',border:'none',
                borderBottom:mainTab===t?'3px solid #f0c040':'3px solid transparent',
                padding:'10px 12px',fontFamily:"'Playfair Display',serif",
                fontWeight:mainTab===t?700:400,fontSize:12,
                color:mainTab===t?'#f0c040':'#8899aa',
                whiteSpace:'nowrap',flexShrink:0,cursor:'pointer'}
            },l)
          )
        )
      )
    ),

    // Body
    h('div',{style:{maxWidth:900,margin:'0 auto',padding:'14px 14px 60px'}},

      // Bills tab
      // Feed tab — community activity stream
      mainTab==='feed'&&h(CommunityFeed,{user,profile,bills,guestMode}),

      mainTab==='news'&&h(NewsTab,{user,rep,profile}),

      mainTab==='bills'&&h(Fragment,null,

        // Search bars
        h('div',{style:{background:'#1a1a2e',borderRadius:10,padding:'14px 16px',marginBottom:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#f0c040',marginBottom:8}},
            "🔍 Search Bills"
          ),
          h('div',{style:{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}},
            h('input',{
              value:keywordSearch,
              onChange:e=>setKeywordSearch(e.target.value),
              placeholder:'Search by keyword — "Medicaid", "roads", "SNAP"...',
              style:{flex:2,minWidth:180,border:'1px solid #444',borderRadius:6,padding:'10px 13px',fontSize:14,background:'#23233a',color:'#fff',boxSizing:'border-box'}
            }),
            h('input',{
              value:zipSearch,
              onChange:e=>{setZipSearch(e.target.value);if(e.target.value.trim().length===5)setBillFilter('all');},
              placeholder:'...or filter by ZIP',
              maxLength:5,
              style:{flex:1,minWidth:120,border:'1px solid #444',borderRadius:6,padding:'10px 13px',fontSize:14,background:'#23233a',color:'#fff',boxSizing:'border-box'}
            }),
            (zipSearch.trim()||keywordSearch.trim())&&h('button',{
              onClick:()=>{setZipSearch('');setKeywordSearch('');},
              style:{background:'transparent',border:'1px solid #556677',color:'#8899aa',borderRadius:5,padding:'9px 12px',fontSize:12,whiteSpace:'nowrap'}
            },"✕ Clear")
          ),
          searchedCommunity&&h('div',{style:{marginTop:4,fontSize:13,color:'#6bcf8a',fontFamily:"'Lora',serif"}},
            "📍 Showing bills for: ",h('strong',null,searchedCommunity)," + all State & Federal bills"
          ),
          zipSearch.trim().length===5&&!searchedCommunity&&h('div',{style:{marginTop:4,fontSize:13,color:'#e74c3c',fontFamily:"'Lora',serif"}},
            "ZIP code not found. Showing all bills."
          ),
          keywordSearch.trim().length>1&&h('div',{style:{marginTop:4,fontSize:13,color:'#6bcf8a',fontFamily:"'Lora',serif"}},
            "🔎 "+filteredBills.length+" result"+(filteredBills.length!==1?'s':'')+" for \""+keywordSearch.trim()+"\""
          )
        ),

        // Level filters
        h('div',{style:{display:'flex',gap:7,flexWrap:'wrap',marginBottom:14,alignItems:'center'}},
          h('span',{style:{fontSize:12,color:'#aaa'}},"Level:"),
          [['all','All'],['village','🏘 Village'],['city','🏙 City'],['township','🌾 Township'],['state','🏛 State'],['federal','🇺🇸 Federal']].map(([v,l])=>
            h('button',{key:v,onClick:()=>{setBillFilter(v);setZipSearch('');},style:{background:billFilter===v&&!zipSearch?'#1a1a2e':'#fff',color:billFilter===v&&!zipSearch?'#f0c040':'#555',border:'1px solid '+(billFilter===v&&!zipSearch?'#1a1a2e':'#ddd'),padding:'6px 12px',borderRadius:20,fontFamily:"'Playfair Display',serif",fontSize:12,fontWeight:billFilter===v&&!zipSearch?700:400}},l)
          ),
          h('div',{style:{marginLeft:'auto',fontSize:12,color:'#aaa'}},filteredBills.length+" bill"+(filteredBills.length!==1?'s':''))
        ),
        filteredBills.length===0&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},"No bills found for this filter."),
        filteredBills.map(bill=>h(BillCard,{key:bill.id,bill,user:{...user,reputation:rep},userVotes,onVoteCast:handleVoteCast,onRepGain:gainRep})),

        // Pending community submissions
        pendingBills.length>0&&h('div',{style:{marginTop:24}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#1a1a2e',marginBottom:4}},'⏳ Pending Community Submissions'),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginBottom:14}},'These bills were submitted by verified residents and are awaiting community co-signers to go live.'),
          pendingBills.map((bill,i)=>h(PendingBillCard,{key:bill.id||i,bill,user:{...user,reputation:rep},onCosign:loadPendingBills,onToast:setToast}))
        ),

        // Nominate a bill (lightweight)
        h(NominateBillPanel,{user:{...user,reputation:rep},onToast:setToast}),

        // Community submit panel (full)
        h(CommunitySubmitPanel,{
          user:{...user,reputation:rep},
          bills,
          onToast:setToast,
          onSubmitted:b=>{setPendingBills(prev=>[b,...prev]);}
        })
      ),

      // Projects tab
      mainTab==='projects'&&h(Fragment,null,
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}},
          h('div',null,
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},"Community Projects"),
            h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:2}},"Propose. Pledge. Build. Forward to power.")
          ),
          canPropose?h('button',{onClick:()=>setShowPropose(true),style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'10px 18px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13}},"+  Propose a Project"):
          h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:7,padding:'10px 14px',fontSize:12,color:'#888',textAlign:'center'}},
            h('div',{style:{fontWeight:600,color:'#5b3a8c',marginBottom:2}},repInfo.icon+" "+repInfo.label),
            "Earn ",h('strong',null,REP_TO_PROPOSE-rep+" more rep")," to propose",h('br'),h('span',{style:{fontSize:11}},"Vote (+5) · Comment (+10) · Pledge (+15)")
          )
        ),
        h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:8,padding:'10px 14px',marginBottom:14,display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}},
          h('span',{style:{fontSize:12,color:'#888',fontStyle:'italic'}},"Earn rep:"),
          [["🗳 Vote","+5"],["💬 Comment","+10"],["🤲 Pledge","+15"],["🌱 Propose","50 req"]].map(([l,v])=>
            h('div',{key:l,style:{display:'flex',alignItems:'center',gap:4}},
              h('span',{style:{fontSize:12,color:'#555'}},l),
              h('span',{style:{background:'#f0c040',color:'#1a1a2e',fontSize:11,fontWeight:700,padding:'2px 7px',borderRadius:20}},v)
            )
          )
        ),
        projects.length===0&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},"No projects yet. Be the first to propose one!"),
        projects.map(proj=>h(ProjectCard,{key:proj.id,project:proj,user:{...user,reputation:rep},onRepGain:gainRep}))
      ),

      // Connect tab — Chat + Neighbor Directory
      mainTab==='connect'&&h('div',null,
        h('div',{style:{marginBottom:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e',marginBottom:3}},'🤝 Connect'),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888'}},'Chat with neighbors. Browse your community. Invite friends.')
        ),
        h(CommunityHub,{user:{...user,...profile},profile})
      ),

      // Resources tab
      mainTab==='resources'&&h(ResourcesTab,{user:{...user,reputation:rep},onToast:setToast}),

      // Ideas tab
      mainTab==='ideas'&&h(IdeasTab,{user:{...user,reputation:rep},profile,rep,onToast:setToast}),

      // Reps tab
      mainTab==='reps'&&h(Fragment,null,
        h('div',{style:{marginBottom:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e',marginBottom:3}},"Representative Accountability"),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888'}},"How your elected officials voted - compared to how you voted.")
        ),
        h(RepTracker,{bills,userZip:profile?.zip})
      ),

      // Admin tab
      mainTab==='admin'&&isAdmin&&h(AdminPanel,{bills,setBills,onToast:setToast,user,profile})
    ),

    // Footer
    h('div',{style:{background:'#1a1a2e',borderTop:'3px solid #f0c040',color:'#556677',textAlign:'center',padding:'20px 16px',fontSize:12,lineHeight:1.9}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",color:'#f0c040',fontSize:14,marginBottom:6}},"The People's Voice"),
      h('div',{style:{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',borderRadius:8,padding:'10px 14px',maxWidth:560,margin:'0 auto 8px',fontSize:11,color:'#8899aa',lineHeight:1.7}},
        "⚖️ ",h('strong',{style:{color:'#aab'}},"Nonpartisan Statement:")," Not affiliated with any political party, government body, or elected official. All analysis is factual and balanced. Community votes carry no official weight.",
        h('span',{style:{marginLeft:8}},
          h('button',{onClick:()=>setShowPrivacy(true),
            style:{background:'none',border:'none',color:'#5b9a6c',fontSize:10,cursor:'pointer',
              textDecoration:'underline',padding:0,fontFamily:"'Lora',serif"}
          },'Privacy Policy')
        )
      ),
      "Votes & proposals are unofficial civic engagement",h('br'),
      h('span',{style:{color:'#5b3a8c'}},"Concord -> Jackson -> Michigan -> Nation")
    )
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(
  h(ErrorBoundary,null,h(App))
);

</script>
</body>
</html>
