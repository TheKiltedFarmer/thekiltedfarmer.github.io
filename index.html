function ExchangeTab({user, profile, onToast}) {
  const [listings, setListings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [typeFilter, setTypeFilter] = useState('all'); // all | offer | request
  const [catFilter, setCatFilter] = useState('All');
  const [showAdd, setShowAdd] = useState(false);
  const [saving, setSaving] = useState(false);
  const isAdmin = profile?.is_admin===true;

  const EMPTY = {listing_type:'offer',title:'',category:'Food & Produce',description:'',zip:profile?.zip||''};
  const [form, setForm] = useState(EMPTY);
  const setF = k => e => setForm(f=>({...f,[k]:e.target.value}));

  const load = async()=>{
    setLoading(true);
    try {
      const {data} = await sb.from('exchange_listings').select('*')
        .order('created_at',{ascending:false}).limit(60);
      setListings(data||[]);
    } catch(e) { /* table may not exist yet */ }
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const submit = async()=>{
    if(!form.title.trim()||!form.description.trim()){
      onToast('Please fill in title and description.'); return;
    }
    setSaving(true);
    try {
      const payload = {
        ...form,
        posted_by_id: user.id,
        posted_by_name: profile?.display_name||user.email||'Neighbor',
        claimed: false,
        created_at: new Date().toISOString()
      };
      const {data,error} = await sb.from('exchange_listings').insert(payload).select().single();
      if(error) throw error;
      setListings(prev=>[data,...prev]);
      setForm(EMPTY);
      setShowAdd(false);
      onToast('✅ Listing posted to the community!');
    } catch(e) {
      onToast('❌ Could not post. Run the exchange SQL in Supabase first.');
    }
    setSaving(false);
  };

  const deleteItem = async(item)=>{
    if(!window.confirm('Remove this listing?')) return;
    await sb.from('exchange_listings').delete().eq('id',item.id);
    setListings(prev=>prev.filter(l=>l.id!==item.id));
    onToast('Listing removed.');
  };

  const filtered = listings.filter(l=>{
    if(typeFilter!=='all'&&l.listing_type!==typeFilter) return false;
    if(catFilter!=='All'&&l.category!==catFilter) return false;
    return true;
  });

  const offerCount = listings.filter(l=>l.listing_type==='offer'&&!l.claimed).length;
  const requestCount = listings.filter(l=>l.listing_type==='request'&&!l.claimed).length;

  return h('div',null,
    // Header
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',
      marginBottom:14,flexWrap:'wrap',gap:10}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,
          color:'#1a1a2e'}},'🤲 Free Stuff & Skill Swap'),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:2}},
          'Get free things. Give free things. Swap skills. No money, no catch.')
      ),
      user&&h('button',{onClick:()=>setShowAdd(!showAdd),
        style:{background:showAdd?'#555':'#1a6b3c',color:'#fff',border:'none',
          padding:'10px 18px',borderRadius:7,fontFamily:"'Playfair Display',serif",
          fontWeight:700,fontSize:13,cursor:'pointer'}},
        showAdd?'✕ Cancel':'+ Post a Listing')
    ),

    // Stats bar
    h('div',{style:{background:'#f0fff4',border:'1px solid #a8e6c0',borderRadius:8,
      padding:'10px 16px',marginBottom:14,display:'flex',gap:20,flexWrap:'wrap'}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:'#1a6b3c'}},offerCount),
        h('div',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1}},'Active Offers')
      ),
      h('div',{style:{width:1,background:'#a8e6c0'}}),
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:'#1a5c8a'}},requestCount),
        h('div',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1}},'Open Requests')
      ),
      h('div',{style:{width:1,background:'#a8e6c0'}}),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#666',lineHeight:1.5,flex:1,alignSelf:'center'}},
        'Everything here is 100% free — no Venmo, no trades required. Just neighbors sharing what they have.')
    ),

    // Add listing form
    showAdd&&h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:20,marginBottom:20}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,
        color:'#f0c040',marginBottom:14}},'Post a Listing'),
      // Offer / Request toggle
      h('div',{style:{display:'flex',gap:0,marginBottom:14,borderRadius:8,overflow:'hidden',border:'1px solid #444'}},
        [['offer','🤲 I\'m Offering'],['request','🙏 I\'m Requesting']].map(([v,l])=>
          h('button',{key:v,onClick:()=>setForm(f=>({...f,listing_type:v})),
            style:{flex:1,padding:'10px',background:form.listing_type===v?'#f0c040':'transparent',
              color:form.listing_type===v?'#1a1a2e':'#8899aa',border:'none',
              fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}},l)
        )
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},
          form.listing_type==='offer'?'What are you offering? *':'What do you need? *'),
        h('input',{value:form.title,onChange:setF('title'),
          placeholder:form.listing_type==='offer'?'e.g. Fresh tomatoes, Truck for moving, Piano lessons...':'e.g. Help fixing a fence, Eggs, Ride to Jackson...',
          style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',
            fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}})
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
        h('div',null,
          h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Category'),
          h('select',{value:form.category,onChange:setF('category'),
            style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',
              fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}},
            EXCHANGE_CATEGORIES.filter(c=>c!=='All').map(c=>h('option',{key:c,value:c},c))
          )
        ),
        h('div',null,
          h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Your ZIP (optional)'),
          h('input',{value:form.zip,onChange:setF('zip'),placeholder:'e.g. 49237',maxLength:5,
            style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',
              fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}})
        )
      ),
      h('div',{style:{marginBottom:16}},
        h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Details *'),
        h('textarea',{value:form.description,onChange:setF('description'),rows:3,
          placeholder:form.listing_type==='offer'?'Describe what you\'re offering, how much, any conditions, how to connect with you...':'Describe what you need, when, any details that help someone help you...',
          style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',
            fontSize:13,background:'#23233a',color:'#fff',resize:'vertical',boxSizing:'border-box'}})
      ),
      h('div',{style:{background:'rgba(240,192,64,0.1)',border:'1px solid rgba(240,192,64,0.3)',
        borderRadius:7,padding:'10px 14px',marginBottom:14,fontSize:12,
        color:'#f0c040',fontFamily:"'Lora',serif",lineHeight:1.6}},
        '🌱 Reminder: This platform operates on the gift economy. Don\'t list anything you expect payment for — this is about neighbors helping neighbors freely.'),
      h('button',{onClick:submit,disabled:saving||!form.title.trim()||!form.description.trim(),
        style:{width:'100%',background:saving?'#555':'#f0c040',color:'#1a1a2e',border:'none',
          padding:'13px',borderRadius:7,fontFamily:"'Playfair Display',serif",
          fontWeight:900,fontSize:15,cursor:saving?'default':'pointer'}},
        saving?'Posting...':'Post to Community →')
    ),


    // Filters
    h('div',{style:{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}},
      [['all','🌿 All'],['offer','🤲 Offers'],['request','🙏 Requests']].map(([v,l])=>
        h('button',{key:v,onClick:()=>setTypeFilter(v),
          style:{background:typeFilter===v?'#1a1a2e':'#fff',
            color:typeFilter===v?'#f0c040':'#555',
            border:'1px solid '+(typeFilter===v?'#1a1a2e':'#ddd'),
            padding:'7px 14px',borderRadius:20,
            fontFamily:"'Playfair Display',serif",fontWeight:typeFilter===v?700:400,
            fontSize:12,cursor:'pointer'}},l)
      ),
      h('div',{style:{marginLeft:'auto',fontSize:12,color:'#aaa'}},
        filtered.length+' listing'+(filtered.length!==1?'s':''))
    ),

    loading&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},'Loading listings...'),

    !loading&&filtered.length===0&&h('div',{style:{textAlign:'center',padding:50,color:'#aaa'}},
      h('div',{style:{fontSize:40,marginBottom:10}},typeFilter==='request'?'🙏':'🤲'),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:'#555',marginBottom:6}},
        typeFilter==='all'?'Nothing listed yet':'No '+(typeFilter==='offer'?'offers':'requests')+' yet'),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,lineHeight:1.6}},
        'Be the first to post something!')
    ),

    !loading&&h('div',null,
      filtered.map(item=>h(ExchangeCard,{key:item.id,item,user,onToast,
        onDelete:canDelete=>canDelete&&removeItem(item)}))
    )
  );
}

const RESOURCE_CATS_MAP = {
  'blessing_box': {label:'Blessing Box', emoji:'📦', color:'#c0392b'},
  'food_pantry':  {label:'Food Pantry',  emoji:'🥫', color:'#e67e22'},
  'food_bank':    {label:'Food Bank',    emoji:'🏛',  color:'#d35400'},
  'free_store':   {label:'Free Store',   emoji:'🛍',  color:'#8e44ad'},
  'meal_program': {label:'Meal Program', emoji:'🍽',  color:'#27ae60'},
  'other':        {label:'Other',        emoji:'🧡',  color:'#888'},
};

function ResourcesTab({user, profile, onToast}) {
  const [resources, setResources] = useState([]);
  const [loading, setLoading] = useState(true);
  const [catFilter, setCatFilter] = useState('all');
  const [showAdd, setShowAdd] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({name:'',category:'blessing_box',description:'',address:'',phone:'',website:'',hours:''});
  const set = k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  useEffect(()=>{
    sb.from('community_resources').select('*').eq('verified',true).order('category')
      .then(({data})=>{ setResources(data||[]); setLoading(false); })
      .catch(()=>setLoading(false));
  },[]);

  const submit = async()=>{
    if(!form.name.trim()||!form.address.trim()){onToast('Name and address required.');return;}
    setSaving(true);
    const {error} = await sb.from('resource_suggestions').insert({
      name:form.name.trim(), category:form.category,
      description:form.description.trim(), address:form.address.trim(),
      phone:form.phone.trim(), website:form.website.trim(),
      hours:form.hours.trim(), submitted_by:user?.id||null, status:'pending',
    });
    if(!error){
      onToast('📍 Submitted! Admin will verify and add it to the map.');
      setShowAdd(false);
      setForm({name:'',category:'blessing_box',description:'',address:'',phone:'',website:'',hours:''});
    } else onToast('Error: '+error.message);
    setSaving(false);
  };

  const filtered = catFilter==='all' ? resources : resources.filter(r=>r.category===catFilter);

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},'🧡 Community Resources'),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:2}},
          'Blessing boxes, food pantries, free stores, and more — mapped across Jackson County.')
      ),
      user&&h('button',{onClick:()=>setShowAdd(!showAdd),
        style:{background:showAdd?'#555':'#c0392b',color:'#fff',border:'none',padding:'10px 18px',
          borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}},
        showAdd?'✕ Cancel':'📍 Add a Location')
    ),

    showAdd&&h('div',{style:{background:'#fff8f8',border:'2px solid #f0c0c0',borderRadius:10,padding:18,marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:4}},'📍 Submit a Resource Location'),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#888',marginBottom:14}},
        'Know of a blessing box, food pantry, or other free resource? Submit it and an admin will verify and add it to the map.'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
        h('div',null,
          h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Name *'),
          h('input',{value:form.name,onChange:set('name'),placeholder:'e.g. First Baptist Blessing Box',
            style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
        ),
        h('div',null,
          h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Type'),
          h('select',{value:form.category,onChange:set('category'),
            style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}},
            Object.entries(RESOURCE_CATS_MAP).map(([k,v])=>h('option',{key:k,value:k},v.emoji+' '+v.label))
          )
        )
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Address * (needed for map pin)'),
        h('input',{value:form.address,onChange:set('address'),placeholder:'Street address or intersection',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
        h('div',null,
          h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Hours'),
          h('input',{value:form.hours,onChange:set('hours'),placeholder:'e.g. Open 24/7',
            style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
        ),
        h('div',null,
          h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Phone'),
          h('input',{value:form.phone,onChange:set('phone'),placeholder:'517-555-0000',
            style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
        )
      ),
      h('div',{style:{marginBottom:12}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Description'),
        h('textarea',{value:form.description,onChange:set('description'),rows:2,
          placeholder:'Who it serves, what items are available, etc.',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box',resize:'vertical',lineHeight:1.5}})
      ),
      h('button',{onClick:submit,disabled:saving,
        style:{background:saving?'#ccc':'#c0392b',color:'#fff',border:'none',padding:'11px 24px',
          borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,cursor:'pointer'}},
        saving?'Submitting...':'Submit for Review')
    ),

    h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}},
      h('button',{onClick:()=>setCatFilter('all'),
        style:{background:catFilter==='all'?'#1a1a2e':'#fff',color:catFilter==='all'?'#f0c040':'#555',
          border:'1px solid '+(catFilter==='all'?'#1a1a2e':'#ddd'),padding:'6px 14px',borderRadius:20,
          fontFamily:"'Playfair Display',serif",fontWeight:catFilter==='all'?700:400,fontSize:12,cursor:'pointer'}},
        'All ('+resources.length+')'),
      Object.entries(RESOURCE_CATS_MAP).map(([k,v])=>{
        const n=resources.filter(r=>r.category===k).length;
        if(!n) return null;
        return h('button',{key:k,onClick:()=>setCatFilter(k),
          style:{background:catFilter===k?v.color:'#fff',color:catFilter===k?'#fff':'#555',
            border:'1px solid '+(catFilter===k?v.color:'#ddd'),padding:'6px 14px',borderRadius:20,
            fontFamily:"'Playfair Display',serif",fontWeight:catFilter===k?700:400,fontSize:12,cursor:'pointer'}},
          v.emoji+' '+v.label+' ('+n+')');
      })
    ),

    loading&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},'Loading resources...'),

    !loading&&filtered.length===0&&h('div',{style:{textAlign:'center',padding:50,color:'#aaa'}},
      h('div',{style:{fontSize:40,marginBottom:10}},'📍'),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:'#555',marginBottom:6}},
        catFilter==='all'?'No resources yet':'No '+(RESOURCE_CATS_MAP[catFilter]?.label||catFilter)+' locations yet'),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,marginBottom:14}},'Know of one in Jackson County?'),
      user&&h('button',{onClick:()=>setShowAdd(true),
        style:{background:'#c0392b',color:'#fff',border:'none',padding:'9px 20px',borderRadius:6,
          fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}},
        '📍 Add a Location')
    ),

    !loading&&filtered.length>0&&h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}},
      filtered.map(r=>{
        const cat=RESOURCE_CATS_MAP[r.category]||RESOURCE_CATS_MAP['other'];
        return h('div',{key:r.id,style:{background:'#fff',border:'2px solid '+cat.color+'33',borderRadius:10,padding:'14px 16px',borderTop:'4px solid '+cat.color}},
          h('div',{style:{display:'flex',gap:8,alignItems:'flex-start',marginBottom:8}},
            h('div',{style:{fontSize:24,flexShrink:0}},cat.emoji),
            h('div',null,
              h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',lineHeight:1.2}},r.name),
              h('div',{style:{fontSize:10,fontWeight:700,color:cat.color,textTransform:'uppercase',letterSpacing:1,marginTop:2}},cat.label)
            )
          ),
          r.address&&h('div',{style:{fontSize:12,color:'#555',marginBottom:4}},'📍 '+r.address),
          r.hours&&h('div',{style:{fontSize:12,color:'#555',marginBottom:4}},'🕐 '+r.hours),
          r.phone&&h('a',{href:'tel:'+r.phone.replace(/\D/g,''),style:{display:'block',fontSize:12,color:'#1a5c8a',marginBottom:4,textDecoration:'none'}},'📞 '+r.phone),
          r.description&&h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#888',lineHeight:1.6,marginTop:6,paddingTop:6,borderTop:'1px solid #f0ece0'}},r.description),
          r.website&&h('a',{href:'https://'+r.website.replace(/^https?:\/\//,''),target:'_blank',rel:'noopener noreferrer',style:{display:'block',fontSize:12,color:'#1a5c8a',marginTop:6,textDecoration:'none'}},'🌐 Visit Website →')
        );
      })
    )
  );
}

// ── Ideas Tab ─────────────────────────────────────────────────────────────────
const IDEA_CATS = ['Roads & Infrastructure','Parks & Public Spaces','Safe Bike Routes','Safety','Environment','Economic Development','Schools & Youth','School Lunch Quality','After-School Spaces','Transit & Getting Around','Health & Wellness','Other'];
const IDEA_THRESHOLD = 10;

function IdeasTab({user, profile, rep, onToast}) {
  const [ideas, setIdeas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [catFilter, setCatFilter] = useState('all');
  const [form, setForm] = useState({title:'',description:'',category:'Roads & Infrastructure',location:'',target_official:''});
  const [saving, setSaving] = useState(false);
  const [upvoted, setUpvoted] = useState({});
  const set = k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  useEffect(()=>{
    sb.from('community_ideas').select('*').order('upvotes',{ascending:false})
      .then(({data})=>{ setIdeas(data||[]); setLoading(false); });
    if(user) sb.from('idea_upvotes').select('idea_id').eq('user_id',user.id)
      .then(({data})=>{ if(data){const v={};data.forEach(d=>v[d.idea_id]=true);setUpvoted(v);}});
  },[]);

  const submit = async()=>{
    if(!form.title.trim()||!form.description.trim()){onToast('Title and description required.');return;}
    setSaving(true);
    const idea = {
      ...form,
      submitted_by_id:user.id,
      submitted_by_name:profile?.display_name||user.email?.split('@')[0],
      upvotes:1, forwarded:false, created_at:new Date().toISOString()
    };
    const {data,error} = await sb.from('community_ideas').insert(idea).select().single();
    if(!error&&data){
      await sb.from('idea_upvotes').insert({idea_id:data.id,user_id:user.id});
      setIdeas(prev=>[data,...prev]);
      setUpvoted(v=>({...v,[data.id]:true}));
      onToast('Idea submitted! Others can now upvote it.');
      setShowAdd(false);
      setForm({title:'',description:'',category:'Roads & Infrastructure',location:'',target_official:''});
    } else onToast('Error submitting. Try again.');
    setSaving(false);
  };

  const upvote = async(idea)=>{
    if(!user){onToast('Sign in to upvote.');return;}
    if(upvoted[idea.id]){onToast('You already upvoted this.');return;}
    const newCount=(idea.upvotes||0)+1;
    setIdeas(prev=>prev.map(i=>i.id===idea.id?{...i,upvotes:newCount}:i));
    setUpvoted(v=>({...v,[idea.id]:true}));
    await sb.from('idea_upvotes').insert({idea_id:idea.id,user_id:user.id});
    await sb.from('community_ideas').update({upvotes:newCount}).eq('id',idea.id);
    if(newCount>=IDEA_THRESHOLD&&!idea.forwarded) forwardIdea({...idea,upvotes:newCount});
  };

  const forwardIdea = async(idea)=>{
    const letter = `Dear ${idea.target_official||'Local Official'},\n\nA community idea on The People\'s Voice civic platform has reached ${IDEA_THRESHOLD} verified resident upvotes and is being formally forwarded to you:\n\n"${idea.title}"\n\n${idea.description}\n\nLocation: ${idea.location||'Jackson County'}\nCategory: ${idea.category}\nUpvotes: ${idea.upvotes} verified residents\n\nThis reflects genuine community priorities. We respectfully request your consideration.\n\nSincerely,\nThe People\'s Voice Community\nthekiltedfarmer.github.io`;
    await sb.from('community_ideas').update({forwarded:true,forwarded_letter:letter}).eq('id',idea.id);
    setIdeas(prev=>prev.map(i=>i.id===idea.id?{...i,forwarded:true}:i));
    onToast('🎉 This idea has been forwarded to local leadership!');
  };

  const filtered = catFilter==='all'?ideas:ideas.filter(i=>i.category===catFilter);

  return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},'💡 Community Ideas'),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:2}},'Your idea. Their problem to fix. '+IDEA_THRESHOLD+' upvotes = automatically forwarded to your official. School lunch, bike routes, after-school spaces — no idea too local.')
      ),
      user&&h('button',{onClick:()=>setShowAdd(!showAdd),
        style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'10px 18px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}
      },'+ Share an Idea')
    ),

    h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13,fontFamily:"'Lora',serif",color:'#8a6000',lineHeight:1.7}},
      '💡 ',h('strong',null,'How it works:'),' Any verified resident can suggest a local improvement. Others upvote ideas they support. When an idea reaches ',h('strong',null,IDEA_THRESHOLD+' upvotes'),', it\'s automatically packaged into a letter and forwarded to the relevant local official.'
    ),

    showAdd&&h('div',{style:{background:'#f0fff4',border:'1px solid #a8e6c0',borderRadius:10,padding:18,marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:14}},'💡 Share a Community Idea'),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Title *'),
        h('input',{value:form.title,onChange:set('title'),placeholder:'e.g. Fix the potholes on Michigan Ave',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}},
        h('div',null,
          h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Category'),
          h('select',{value:form.category,onChange:set('category'),
            style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}},
            IDEA_CATS.map(c=>h('option',{key:c,value:c},c))
          )
        ),
        h('div',null,
          h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Location'),
          h('input',{value:form.location,onChange:set('location'),placeholder:'e.g. Downtown Jackson',
            style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
        )
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Description *'),
        h('textarea',{value:form.description,onChange:set('description'),rows:3,
          placeholder:'Describe the problem and your idea for improving it...',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box',resize:'vertical',lineHeight:1.5}})
      ),
      h('div',{style:{marginBottom:14}},
        h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Who should receive this? (optional)'),
        h('input',{value:form.target_official,onChange:set('target_official'),placeholder:'e.g. Jackson City Council, Mayor',
          style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
      ),
      h('button',{onClick:submit,disabled:saving,
        style:{background:saving?'#ccc':'#1a6b3c',color:'#fff',border:'none',padding:'11px 24px',
          borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,cursor:'pointer'}},
        saving?'Submitting...':'Submit Idea')
    ),

    h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}},
      h('button',{onClick:()=>setCatFilter('all'),
        style:{background:catFilter==='all'?'#1a1a2e':'#fff',color:catFilter==='all'?'#f0c040':'#555',
          border:'1px solid '+(catFilter==='all'?'#1a1a2e':'#ddd'),padding:'6px 14px',borderRadius:20,
          fontFamily:"'Playfair Display',serif",fontWeight:catFilter==='all'?700:400,fontSize:12,cursor:'pointer'}},
        'All ('+ideas.length+')'),
      IDEA_CATS.map(c=>{
        const n=ideas.filter(i=>i.category===c).length;
        if(!n) return null;
        return h('button',{key:c,onClick:()=>setCatFilter(c),
          style:{background:catFilter===c?'#1a1a2e':'#fff',color:catFilter===c?'#f0c040':'#555',
            border:'1px solid '+(catFilter===c?'#1a1a2e':'#ddd'),padding:'6px 14px',borderRadius:20,
            fontFamily:"'Playfair Display',serif",fontWeight:catFilter===c?700:400,fontSize:12,cursor:'pointer'}},
          c+' ('+n+')');
      })
    ),

    loading&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa',fontStyle:'italic'}},'Loading ideas...'),

    !loading&&filtered.length===0&&h('div',{style:{textAlign:'center',padding:50,color:'#aaa'}},
      h('div',{style:{fontSize:40,marginBottom:10}},'💡'),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:'#555',marginBottom:6}},'No ideas yet'),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,marginBottom:14}},'Be the first to share one!'),
      user&&h('button',{onClick:()=>setShowAdd(true),
        style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'9px 20px',borderRadius:6,
          fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}},
        '+ Share an Idea')
    ),

    !loading&&filtered.length>0&&h('div',null,
      filtered.map(idea=>{
        const pct=Math.min(100,Math.round((idea.upvotes||0)/IDEA_THRESHOLD*100));
        const hasVoted=upvoted[idea.id];
        return h('div',{key:idea.id,style:{background:'#fff',border:'1px solid '+(idea.forwarded?'#1a6b3c':'#e5dece'),borderRadius:10,padding:'14px 16px',marginBottom:10}},
          h('div',{style:{display:'flex',gap:12,alignItems:'flex-start'}},
            h('div',{style:{textAlign:'center',flexShrink:0}},
              h('button',{onClick:()=>upvote(idea),disabled:hasVoted,
                style:{background:hasVoted?'#eef7f1':'#fff',border:'2px solid '+(hasVoted?'#1a6b3c':'#ddd'),
                  borderRadius:8,padding:'8px 10px',cursor:hasVoted?'default':'pointer',display:'block',width:52}},
                h('div',{style:{fontSize:18}},'▲'),
                h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:hasVoted?'#1a6b3c':'#333'}},idea.upvotes||0)
              ),
              idea.forwarded&&h('div',{style:{fontSize:10,color:'#1a6b3c',fontWeight:700,marginTop:4}},'✅ SENT')
            ),
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{display:'flex',gap:8,alignItems:'flex-start',flexWrap:'wrap',marginBottom:6}},
                h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',flex:1}},idea.title),
                h('span',{style:{background:'#e8f4fd',color:'#1a5c8a',borderRadius:20,padding:'2px 8px',fontSize:10,fontWeight:700,flexShrink:0}},idea.category)
              ),
              h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#555',lineHeight:1.6,marginBottom:8}},idea.description),
              idea.location&&h('div',{style:{fontSize:11,color:'#888',marginBottom:6}},'📍 '+idea.location),
              h('div',{style:{background:'#f0f0f0',borderRadius:20,height:6,marginBottom:4,overflow:'hidden'}},
                h('div',{style:{background:idea.forwarded?'#1a6b3c':'#f0c040',height:'100%',width:pct+'%',borderRadius:20,transition:'width 0.3s'}})
              ),
              h('div',{style:{fontSize:11,color:'#888'}},
                idea.forwarded
                  ? '✅ Forwarded to '+( idea.target_official||'local officials')
                  : pct+'% to '+IDEA_THRESHOLD+' upvotes needed to forward'
              ),
              h('div',{style:{fontSize:11,color:'#aaa',marginTop:4}},
                'Submitted by '+(idea.submitted_by_name||'neighbor')+' • '+(idea.created_at?new Date(idea.created_at).toLocaleDateString():'')
              )
            )
          )
        );
      })
    )
  );
}

// ── Resource Approval Queue ────────────────────────────────────────────────────
function ResourceApprovalQueue({onToast}) {
  const [pending, setPending] = useState([]);
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    sb.from('resource_suggestions').select('*').eq('status','pending').order('created_at',{ascending:false})
      .then(({data})=>setPending(data||[]))
      .catch(()=>{});
  },[]);

  const approve = async(r)=>{
    let lat=null,lng=null;
    if(r.address){
      try{
        const q=encodeURIComponent(r.address+', Jackson County, Michigan');
        const res=await fetch('https://nominatim.openstreetmap.org/search?q='+q+'&format=json&limit=1&countrycodes=us');
        const geo=await res.json();
        if(geo&&geo[0]){lat=parseFloat(geo[0].lat);lng=parseFloat(geo[0].lon);}
      }catch(e){}
    }
    const {error}=await sb.from('community_resources').insert({
      name:r.name,category:r.category,address:r.address,
      description:r.description,hours:r.hours,phone:r.phone,
      website:r.website,lat,lng,verified:true,submitted_by:r.submitted_by,
    });
    if(!error){
      await sb.from('resource_suggestions').update({status:'approved'}).eq('id',r.id);
      setPending(p=>p.filter(x=>x.id!==r.id));
      onToast('✅ Approved & pinned to map!'+(lat?' Geocoded.':' No coords — add manually in Supabase.'));
    } else onToast('Error: '+error.message);
  };

  const reject=async(r)=>{
    if(!window.confirm('Reject "'+r.name+'"?')) return;
    await sb.from('resource_suggestions').update({status:'rejected'}).eq('id',r.id);
    setPending(p=>p.filter(x=>x.id!==r.id));
    onToast('Suggestion rejected.');
  };

  if(!pending.length) return null;
  const catLabel=c=>({'blessing_box':'📦 Blessing Box','food_pantry':'🥫 Food Pantry',
    'food_bank':'🏛 Food Bank','free_store':'🛍 Free Store','meal_program':'🍽 Meal Program','other':'🧡 Other'}[c]||c);

  return h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:open?14:0,cursor:'pointer'},onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',display:'flex',alignItems:'center',gap:8}},
        '🧡 Resource Suggestions',
        h('span',{style:{background:'#c0392b',color:'#fff',borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:700}},pending.length+' pending')
      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')
    ),
    open&&h('div',null,
      h('div',{style:{fontSize:12,color:'#888',fontFamily:"'Lora',serif",marginBottom:10,fontStyle:'italic'}},
        'Approving geocodes the address and pins it to the community map.'),
      pending.map(r=>h('div',{key:r.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:7,padding:'12px 14px',marginBottom:8}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10,flexWrap:'wrap'}},
          h('div',{style:{flex:1}},
            h('div',{style:{fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:2}},r.name),
            h('div',{style:{fontSize:11,color:'#888',marginBottom:4}},catLabel(r.category)),
            r.address&&h('div',{style:{fontSize:12,color:'#555',marginBottom:2}},'📍 '+r.address),
            r.hours&&h('div',{style:{fontSize:12,color:'#555',marginBottom:2}},'🕐 '+r.hours),
            r.phone&&h('div',{style:{fontSize:12,color:'#555',marginBottom:2}},'📞 '+r.phone),
            r.description&&h('div',{style:{fontSize:12,color:'#888',marginTop:4,fontStyle:'italic'}},r.description)
          ),
          h('div',{style:{display:'flex',gap:6,flexShrink:0}},
            h('button',{onClick:()=>approve(r),style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'✅ Approve & Map'),
            h('button',{onClick:()=>reject(r),style:{background:'#c0392b',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},'❌ Reject')
          )
        )
      ))
    )
  );
}

// ── Feedback Inbox (Admin) ────────────────────────────────────────────────────
function FeedbackInbox({onToast}) {
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [unread, setUnread] = useState(0);
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    sb.from('user_feedback').select('*').order('created_at',{ascending:false})
      .then(({data})=>{
        setMessages(data||[]);
        setUnread((data||[]).filter(m=>!m.read).length);
        setLoading(false);
      });
  },[]);

  const markRead = async(id)=>{
    await sb.from('user_feedback').update({read:true}).eq('id',id);
    setMessages(prev=>prev.map(m=>m.id===id?{...m,read:true}:m));
    setUnread(u=>Math.max(0,u-1));
  };

  const del = async(id)=>{
    await sb.from('user_feedback').delete().eq('id',id);
    setMessages(prev=>prev.filter(m=>m.id!==id));

// ── Official Manager (Admin) ──────────────────────────────────────────────────
function OfficialManager({onToast}) {
  const [officials, setOfficials] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const [results, setResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [colMissing, setColMissing] = useState(false);

  useEffect(()=>{
    // Try to load officials - gracefully handle missing column
    sb.from('profiles').select('id,display_name,email,is_official,official_title,zip')
      .eq('is_official',true).order('display_name')
      .then(({data,error})=>{
        if(error && error.message && error.message.includes('is_official')) {
          setColMissing(true);
        } else {
          setOfficials(data||[]);
        }
        setLoading(false);
      })
      .catch(()=>{ setColMissing(true); setLoading(false); });
  },[]);

  const searchUsers = async()=>{
    setSearching(true);
    try {
      let query = sb.from('profiles')
        .select('id,display_name,email,is_official,official_title,zip,reputation,is_admin,created_at')
        .order('created_at',{ascending:false})
        .limit(25);
      if(search.trim()) {
        const q = search.trim();
        const {data:byName} = await sb.from('profiles')
          .select('id,display_name,email,is_official,official_title,zip,reputation,is_admin,created_at')
          .ilike('display_name','%'+q+'%').limit(15);
        const {data:byEmail} = await sb.from('profiles')
          .select('id,display_name,email,is_official,official_title,zip,reputation,is_admin,created_at')
          .ilike('email','%'+q+'%').limit(15);
        const all = [...(byName||[]),...(byEmail||[])];
        const seen = new Set();
        const deduped = all.filter(r=>{ if(seen.has(r.id)) return false; seen.add(r.id); return true; });
        setResults(deduped);
        if(deduped.length===0) onToast('No users found. Try their email address.');
      } else {
        const {data} = await query;
        setResults(data||[]);
      }
    } catch(e) {
      onToast('Search failed: '+e.message);
    }
    setSearching(false);
  };

  const grantOfficial = async(profile)=>{
    const t = window.prompt('Enter their official title:\ne.g. "Ward 3 Council Member, City of Jackson"');
    if(!t||!t.trim()) return;
    try {
      const {error} = await sb.from('profiles').update({is_official:true,official_title:t.trim()}).eq('id',profile.id);
      if(error) throw error;
      const updated = {...profile,is_official:true,official_title:t.trim()};
      setOfficials(prev=>[...prev.filter(o=>o.id!==profile.id),updated]);
      setResults(prev=>prev.map(r=>r.id===profile.id?updated:r));
      onToast('Official badge granted to '+(profile.display_name||profile.email));
    } catch(e) {
      onToast('Error: '+(e.message||'Could not grant badge. Run the column SQL first.'));
    }
  };

  const revokeOfficial = async(profile)=>{
    if(!window.confirm('Remove badge from '+(profile.display_name||profile.email)+'?')) return;
    await sb.from('profiles').update({is_official:false,official_title:null}).eq('id',profile.id);
    setOfficials(prev=>prev.filter(o=>o.id!==profile.id));
    onToast('Badge removed.');
  };

  return h('div',{style:{background:'#e8f2fa',border:'1px solid #c8d8f0',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:open?14:0,cursor:'pointer'},onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e'}},
        '🏛 Verified Officials ('+officials.length+')'      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')    ),
    open&&h('div',null,
      colMissing&&h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'12px 14px',marginBottom:12,fontSize:13,color:'#8a6000'}},
        '⚠️ Run this SQL in Supabase first: ',
        h('code',{style:{display:'block',marginTop:6,background:'#f5f5f5',padding:'8px 10px',borderRadius:4,fontSize:11,color:'#333'}},
          'alter table public.profiles add column if not exists is_official boolean default false;\nalter table public.profiles add column if not exists official_title text;'
        )
      ),
      !colMissing&&officials.length>0&&h('div',{style:{marginBottom:16}},
        h('div',{style:{fontSize:12,color:'#888',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'Current Verified Officials'),
        officials.map(o=>h('div',{key:o.id,style:{background:'#fff',border:'1px solid #c8d8f0',borderRadius:7,padding:'10px 12px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
          h('div',null,
            h('div',{style:{fontWeight:700,fontSize:13,color:'#1a1a2e',display:'flex',alignItems:'center',gap:6}},
              o.display_name||o.email,
              h(OfficialBadge,{title:o.official_title,small:true})
            ),
            h('div',{style:{fontSize:11,color:'#888',marginTop:2}},o.official_title),
            o.email&&h('div',{style:{fontSize:11,color:'#1a5c8a'}},o.email)
          ),
          h('button',{onClick:()=>revokeOfficial(o),
            style:{background:'transparent',border:'1px solid #ddd',color:'#c0392b',padding:'5px 10px',borderRadius:5,fontSize:11,cursor:'pointer'}          },'Remove Badge')        ))      ),
      !colMissing&&officials.length===0&&h('div',{style:{fontSize:13,color:'#aaa',fontStyle:'italic',marginBottom:12}},'No verified officials yet.'),
      !colMissing&&h('div',null,
        h('div',{style:{fontSize:12,color:'#888',fontWeight:600,textTransform:'uppercase',letterSpacing:1,marginBottom:8}},'Grant Official Badge'),
        h('div',{style:{fontSize:12,color:'#888',marginBottom:8}},'Search by name or email address:'),
        h('div',{style:{display:'flex',gap:8,marginBottom:10}},
          h('input',{value:search,onChange:e=>setSearch(e.target.value),
            onKeyDown:e=>e.key==='Enter'&&searchUsers(),
            placeholder:'Name or email — or leave blank to show all...',
            style:{flex:1,border:'1px solid #ddd',borderRadius:6,padding:'8px 11px',fontSize:13}}),
          h('button',{onClick:searchUsers,disabled:searching,
            style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'8px 16px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}          },searching?'...':'Search')        ),
        results.length===0&&search.trim()&&!searching&&h('div',{style:{fontSize:12,color:'#aaa',fontStyle:'italic',marginBottom:8}},'No users found. Try searching by email address.'),
        results.map(r=>h('div',{key:r.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:7,padding:'10px 12px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}},
          h('div',null,
            h('div',{style:{fontWeight:700,fontSize:13,color:'#1a1a2e'}},r.display_name||'(no name)'),
            r.email&&h('div',{style:{fontSize:11,color:'#888'}},r.email),
            r.is_official&&h('div',{style:{fontSize:11,color:'#1a5c8a',fontWeight:600}},'Already verified: '+r.official_title)
          ),
          !r.is_official
            ? h('button',{onClick:()=>grantOfficial(r),
                style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}              },'🏛 Grant Badge')            : h('button',{onClick:()=>revokeOfficial(r),
                style:{background:'transparent',border:'1px solid #ddd',color:'#c0392b',padding:'7px 12px',borderRadius:5,fontSize:12,cursor:'pointer'}              },'Remove')        ))      )    )  );}

// ── New Users Inbox (Admin) ───────────────────────────────────────────────────

  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);

  const load = async()=>{
    setLoading(true);

        .select('id,display_name,email,zip,reputation,is_admin,is_official,created_at')

            h('div',{style:{fontWeight:700,fontSize:13,color:'#1a1a2e',display:'flex',alignItems:'center',gap:6}},

function ProjectsManager({onToast}) {
  const [projects, setProjects] = useState([]);
  const [loading, setLoading] = useState(true);
  const [deleting, setDeleting] = useState(null);
  const [open, setOpen] = useState(false);

    setLoading(true);
    const {data} = await sb.from('projects').select('*').order('created_at',{ascending:false});

  };

  useEffect(()=>{ load(); },[]);

  const searchUsers = async()=>{
    setLoading(true); setSelected(null);

      const {data} = await sb.from('profiles')
        .select('*')
        .or(`email.ilike.%${search.trim()}%,display_name.ilike.%${search.trim()}%`)
        .limit(15);
      setResults(data||[]);
    } else {
      const {data} = await sb.from('profiles')
        .select('*')
        .order('created_at',{ascending:false})
        .limit(25);
      setResults(data||[]);
    }
    setLoading(false);
  };

  const selectUser = (u)=>{
    setSelected(u);

      display_name: u.display_name||'',
      zip: u.zip||'',

      is_admin: u.is_admin||false,
      show_in_directory: u.show_in_directory!==false,
    });

    if(!selected) return;
    setSaving(true);
    const updates = {

      zip: editing.zip.trim(),
      reputation: Math.max(0,Math.min(9999,parseInt(editing.reputation)||0)),

// ── Admin Panel ───────────────────────────────────────────────────────────────
const LEVELS = ['village','city','township','state','federal','county'];
const JURISDICTIONS = [
  'Village of Concord','City of Jackson','Summit Township','Columbia Township',
  'Napoleon Township','Grass Lake Township','Spring Arbor Township','Leoni Township',
  'Blackman Township','Rives Township','Henrietta Township','Waterloo Township',
  'Norvell Township','Hanover Township','Springport Township','Liberty Township',
  'Pulaski Township','Sandstone Township','Tompkins Township','Concord Township',
  'Jackson County','State of Michigan','Federal',
];

function AdminPanel({bills,setBills,onToast,user,profile}) {
  // Admin access is granted via is_admin flag on the profile — no password in source code
  const isAdmin = profile?.is_admin === true;
  const [authed,setAuthed]=useState(isAdmin);

  // Re-check if profile loads after mount
  useEffect(()=>{ if(isAdmin) setAuthed(true); },[isAdmin]);
  const [view,setView]=useState('list'); // list | add | edit
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [deleting,setDeleting]=useState(null);

  const EMPTY = {id:'',level:'city',jurisdiction:'City of Jackson',title:'',status:'',introduced:'',sponsor:'',summary:'',full_text:'',votes_yes:0,votes_no:0,votes_abstain:0,created_at:'2025-01-01'};
  const [form,setForm]=useState(EMPTY);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const [sourceUrl,setSourceUrl]=useState('');
  const [fetching,setFetching]=useState(false);
  const [fetchMsg,setFetchMsg]=useState('');

  const fetchFromUrl=async()=>{
    if(!sourceUrl.trim()){setFetchMsg('Please enter a URL first.');return;}
    setFetching(true);setFetchMsg('Fetching page...');
    try{
      // Use a CORS proxy to fetch the government page
      const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(sourceUrl);
      const res=await fetch(proxy);
      const json=await res.json();
      const raw=json.contents||'';
      // Strip HTML tags to get readable text
      const text=raw.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
                    .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
                    .replace(/<[^>]+>/g,' ')
                    .replace(/\s+/g,' ')
                    .trim()
                    .slice(0,6000);
      if(!text||text.length<100){setFetchMsg('Could not read that page. Try pasting the text manually.');setFetching(false);return;}
      setFetchMsg('Analyzing with AI...');
      const aiRes=await fetch(AI_PROXY,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:'You are a civic data extractor. Extract bill/proposal information from government website text and return ONLY valid JSON with no markdown. If you cannot find a specific field, use an empty string. Schema: {"title":"full bill or proposal title","level":"one of: village, city, township, county, state, federal","jurisdiction":"the specific government body e.g. City of Jackson or Village of Concord","status":"current status e.g. Council Vote Pending or Passed or Under Review","introduced":"date introduced if found","sponsor":"sponsor or author name if found","summary":"2-3 plain English sentences describing what this proposal does","full_text":"key text from the proposal plus the source URL"}',
          messages:[{role:'user',content:'Extract bill information from this government page (source: '+sourceUrl+'):\n\n'+text}]
        })
      });
      const aiJson=await aiRes.json();
      const aiRaw=aiJson.content?.find(b=>b.type==='text')?.text||'{}';
      const extracted=JSON.parse(aiRaw.replace(/```json|```/g,'').trim());
      // Merge extracted data into form, append source URL to full_text
      setForm(f=>({
        ...f,
        title:extracted.title||f.title,
        level:extracted.level||f.level,
        jurisdiction:extracted.jurisdiction||f.jurisdiction,
        status:extracted.status||f.status,
        introduced:extracted.introduced||f.introduced,
        sponsor:extracted.sponsor||f.sponsor,
        summary:extracted.summary||f.summary,
        full_text:(extracted.full_text||f.full_text)+'\n\nSource: '+sourceUrl,
      }));
      setFetchMsg('✅ Fields filled in! Review everything below before publishing.');
    }catch(e){
      setFetchMsg('❌ Could not fetch that page. Try a different URL, or fill in the form manually.');
    }
    setFetching(false);
  };

  const openAdd=()=>{setForm(EMPTY);setEditing(null);setView('add');setSourceUrl('');setFetchMsg('');};
  const openEdit=(bill)=>{setForm({...bill});setEditing(bill.id);setView('edit');setSourceUrl('');setFetchMsg('');};

  const genId=()=>{
    const slug=form.title.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,20);
    const jurisSlug=form.jurisdiction.split(' ')[0].toUpperCase().slice(0,8);
    return jurisSlug+'-'+new Date().getFullYear()+'-'+slug.slice(0,12).replace(/-$/,'');
  };

  const saveBill=async()=>{
    if(!form.title.trim()||!form.summary.trim()||!form.jurisdiction){
      onToast('Please fill in Title, Summary, and Jurisdiction.');return;
    }
    setSaving(true);
    const billData={
      ...form,
      id:editing||genId(),
      votes_yes:parseInt(form.votes_yes)||0,
      votes_no:parseInt(form.votes_no)||0,
      votes_abstain:parseInt(form.votes_abstain)||0,
    };
    const {error}=await sb.from('bills').upsert(billData,{onConflict:'id'});
    if(error){onToast('Error saving: '+error.message);}
    else{
      setBills(prev=>editing?prev.map(b=>b.id===editing?billData:b):[billData,...prev]);
      onToast(editing?'Bill updated!':'Bill added! It\'s now live for the community.');
      setView('list');
    }
    setSaving(false);
  };

  const deleteBill=async(bill)=>{
    if(!window.confirm('Delete "'+bill.title+'"? This cannot be undone.'))return;
    setDeleting(bill.id);
    await sb.from('user_votes').delete().eq('bill_id',bill.id);
    await sb.from('bill_comments').delete().eq('bill_id',bill.id);
    const {error}=await sb.from('bills').delete().eq('id',bill.id);
    if(error)onToast('Error: '+error.message);
    else{setBills(prev=>prev.filter(b=>b.id!==bill.id));onToast('Bill removed.');}
    setDeleting(null);
  };

  const inp = (label,key,placeholder,type='text',opts={}) =>
    h('div',{style:{marginBottom:12}},
      h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},label),
      opts.textarea?
        h('textarea',{value:form[key],onChange:set(key),placeholder,rows:opts.rows||3,style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box',resize:'vertical'}}):
        h('input',{value:form[key],onChange:set(key),placeholder,type,style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13,boxSizing:'border-box'}})
    );

  const sel = (label,key,options) =>
    h('div',{style:{marginBottom:12}},
      h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},label),
      h('select',{value:form[key],onChange:set(key),style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',fontSize:13}},
        options.map(o=>h('option',{key:o,value:o},o))
      )
    );

  if(!authed) return h('div',{style:{maxWidth:440,margin:'0 auto',padding:32}},
    h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:32,textAlign:'center'}},
      h('div',{style:{fontSize:32,marginBottom:12}},"🔐"),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:20,color:'#f0c040',marginBottom:8}},"Admin Access Required"),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#8899aa',marginBottom:20,lineHeight:1.7}},
        "This panel is restricted to authorized administrators only.",
        h('br'),
        h('br'),
        "If you believe you should have access, contact ",
        h('a',{href:'mailto:chef.justinfairchild@gmail.com',style:{color:'#f0c040'}},"the platform admin"),
        "."
      ),
      h('div',{style:{background:'rgba(255,255,255,.05)',borderRadius:8,padding:'12px 16px',fontSize:12,color:'#556677',fontFamily:"'Lora',serif"}},
        "Signed in as: "+(profile?.display_name||user?.email||'Unknown')
      )
    )
  );

  if(view==='list') return h('div',null,
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:19,color:'#1a1a2e'}},
          "⚙️ Admin Panel - Bills Manager"
        ),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',marginTop:3}},
          "Add or update bills for any community. Changes go live immediately."
        )
      ),
      h('div',{style:{display:'flex',gap:10,flexWrap:'wrap',alignItems:'flex-start'}},
        h('button',{onClick:openAdd,style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'10px 20px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14}},
          "+ Add New Bill"
        ),
        h(RssFetchButton,{onToast,user,profile})
      )
    ),

    // Pending community submissions review queue
    h(NewUsersInbox,{onToast}),
    h(ProjectsManager,{onToast}),
    h(EventsApprovalQueue,{onToast}),
    h(UserManager,{onToast}),
    h(OfficialBadgeInbox,{onToast}),
    h(PressBadgeInbox,{onToast}),
    h(PendingReviewQueue,{onToast,setBills}),
    h(ResourceApprovalQueue,{onToast}),
    h(NominationsInbox,{onToast}),
    h(FeedbackInbox,{onToast}),
    h(OfficialManager,{onToast}),

    h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'12px 16px',marginBottom:16,fontSize:13,fontFamily:"'Lora',serif",color:'#8a6000',lineHeight:1.7}},
      "⚠️ ",h('strong',null,"Admin tips:")," Only add bills with verified, publicly-sourced information. Include the source in the Full Text field. Bills you add go live immediately for all users. Deleting a bill also removes all votes and comments on it - use carefully."
    ),

    bills.map(bill=>h('div',{key:bill.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,marginBottom:10,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}},
      h('div',{style:{flex:1,minWidth:200}},
        h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}},
          h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,textTransform:'uppercase'}},bill.level),
          h('span',{style:{background:'#f5f5f5',color:'#555',fontSize:10,padding:'2px 8px',borderRadius:20}},bill.jurisdiction),
          h('span',{style:{background:'#fffbea',color:'#8a6000',fontSize:10,padding:'2px 8px',borderRadius:20}},bill.status||'No status')
        ),
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:4}},bill.title),
        h('div',{style:{fontSize:11,color:'#aaa'}},
          "✅ "+bill.votes_yes+" · ❌ "+bill.votes_no+" · ⬜ "+bill.votes_abstain+" · ID: "+bill.id
        )
      ),
      h('div',{style:{display:'flex',gap:8,flexShrink:0}},
        h('button',{onClick:()=>openEdit(bill),style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12}},
          "✏️ Edit"
        ),
        h('button',{onClick:()=>deleteBill(bill),disabled:deleting===bill.id,style:{background:'#c0392b',color:'#fff',border:'none',padding:'7px 14px',borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12}},
          deleting===bill.id?"...":"🗑 Delete"
        )
      )
    ))
  );

  return h('div',null,
    h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:20}},
      h('button',{onClick:()=>setView('list'),style:{background:'transparent',border:'1px solid #ddd',borderRadius:5,padding:'7px 12px',fontFamily:"'Playfair Display',serif",fontSize:13,color:'#555'}},
        "<- Back to list"
      ),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:18,color:'#1a1a2e'}},
        editing?"Edit Bill":"Add New Bill"
      )
    ),

    // URL Auto-fill section
    h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:20,marginBottom:20}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:16,color:'#f0c040',marginBottom:4}},
        "🔗 Import from a Government Website"
      ),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#8899aa',marginBottom:14,lineHeight:1.6}},
        "Paste a link to any council agenda, meeting minutes, or ordinance page. The AI will read it and fill in the form automatically. You can edit anything before publishing."
      ),
      h('div',{style:{display:'flex',gap:10,flexWrap:'wrap'}},
        h('input',{
          value:sourceUrl,onChange:e=>setSourceUrl(e.target.value),
          placeholder:'e.g. https://villageofconcord.com/agenda or https://cityofjackson.org/...',
          onKeyDown:e=>e.key==='Enter'&&fetchFromUrl(),
          style:{flex:1,minWidth:200,border:'1px solid #444',borderRadius:6,padding:'10px 13px',fontSize:13,background:'#23233a',color:'#fff',boxSizing:'border-box'}
        }),
        h('button',{onClick:fetchFromUrl,disabled:fetching,style:{background:fetching?'#555':'#f0c040',color:'#1a1a2e',border:'none',padding:'10px 20px',borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:14,whiteSpace:'nowrap'}},
          fetching?'Working...':'Auto-Fill ->'
        )
      ),
      fetchMsg&&h('div',{style:{marginTop:10,fontSize:13,fontFamily:"'Lora',serif",color:fetchMsg.startsWith('✅')?'#6bcf8a':fetchMsg.startsWith('❌')?'#e74c3c':'#f0c040',lineHeight:1.6}},fetchMsg),
      h('div',{style:{marginTop:12,fontSize:11,color:'#556677',lineHeight:1.7}},
        "💡 Works best with: Village of Concord (villageofconcord.com) · City of Jackson (cityofjackson.org) · Jackson County (co.jackson.mi.us) · Michigan Legislature (legislature.mi.gov) · Any public government meeting page"
      )
    ),

    h('div',{style:{background:'#fff',borderRadius:12,border:'1px solid #e5dece',padding:24}},
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}},
        h('div',{style:{paddingRight:12}},sel('Level *','level',LEVELS)),
        h('div',{style:{paddingLeft:12}},sel('Jurisdiction *','jurisdiction',JURISDICTIONS))
      ),
      inp('Bill / Proposal Title *','title','e.g. Main Street Sidewalk Repair Ordinance'),
      inp('Status','status','e.g. Council Vote Pending, Passed, Under Review, Ballot Measure'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}},
        h('div',{style:{paddingRight:12}},inp('Date Introduced','introduced','e.g. March 15, 2025')),
        h('div',{style:{paddingLeft:12}},inp('Sponsor / Author','sponsor','e.g. Councilmember Jane Smith'))
      ),
      inp('Plain-Language Summary *','summary','Describe what this bill does in 2-3 sentences that any resident can understand.',''  ,{textarea:true,rows:3}),
      inp('Full Text / Source','full_text','Paste the full bill text or describe where it can be found. Always include your source.',''  ,{textarea:true,rows:4}),

      h('div',{style:{background:'#f8f6f0',borderRadius:8,padding:'14px 16px',marginBottom:16}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e',marginBottom:10}},
          "Starting Vote Counts (leave at 0 for a fresh bill)"
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}},
          ['yes','no','abstain'].map(k=>
            h('div',{key:k},
              h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},k),
              h('input',{value:form['votes_'+k],onChange:set('votes_'+k),type:'number',min:0,style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box'}})
            )
          )
        )
      ),

      h('div',{style:{background:'#e8f2fa',borderRadius:8,padding:'12px 14px',marginBottom:16,fontSize:12,color:'#1a5c8a',fontFamily:"'Lora',serif",lineHeight:1.7}},
        "💡 ",h('strong',null,"AI Analysis:")," The AI breakdown will be generated automatically using your Summary and Full Text when a user clicks 'Get AI Analysis'. You don't need to write it manually."
      ),

      h('div',{style:{display:'flex',gap:10}},
        h('button',{onClick:saveBill,disabled:saving,style:{flex:1,background:saving?'#ccc':'#1a6b3c',color:'#fff',border:'none',padding:'13px',borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15}},
          saving?'Saving...':(editing?'Save Changes ->':'Publish Bill ->')
        ),
        h('button',{onClick:()=>setView('list'),style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',padding:'13px 20px',borderRadius:7,fontSize:14}},
          "Cancel"
        )
      )
    )
  );
}

  dm:       {icon:'✉️', label:'Direct message', color:'#1a5c8a'},
  bill:     {icon:'📋', label:'New bill added', color:'#5b3a8c'},
  comment:  {icon:'💬', label:'Comment on your bill', color:'#1a5c8a'},
  vote:     {icon:'🗳', label:'Community vote', color:'#1a6b3c'},
  badge:    {icon:'🏅', label:'Badge earned', color:'#8a6000'},
  idea:     {icon:'💡', label:'Idea update', color:'#8a6000'},

  system:   {icon:'📢', label:'Platform update', color:'#555'},
};

    border:'1px solid #e5dece',zIndex:1000,overflow:'hidden',maxHeight:'80vh',display:'flex',flexDirection:'column'}},

    h('div',{style:{background:'#1a1a2e',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}},

        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',marginBottom:6}},'All caught up!'),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,color:'#888',lineHeight:1.6}},'Notifications will appear here when there\'s activity that matters to you.')
      ),
      notifications.map((n,i)=>{

            n.body&&h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#666',lineHeight:1.5,marginBottom:3}},n.body),
            h('div',{style:{fontSize:10,color:'#bbb',fontFamily:"'Lora',serif"}},timeAgo(n.created_at))
          ),
          !n.read&&h('div',{style:{width:8,height:8,borderRadius:'50%',background:'#1a5c8a',flexShrink:0,marginTop:4}})

      })
