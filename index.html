}

// ── Project Card ──────────────────────────────────────────────────────────────
function ProjectCard({project,user,onRepGain}) {
  const [open,setOpen]=useState(false);
  const [tab,setTab]=useState('pledges');
  const [pledgeType,setPledgeType]=useState('labor');
  const [pledgeVal,setPledgeVal]=useState('');
  const [pledgeDetail,setPledgeDetail]=useState('');
  const [commentText,setCommentText]=useState('');
  const [pledges,setPledges]=useState([]);
  const [comments,setComments]=useState([]);
  const [supported,setSupported]=useState(false);
  const [supportCount,setSupportCount]=useState(project.supporter_count||0);
  const [letter,setLetter]=useState(project.forwarded_letter||null);
  const [showLetter,setShowLetter]=useState(false);
  const [toast,setToast]=useState(null);
  const catColor=CAT_COLORS[project.category]||'#555';
  const isReady=supportCount>=project.supporter_threshold;
  const supportPct=Math.min(100,Math.round(supportCount/project.supporter_threshold*100));

  useEffect(()=>{if(open){loadPledges();loadComments();checkSupport();}},[open]);

  const loadPledges=async()=>{const {data}=await sb.from('project_pledges').select('*').eq('project_id',project.id);if(data)setPledges(data);};
  const loadComments=async()=>{const {data}=await sb.from('project_comments').select('*').eq('project_id',project.id).order('created_at',{ascending:false});if(data)setComments(data);};
  const checkSupport=async()=>{if(!user)return;const {data}=await sb.from('project_supporters').select('id').eq('project_id',project.id).eq('user_id',user.id);if(data&&data.length)setSupported(true);};

  const addSupport=async()=>{
    if(!user){setToast("Sign in to support projects.");return;}
    if(supported)return;
    const {error}=await sb.from('project_supporters').insert({project_id:project.id,user_id:user.id});
    if(!error){
      await sb.from('projects').update({supporter_count:supportCount+1}).eq('id',project.id);
      setSupportCount(c=>c+1);setSupported(true);
      await sb.from('profiles').update({reputation:Math.min(9999,(user.reputation||0)+5)}).eq('id',user.id);
      onRepGain(5);setToast("Support added! +5 reputation");
    }
  };

  const submitPledge=async()=>{
    if(!pledgeVal.trim()||!user)return;
    const name=user.display_name||user.email.split('@')[0];
    const {error}=await sb.from('project_pledges').insert({project_id:project.id,user_id:user.id,display_name:name,pledge_type:pledgeType,value:pledgeVal,detail:pledgeDetail});
    if(!error){
      setPledges(prev=>[...prev,{display_name:name,pledge_type:pledgeType,value:pledgeVal,detail:pledgeDetail}]);
      setPledgeVal('');setPledgeDetail('');
      await sb.from('profiles').update({reputation:Math.min(9999,(user.reputation||0)+15)}).eq('id',user.id);
      onRepGain(15);setToast("Pledge saved! +15 reputation");
    }
  };

  const postComment=async()=>{
    if(!commentText.trim()||!user)return;
    const name=user.display_name||user.email.split('@')[0];
    const {error}=await sb.from('project_comments').insert({project_id:project.id,user_id:user.id,display_name:name,content:commentText.trim()});
    if(!error){
      setComments(prev=>[{display_name:name,content:commentText.trim(),created_at:new Date().toISOString()},...prev]);
      setCommentText('');
      await sb.from('profiles').update({reputation:Math.min(9999,(user.reputation||0)+10)}).eq('id',user.id);
      onRepGain(10);setToast("+10 reputation!");
    }
  };

  const generateLetter=async()=>{
    const pledgeSummary=pledges.map(p=>p.display_name+": "+p.pledge_type+" - "+p.value).join(", ");
    const text="Dear "+project.official_target_name+",\n\nWe, "+supportCount+" verified residents of "+project.jurisdiction+", write to formally request your support for:\n\n\""+project.title+"\"\n\n"+project.description+"\n\nOur community has already pledged: "+(pledgeSummary||"volunteer time and community support")+".\n\nThis reflects the genuine priorities of your constituents as documented through The People's Voice civic platform.\n\nWe respectfully request a response or a meeting to discuss how this project can receive official support.\n\nRespectfully,\nThe People of "+project.jurisdiction+"\nvia The People's Voice - "+SITE_URL;
    await sb.from('projects').update({forwarded_letter:text,status:'forwarded'}).eq('id',project.id);
    setLetter(text);setShowLetter(true);setToast("Letter generated! Project marked as forwarded.");
  };

  return h('div',{style:{background:'#fff',borderRadius:10,border:'1px solid #e5dece',marginBottom:16,overflow:'hidden',boxShadow:'0 2px 10px rgba(0,0,0,.05)'}},
    toast&&h(Toast,{msg:toast,onDone:()=>setToast(null)}),
    h('div',{style:{borderLeft:'5px solid '+catColor,padding:'18px 16px'}},
      h('div',{style:{display:'flex',gap:7,flexWrap:'wrap',marginBottom:10}},
        h(Tag,{bg:catColor+'22',color:catColor},"🌱 "+project.category),
        h(Tag,{bg:'#f5f5f5',color:'#555'},project.jurisdiction),
        h(Tag,{bg:project.status==='forwarded'?'#eef7f1':'#fffbea',color:project.status==='forwarded'?'#1a6b3c':'#8a6000'},project.status==='forwarded'?"✅ Forwarded":"⏳ Gathering Support")
      ),
      h('h3',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:17,color:'#1a1a2e',margin:'0 0 6px',lineHeight:1.3}},project.title),
      h('div',{style:{fontSize:12,color:'#aaa',marginBottom:10}},"Proposed by ",h('strong',{style:{color:'#5b3a8c'}},project.proposer_name)," · ",project.created_at ? new Date(project.created_at).toLocaleDateString() : ''),
      h('p',{style:{fontFamily:"'Lora',serif",fontSize:14,lineHeight:1.7,color:'#444',margin:'0 0 14px'}},project.description),
      h('div',{style:{marginBottom:14}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
          h('span',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e'}},"Community Support"),
          h('span',{style:{fontSize:13,color:isReady?'#1a6b3c':'#888',fontWeight:isReady?700:400}},supportCount+" / "+project.supporter_threshold+(isReady?" ✅":""))
        ),
        h('div',{style:{height:12,background:'#eee',borderRadius:6,overflow:'hidden'}},
          h('div',{style:{width:supportPct+'%',height:'100%',background:isReady?'#1a6b3c':catColor,transition:'width .5s'}})
        )
      ),
      h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
        !supported?h(Btn,{onClick:addSupport,bg:'#1a6b3c',color:'#fff'},"🤝 Add My Support"):h('div',{style:{background:'#eef7f1',border:'1px solid #c8e8d4',borderRadius:5,padding:'8px 14px',fontSize:13,color:'#1a6b3c'}},"✓ You support this"),
        isReady&&project.status!=='forwarded'&&h(Btn,{onClick:generateLetter,bg:'#c0392b',color:'#fff'},"📨 Forward to Officials"),
        (letter||project.status==='forwarded')&&h(Btn,{onClick:()=>setShowLetter(!showLetter),bg:'transparent',color:'#1a5c8a',border:'1px solid #1a5c8a'},"📄 "+(showLetter?"Hide":"View")+" Letter")
      ),
      showLetter&&letter&&h('div',{style:{marginTop:14,background:'#f0f4ff',border:'1px solid #c0d0e8',borderRadius:8,padding:16}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a5c8a',marginBottom:10}},"📨 Letter to "+project.official_target_name),
        h('pre',{style:{fontFamily:"'Lora',serif",fontSize:12,lineHeight:1.7,color:'#333',whiteSpace:'pre-wrap',margin:0}},letter)
      ),
      h('button',{onClick:()=>setOpen(!open),style:{marginTop:12,background:'transparent',border:'none',color:'#1a5c8a',fontFamily:"'Playfair Display',serif",fontSize:13,padding:0}},open?"▲ Close":"▼ Pledges & Discussion")
    ),
    open&&h('div',{style:{borderTop:'1px solid #e5dece',padding:'16px'}},
      h('div',{style:{display:'flex',borderBottom:'2px solid #e5dece',marginBottom:16}},
        [['pledges','🤲 Pledges'],['discuss','💬 Discussion']].map(([t,l])=>
          h('button',{key:t,onClick:()=>setTab(t),style:{background:'transparent',border:'none',borderBottom:tab===t?'2px solid #1a1a2e':'none',marginBottom:-2,padding:'8px 14px',fontFamily:"'Playfair Display',serif",fontWeight:tab===t?700:400,fontSize:14,color:tab===t?'#1a1a2e':'#aaa'}},l)
        )
      ),
      tab==='pledges'&&h('div',null,
        pledges.length>0&&h('div',{style:{marginBottom:16}},
          pledges.map((p,i)=>{const m=PLEDGE_META[p.pledge_type]||PLEDGE_META.labor;return h('div',{key:i,style:{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:m.bg,borderRadius:7,marginBottom:8}},
            h('span',{style:{fontSize:18}},m.icon),
            h('div',{style:{flex:1}},
              h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:m.color}},p.display_name+" - "+p.value),
              p.detail&&h('div',{style:{fontSize:12,color:'#666'}},p.detail)
            ),
            h('div',{style:{fontSize:11,color:m.color,fontWeight:700,textTransform:'uppercase'}},m.label)
          );})
        ),
        user?h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:8,padding:14}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:12}},"Pledge Your Contribution"),
          h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}},
            Object.entries(PLEDGE_META).map(([type,meta])=>
              h('button',{key:type,onClick:()=>setPledgeType(type),style:{padding:'7px 11px',border:'2px solid '+(pledgeType===type?meta.color:'#ddd'),borderRadius:6,background:pledgeType===type?meta.bg:'#fff',color:pledgeType===type?meta.color:'#777',fontFamily:"'Playfair Display',serif",fontSize:12,fontWeight:pledgeType===type?700:400}},meta.icon+" "+meta.label)
            )
          ),
          h('input',{value:pledgeVal,onChange:e=>setPledgeVal(e.target.value),placeholder:pledgeType==='labor'?'e.g. 4 hours on weekends':pledgeType==='skills'?'e.g. Carpentry, cooking':pledgeType==='materials'?'e.g. 10 bags of soil':'e.g. $50',style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box',marginBottom:8}}),
          h('input',{value:pledgeDetail,onChange:e=>setPledgeDetail(e.target.value),placeholder:'Optional details...',style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,boxSizing:'border-box',marginBottom:10}}),
          h(Btn,{onClick:submitPledge,bg:'#1a6b3c',color:'#fff'},"Pledge +15 rep ->")
        ):h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:12,fontSize:13,color:'#8a6000',textAlign:'center'}},"Sign in to pledge resources.")
      ),
      tab==='discuss'&&h('div',null,
        user?h('div',{style:{background:'#faf8f3',border:'1px solid #e5dece',borderRadius:8,padding:14,marginBottom:14}},
          h('textarea',{value:commentText,onChange:e=>setCommentText(e.target.value),placeholder:'Ideas, questions, offers to help...',rows:3,style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'8px 10px',fontSize:13,resize:'vertical',boxSizing:'border-box'}}),
          h('div',{style:{textAlign:'right',marginTop:8}},h(Btn,{onClick:postComment},"Post +10 rep"))
        ):h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:12,marginBottom:14,fontSize:13,color:'#8a6000',textAlign:'center'}},"Sign in to join the discussion."),
        comments.length===0&&h('div',{style:{textAlign:'center',color:'#bbb',fontStyle:'italic',fontSize:13,padding:16}},"No discussion yet."),
        comments.map((c,i)=>h('div',{key:i,style:{display:'flex',gap:10,marginBottom:12,paddingBottom:12,borderBottom:'1px solid #f0ece4'}},
          h('div',{style:{width:36,height:36,borderRadius:'50%',background:'#1a1a2e',color:'#f0c040',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,flexShrink:0}},(c.display_name||'?')[0].toUpperCase()),
          h('div',null,
            h('div',{style:{fontWeight:700,fontSize:13,color:'#1a1a2e',fontFamily:"'Playfair Display',serif",marginBottom:3}},c.display_name," ",h('span',{style:{color:'#bbb',fontWeight:400,fontSize:11}},c.created_at ? new Date(c.created_at).toLocaleDateString() : '')),
            h('div',{style:{fontSize:13,lineHeight:1.65,color:'#333'}},c.content)
          )
        ))
      )
    )
  );
}

        h('input',{value:form[k],onChange:set(k),placeholder:'e.g. Community Tool Library on Main Street',style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'10px 12px',fontSize:14,boxSizing:'border-box'}})
      )),

        h('div',null,h('label',{style:{fontSize:12,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},"Category"),h('select',{value:form.cat,onChange:set('cat'),style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 10px',fontSize:13}},Object.keys(CAT_COLORS).map(c=>h('option',{key:c},c)))),

function OnboardingTour({onDone, displayName}) {
  const [step, setStep] = useState(0);
  const current = TOUR_STEPS[step];
  const isLast = step === TOUR_STEPS.length - 1;

  return h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999,padding:16}},
    h('div',{style:{background:'#fff',borderRadius:16,width:440,maxWidth:'100%',boxShadow:'0 40px 80px rgba(0,0,0,.4)',overflow:'hidden'}},
      // Progress bar
      h('div',{style:{height:4,background:'#eee'}},
        h('div',{style:{height:'100%',background:'#f0c040',width:((step+1)/TOUR_STEPS.length*100)+'%',transition:'width .3s'}})
      ),
      h('div',{style:{padding:'28px 28px 24px'}},
        // Step counter
        h('div',{style:{fontSize:11,color:'#aaa',textTransform:'uppercase',letterSpacing:2,marginBottom:16}},
          'Step '+(step+1)+' of '+TOUR_STEPS.length
        ),
        // Icon + title

        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:22,color:'#1a1a2e',marginBottom:12,lineHeight:1.2}},
          step===0 ? 'Welcome'+(displayName?', '+displayName.split(' ')[0]:'')+' to The People\'s Voice' : current.title
        ),
        h('p',{style:{fontFamily:"'Lora',serif",fontSize:15,color:'#444',lineHeight:1.8,marginBottom:16}},current.body),
        // Tip box
        h('div',{style:{background:'#fff8e7',border:'1px solid #f0c040',borderRadius:8,padding:'10px 14px',fontSize:13,color:'#8a6000',fontFamily:"'Lora',serif",lineHeight:1.6}},
          h('strong',null,'💡 Tip: '),current.tip
        ),
        // Navigation
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:24}},
          step>0
            ? h('button',{onClick:()=>setStep(s=>s-1),style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',padding:'10px 18px',borderRadius:7,fontSize:14,cursor:'pointer'}},'<- Back')
            : h('button',{onClick:onDone,style:{background:'transparent',border:'none',color:'#bbb',fontSize:13,cursor:'pointer'}},'Skip tour'),
          h('button',{onClick:()=>isLast?onDone():setStep(s=>s+1),

      )
    )
  );

// ── Profile Page (Editable) ───────────────────────────────────────────────────
function ProfilePage({user, profile, rep, bills, userVotes, onClose, onProfileUpdate, onToast}) {
  const repInfo = repLevel(rep);
  const votedBills = bills.filter(b=>userVotes[b.id]);
  const [avatarUrl, setAvatarUrl] = useState(profile?.avatar_url||null);
  const [uploading, setUploading] = useState(false);
  const [editing, setEditing] = useState(false);
  const [saving, setSaving] = useState(false);
  const [activeSection, setActiveSection] = useState('contributions');
  const [myEvents, setMyEvents] = useState([]);
  const [myExchange, setMyExchange] = useState([]);
  const [myProjects, setMyProjects] = useState([]);
  const [editForm, setEditForm] = useState({
    display_name: profile?.display_name||'',
    bio: profile?.bio||'',
    tagline: profile?.tagline||'',
    skills: profile?.skills||'',
    offering: profile?.offering||'',
    facebook: profile?.facebook||'',
    instagram: profile?.instagram||'',
    favorite_quote: profile?.favorite_quote||'',
    causes: profile?.causes||'',
  });
  const fileRef = useRef(null);
  const setField = k=>e=>setEditForm(f=>({...f,[k]:e.target.value}));

  const displayName = editForm.display_name||profile?.display_name||user.email?.split('@')[0]||'Resident';
  const joinDate = user.created_at ? new Date(user.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'}) : 'Recently';
  const community = ZIP_COMMUNITY[profile?.zip]||'Jackson County';

  const voteBreakdown = votedBills.reduce((acc,b)=>{
    const v = userVotes[b.id];
    if(v) acc[v.choice] = (acc[v.choice]||0)+1;
    return acc;
  },{});

  // Load contributions
  useEffect(()=>{
    if(!user?.id) return;
    (async()=>{
      const [evRes,exRes,prRes] = await Promise.all([
        sb.from('events').select('id,title,event_date,category').eq('submitted_by_id',user.id).order('event_date',{ascending:false}).limit(5).catch(()=>({data:[]})),
        sb.from('exchange_listings').select('id,title,listing_type,category,claimed').eq('posted_by_id',user.id).limit(5).catch(()=>({data:[]})),
        sb.from('projects').select('id,title,supporter_count').eq('proposer_id',user.id).limit(5).catch(()=>({data:[]})),
      ]);
      setMyEvents(evRes.data||[]);
      setMyExchange(exRes.data||[]);
      setMyProjects(prRes.data||[]);
    })();
  },[user?.id]);

  const saveProfile = async()=>{
    setSaving(true);
    const updates = {
      display_name: editForm.display_name.trim()||displayName,
      bio: editForm.bio.trim(),
      tagline: editForm.tagline.trim(),
      skills: editForm.skills.trim(),
      offering: editForm.offering.trim(),
      facebook: editForm.facebook.trim(),
      instagram: editForm.instagram.trim(),
      favorite_quote: editForm.favorite_quote.trim(),
      causes: editForm.causes.trim(),
    };
    await sb.from('profiles').update(updates).eq('id',user.id);
    if(onProfileUpdate) onProfileUpdate(updates);
    setEditing(false);
    setSaving(false);
    onToast('✅ Profile saved!');
  };

  const handleAvatarUpload = async(e)=>{
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 2*1024*1024) { alert('Image must be under 2MB'); return; }
    setUploading(true);
    const reader = new FileReader();
    reader.onload = async(ev)=>{
      const dataUrl = ev.target.result;
      await sb.from('profiles').update({avatar_url:dataUrl}).eq('id',user.id);
      setAvatarUrl(dataUrl);
      if(onProfileUpdate) onProfileUpdate({avatar_url:dataUrl});
      setUploading(false);
    };
    reader.readAsDataURL(file);
  };

  const shareProfile = ()=>{
    const text = (displayName||'A neighbor')+' is on The People\'s Voice — Jackson County\'s free civic platform.';
    if(navigator.share) navigator.share({title:displayName,text,url:SITE_URL}).catch(()=>{});
    else { navigator.clipboard&&navigator.clipboard.writeText(SITE_URL); onToast('Link copied!'); }
  };

  const totalContribs = votedBills.length + myEvents.length + myExchange.length + myProjects.length;

  const SECTIONS = [
    ['contributions','🤲 Contributions'],
    ['civic','🗳 Civic Activity'],
    ['about','👤 About'],
    ['settings','⚙️ Settings'],
  ];

  return h('div',{style:{position:'fixed',inset:0,background:'rgba(0,0,0,.65)',display:'flex',alignItems:'flex-start',justifyContent:'center',zIndex:9000,padding:16,overflowY:'auto'}},
    h('div',{style:{background:'#f4f1ea',borderRadius:14,width:560,maxWidth:'100%',marginTop:20,boxShadow:'0 30px 60px rgba(0,0,0,.35)',marginBottom:20}},

      // ── Hero header ──────────────────────────────────────────────────────
      h('div',{style:{background:'linear-gradient(135deg,#1a1a2e,#2a1540)',borderRadius:'14px 14px 0 0',padding:'28px 24px 20px',position:'relative'}},
        h('button',{onClick:onClose,style:{position:'absolute',top:14,right:16,background:'transparent',border:'none',color:'#8899aa',fontSize:22,cursor:'pointer',lineHeight:1}},'×'),

        // Avatar + name
        h('div',{style:{display:'flex',gap:18,alignItems:'flex-end',marginBottom:16}},
          h('div',{style:{position:'relative',flexShrink:0}},
            avatarUrl
              ? h('img',{src:avatarUrl,alt:'Profile',style:{width:84,height:84,borderRadius:'50%',objectFit:'cover',border:'3px solid #f0c040'}})
              : h('div',{style:{width:84,height:84,borderRadius:'50%',background:'#f0c040',color:'#1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:34,border:'3px solid #f0c040'}},
                  displayName[0].toUpperCase()),
            h('button',{onClick:()=>fileRef.current&&fileRef.current.click(),title:'Change photo',
              style:{position:'absolute',bottom:0,right:0,width:26,height:26,borderRadius:'50%',background:'#f0c040',border:'2px solid #1a1a2e',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:13}
            },uploading?'…':'📷'),
            h('input',{ref:fileRef,type:'file',accept:'image/*',onChange:handleAvatarUpload,style:{display:'none'}})
          ),
          h('div',{style:{flex:1,paddingBottom:2}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:22,color:'#f0c040',lineHeight:1.1}},displayName),
            (profile?.tagline)&&h('div',{style:{fontSize:13,color:'#aab',fontStyle:'italic',marginTop:4}},profile.tagline),
            h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',marginTop:6,alignItems:'center'}},
              h('span',{style:{fontSize:11,color:'#5b9a6c',fontWeight:600}},'✅ Verified Resident'),
              profile?.zip&&h('span',{style:{fontSize:11,color:'#8899aa'}},'· 📍 '+community),
              h('span',{style:{fontSize:11,color:'#8899aa'}},'· Member since '+joinDate)
            ),
            profile?.is_official&&h(OfficialBadge,{title:profile.official_title}),
            profile?.is_press&&h(PressBadge,{outlet:profile.press_outlet})

        // Quote if set

function PressBadgeRequest({user, profile, onToast}) {
  const [open, setOpen] = useState(false);
  const [outlet, setOutlet] = useState('');
  const [beat, setBeat] = useState('');
  const [body, setBody] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  const submit = async()=>{
    if(!outlet.trim()) return;
    setSubmitting(true);
    const {error} = await sb.from('press_badge_requests').insert({
      user_id: user.id,
      display_name: profile?.display_name||user.email?.split('@')[0]||'Resident',
      email: user.email||'',
      zip: profile?.zip||'',
      outlet: outlet.trim(),
      beat: beat.trim()||null,
      message: body.trim()||null,
      status: 'pending',
      created_at: new Date().toISOString()
    });
    if(!error) {
      setSubmitted(true);
      onToast('✅ Press badge request submitted! Justin will review your application.');
    } else {
      onToast('❌ Error submitting — please try again.');
    }
    setSubmitting(false);
  };

  if(submitted||profile?.is_press) return null;

  return h('div',null,
    !open
      ? h('button',{onClick:()=>setOpen(true),
          style:{background:'#8a4000',color:'#fff',border:'none',padding:'10px 20px',
            borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,
            fontSize:13,cursor:'pointer',width:'100%'}},'📰 Request Press Badge')
      : h('div',{style:{background:'#fff8f0',border:'1px solid #f0c8a0',borderRadius:8,padding:14,marginTop:8}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:4}},'Press Badge Application'),
          h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#888',lineHeight:1.5,marginBottom:12}},
            'For journalists, bloggers, newsletter writers, and community reporters covering Jackson County. Verified press get a badge on their profile and their news submissions go live immediately.'),
          h('div',{style:{marginBottom:10}},
            h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Publication / Outlet *'),
            h('input',{value:outlet,onChange:e=>setOutlet(e.target.value),
              placeholder:'e.g. Jackson Citizen Patriot, Concord Courier, my own newsletter...',
              style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',
                fontSize:13,boxSizing:'border-box',fontFamily:"'Lora',serif"}})
          ),
          h('div',{style:{marginBottom:10}},
            h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Your Beat / Coverage Area (optional)'),
            h('input',{value:beat,onChange:e=>setBeat(e.target.value),
              placeholder:'e.g. Local government, food & agriculture, community events...',
              style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',
                fontSize:13,boxSizing:'border-box',fontFamily:"'Lora',serif"}})
          ),
          h('div',{style:{marginBottom:12}},
            h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Additional Info (optional)'),
            h('textarea',{value:body,onChange:e=>setBody(e.target.value),rows:2,
              placeholder:'Link to your work, social media, or anything else that helps verify you...',
              style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',
                fontSize:13,boxSizing:'border-box',resize:'vertical',fontFamily:"'Lora',serif",lineHeight:1.6}})
          ),
          h('div',{style:{fontSize:11,color:'#888',fontFamily:"'Lora',serif",lineHeight:1.5,marginBottom:12}},
            '📋 Your request will be reviewed by the platform admin. Verified press have their submissions highlighted with a Local Source label.'),
          h('div',{style:{display:'flex',gap:8}},
            h('button',{onClick:submit,disabled:submitting||!outlet.trim(),
              style:{flex:1,background:submitting||!outlet.trim()?'#ccc':'#8a4000',
                color:'#fff',border:'none',padding:'10px',borderRadius:7,
                fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}},
              submitting?'Submitting...':'Submit Application'),
            h('button',{onClick:()=>setOpen(false),
              style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',
                padding:'10px 16px',borderRadius:7,fontSize:13,cursor:'pointer'}},'Cancel')
          )
        )
  );
}

// Admin inbox for press badge requests
function PressBadgeInbox({onToast}) {
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    sb.from('press_badge_requests').select('*')
      .eq('status','pending').order('created_at',{ascending:false})
      .then(({data})=>{ setRequests(data||[]); setLoading(false); })
      .catch(()=>setLoading(false));
  },[]);

  const approve = async(req)=>{
    await sb.from('profiles').update({is_press:true,press_outlet:req.outlet,press_beat:req.beat||null}).eq('id',req.user_id);
    await sb.from('press_badge_requests').update({status:'approved'}).eq('id',req.id);
    // Notify them
    try {
      await sb.from('notifications').insert({
        user_id:req.user_id,type:'official',
        title:'Your Press badge has been approved!',
        body:'Your 📰 Press badge is now live on your profile.',
        read:false,created_at:new Date().toISOString()
      });
    } catch(e){}
    setRequests(prev=>prev.filter(r=>r.id!==req.id));
    onToast('✅ Press badge granted to '+req.display_name+'!');
  };

  const deny = async(req)=>{
    await sb.from('press_badge_requests').update({status:'denied'}).eq('id',req.id);
    setRequests(prev=>prev.filter(r=>r.id!==req.id));
    onToast('Request from '+req.display_name+' denied.');
  };

  const count = requests.length;

  return h('div',{style:{background:'#fff8f0',border:'1px solid #f0c8a0',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',marginBottom:open?14:0},
      onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',display:'flex',alignItems:'center',gap:8}},
        '📰 Press Badge Requests',
        count>0&&h('span',{style:{background:'#8a4000',color:'#fff',borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:700}},count)
      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')
    ),
    open&&h('div',null,
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa'}},'Loading...'),
      !loading&&requests.length===0&&h('div',{style:{textAlign:'center',padding:16,color:'#aaa',fontStyle:'italic'}},'No pending press badge requests.'),
      requests.map(req=>h('div',{key:req.id,
        style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:8}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:2}},req.display_name),
        h('div',{style:{fontSize:12,color:'#8a4000',fontWeight:700,marginBottom:2}},'📰 '+req.outlet),
        req.beat&&h('div',{style:{fontSize:12,color:'#666',marginBottom:4}},'Beat: '+req.beat),
        h('div',{style:{display:'flex',gap:8,fontSize:11,color:'#888',marginBottom:req.message?6:10,flexWrap:'wrap'}},
          h('span',null,'📧 '+req.email),
          h('span',null,'🕐 '+new Date(req.created_at).toLocaleDateString())
        ),
        req.message&&h('div',{style:{fontSize:12,color:'#555',fontFamily:"'Lora',serif",
          lineHeight:1.6,fontStyle:'italic',marginBottom:8,padding:'6px 10px',
          background:'#fff8f0',borderRadius:5}},'\"'+req.message+'\"'),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{onClick:()=>approve(req),
            style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'7px 16px',
              borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},
            '✅ Approve & Grant Badge'),
          h('button',{onClick:()=>deny(req),
            style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',
              padding:'7px 12px',borderRadius:6,fontSize:12,cursor:'pointer'}},'Deny')
        )
      ))
    )
  );
}

function OfficialBadgeRequest({user, profile, onToast}) {
  const [open, setOpen] = useState(false);
  const [title, setTitle] = useState('');
  const [body, setBody] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  const submit = async()=>{
    if(!title.trim()) return;
    setSubmitting(true);
    const {error} = await sb.from('official_badge_requests').insert({
      user_id: user.id,
      display_name: profile?.display_name||user.email?.split('@')[0]||'Resident',
      email: user.email||'',
      zip: profile?.zip||'',
      title: title.trim(),
      message: body.trim()||null,
      status: 'pending',
      created_at: new Date().toISOString()
    });
    if(!error) {
      setSubmitted(true);
      onToast('✅ Request submitted! Justin will review your application.');
    } else {
      onToast('❌ Error submitting request — please try again.');
    }
    setSubmitting(false);

  if(submitted||profile?.is_official) return null;

  return h('div',null,

          style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'10px 20px',

      : h('div',{style:{background:'#f0ebf8',border:'1px solid #c8b8e8',borderRadius:8,padding:14,marginTop:8}},
          h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:10}},
            'Official Badge Application'
          ),
          h('div',{style:{marginBottom:10}},
            h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Your Official Title *'),
            h('input',{value:title,onChange:e=>setTitle(e.target.value),
              placeholder:'e.g. "Jackson City Council Member, Ward 3" or "Village of Concord Trustee"',
              style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',
                fontSize:13,boxSizing:'border-box',fontFamily:"'Lora',serif"}})
          ),
          h('div',{style:{marginBottom:12}},
            h('label',{style:{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:3}},'Additional Information (optional)'),
            h('textarea',{value:body,onChange:e=>setBody(e.target.value),rows:2,
              placeholder:'Any additional context — official website, contact info, etc.',
              style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'9px 11px',
                fontSize:13,boxSizing:'border-box',resize:'vertical',fontFamily:"'Lora',serif",lineHeight:1.6}})

          h('div',{style:{fontSize:11,color:'#888',fontFamily:"'Lora',serif",lineHeight:1.5,marginBottom:12}},

          ),
          h('div',{style:{display:'flex',gap:8}},
            h('button',{onClick:submit,disabled:submitting||!title.trim(),
              style:{flex:1,background:submitting||!title.trim()?'#ccc':'#5b3a8c',
                color:'#fff',border:'none',padding:'10px',borderRadius:7,

// Admin inbox for official badge requests
function OfficialBadgeInbox({onToast}) {
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    sb.from('official_badge_requests').select('*')
      .eq('status','pending').order('created_at',{ascending:false})
      .then(({data})=>{ setRequests(data||[]); setLoading(false); });
  },[]);

  const approve = async(req)=>{
    // Grant the badge
    await sb.from('profiles').update({
      is_official: true,
      official_title: req.title
    }).eq('id',req.user_id);
    // Mark request as approved
    await sb.from('official_badge_requests').update({status:'approved'}).eq('id',req.id);
    setRequests(prev=>prev.filter(r=>r.id!==req.id));
    onToast('✅ Official badge granted to '+req.display_name+'!');
  };

  const deny = async(req)=>{
    await sb.from('official_badge_requests').update({status:'denied'}).eq('id',req.id);
    setRequests(prev=>prev.filter(r=>r.id!==req.id));
    onToast('Request from '+req.display_name+' denied.');
  };

  const count = requests.length;

  return h('div',{style:{background:'#f0ebf8',border:'1px solid #c8b8e8',borderRadius:10,padding:16,marginBottom:20}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',marginBottom:open?14:0},
      onClick:()=>setOpen(!open)},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e',display:'flex',alignItems:'center',gap:8}},
        '🏛 Official Badge Requests',
        count>0&&h('span',{style:{background:'#5b3a8c',color:'#fff',borderRadius:20,padding:'2px 8px',fontSize:11,fontWeight:700}},count)
      ),
      h('span',{style:{color:'#888',fontSize:14}},open?'▲':'▼')
    ),
    open&&h('div',null,
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa'}},'Loading...'),
      !loading&&requests.length===0&&h('div',{style:{textAlign:'center',padding:16,color:'#aaa',fontStyle:'italic'}},'No pending badge requests.'),
      requests.map(req=>h('div',{key:req.id,
        style:{background:'#fff',border:'1px solid #e5dece',borderRadius:8,padding:'12px 14px',marginBottom:8}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e',marginBottom:2}},
          req.display_name
        ),
        h('div',{style:{fontSize:12,color:'#1a5c8a',fontWeight:700,marginBottom:4}},
          '🏛 '+req.title
        ),
        h('div',{style:{display:'flex',gap:8,fontSize:11,color:'#888',marginBottom:req.message?6:10,flexWrap:'wrap'}},
          h('span',null,'📧 '+req.email),
          h('span',null,'📍 ZIP: '+req.zip),
          h('span',null,'🕐 '+new Date(req.created_at).toLocaleDateString())
        ),
        req.message&&h('div',{style:{fontSize:12,color:'#555',fontFamily:"'Lora',serif",
          lineHeight:1.6,fontStyle:'italic',marginBottom:8,padding:'6px 10px',
          background:'#f5f3ee',borderRadius:5}},'"'+req.message+'"'),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{onClick:()=>approve(req),
            style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'7px 16px',
              borderRadius:6,fontFamily:"'Playfair Display',serif",fontWeight:700,
              fontSize:12,cursor:'pointer'}
          },'✅ Approve & Grant Badge'),
          h('button',{onClick:()=>deny(req),
            style:{background:'transparent',border:'1px solid #ddd',color:'#aaa',
              padding:'7px 12px',borderRadius:6,fontSize:12,cursor:'pointer'}
          },'Deny')
        )
      ))
    )
  );

const GROUP_TOPICS = ['General','Neighborhood','Farmers & Food','Urban Farming','Environment','Local Business','Faith & Community','Arts & Culture','Youth & Families','Safety','Housing','Other'];

function GroupsTab({user, profile, neighbors}) {
  const [groups, setGroups] = useState([]);
  const [myMemberships, setMyMemberships] = useState(new Set());
  const [loading, setLoading] = useState(true);
  const [activeGroup, setActiveGroup] = useState(null); // group object
  const [showCreate, setShowCreate] = useState(false);
  const [groupActivity, setGroupActivity] = useState({});
  const isAdmin = profile?.is_admin===true;

  const EMPTY = {name:'',description:'',topic:'General',open:true};
  const [form, setForm] = useState(EMPTY);
  const setF = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const [saving, setSaving] = useState(false);

  const displayName = profile?.display_name||user?.email?.split('@')[0]||'Resident';

  const load = async()=>{
    setLoading(true);
    try {
      const {data:grps} = await sb.from('groups').select('*').order('created_at',{ascending:false});
      setGroups(grps||[]);
      if(user?.id) {
        const {data:mem} = await sb.from('group_members').select('group_id').eq('user_id',user.id);
        setMyMemberships(new Set((mem||[]).map(m=>m.group_id)));
        // Check activity dots
        const activity = {};
        for(const g of (grps||[])) {
          const seenKey = 'group_seen_'+g.id;
          const seen = parseInt(localStorage.getItem(seenKey)||'0');
          const seenIso = new Date(seen||0).toISOString();
          const {count} = await sb.from('community_chat')
            .select('id',{count:'exact',head:true})
            .eq('room_id','group-'+g.id)
            .gt('created_at',seenIso);
          activity[g.id] = (count||0) > 0;
        }
        setGroupActivity(activity);
      }
    } catch(e) {}
    setLoading(false);
  };

  useEffect(()=>{ if(user?.id) load(); },[user?.id]);

  const createGroup = async()=>{
    if(!form.name.trim()) return;
    setSaving(true);
    try {
      const {data:grp,error} = await sb.from('groups').insert({
        name:form.name.trim(),
        description:form.description.trim(),
        topic:form.topic,
        open:form.open,
        created_by:user.id,
        created_by_name:displayName,
        created_at:new Date().toISOString()
      }).select().single();
      if(error) throw error;
      // Auto-join creator as member + admin
      await sb.from('group_members').insert({group_id:grp.id,user_id:user.id,display_name:displayName,role:'admin',joined_at:new Date().toISOString()});
      setGroups(prev=>[grp,...prev]);
      setMyMemberships(prev=>new Set([...prev,grp.id]));
      setForm(EMPTY);
      setShowCreate(false);
      setActiveGroup(grp);
    } catch(e) { alert('Could not create group. Run the groups SQL in Supabase first.\n'+e.message); }
    setSaving(false);
  };

  const joinGroup = async(grp)=>{
    await sb.from('group_members').insert({group_id:grp.id,user_id:user.id,display_name:displayName,role:'member',joined_at:new Date().toISOString()});
    setMyMemberships(prev=>new Set([...prev,grp.id]));
    setGroups(prev=>prev.map(g=>g.id===grp.id?{...g,member_count:(g.member_count||0)+1}:g));
  };

  const leaveGroup = async(grp)=>{
    if(!window.confirm('Leave "'+grp.name+'"?')) return;
    await sb.from('group_members').delete().eq('group_id',grp.id).eq('user_id',user.id);
    setMyMemberships(prev=>{ const n=new Set(prev); n.delete(grp.id); return n; });
    setGroups(prev=>prev.map(g=>g.id===grp.id?{...g,member_count:Math.max(0,(g.member_count||1)-1)}:g));
    if(activeGroup?.id===grp.id) setActiveGroup(null);
  };

  const deleteGroup = async(grp)=>{
    if(!window.confirm('Delete "'+grp.name+'"? This cannot be undone.')) return;
    await sb.from('community_chat').delete().eq('room_id','group-'+grp.id);
    await sb.from('group_members').delete().eq('group_id',grp.id);
    await sb.from('groups').delete().eq('id',grp.id);
    setGroups(prev=>prev.filter(g=>g.id!==grp.id));
    if(activeGroup?.id===grp.id) setActiveGroup(null);
  };

  const openGroup = (grp)=>{
    setActiveGroup(grp);
    localStorage.setItem('group_seen_'+grp.id, Date.now().toString());
    setGroupActivity(prev=>({...prev,[grp.id]:false}));
  };

  if(activeGroup) return h(GroupRoom,{group:activeGroup,user,profile,neighbors,myMemberships,
    onJoin:()=>joinGroup(activeGroup),
    onLeave:()=>leaveGroup(activeGroup),
    onDelete:()=>deleteGroup(activeGroup),
    onBack:()=>setActiveGroup(null),
    isAdmin,displayName});

  return h('div',null,
    // Header
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}},
      h('div',null,
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:17,color:'#1a1a2e'}},'👥 Community Groups'),
        h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#888',marginTop:2}},'Create or join groups with your neighbors')
      ),
      user&&h('button',{onClick:()=>setShowCreate(!showCreate),
        style:{background:showCreate?'#555':'#1a6b3c',color:'#fff',border:'none',padding:'8px 16px',
          borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}},
        showCreate?'✕ Cancel':'+ Create Group')
    ),

    // Create group form
    showCreate&&h('div',{style:{background:'#1a1a2e',borderRadius:12,padding:18,marginBottom:16}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:900,fontSize:15,color:'#f0c040',marginBottom:14}},'Create a New Group'),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Group Name *'),
        h('input',{value:form.name,onChange:setF('name'),placeholder:'e.g. Concord Neighbors, Jackson Urban Farmers...',
          style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,
            background:'#23233a',color:'#fff',boxSizing:'border-box'}})
      ),
      h('div',{style:{marginBottom:10}},
        h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Description'),
        h('textarea',{value:form.description,onChange:setF('description'),rows:2,
          placeholder:"What's this group about?",
          style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,
            background:'#23233a',color:'#fff',resize:'none',boxSizing:'border-box'}})
      ),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}},
        h('div',null,
          h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Topic'),
          h('select',{value:form.topic,onChange:setF('topic'),
            style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,
              background:'#23233a',color:'#fff',boxSizing:'border-box'}},
            GROUP_TOPICS.map(t=>h('option',{key:t,value:t},t))
          )
        ),
        h('div',null,
          h('label',{style:{fontSize:11,color:'#8899aa',textTransform:'uppercase',letterSpacing:1,display:'block',marginBottom:4}},'Membership'),
          h('select',{value:form.open?'open':'invite',
            onChange:e=>setForm(f=>({...f,open:e.target.value==='open'})),
            style:{width:'100%',border:'1px solid #444',borderRadius:6,padding:'9px 12px',fontSize:13,
              background:'#23233a',color:'#fff',boxSizing:'border-box'}},
            h('option',{value:'open'},'🌐 Open — anyone can join'),
            h('option',{value:'invite'},'🔒 Invite only')
          )
        )
      ),
      h('button',{onClick:createGroup,disabled:saving||!form.name.trim(),
        style:{width:'100%',background:saving||!form.name.trim()?'#555':'#f0c040',color:'#1a1a2e',
          border:'none',padding:'12px',borderRadius:7,fontFamily:"'Playfair Display',serif",
          fontWeight:900,fontSize:14,cursor:saving?'default':'pointer'}},
        saving?'Creating...':'Create Group →')
    ),

    // Group list
    loading&&h('div',{style:{textAlign:'center',padding:30,color:'#aaa',fontStyle:'italic'}},'Loading groups...'),
    !loading&&groups.length===0&&h('div',{style:{textAlign:'center',padding:40,color:'#aaa'}},
      h('div',{style:{fontSize:36,marginBottom:10}},'👥'),
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#555',marginBottom:6}},'No groups yet'),
      h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,lineHeight:1.6}},'Be the first to create one!')
    ),
    groups.map(grp=>{
      const isMember = myMemberships.has(grp.id);
      const hasActivity = groupActivity[grp.id];
      return h('div',{key:grp.id,style:{background:'#fff',border:'1px solid #e5dece',borderRadius:10,
        marginBottom:10,padding:'14px 16px',display:'flex',justifyContent:'space-between',
        alignItems:'center',gap:12,flexWrap:'wrap',
        boxShadow:hasActivity?'0 0 0 2px #c0392b33':'none'}},
        h('div',{style:{flex:1,minWidth:180,cursor:'pointer'},onClick:()=>openGroup(grp)},
          h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:'#1a1a2e'}},grp.name),
            hasActivity&&!isMember&&h('span',{style:{width:9,height:9,background:'#c0392b',borderRadius:'50%',display:'inline-block',flexShrink:0}}),
            hasActivity&&isMember&&h('span',{style:{background:'#c0392b',color:'#fff',fontSize:9,fontWeight:700,padding:'1px 6px',borderRadius:10}},'New')
          ),
          h('div',{style:{display:'flex',gap:6,flexWrap:'wrap',marginBottom:grp.description?6:0}},
            h('span',{style:{background:'#f0f4ff',color:'#1a5c8a',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20}},grp.topic),
            h('span',{style:{background:'#f5f5f5',color:'#777',fontSize:10,padding:'2px 8px',borderRadius:20}},grp.open?'🌐 Open':'🔒 Invite only'),
            h('span',{style:{fontSize:11,color:'#aaa'}},(grp.member_count||1)+' member'+((grp.member_count||1)!==1?'s':''))
          ),
          grp.description&&h('div',{style:{fontFamily:"'Lora',serif",fontSize:12,color:'#666',lineHeight:1.5}},
            grp.description.slice(0,100)+(grp.description.length>100?'...':''))
        ),
        h('div',{style:{display:'flex',gap:8,flexShrink:0}},
          h('button',{onClick:()=>openGroup(grp),
            style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'7px 14px',borderRadius:6,
              fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},
            '💬 Open'),
          !isMember&&grp.open&&h('button',{onClick:e=>{e.stopPropagation();joinGroup(grp);},

              fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},
            'Join'),
          isMember&&grp.created_by!==user?.id&&h('button',{onClick:e=>{e.stopPropagation();leaveGroup(grp);},

              borderRadius:6,fontSize:12,cursor:'pointer'}},
            'Leave'),
          isAdmin&&h('button',{onClick:e=>{e.stopPropagation();deleteGroup(grp);},
            style:{background:'transparent',border:'1px solid #fcc',color:'#c0392b',padding:'7px 10px',
              borderRadius:6,fontSize:11,cursor:'pointer'}},'🗑')
        )
      );
    })
  );
}

function GroupRoom({group, user, profile, neighbors, myMemberships, onJoin, onLeave, onDelete, onBack, isAdmin, displayName}) {
  const [messages, setMessages] = useState([]);
  const [members, setMembers] = useState([]);
  const [msgText, setMsgText] = useState('');
  const [sending, setSending] = useState(false);
  const [loading, setLoading] = useState(true);
  const [showMembers, setShowMembers] = useState(false);
  const [showInvite, setShowInvite] = useState(false);
  const [inviteSearch, setInviteSearch] = useState('');
  const [inviting, setInviting] = useState(null);
  const scrollRef = useRef(null);
  const pollRef = useRef(null);
  const fileInputRef = useRef(null);
  const [uploadingPhoto, setUploadingPhoto] = useState(false);

  const roomId = 'group-'+group.id;
  const isMember = myMemberships.has(group.id);

  const loadMessages = async()=>{
    const {data} = await sb.from('community_chat').select('*').eq('room_id',roomId)
      .order('created_at',{ascending:true}).limit(80);
    if(data) setMessages(data);
    setLoading(false);
  };

  const loadMembers = async()=>{
    const {data} = await sb.from('group_members').select('*').eq('group_id',group.id);
    setMembers(data||[]);
  };

  useEffect(()=>{
    loadMessages();
    loadMembers();
    pollRef.current = setInterval(loadMessages, 5000);
    return ()=>clearInterval(pollRef.current);
  },[]);

  useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  },[messages]);

  const sendMessage = async()=>{
    if(!msgText.trim()||!user||sending) return;
    setSending(true);
    const msg = {room_id:roomId,user_id:user.id,display_name:displayName,
      content:msgText.trim(),is_official:profile?.is_official||false,
      official_title:profile?.official_title||null,created_at:new Date().toISOString()};
    const {data} = await sb.from('community_chat').insert(msg).select().single();
    if(data) setMessages(prev=>[...prev,data]);
    else setMessages(prev=>[...prev,{...msg,id:Date.now()}]);
    setMsgText('');
    setSending(false);
  };

  const uploadPhoto = async(file)=>{
    if(!file||!user) return;
    if(file.size > 5*1024*1024) { alert('Photo must be under 5MB.'); return; }
    setUploadingPhoto(true);
    try {
      const ext = file.name.split('.').pop().toLowerCase();
      const path = 'chat/'+user.id+'-'+Date.now()+'.'+ext;
      const {error:upErr} = await sb.storage.from('chat-photos').upload(path,file,{upsert:true});
      if(upErr) throw upErr;
      const {data:{publicUrl}} = sb.storage.from('chat-photos').getPublicUrl(path);
      const msg = {room_id:roomId,user_id:user.id,display_name:displayName,
        content:'[photo]',image_url:publicUrl,is_official:profile?.is_official||false,
        created_at:new Date().toISOString()};
      const {data} = await sb.from('community_chat').insert(msg).select().single();
      if(data) setMessages(prev=>[...prev,data]);
      else setMessages(prev=>[...prev,{...msg,id:Date.now()}]);
    } catch(e) { alert('Upload failed: '+e.message); }
    setUploadingPhoto(false);
    if(fileInputRef.current) fileInputRef.current.value='';
  };

  const inviteNeighbor = async(neighbor)=>{
    setInviting(neighbor.id);
    try {
      const already = members.find(m=>m.user_id===neighbor.id);
      if(already) { alert(neighbor.display_name+' is already in this group.'); setInviting(null); return; }
      await sb.from('group_members').insert({
        group_id:group.id,user_id:neighbor.id,
        display_name:neighbor.display_name||'Neighbor',
        role:'member',joined_at:new Date().toISOString()
      });
      // Notify them
      try {
        await sb.from('notifications').insert({
          user_id:neighbor.id,type:'group',
          title:'You were added to "'+group.name+'"',
          body:displayName+' invited you to join the group.',
          read:false,created_at:new Date().toISOString()
        });
      } catch(e) {}
      await loadMembers();
    } catch(e) { alert('Could not invite: '+e.message); }
    setInviting(null);
  };

  const removeMember = async(member)=>{
    if(!window.confirm('Remove '+member.display_name+' from this group?')) return;
    await sb.from('group_members').delete().eq('group_id',group.id).eq('user_id',member.user_id);
    setMembers(prev=>prev.filter(m=>m.user_id!==member.user_id));
  };

  const filteredNeighbors = neighbors.filter(n=>
    n.id!==user?.id &&
    (n.display_name||'').toLowerCase().includes(inviteSearch.toLowerCase())
  );

  const memberIds = new Set(members.map(m=>m.user_id));

  return h('div',{style:{background:'#fff',borderRadius:10,overflow:'hidden',border:'1px solid #e5dece'}},
    // Header
    h('div',{style:{background:'#1a1a2e',padding:'12px 16px',display:'flex',alignItems:'center',gap:10}},
      h('button',{onClick:onBack,style:{background:'transparent',border:'none',color:'#8899aa',
        cursor:'pointer',fontSize:18,padding:'0 4px',lineHeight:1}},'←'),
      h('div',{style:{flex:1}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,color:'#f0c040',fontSize:15}},group.name),
        h('div',{style:{fontSize:11,color:'#8899aa',marginTop:1}},group.topic+' · '+members.length+' member'+(members.length!==1?'s':''))
      ),
      h('button',{onClick:()=>setShowInvite(!showInvite),
        style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'6px 12px',borderRadius:6,
          fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:12,cursor:'pointer'}},
        '+ Invite'),
      h('button',{onClick:()=>setShowMembers(!showMembers),
        style:{background:'rgba(255,255,255,.1)',color:'#f0c040',border:'none',padding:'6px 12px',
          borderRadius:6,fontSize:12,cursor:'pointer'}},
        '👥 '+members.length)
    ),

    // Invite panel
    showInvite&&h('div',{style:{background:'#f0f8ff',borderBottom:'1px solid #c8d8f0',padding:'12px 16px'}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e',marginBottom:8}},'Invite a Neighbor'),
      h('input',{value:inviteSearch,onChange:e=>setInviteSearch(e.target.value),
        placeholder:'Search by name...',
        style:{width:'100%',border:'1px solid #ddd',borderRadius:6,padding:'8px 12px',fontSize:13,
          boxSizing:'border-box',marginBottom:8}}),
      h('div',{style:{maxHeight:180,overflowY:'auto',display:'flex',flexDirection:'column',gap:4}},
        filteredNeighbors.slice(0,20).map(n=>
          h('div',{key:n.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',
            background:'#fff',borderRadius:6,padding:'7px 10px',border:'1px solid #e5dece'}},
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:13,fontWeight:600,color:'#1a1a2e'}},
              n.display_name||'Neighbor'),
            memberIds.has(n.id)
              ? h('span',{style:{fontSize:11,color:'#1a6b3c',fontWeight:700}},'✓ Member')
              : h('button',{onClick:()=>inviteNeighbor(n),disabled:inviting===n.id,
                  style:{background:'#1a5c8a',color:'#fff',border:'none',padding:'5px 12px',
                    borderRadius:5,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:11,cursor:'pointer'}},
                  inviting===n.id?'...':'Invite')
          )
        ),
        filteredNeighbors.length===0&&h('div',{style:{textAlign:'center',padding:12,color:'#aaa',fontSize:12,fontStyle:'italic'}},'No neighbors found')
      )
    ),

    // Members panel
    showMembers&&h('div',{style:{background:'#faf8f3',borderBottom:'1px solid #e5dece',padding:'12px 16px'}},
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#1a1a2e',marginBottom:8}},'Members'),
      h('div',{style:{display:'flex',flexWrap:'wrap',gap:6}},
        members.map(m=>h('div',{key:m.user_id,style:{background:'#fff',border:'1px solid #e5dece',
          borderRadius:20,padding:'4px 10px',fontSize:12,display:'flex',alignItems:'center',gap:6}},
          h('span',{style:{fontWeight:600,color:'#1a1a2e'}},m.display_name),
          m.role==='admin'&&h('span',{style:{fontSize:9,background:'#f0c040',color:'#1a1a2e',
            fontWeight:700,padding:'1px 5px',borderRadius:10}},'ADMIN'),
          (isAdmin||group.created_by===user?.id)&&m.user_id!==user?.id&&
            h('button',{onClick:()=>removeMember(m),style:{background:'none',border:'none',
              color:'#c0392b',cursor:'pointer',fontSize:11,padding:'0 2px'}},'✕')
        ))
      )
    ),

    // Messages
    h('div',{ref:scrollRef,style:{height:300,overflowY:'auto',padding:'12px 16px',
      display:'flex',flexDirection:'column',gap:8}},
      loading&&h('div',{style:{textAlign:'center',padding:20,color:'#aaa',fontStyle:'italic'}},'Loading...'),
      !loading&&messages.length===0&&h('div',{style:{textAlign:'center',padding:30,color:'#aaa'}},
        h('div',{style:{fontSize:28,marginBottom:8}},'👋'),
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:14,fontWeight:700,color:'#555'}},'Welcome to '+group.name),
        h('div',{style:{fontSize:12,fontStyle:'italic',marginTop:4}},'Say hello to the group!')
      ),
      messages.map((m,i)=>{
        const isMe = m.user_id===user?.id;
        return h('div',{key:m.id||i,style:{display:'flex',gap:8,alignItems:'flex-start',flexDirection:isMe?'row-reverse':'row'}},
          h('div',{style:{width:28,height:28,borderRadius:'50%',flexShrink:0,
            background:m.is_official?'#1a5c8a':'#1a1a2e',color:'#f0c040',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}},
            (m.display_name||'?')[0].toUpperCase()),
          h('div',{style:{maxWidth:'75%'}},
            h('div',{style:{display:'flex',gap:6,alignItems:'center',marginBottom:2,flexDirection:isMe?'row-reverse':'row'}},
              h('span',{style:{fontSize:11,fontWeight:700,color:isMe?'#1a5c8a':'#1a1a2e'}},isMe?'You':m.display_name),
              h('span',{style:{fontSize:10,color:'#bbb'}},m.created_at?new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'')
            ),
            m.image_url
              ? h('img',{src:m.image_url,alt:'photo',style:{maxWidth:200,maxHeight:200,borderRadius:8,display:'block',cursor:'pointer'},onClick:()=>window.open(m.image_url,'_blank')})
              : h('div',{style:{background:isMe?'#e8f2fa':'#f5f3ee',border:'1px solid '+(isMe?'#c8d8f0':'#e5dece'),
                  borderRadius:8,padding:'8px 11px',fontSize:13,fontFamily:"'Lora',serif",lineHeight:1.5,color:'#333'}},
                  m.content)
          )
        );
      })
    ),

    // Input
    isMember
      ? h('div',{style:{padding:'10px 12px',borderTop:'1px solid #e5dece',background:'#faf8f3',display:'flex',gap:8,alignItems:'center'}},
          h('input',{ref:fileInputRef,type:'file',accept:'image/*',style:{display:'none'},onChange:e=>e.target.files[0]&&uploadPhoto(e.target.files[0])}),
          h('button',{onClick:()=>fileInputRef.current&&fileInputRef.current.click(),disabled:uploadingPhoto,title:'Send a photo',
            style:{background:'transparent',border:'1px solid #ddd',borderRadius:'50%',width:34,height:34,
              display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,fontSize:15,color:uploadingPhoto?'#ccc':'#888'}},
            uploadingPhoto?'⏳':'📷'),
          h('input',{value:msgText,onChange:e=>setMsgText(e.target.value.slice(0,1000)),
            onKeyDown:e=>e.key==='Enter'&&!e.shiftKey&&sendMessage(),
            placeholder:'Message the group...',maxLength:1000,
            style:{flex:1,border:'1px solid #ddd',borderRadius:20,padding:'9px 14px',fontSize:13,
              fontFamily:"'Lora',serif",background:'#fff'}}),
          h('button',{onClick:sendMessage,disabled:!msgText.trim()||sending,
            style:{background:msgText.trim()&&!sending?'#1a1a2e':'#ddd',color:msgText.trim()&&!sending?'#f0c040':'#aaa',
              border:'none',borderRadius:20,padding:'9px 16px',fontFamily:"'Playfair Display',serif",
              fontWeight:700,fontSize:13,cursor:msgText.trim()&&!sending?'pointer':'default',whiteSpace:'nowrap'}},
            'Send')
        )
      : h('div',{style:{padding:'12px 16px',borderTop:'1px solid #e5dece',background:'#faf8f3',textAlign:'center'}},
          group.open
            ? h('button',{onClick:onJoin,style:{background:'#1a6b3c',color:'#fff',border:'none',padding:'9px 24px',
                borderRadius:7,fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,cursor:'pointer'}},
                'Join Group to Chat')
            : h('div',{style:{fontSize:13,color:'#888',fontStyle:'italic'}},'This is an invite-only group.')
        )
  );
}

function DirectMessages({user, profile, neighbors, initThread, onClearThread}) {
  const [thread, setThread] = useState(initThread||null); // {userId, displayName}
  const [conversations, setConversations] = useState([]); // list of people you've messaged
  const [messages, setMessages] = useState([]);
  const [msgText, setMsgText] = useState('');
  const [sending, setSending] = useState(false);
  const [loadingMsgs, setLoadingMsgs] = useState(false);
  const [showNewDm, setShowNewDm] = useState(false);
  const [search, setSearch] = useState('');
  const bottomRef = useRef(null);
  const scrollRef = useRef(null);
  const pollRef = useRef(null);

  const myName = profile?.display_name||user?.email?.split('@')[0]||'Resident';

  useEffect(()=>{
    loadConversations();
    return ()=>{ if(pollRef.current) clearInterval(pollRef.current); };
  },[]);

  useEffect(()=>{
    if(initThread) { setThread(initThread); if(onClearThread) onClearThread(); }
  },[initThread]);

  useEffect(()=>{
    if(thread) {
      loadMessages(thread.userId);
      if(pollRef.current) clearInterval(pollRef.current);
      pollRef.current = setInterval(()=>loadMessages(thread.userId), 5000);
    }
    return ()=>{ if(pollRef.current) clearInterval(pollRef.current); };
  },[thread]);

  useEffect(()=>{
    if(scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  },[messages]);

  const loadConversations = async()=>{
    try {
      const {data:sent} = await sb.from('direct_messages').select('recipient_id,recipient_name').eq('sender_id',user.id).order('created_at',{ascending:false});
      const {data:recv} = await sb.from('direct_messages').select('sender_id,sender_name,read').eq('recipient_id',user.id).order('created_at',{ascending:false});
      const people = new Map();
      (sent||[]).forEach(m=>{ if(!people.has(m.recipient_id)) people.set(m.recipient_id,{userId:m.recipient_id,displayName:m.recipient_name,unread:0}); });
      (recv||[]).forEach(m=>{ 
        if(!people.has(m.sender_id)) people.set(m.sender_id,{userId:m.sender_id,displayName:m.sender_name,unread:0});
        if(!m.read) people.get(m.sender_id).unread = (people.get(m.sender_id).unread||0)+1;
      });
      setConversations(Array.from(people.values()));
    } catch(e) { /* table not yet created */ }
  };

  const loadMessages = async(otherId)=>{
    setLoadingMsgs(true);
    const {data} = await sb.from('direct_messages')
      .select('*')
      .or(`and(sender_id.eq.${user.id},recipient_id.eq.${otherId}),and(sender_id.eq.${otherId},recipient_id.eq.${user.id})`)
      .order('created_at',{ascending:true}).limit(60);
    setMessages(data||[]);
    // Mark received messages as read
    await sb.from('direct_messages').update({read:true}).eq('recipient_id',user.id).eq('sender_id',otherId).eq('read',false);
    setLoadingMsgs(false);
  };

  const sendMessage = async()=>{
    if(!msgText.trim()||!thread||sending) return;
    setSending(true);
    const msgContent = msgText.trim();
    const {data,error} = await sb.from('direct_messages').insert({
      sender_id: user.id,
      sender_name: myName,
      recipient_id: thread.userId,
      recipient_name: thread.displayName,
      content: msgContent,
      read: false,
      created_at: new Date().toISOString()
    }).select().single();
    if(data) setMessages(prev=>[...prev,data]);
    setMsgText('');
    setSending(false);
    // Make sure conversation shows in list
    setConversations(prev=>{
      if(prev.find(c=>c.userId===thread.userId)) return prev;
      return [{userId:thread.userId,displayName:thread.displayName,unread:0},...prev];
    });
    // Write a notification row for the recipient so their bell lights up
    try {
      await sb.from('notifications').insert({
        user_id: thread.userId,
        type: 'dm',
        title: 'New message from ' + myName,
        body: msgContent.slice(0, 120),
        read: false,
        created_at: new Date().toISOString()
      });
    } catch(e) { /* notifications table may not exist yet */ }
  };

  const openThread = (userId, displayName)=>{
    setThread({userId,displayName});
    setShowNewDm(false);
    setSearch('');
    // Update unread count
    setConversations(prev=>prev.map(c=>c.userId===userId?{...c,unread:0}:c));
  };

  const filteredNeighbors = neighbors.filter(n=>
    n.id!==user?.id &&
    (n.display_name||'').toLowerCase().includes(search.toLowerCase())
  );

  return h('div',{style:{display:'flex',gap:0,background:'#fff',borderRadius:10,overflow:'hidden',border:'1px solid #e5dece',minHeight:480}},

    // Left — conversation list
    h('div',{style:{width:220,borderRight:'1px solid #e5dece',display:'flex',flexDirection:'column',flexShrink:0}},
      h('div',{style:{padding:'12px 14px',borderBottom:'1px solid #e5dece',display:'flex',justifyContent:'space-between',alignItems:'center',background:'#1a1a2e'}},
        h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:'#f0c040'}},'Direct Messages'),
        h('button',{onClick:()=>setShowNewDm(!showNewDm),
          style:{background:'#f0c040',color:'#1a1a2e',border:'none',borderRadius:5,
            padding:'4px 8px',fontSize:11,cursor:'pointer',fontFamily:"'Playfair Display',serif",fontWeight:700}
        },'+ New')
      ),
      // New DM — search neighbors
      showNewDm&&h('div',{style:{padding:'10px 12px',borderBottom:'1px solid #e5dece',background:'#f5f3ee'}},
        h('input',{value:search,onChange:e=>setSearch(e.target.value),
          placeholder:'Search members...',autoFocus:true,
          style:{width:'100%',border:'1px solid #ddd',borderRadius:5,padding:'6px 8px',
            fontSize:12,boxSizing:'border-box',fontFamily:"'Lora',serif"}}),
        h('div',{style:{maxHeight:160,overflowY:'auto',marginTop:6}},
          filteredNeighbors.slice(0,10).map(n=>
            h('div',{key:n.id,onClick:()=>openThread(n.id,n.display_name||n.email?.split('@')[0]||'Resident'),
              style:{padding:'7px 8px',cursor:'pointer',borderRadius:5,fontSize:12,
                fontFamily:"'Lora',serif",color:'#333',
                display:'flex',alignItems:'center',gap:8}},
              h('div',{style:{width:24,height:24,borderRadius:'50%',background:'#1a1a2e',
                color:'#f0c040',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:10,fontWeight:700,flexShrink:0}},
                (n.display_name||'?')[0].toUpperCase()
              ),
              n.display_name||n.email?.split('@')[0]||'Resident'
            )
          ),
          filteredNeighbors.length===0&&h('div',{style:{fontSize:11,color:'#aaa',padding:'6px 8px',fontStyle:'italic'}},'No members found')
        )
      ),
      // Conversation list
      h('div',{style:{flex:1,overflowY:'auto'}},
        conversations.length===0&&!showNewDm&&h('div',{style:{padding:20,textAlign:'center',color:'#aaa',fontSize:12,fontStyle:'italic',lineHeight:1.6}},
          'No messages yet.',h('br'),'Click + New to start a private conversation.'
        ),
        conversations.map(c=>
          h('div',{key:c.userId,onClick:()=>openThread(c.userId,c.displayName),
            style:{padding:'10px 14px',cursor:'pointer',
              background:thread?.userId===c.userId?'#e8f2fa':'transparent',
              borderBottom:'1px solid #f5f3ee',
              borderLeft:thread?.userId===c.userId?'3px solid #1a5c8a':'3px solid transparent',
              display:'flex',alignItems:'center',gap:8}},
            h('div',{style:{position:'relative',flexShrink:0}},
              h('div',{style:{width:30,height:30,borderRadius:'50%',background:'#1a1a2e',
                color:'#f0c040',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:12,fontWeight:700}},
                (c.displayName||'?')[0].toUpperCase()
              ),
              c.unread>0&&h('span',{style:{
                position:'absolute',top:-3,right:-3,
                width:10,height:10,
                background:'#c0392b',borderRadius:'50%',
                border:'2px solid #fff',display:'block'
              }})
            ),
            h('div',{style:{flex:1,minWidth:0}},
              h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:c.unread>0?700:400,fontSize:12,
                color:'#1a1a2e',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},c.displayName),
              c.unread>0&&h('div',{style:{fontSize:10,color:'#c0392b',fontWeight:700}},c.unread+' new message'+(c.unread>1?'s':''))
            )
          )
        )
      )
    ),

    // Right — message thread
    h('div',{style:{flex:1,display:'flex',flexDirection:'column'}},
      !thread
        ? h('div',{style:{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,color:'#aaa',padding:30}},
            h('div',{style:{fontSize:40}},'✉️'),
            h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:'#1a1a2e'}},'Private Messages'),
            h('div',{style:{fontFamily:"'Lora',serif",fontSize:13,textAlign:'center',lineHeight:1.7,color:'#888',maxWidth:280}},
              'Select a conversation or click + New to send a private message to any Jackson County resident.'
            )
          )
        : h('div',{style:{flex:1,display:'flex',flexDirection:'column'}},
            // Thread header
            h('div',{style:{padding:'12px 16px',borderBottom:'1px solid #e5dece',background:'#f5f3ee',
              display:'flex',alignItems:'center',gap:10}},
              h('div',{style:{width:32,height:32,borderRadius:'50%',background:'#1a1a2e',
                color:'#f0c040',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:14,fontWeight:700}},
                (thread.displayName||'?')[0].toUpperCase()
              ),
              h('div',null,
                h('div',{style:{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:14,color:'#1a1a2e'}},thread.displayName),
                h('div',{style:{fontSize:10,color:'#aaa',fontFamily:"'Lora',serif"}},'Private · only you two can see this')
              ),
              h('button',{onClick:()=>setThread(null),
                style:{marginLeft:'auto',background:'transparent',border:'none',color:'#aaa',cursor:'pointer',fontSize:16}
              },'×')
            ),
            // Messages
            h('div',{ref:scrollRef,style:{flex:1,overflowY:'auto',padding:'12px 16px'}},
              loadingMsgs&&h('div',{style:{textAlign:'center',color:'#aaa',fontSize:12,fontStyle:'italic'}},'Loading...'),
              messages.length===0&&!loadingMsgs&&h('div',{style:{textAlign:'center',color:'#aaa',fontSize:12,fontStyle:'italic',padding:20}},
                'No messages yet. Say hello!'
              ),
              messages.map((m,i)=>{
                const isMe = m.sender_id===user.id;
                return h('div',{key:m.id||i,style:{display:'flex',justifyContent:isMe?'flex-end':'flex-start',marginBottom:10}},
                  h('div',{style:{maxWidth:'75%'}},
                    !isMe&&h('div',{style:{fontSize:10,color:'#aaa',marginBottom:3,fontFamily:"'Lora',serif"}},m.sender_name),
                    h('div',{style:{background:isMe?'#1a1a2e':'#f5f3ee',
                      color:isMe?'#f0c040':'#333',
                      borderRadius:isMe?'12px 12px 2px 12px':'12px 12px 12px 2px',
                      padding:'9px 13px',fontSize:13,fontFamily:"'Lora',serif",lineHeight:1.6}},m.content),
                    h('div',{style:{fontSize:10,color:'#bbb',marginTop:3,textAlign:isMe?'right':'left',fontFamily:"'Lora',serif"}},
                      new Date(m.created_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})
                    )
                  )
                );
              }),
              h('div',{ref:bottomRef})
            ),
            // Input
            h('div',{style:{padding:'10px 12px',borderTop:'1px solid #e5dece',display:'flex',gap:8,alignItems:'flex-end',background:'#faf8f5'}},
              h('textarea',{value:msgText,onChange:e=>setMsgText(e.target.value.slice(0,1000)),
                onKeyDown:e=>e.key==='Enter'&&!e.shiftKey&&(e.preventDefault(),sendMessage()),
                placeholder:'Message '+thread.displayName+'...',
                rows:3,
                maxLength:1000,
                style:{flex:1,border:'1px solid #ddd',borderRadius:12,padding:'9px 14px',
                  fontSize:13,fontFamily:"'Lora',serif",background:'#fff',
                  resize:'none',lineHeight:1.5,boxSizing:'border-box'}}),
              h('button',{onClick:sendMessage,disabled:!msgText.trim()||sending,
                style:{background:msgText.trim()&&!sending?'#1a1a2e':'#ddd',
                  color:msgText.trim()&&!sending?'#f0c040':'#aaa',
                  border:'none',borderRadius:12,padding:'9px 16px',

// ── Chat activity dot helpers (localStorage) ──────────────────────────────────
const SEEN_KEY = r => 'chat_seen_'+r;
const getRoomSeen = r => parseInt(localStorage.getItem(SEEN_KEY(r))||'0');
const setRoomSeen = r => localStorage.setItem(SEEN_KEY(r), Date.now().toString());
const checkRoomActivity = async(rooms) => {
  const activity = {};
  try {
    const cutoff = new Date(Date.now() - 7*24*60*60*1000).toISOString(); // only check last 7 days
    for(const r of rooms) {
      const seen = getRoomSeen(r.id);
      const seenIso = new Date(seen||0).toISOString();
      const {count} = await sb.from('community_chat')
        .select('id',{count:'exact',head:true})
        .eq('room_id',r.id)
        .gt('created_at', seen ? seenIso : cutoff);
      activity[r.id] = (count||0) > 0;
    }
  } catch(e) {}
  return activity;
};

  const [activeRoom, setActiveRoom] = useState('general');
  const [messages, setMessages] = useState([]);
  const [msgText, setMsgText] = useState('');
  const [sending, setSending] = useState(false);
  const [neighbors, setNeighbors] = useState([]);
  const [connections, setConnections] = useState(new Set());

  const fileInputRef = useRef(null);
  const bottomRef = useRef(null);
  const chatScrollRef = useRef(null);
  const pollRef = useRef(null);

  const displayName = profile?.display_name||user?.email?.split('@')[0]||'Resident';
  const userZip = profile?.zip||'';

  // Load neighbors
  useEffect(()=>{
    sb.from('profiles').select('id,display_name,zip,reputation,avatar_url,tagline,bio,is_official,official_title,created_at,badges,show_in_directory').or('show_in_directory.is.null,show_in_directory.eq.true').order('reputation',{ascending:false}).limit(50).then(({data})=>{ setNeighbors(data||[]); setLoadingNeighbors(false); });

    if(user?.id) {
      sb.from('neighbor_connections').select('neighbor_id').eq('user_id',user.id)
        .then(({data})=>{ setConnections(new Set((data||[]).map(r=>r.neighbor_id))); });
      // Load unread DM count — wrapped in try-catch in case table doesn't exist yet
      try {
        sb.from('direct_messages').select('id',{count:'exact',head:true})
          .eq('recipient_id',user.id).eq('read',false)
          .then(({count,error})=>{ if(!error) setUnreadDms(count||0); });

    }
  },[]);

  const toggleConnection = async(neighborId)=>{
    if(!user) return;
    const isConnected = connections.has(neighborId);
    if(isConnected) {
      await sb.from('neighbor_connections').delete().eq('user_id',user.id).eq('neighbor_id',neighborId);
      setConnections(prev=>{ const n=new Set(prev); n.delete(neighborId); return n; });
    } else {
      await sb.from('neighbor_connections').insert({user_id:user.id,neighbor_id:neighborId,created_at:new Date().toISOString()});
      setConnections(prev=>new Set([...prev,neighborId]));
    }
  };

  // Load + poll messages
  const loadMessages = async(room)=>{
    const {data} = await sb.from('community_chat')
      .select('*').eq('room_id',room)
      .order('created_at',{ascending:true}).limit(60);
    if(data) setMessages(data);
    setLoadingMsgs(false);
  };

  useEffect(()=>{
    setLoadingMsgs(true);
    loadMessages(activeRoom);
    setRoomSeen(activeRoom); // mark this room as seen when we open it
    clearInterval(pollRef.current);
    pollRef.current = setInterval(()=>loadMessages(activeRoom), 5000);
    return ()=>clearInterval(pollRef.current);
  },[activeRoom]);

  // Load activity dots on mount
  useEffect(()=>{
    checkRoomActivity(CHAT_ROOMS).then(setRoomActivity);

  // Scroll chat to bottom inside container only

    if(chatScrollRef.current) chatScrollRef.current.scrollTop = chatScrollRef.current.scrollHeight;
  },[messages]);

  const sendMessage = async()=>{
    if(!msgText.trim()||!user) return;
    if(msgText.trim().length > 1000) return;
    setSending(true);
    const msg = {
      room_id: activeRoom,
      user_id: user.id,
      display_name: displayName,
      content: msgText.trim(),
      is_official: profile?.is_official||false,
      official_title: profile?.official_title||null,
      is_press: profile?.is_press||false,
      press_outlet: profile?.press_outlet||null,
      created_at: new Date().toISOString()
    };
    const {data} = await sb.from('community_chat').insert(msg).select().single();
    if(data) setMessages(prev=>[...prev,data]);
    else setMessages(prev=>[...prev,{...msg,id:Date.now()}]);
    setMsgText('');
    setSending(false);
  };

  const uploadPhoto = async(file)=>{
    if(!file||!user) return;
    if(file.size > 5*1024*1024) { alert('Photo must be under 5MB.'); return; }
    setUploadingPhoto(true);
    try {
      const ext = file.name.split('.').pop().toLowerCase();
      const path = 'chat/'+user.id+'-'+Date.now()+'.'+ext;
      const {data:upData, error:upErr} = await sb.storage.from('chat-photos').upload(path, file, {upsert:true});
      if(upErr) throw upErr;
      const {data:{publicUrl}} = sb.storage.from('chat-photos').getPublicUrl(path);
